body:
  text: 古吳後學蕅益智旭述二別說迹本兩門大分為二初自今文至安樂行品是迹門開權顯實二自從地涌出品至常不輕品是本門開近顯遠初迹門開權顯實為三初序段二自方便品至授學無學人記品是正說段三自法師品至安樂行品為流通段初序段五初衆集序二現瑞序三疑念序四發問序五答問序集衆敘人一現瑞敘理一疑念敘行一問答敘教一此因緣釋也集衆是世界現瑞是第一義疑念是為人問答是對治一往如此約教者此序序正非三藏非通非別乃是序於圓正耳開已唯圓故云非也本迹者若以序序壽量品中本地四一此義自可知本門須至壽量然亦可以預表當知此序顯表迹四密表本四久成不逾此四故也久近雖殊四一理等觀心者一心三諦理一也一心三觀行一也作是觀者人一也能詮觀境教一也又常觀三德能所皆四法身理也般若教也解脫行也和合三法成假名人即觀行如來也約六即位位位四一於念念中念念四一一色一香無非四一如此觀行真法華三昧也心境互發即因緣觀之四一不同三教即約教觀之四一久遠已得即本地觀之四一初衆集序爾時世尊四衆圍繞供養恭敬尊重讚歎上句是衆集威儀下句是衆集供養爾時者欲現六瑞時也四衆者一發起衆二當機衆三影響衆四結緣衆也發起者權謀智鑒知機知時擊揚發動成辦利益如大象躃樹使象子得飽所謂發起令集發起瑞相乃至發起問答等皆名發起衆應物施設名權順宜制立名謀有權之謀故名權謀實智內融不慮而當故云智鑒鑒其宿善可生可成故名知機逗會無舛故名知時此內德也擊平等之大慈發時衆之一善揚不二之大慧動稟益之三業又擊大會之宿因發當機之妙益揚如來之大教動時衆之固執又扣佛大悲名擊咨啓聖旨名揚令聞所未聞名發動使聞者果遂名成辦遂必獲悟名利益此外用也大權象王躃法身樹至起應地演一乘之實唱飽妙行之機緣發起五序咸益物機乃至問答等者等取正宗當機者宿值德本緣合時熟不起於座聞即得道尅論在初住通收乃攝六根五品影響者古往諸佛法身菩薩隱其圓極匡輔法王雖無為作而有巨益化主形聲必資伴以影響故大論問諸比丘何故常隨世尊答如病差隨醫顯醫功也此舉實行者尚有影響之儀況法身古佛垂形助化者耶故知四衆如輕病者差八部如重病者差輕重俱有權實影響結緣者力無引導擊動之能德非伏物鎮嚴之用過去根淺三慧不生現世雖見佛聞法無四悉益但作未來得度因緣四悉俱得名為當機五品世界益也六根為人對治益也初住去第一義益也但未入品俱名結緣故五品前無復三慧四益無聞慧故無世界益無思慧故無為人益無修慧故無對治益無證入故無第一義益第一義益有通有別通收五品別在初住故得度之言亦有通別即是第一義之通別也比丘衆既有四別餘三衆亦然合十六衆類如大通佛時王子覆講即彼時發起衆聞法得道即彼時當機衆聞法未度而世世相值於今有住聲聞地者即彼時結緣衆彼佛既有四四一十六衆今佛道同寧得無耶此是圓教十六衆約三教亦例可知本迹者且約體用以明本迹本住尊極或深位法身迹為四教一十六衆觀心者研境作觀在名字觀行位中即成結緣衆入相似位即成當機衆入分真位即成發起影響衆若舊入者唯名影響若新入者得是當機亦是影響及以發起如發誓弘經之徒圍繞者佛初出世人未知法淨居天下化為人像到已右旋旋已敬禮禮已却坐聽法遂以為楷此因緣釋也淨居天下即世界化為人像即為人以為楷即對治禮已聽法即第一義圍繞謂行旋威儀表四門機動俱見圓理以圓對偏例有四義即約教釋也又佛身周匝相好莊嚴四旋瞻仰增念佛定即觀心釋也若觀佛色身得見法身即本迹釋又約體用及久近者本住非動非不動之法身迹示諸教機動繞佛供養者通論則三業皆是供養別論則卑謹虔禮名恭敬至心專注名尊重發言稱美名讚歎施以依報名供養此中文略廣說應如無量義經天厨天香天鉢器等是供養大莊嚴菩薩及八萬大士合掌叉手是恭敬一心瞻仰是尊重說七言偈是讚歎彼經衆集說法竟儼然不散即彼座席說今法華故用彼廣以釋此略於義無妨二現瑞序二初此土六瑞二他土六瑞初中六初說法瑞二入定瑞三雨華瑞四地動瑞五衆喜瑞六放光瑞說法表說法妙智妙入定表行妙雨華表位妙地動表境妙乘妙衆喜表眷屬妙利益妙放光表感應妙神通妙是故六俱名現瑞序此與玄義神通妙中有不同者彼則通收香風地淨兩土六瑞故遍取之今文不列他土文者此土自足故也凡諸取文皆有通別凡所表語意並含弘是則大事大人作大感動大機大益顯於大理須大眷屬以輔大會俱感大時大運成熟自非靈山共稟此世親承焉能契之曷有測之初說法瑞為諸菩薩說大乘經名無量義教菩薩法佛所護念初句列所說法體次句列體上之名第三句明菩薩所依第四句明佛之所護也大乘者善戒經有七大一法大謂十二部毗佛略二心大謂求無上大菩提三解大謂解菩薩藏四淨大謂見道淨心地五莊嚴大謂福德智慧六時大謂三阿僧祇行行七具足大謂以相好自嚴而得菩提六是因大七是果大大因大果名大乘經今將十妙對之法大是境妙心大解大是智妙淨大莊嚴大是行妙時大是位妙具足大是三法妙由因有果能豈無所故但有前五必兼後五然彼三祇義涉三藏從名同邊可對十妙無量義者彼經云從一法生其一法者所謂無相無相不相名為實相從此實相生無量法所謂二法三道四果今為釋之無相者無生死相也不相者不涅槃相也涅槃亦無故言不相正指中道為實相也二法即頓漸頓謂華嚴頓中一切法也漸謂三藏方等般若一切法也三道即三乘四果即羅漢支佛菩薩佛也此等諸法名為無量實相名義處從一義處出無量法得與無量法入一義處作序譬如算者從一算下諸算除諸算歸一算由下故除下為除序開為合序亦復如是從一派諸收諸歸一教菩薩法者無量義處用教菩薩也義處即諦理也下文云普令一切衆亦同得此道又云若我過衆生盡教以佛道即此意也佛所護念者無量義處是佛自所證得下文云佛自住大乘也雖欲開示而衆生根鈍久默斯要不務速說故言護念二入定瑞佛說此經已結加趺坐入於無量義處三昧身心不動加趺坐者古往諸佛及弟子盡行此法故令人恭敬可人天意故不與世儀外道共能破魔軍故能發三菩提心故此即四悉檀意說經已入三昧者慧定相成非禪不智故先入定非智不禪故先說法即智而禪即禪而智先後入出無有隔礙疑者云若未說無量義可入斯定說此經已何故入定釋言是為法華作序耳何者若不先開則後無所合先入開定為合定作序故稱為瑞相也身心不動者與所緣實相義處相應也身之本源湛若虗空心之理性畢竟常寂下文讚大通智勝佛云身心及手足寂然安不動其心常憺怕未曾有散亂今身若金剛不可動轉心若虗空無有分別無量義處三昧法持於身心故不動也定依義處仍稱為無量者此定寂而常照能知世間從此一法出無量法也夫身法體運動今令不運動心法體分別今令不分別序義明矣問瑞相本論奇異說法入定佛之恆儀何得為瑞答說法雖竟由即入定令時衆不散肅有所待故知前之說法舉衆來集待於後聞此事奇特與常說異何意非瑞雖入開定意在合定與常入定有異何意非瑞又文殊引古佛六瑞皆有此事若昔非瑞相何以證今今古同然豈可以凡情而非之耶三雨華瑞是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆四華舊翻白大白赤大赤或翻適意大適意柔軟大柔軟白表十住開佛知見大白表十行示佛知見赤表十回向悟佛知見大赤表十地入佛知見四十位皆是佛因是因由中道第一義生故從天而雨因有趣果之義故而散佛上如此因果誰當感尅秪是此會時衆故言及諸大衆四地動瑞普佛世界六種震動表圓教十住十行十向十地等覺妙覺凡六番破無明也無明磐未曾侵毀方將破壞故動地以表之優婆塞清淨行經云菩薩生時動地示此生已盡無復煩惱一切衆生應得道者煩惱將滅故動即此義也本迹釋者如文殊釋疑引古佛為答密得此意即是識本非但他佛昔現斯瑞而我世尊本亦斯瑞非今一反也觀心釋者動六根也六根冰執如地相堅固動難動之地表淨未淨之根東涌西沒等者東方青主肝肝主眼西方白主肺肺主鼻此表眼根功德生鼻根煩惱互滅鼻根功德生眼根煩惱互滅南方赤主心心主舌北方黑主腎腎主耳四邊表身中央表意身具四根意遍緣四相對涌沒以表功德互生煩惱互滅可知六種者舊云動起涌震吼覺搖揚不安名動自下升高名起凹凸出沒名涌隱隱有聲名震砰礚發響名吼令物驚悟名覺新云動踊擊震吼𪹼擊如打搏𪹼若火聲前三是形後三是聲經論略標但云震動即形聲各標一也一一中又有三謂動遍動等遍動當處動為動四天下動為遍動大千動為等遍動餘五亦爾合十八震動即表淨十八界也又根根皆修三觀如十八動然動相雖有十八而所動唯是一地如根雖有六界雖十八以無明破故一切俱破五衆喜瑞爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人及諸小王轉輪聖王是諸大衆得未曾有歡喜合掌一心觀佛優婆塞此云近事男優婆夷此云近事女稟受三歸五戒親近承事三寶者也然有在家出家之分在家名近事出家名近住出家住僧伽藍但未剃鬚髮未受十戒故不名為沙彌夜叉此云捷疾亦云勇健亦云暴惡飛行鬼名摩睺羅伽此云大腹行餘如前釋人非人者四衆為人八部為非人此句總結也小王如十六國王乃至聚落主等轉輪聖王有四一金輪王王四天下二銀輪王王三天下除北洲三銅輪王王二天下更除西洲四鐵輪王王南洲問佛在世時何得有四輪王答應聞法華經者皆從他土來集也問前同聞衆中何以不列答同聞證信皆非聊爾之人多是影響發起二類今則普及當機結緣衆不應為難衆見雨華地動知甘露將降故欣躍內充表大機當發感於勝應也問喜怒人之常情何得為瑞答天華悅眼地動震心故大經云動時能令衆生心動華地是外瑞心喜是內瑞非常之喜昔雖曾有而不為喜所動而能一心觀佛何得非瑞約教者歡喜動陰心人天義喜動真諦無漏心藏通義喜動即假心別教義喜動實相心圓教義今是圓動問實理無動那得言動答動即發也圓機當成名動實相本迹者本住不動三昧迹以地動表發觀心者一念妙觀初動諸餘心所隨順而動六放光瑞爾時佛放眉間白毫相光照東方萬八千世界靡不周遍放光表應機設教破惑除疑也白毫者觀佛三昧海經云佛初生時牽長五尺苦行時長一丈四尺得佛時長一丈五尺其毫中表俱空白如琉璃筒內外清淨從初發心中間行行種種相貌乃至入涅槃一切功德皆現毫中毫在兩眉之間即表中道常也其相柔軟表樂卷舒自在表我白即表淨放光破暗表中道生智慧光照此土他土表自覺覺他復次藏通雖知二諦不知中道如有二真而無白毫別教雖知三諦不能毫中具一切法今從初至後法界中事悉現毫內即表圓教意復次衆經明放光不同華嚴經現相品齒間放光出頌集衆是表欲說法又眉間放光從足下入是表以極果而為真因普賢三昧品毛孔放光頌讚普賢是表普賢行遍光明覺品放兩足輪光是表十信法門須彌山頂品放兩足指光是表十住夜摩宮品放兩足上光是表十行兜率宮品放兩膝輪光是表十回向十地品放眉間光是表十地正證中道故云兼別如來出現品放白毫相光入妙德頂是令問圓妙佛法放口光入普賢口是令說圓妙佛法入法界品放白毫相光令諸菩薩普見法界佛事是欲令其安住師子嚬申三昧大品般若經從足下千輻輪相乃至頂髻一一各放六萬億光明是以身輪表般若遍大涅槃經面門放光是表佛口密說於祕藏今經白毫放光正表中道實相故文殊云今佛放光明助發實相義又光照此土他土十法界事正表十法界無非一實相印所印約教者丈六佛放光三藏義帶劣勝應身放光通教義尊特身放光別教義即丈六是毗盧遮那法身放光圓教義龍女讚云微妙淨法身具相三十二正屬開顯圓也東方者諸方之始表十住是始位迹門說法令生身菩薩朗然見理入於圓住開佛知見舉初即知中後故云靡不周遍當知諸方亦然諸位亦然若本門說法四方佛集即表法身菩薩增道損生四位增長也萬八千世界者如華嚴所照動以剎塵數計此何其少特表十八界各具百界千如為萬八千此等無非佛慧境界耳彌勒問云放一淨光照無量國當知方不局東數不止于萬八千也明矣又所照萬八千土皆是五濁機緣備須為實施權開權顯實者得與此土釋迦例同若有佛土純說大乘大隔于小者則如華嚴諸經光中所見雖境界殊勝而不具顯如來善巧方便原始要終之致故不得與此經同其妙瑞也夫光照本方因光得見他土六瑞所謂六趣衆生諸佛說法三乘修得涅槃起塔等如此十界若相若性若體若力若作若因若緣若果若報從本至末炳然齊現於一光中橫該無際豎徹始終如鏡中像如水中月言有不有言空不空光外無土土外無光所謂空等假等中等上根利智正可向此處頓了同體權實非權非實為未了者更作三周巧說耳有人云一光東照妙體全彰庶幾得之初此土六瑞竟二他土六瑞即是此土第六放光瑞中所見境界為令易解兼欲引同故分為六初見六趣瑞二見諸佛瑞是上聖下凡一雙三聞說法瑞四見四衆得道瑞是人法一雙五見菩薩行行瑞六見諸佛涅槃瑞是始終一雙既有可化衆生即有能化之佛有佛即有說法說法即有弟子弟子即是行始行始必致終也又此土六瑞總表衆生當獲自覺彼土六瑞總表衆生當獲覺他又此彼六瑞表此彼諸佛道同今前五瑞是現彼土己與此同第六瑞是現此土當與彼同初見六趣瑞下至阿鼻地獄上至阿迦尼吒天於此世界盡見彼土六趣衆生阿鼻此云無間最在世界之下阿迦尼吒此云色究竟最在色界之上此承上文光照東方萬八千土照彼阿鼻乃至色究竟天無不盡于光中顯現故時會大衆即於此界盡見彼土六趣衆生所謂地獄鬼畜修羅人天也此現彼土五濁與此土同二見諸佛瑞又見彼土現在諸佛此現彼土諸佛為五濁故出現於世與此土釋迦佛出世意同三聞說法瑞及聞諸佛所說經法此現彼佛初從無相一法非頓而頓演大華嚴與此土釋迦佛說華嚴經意同四見四衆得道瑞并見彼諸比丘比丘尼優婆塞優婆夷諸修行得道者此現彼佛非漸而漸為鈍根人說三藏法四衆依之得出世四果辟支佛道與此土釋迦佛說三藏教意同五見菩薩行行瑞復見諸菩薩摩訶薩種種因緣種種信解種種相貌行菩薩道此現彼佛非漸而漸為大乘人說方等般若諸大乘經與此土釋迦佛說二酥教意同昔種四教善根為因今稟四教法門為緣四教各有信解以為能感修行四教復各四門故云種種相貌六見諸佛涅槃瑞復見諸佛般涅槃者復見諸佛般涅槃後以佛舍利起七寶塔此現彼佛施化事畢收無量法還歸一法示滅息化乃至起塔而作佛事是則始從出世終于像法一代所作權實利益光照彼土炳然在目以彼例此前五既同後一豈別當知釋迦從初成道于一無相法出無量法非頓而頓非漸而漸其事已竟今日必當收無量法還入一法開權顯實唱言入滅與彼土同也問光中何以不現彼土說法華經答若使彰灼顯現則不成序亦不能使衆會疑念彌勒發問文殊忖答則迹本二說無由發起何以尅臻現在滅後無邊利益故有謂法華正旨唯在一光東照者乃擔板之見不知說默皆具四悉故也入定四悉單被上上根人說法四悉三根普被入定四悉唯局現在說法流通四悉普及未來暗證罔知故多異見問光中所照一時橫見何得云先頓後漸乃至會歸答遠近既可俱令見聞過未何難皆令視聽故使十方始末皎若目前安得以爾凡情測量聖境問光中所見可無純頓唯漸等耶答時衆但因光得見大術乃在於世尊然令見者本為證同所放光明為成一實故事殊理絶者非光所霑問般此云入涅槃此云滅度藏通灰斷故般涅槃既顯圓常何得入滅答佛出同居事必示滅若知非生示生即知生即非生若知非滅示滅即知滅即非滅讀壽量品此疑自釋舍利或云室利羅此翻靈骨塔具云塔婆或云窣堵波此翻方墳或翻圓冢亦翻高顯二現瑞序竟三疑念序二初彌勒疑念二大衆疑念今初爾時彌勒菩薩作是念今者世尊現神變相以何因緣而有此瑞今佛世尊入於三昧是不可思議現希有事當以問誰誰能答者復作此念是文殊師利法王之子已曾親近供養過去無量諸佛必應見此希有之相我今當問彌勒有三念初今者下是正念六瑞二今佛下是念問誰三復作下是念文殊文殊念起第二念除唯初念在但成一疑也神變者神名天心即是天然內慧變名變動即是六瑞外彰首楞嚴三昧經云佛住不二法能作神通法王法力超蓋一切彌勒不測外變亦不知內慧故興疑念夫庸人不知術者散人不知定者凡夫不知聖者小聖不知身子身子不知菩薩菩薩不知補處補處不知尊極此是尊極境界所以彌勒不知然彌勒植善既多何容不髣佛知應須隱明示暗權言不知耳問一切菩薩皆法王子何以獨推文殊答有二義故一於法王子中德推文殊二諸經中文殊並為菩薩上首二大衆疑念爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是佛光明神通之相今當問誰大衆有兩念一正念六瑞二念問誰若將下偈望此亦得有三念偈云四衆欣仰瞻仁及我無第三念何事瞻仁而此中無者欲推補處居先也問文殊彌勒德位相亞何故一問一答答夫機有在無位雖齊等賓主異宜聖人承機非問者不能答也因緣又法門有權實權補處須問實者須答約教又迹有久近近問久答本迹又名有便易彌勒名慈慈為衆生應須問文殊名妙德德應須答觀解三疑念序竟四發問序二初長文二偈頌初中二初經家述二正發問今初爾時彌勒菩薩欲自決疑又觀四衆比丘比丘尼優婆塞優婆夷及諸天龍鬼神等衆會之心雙述自疑他疑如文二正發問而問文殊師利言以何因緣而有此瑞神通之相放大光明照于東方萬八千土悉見彼佛國界莊嚴雙問此土他土如文二偈頌二初頌上問二頌請答何意有偈頌耶龍樹毗婆沙云一障國土天竺有散華貫華之說如此間序後銘也二隨樂欲不同有樂散說或樂章句二是世界三隨生解不同或於散說得解或於章句得解為人四隨利鈍利者一聞即悟鈍者再說方悟第一義又表佛殷勤重說五亦為人又為衆集前後故有偈也對治能除後來疑故論文十義今但列六前五如所引六使後人于經生信亦是為人七易奪言辭轉勢說法亦是對治八示義無盡九明至人有無方之說此二同第一義十即今所引第六文初頌上問二初問此土六瑞二問他土六瑞今初於是彌勒菩薩欲重宣此義以偈問曰文殊師利導師何故眉間白毫大光普照雨曼陀羅曼殊沙華旃檀香風悅可衆心以是因緣地皆嚴淨而此世界六種震動時四部衆咸皆歡喜身意快然得未曾有長文總問此土六瑞偈中長有香風地淨而無說法入定觀文謂言盈縮尋義不然說法是慧性入定是天心由慧性天心能放光動地舉末即知本故縮非縮又秖導師兩字即是問說法入定良以說法入定能導于人也天華至妙豈有色而無香故有華則有香風華既集地地則嚴淨表因若趣果果則嚴淨如金光明云聚集功德莊嚴法身故以香風地淨顯成四華盈非盈也二問他土六瑞為六初問六趣衆生二問見彼佛及聞說法三問他土四衆四結前開後五問他土修菩薩行六問他土供養舍利即是問佛涅槃今初眉間光明照于東方萬八千土皆如金色從阿鼻獄上至有頂諸世界中六道衆生生死所趣善惡業緣受報好醜於此悉見六道衆生是能趣之假名生死是所趣之五陰善惡業緣是趣因好醜是趣果也有頂謂三有之頂指非想非非想天長文云阿迦尼吒但指色究竟天今云爾者若承光遠見則無色界既無形色故不可見若生死業緣受報差別皆悉見之則理應遍照無色界也二問見彼佛及聞說法又覩諸佛聖主師子演說經典微妙第一其聲清淨出柔軟音教諸菩薩無數億萬梵音深妙令人樂聞各於世界講說正法種種因緣以無量喻照明佛法開悟衆生別地圓住名之為聖佛復最尊故名聖主說大乘法決定無畏故名師子頓教純大故云第一詮中道理故聲清淨順實相法故音柔軟無二乘衆故云教諸菩薩所詮次第三諦為深圓融三諦為妙稱理當機故云令人樂聞遍在七處九會故云各於世界兩教八門故云種種不涉三乘故名佛法聞者即入佛慧故名開悟正與此土華嚴教同三問他土四衆若人遭苦厭老病死為說涅槃盡諸苦際若人有福曾供養佛志求勝法為說緣覺若有佛子修種種行求無上慧為說淨道若人遭苦者開聲聞乘也遭苦而更造惡業則苦不得盡底下衆生是也遭苦而造善業厭下攀上則苦亦不盡為生人天而持戒修定者是也遭苦而於外道法中求解脫者苦亦不盡不知三寶四諦及四念處但能增見長非更集苦本故也遭苦而能遍厭三界生老病死兼能厭集乃能感佛為說涅槃從此修出世道永盡苦際我謂知苦故斷集慕滅故修道也若人有福者開辟支佛乘也支佛百劫種福故云有福四諦總相略觀為劣十二因緣別相細觀為勝又四諦以苦為初門故劣因緣以集諦為初門故勝觀十二因緣而得覺悟故名緣覺也若有佛子者開事六度菩薩乘也有大慈悲堪紹佛種故名佛子六度事廣名種種行志求作佛名無上慧六度中無六蔽故名淨道此以道諦為初門也正與此土三藏教中三乘意同四結前開後文殊師利我住於此見聞若斯及千億事如是衆多今當略說見聞若斯是結前今當略說是開後五問他土修菩薩行正與此土方等般若諸大乘教意同文分為三初總問二次第問三雜問次第擬同此土漸教雜問擬同此土不定教也今初我見彼土恆沙菩薩種種因緣而求佛道恆沙具云恆河沙亦云殑伽沙阿耨達池東銀牛口出殑伽河南金象口出信度河西琉璃馬口出縛芻河北頗胝迦師子口出徙多河殑伽沙細而多佛說法處近此河故以為喻二次第問為六初問施二問戒三問忍四問進五問禪六問慧今初或有行施金銀珊瑚真珠摩尼硨磲碼瑙金剛諸珍奴婢車乘寶飾輦輿歡喜布施回向佛道願得是乘三界第一諸佛所歎或有菩薩駟馬寶車欄楯華蓋軒飾布施復見菩薩身肉手足及妻子施求無上道又見菩薩頭目身體欣樂施與求佛智慧初四偈是問捨財第五偈是問捨身身肉手足是內身妻子是外身第六偈是問捨命捨頭目即捨命也不言法施者讓後般若二問戒文殊師利我見諸王往詣佛所問無上道便捨樂土宮殿臣妾剃除鬚髮而被法服約出家論持戒者菩薩律儀通于七衆比丘篇聚局在大僧只此篇聚於諸戒中最尊最貴以是七衆上首故也然以自度心持之則便為聲聞戒以求無上道心持之則便為菩薩戒波羅蜜就無上道復有四別謂依生滅無生無量無作四種四諦所發四弘誓願也生滅四弘屬前事度此中應指後三四弘又出家約諸王者以貴例賤以勝概劣非謂戒度局在人王又如法藏比丘捨王位而攝取淨土乃名菩薩戒波羅蜜故也三問忍或見菩薩而作比丘獨處間靜樂誦經典間林邃谷惡人惡獸耐忍無瞋即生忍自節守志即苦行忍誦經求佛即第一義忍四教通得論三忍也四問進又見菩薩勇猛精進入於深山思惟佛道此如太子雪山苦行之類所思佛道亦得通于四教五問禪又見離欲常處空間深修禪定得五神通又見菩薩安禪合掌以千萬偈讚諸法王初一偈問修世間淨禪及觀練熏修等禪第二偈問修出世上上禪所謂首楞嚴三昧不起滅定現諸威儀者也初中言離欲者離下界煩惱得根本初禪此禪則淺展轉離有頂欲得滅盡定乃名為深止是藏教意耳不惟離三界欲亦離涅槃法愛不惟離二乘欲亦離出假法愛不惟離二邊欲亦離中道順道法愛如此名深猶是別意若一離一切離圓伏圓修乃名為深則是圓教意也別地分得六通無漏讓佛故僅名五首楞三昧正在圓家別地證同亦應得之六問慧復見菩薩智深志固能問諸佛聞悉受持又見佛子定慧具足以無量喻為衆講說欣樂說法化諸菩薩破魔兵衆而擊法鼓初一偈是問自行次二偈是問化他也慧窮理本名為智深誓願廣堅名為志固此即具二莊嚴故能問能持也定慧具足者若云未到慧多無色定多四禪則等又背捨慧多九定定多十一切則等因緣釋也又二乘定多菩薩慧多惟佛則等約教釋也又空觀定多假觀慧多中觀則等觀心釋也無量喻謂諸教中種種譬類助顯第一義也破魔兵者藏通破界內四魔別教次第破界內界外八魔圓教圓破八魔一切魔擊法鼓者既破魔已轉於四教四種法輪二次第問竟三雜問為七初問禪二問進三問戒四問忍五更問禪六問施七問慧今初又見菩薩寂然宴默天龍恭敬不以為喜又見菩薩處林放光濟地獄苦令入佛道初一偈問入捨禪即是自行次一偈問入悲禪即是化他捨禪者第四禪也亦可別圓忘懷之捨忘彼禪故名之為捨悲禪者婆沙云初禪修悲易二禪修喜易三禪修慈易四禪修捨易此中悲禪既云化他豈獨初禪故婆沙中尚有通論別論況大教耶故一一禪皆應云慈乃至喜捨放光濟苦者如思益經網明菩薩放光遍照十方阿僧祇國一切煩惱一切疾病遇光安樂乃至佛自放六度光觸者蒙益夫煩惱疾病並云一切應具四教如佛告思益梵天能教衆生一切智心是名布施不捨菩提心名持戒不見心相生滅名忍求心不可得名進除身心粗名禪離諸戲論名慧豈非三藏六度相耶又云我說布施名為涅槃愚謂大富入諸法實相故持戒是涅槃不作不起故忍是涅槃念念滅故進是涅槃無所取故禪是涅槃不貪著故慧是涅槃不得相故又云布施平等即薩婆若乃至般若即薩婆若又云布施不施不慳乃至般若不智不愚豈非並是通教六度相耶又云能達一切法無所捨名檀達一切法無所漏失名尸達一切法無所傷損名忍達一切法平等名禪達一切法無有起相名慧豈非別圓六度相耶又如地持六度各九此並蒙光得益之相以佛道名通于四教悲禪亦不局在初禪故別初地圓初住及通七地俱皆得入四相既分五時可辨二問進又見佛子未嘗睡眠經行林中勤求佛道此如般舟念佛等法門也般舟此云佛立九十日中常行不坐不臥除睡為最部在方等亦通四教今云勤求佛道揀兩二乘三問戒又見具戒威儀無缺淨如寶珠以求佛道威儀無缺即初不缺戒淨如寶珠即第十具足戒十戒名出大論初不缺戒謂重罪無犯若犯重罪如浮囊缺失故二不破戒謂中罪無犯若犯中罪如浮襄殘破故三不穿戒謂小罪無犯若犯小罪如浮囊穿穴故此三屬律儀攝四不雜戒謂不起惡覺若起惡覺則身口雖淨意雜煩惱故此一是定共戒五隨道戒如初果耕地蟲離四寸等六無著戒如羅漢於三界六塵永無貪著等此二是道共戒亦是真諦戒也七智所讚戒謂善能出假涉俗利生故為智人所讚八自在戒謂遊戲神通逆順示現而於性遮無所違犯故恆自在此二是俗諦戒也九隨定戒謂不起滅定現諸威儀十具足戒謂戒波羅蜜畢竟圓滿無法無備此二是中道第一義諦戒也以前四戒為所觀境後六觀之事理相即兩教二乘但有前六出假菩薩容有七八別教次第修十圓教一心修十今云以求佛道亦揀兩種二乘四問忍又見佛子住忍辱力增上慢人惡罵捶打皆悉能忍以求佛道統輪生法二忍四教不同若於恭敬供養中能忍不著則不生憍逸若於嗔罵打害及蚊蚋等能忍則不生瞋惱是為生忍若於寒熱風雨飢渴老病等外法能忍不動若於貪瞋憂慢邪見等內法能忍不起是為法忍三藏意也合前二忍為生忍第一義為法忍通意也又觀生法二境即空為第一義通也觀二境先空次假後中別也觀二境即空假中圓也今獨舉惡罵捶打為所忍境舉難況易耳五更問禪又見菩薩離諸戲笑及癡眷屬親近智者一心除亂攝念山林億千萬歲以求佛道離戲笑是却掉悔蓋離癡眷屬是除瞋蓋近智者是除疑蓋一心除亂是却貪蓋攝念山林是除睡蓋初六句明所離後二句明離意以世間及四教修禪皆離五蓋今意在佛道不同凡夫外道及以二乘約觀明五蓋具如止觀第四卷尋之六問施或見菩薩肴膳飲食百種湯藥施佛及僧名衣上服價直千萬或無價衣施佛及僧千萬億種旃檀寶舍衆妙臥具施佛及僧清淨園林華果茂盛流泉浴池施佛及僧如是等施種種微妙歡喜無厭求無上道初四偈明施四事供養後一偈明施供意初一偈是飲食醫藥二事第二偈是衣服第三第四兩偈皆臥具攝無上道仍通四教七問慧或有菩薩說寂滅法種種教詔無數衆生或見菩薩觀諸法性無有二相猶如虗究又見佛子心無所著以此妙慧求無上道初一偈不可說而說般若次一偈不可觀而觀般若後一偈言語道斷心行處滅即是說不可說觀不可觀而論般若也般若亦通諸教思之五問他土修菩薩行竟六問他土供養舍利即是問佛涅槃文殊師利又有菩薩佛滅度後供養舍利又見佛子造諸塔廟無數恆沙嚴飾國界寶塔高妙五千由旬縱廣正等二千由旬一一塔廟各千幢幡珠交露幔寶鈴和鳴諸天龍神人及非人香華伎樂常以供養文殊師利諸佛子等為供舍利嚴飾塔廟國界自然殊特妙好如天樹王其華開敷初一偈總標佛滅供養舍利第二偈明塔數第三偈明塔量第四偈明塔莊嚴第五偈明供養第六第七兩偈結歎嚴飾也天樹王即波利質多樹初頌上問竟二頌請答二初舉疑述請二釋四伏難今初佛放一光我及衆會見此國界種種殊妙諸佛神力智慧希有放一淨光照無量國我等見此得未曾有佛子文殊願決衆疑初一偈舉見此土事白毫表中道為諸法本故先舉之種種殊妙即六瑞也第二偈舉見他土事他土六瑞皆由光見光復由於神力智慧也第三偈正請答釋此者指兩土六瑞得未曾有者與華嚴乃至般若咸皆有異二釋四伏難四衆欣仰瞻仁及我世尊何故放斯光明佛子時答決疑令喜何所饒益演斯光明佛坐道場所得妙法為欲說此為當授記示諸佛土衆寶嚴淨及見諸佛此非小緣文殊當知四衆龍神瞻察仁者為說何等初四偈正釋伏難後一偈結請也言伏難者文殊內心構難不肯時答其意有三一此瑞希奇不可倉卒輕判二智衆如海謙光推高三靳固前却生衆渴仰故以伏難潛而拒之彌勒彰灼釋難意亦有三一瑞大故疑大若不為釋憂疑在懷妨聞正說二衆海雖多機在仁者三闔衆瞻仁故知注誠殷重所以彰言釋難請令時答也初伏難者因正請生請云佛子文殊願決衆疑文殊從此起初伏難汝云衆疑衆未曾疑若疑應問衆既不疑我何所決彌勒即以第一偈釋云四衆欣仰瞻仁及我瞻我欲令我問瞻仁欲得仁答也文殊因此起第二伏難衆同有疑不易可答待佛出定自當決疑彌勒即以第二偈釋云若有疑在懷憂惱不泰未知如來何時起定故須時答令喜言時答者催促令其即答也文殊因此起第三伏難我與仁者同居學地欲測佛意幸共籌量獨令我答於理不可彌勒即以第三偈釋云我亦踟蹰思忖為說道場所得妙法為當授記耶文殊因此起第四伏難若如汝說即是釋疑何煩我決彌勒乃以第四偈釋云此非小緣安得以我猶豫之心而判大事文殊至此伏難既窮謙光亦止故後一偈結請答也四發問序竟五答問序二初長文二偈頌初中四初惟忖答二略舉曾見以答三廣舉曾見以答四分明判答今初爾時文殊師利語彌勒菩薩摩訶薩及諸大士善男子等如我惟忖今佛世尊欲說大法雨大法雨吹大法螺擊大法鼓演大法義善男子者開七方便為善堪聞獨妙為男猶云善丈夫也丈夫之稱亦通四教今須在圓惟者思惟忖者忖量惟今如昔忖昔如今然文殊古佛豈應不知迹示思惟耳欲說大法者答說法瑞惟昔諸佛說無量義之後開權顯實收無量歸一忖于今佛既說無量義已亦應開顯會無量以歸一一者即大法也雨大法雨答雨華瑞惟昔諸佛天雨四華之後普入圓因住行向地忖於今佛雨華之後亦必皆成佛因住行向地也吹大法螺者吹螺改號答大衆心喜瑞惟昔四衆見瑞歡喜得未曾有障除機動即改人教行理皆一忖今衆喜亦應障除機動改前人教行理所改甚深也擊大法鼓答地動瑞惟昔地動已後即有六番破無明賊忖於今佛地動已後亦應六番破無明惑聲教極妙也演大法義答放光瑞惟昔諸佛放白毫光後說法華彼此道同忖于今佛放光已後亦應說法華經廣明五佛道同也如是五句悉是惟昔判今忖今類昔附文會義唯少入定一瑞而雨華動地放光等皆由入定故爾意則兼具無勞疑也闕此一條故稱略答耳此惟忖答是答此土六瑞二略舉曾見以答諸善男子我於過去諸佛曾見此瑞放斯光已即說大法是故當知今佛現光亦復如是欲令衆生咸得聞知一切世間難信之法故現斯瑞此略舉曾見但明放光一事即是答他土六瑞以他土六瑞皆是放光所照故也聞指信行知指法行一切世間難信之法者所謂收無量歸一令開示悟入改人教行理六番破無明顯諸佛道同等非九法界機所能信也三廣舉曾見以答即雙答此土地土問也彌勒因光橫見東方以為問文殊引昔豎見多佛以為答正顯十方三世諸佛道同文為三初引一佛同次引二萬佛同三引最後佛同初中三初時節二標名三說法今初諸善男子如過去無量無邊不可思議阿僧祇劫二標名爾時有佛號日月燈明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊爾時者過去不可思議劫前時也夫時無實法依於色心分位假立隨俗分別不壞假名世界悉也聞無量劫則知生死事長生厭離心為人悉也劫前有劫不生斷見劫復一劫不生常見對治悉也觀彼久遠猶若今日十世古今不離當念第一義也佛出彼時亦說三乘則與今佛出五濁同若云三大阿僧祇劫積行成佛即三藏相若云了知時劫性空一念相應慧朗然大覺即通佛相若云不可思議阿僧祇劫盡行法界無邊諸行斷彼微細極微細二品愚已爾乃成佛應身遍坐百億樹下即別佛相若云無量無數劫解之即一念了知一念之性即是亘古亘今之性智入三世而無往來於剎那際三昧遍能示現剎海古今成菩提事為衆生故非生示生即圓佛相本迹者如今釋迦久成為本王宮為迹驗知彼佛亦復應爾觀心者觀此一念五陰皆是因緣所生即空即假即中是名有佛出現于世從名字有佛乃至究竟有佛也日月燈明是別號如來等是通號一切諸佛皆有通別二號皆是隨世假立即世界悉聞名生善即為人悉超過一切梵魔沙門婆羅門等即對治悉若聞諸佛名者皆得不退轉于無上菩提即第一義悉別號日月燈明者日表慧月表定即自行德燈明是化他德又日月燈表一心三智當知前佛後佛自行同化他同一心三智同又佛有無量德應有無量號如華嚴明釋迦於此娑婆世界則有百億十千名號何況應身遍微塵國名復何窮然一一名皆召實德皆以窮劫說其功德終不可盡以今例古日月燈明何獨不然通號如來等者梵語多陀阿伽度亦云怛闥阿竭此翻如來梵語阿羅訶此翻應供亦翻至真亦翻無所著梵語三藐三佛陀此翻正遍知亦翻等正覺梵語侈遮羅那三般那此翻明行足梵語修伽陀此翻善逝亦翻好去梵語路伽憊此翻世間解梵語阿耨多羅此翻無上士梵語富樓沙曇藐婆羅提此翻調御丈夫梵語舍多提婆摩㝹舍喃此翻天人教師梵語佛陀此翻知者覺者梵語路迦那他此翻世尊謂具上十號真實功德故為一切世間之尊釋此十號須約四教及以開顯茲不繁述本迹觀心例亦可解三說法演說正法初善中善後善其義深遠其語巧妙純一無雜具足清白梵行之相為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩說應六波羅蜜令得阿耨多羅三藐三菩提成一切種智此明昔佛為實施權說頓說漸開權顯實同歸非頓非漸與今光中所見同亦與釋迦佛說法同也初云演說正法指頓教法初中後三善約頓教序正流通三段其義深遠即頓教了義二乘不能測其底邊也其語巧妙即頓教之文會理直說悅菩薩心也純一無雜謂頓教不與二乘共也具足者頓教明滿字法門清白者頓教無二邊瑕穢梵行者頓教無緣慈也已上是明昔佛說頓與今佛說華嚴同酬上聖主師子演說經法微妙第一之問也次云為求聲聞等者是明昔佛施三與今佛說三藏乃至方等般若意同酬上若人遭苦乃至佛子修種種行之問也四諦有四種具如玄義所明今為聲聞且說生滅相應之法所謂三界果報實苦不可令樂煩惱及業真是苦因更無異因因滅則果滅乃為究竟安樂滅苦之道惟戒定慧更無餘道也因緣亦有四種如玄義今為辟支且說思議生滅相應之相所謂無明行是能引支識名色六入觸受是所引支愛取有是能生支生老死是所生支所引所生即苦諦能引能生即集諦無明滅乃至老死滅是滅諦觀因緣智即道諦聲聞根鈍故為總相說四諦法辟支稍利故為別相說因緣法也六波羅蜜四教相如前略明若直明三藏六度則屬阿含若事理對論而多以理奪事則屬方等若帶事談理而多以理融事則屬般若也後云令得阿耨等者是明昔佛開權顯實與今佛法華意同若粗觀文勢則令得等似單承為諸菩薩句來若細研語脉則以令得等通結演說正法已下之意蓋從初說頓即令衆生得成一切種智其未成者循循善誘以三藏通別兼但對帶等種種方便而成熟之或定不定或顯或密事非一概來至法華則若聲聞若辟支若事度乃至若華嚴中所兼之別無不令得無上菩提成就一切種智也此即酬上光中見他土佛涅槃起塔之問以光中但見他土涅槃佛事不見他土法華會席因此致疑成發起序今引古事同顯此法華為最後了義極談過此以往更無可說唯有非滅唱滅而已一代時教究竟結歸獨在此經三世十方無不咸爾稱之為妙豈徒然哉初引一佛同竟次引二萬佛同次復有佛亦名日月燈明次復有佛亦名日月燈明如是二萬佛皆同一字號日月燈明又同一姓姓頗羅墮彌勒當知初佛後佛皆同一字名日月燈明十號具足所可說法初中後善前佛後佛無不施頓施漸會入非頓非漸而文殊巧說不事繁文故于初佛廣明頓漸已同不過略點開顯於今二萬諸佛但明名同姓同及十號同說法善同至最後佛方乃廣明現同及當同也日月燈明既稱為名亦稱為字亦稱為號故知名字號三秖是假立本無親疏不似今人妄生分別有諱不諱頗羅墮者此翻捷疾亦翻利根亦翻滿語婆羅門姓觀心釋者十善各具百界千如為一萬自行化他滿足為二萬三引最後佛同又三初曾見事與今已同二曾見事與今現同三曾見事與今當同今初其最後佛未出家時有八王子一名有意二名善意三名無量意四名寶意五名增意六名除疑意七名響意八名法意是八王子威德自在各領四天下是諸王子聞父出家得阿耨多羅三藐三菩提悉捨王位亦隨出家發大乘意常修梵行皆為法師已於千萬佛所植諸善本昔佛八子今佛一子數雖不等並出同居之土土有見思俱示有子有子事同一八赴緣各有所表一子表一道清淨八子表八正道也又昔佛子發大乘意今佛子住小乘果此云何同昔化道已竟顯本事彰故云發大乘意今未發迹猶言羅漢至下文顯本即是菩薩其意則同各領四天下是金輪王有云輪王必不值佛此殆不然二曾見事與今現同二初現瑞同二疑念同初又二初此土六瑞同二他土六瑞同今初是時日月燈明佛說大乘經名無量義教菩薩法佛所護念說是經已即於大衆中結加趺坐入於無量義處三昧身心不動是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆普佛世界六種震動爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人及諸小王轉輪聖王等是諸大衆得未曾有歡喜合掌一心觀佛爾時如來放眉間白毫相光照東方萬八千土靡不周遍二他土六瑞同如今所見是諸佛土但云如今所見文略義周矣初現瑞同竟二疑念同彌勒當知爾時會中有二十億菩薩樂欲聽法是諸菩薩見此光明普照佛土得未曾有欲知此光所為因緣既云欲知此光所為因緣理應亦有發問答問二序不俟費辭也二曾見事與今現同竟三曾見事與今當同五初因人說法同二時節同三唱滅同四授記同五滅後通經同今初時有菩薩名曰妙光有八百弟子是時日月燈明佛從三昧起因妙光菩薩說大乘經名妙法蓮華教菩薩法佛所護念昔佛起定因妙光菩薩說經今佛起定因舍利弗說經舍利弗為羅睺師昔妙光為八王子師故云同也又舍利弗既得授記實是菩薩昔妙光聞法華時何必不示作聲聞二時節同六十小劫不起于座時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃是時衆中無有一人若身若心而生懈倦此與下文五十小劫謂如半日同也佛力所加故令忘長見短下當廣釋三唱滅同日月燈明佛於六十小劫說是經已即於梵魔沙門婆羅門天人阿修羅衆中而宣此言如來於今日中夜當入無餘涅槃昔說法華即唱入滅今佛于寶塔品中亦言如來不久當入涅槃化道已足唱滅事齊也梵是色界主魔是欲界主沙門此云勤息出家之都名婆羅門此云淨裔亦云梵志在家之尊姓天人阿修羅略舉三種善道並皆從勝取其易入佛法耳四授記同時有菩薩名曰德藏日月燈明佛即授其記告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽度阿羅訶三藐三佛陀授聲聞記是此經正宗不應預泄今云授補處記則與釋迦授彌勒記同也問法華中不曾授彌勒記豈應引同答但得彼此一代化齊于義即足何必拘拘微細強配況法華梵文積至八里來者無幾安知梵冊無記囑補處之文授記中略舉三號若三若十平等平等五滅後通經同三初正明入滅二明滅後通經利益三結會古今今初佛授記已便於中夜入無餘涅槃授記便入涅槃者雖復出同居土五濁未甚故不必更說大涅槃經如此土迦葉佛亦於說法華畢即涅槃也然無餘涅槃義通大小略須申明有人云小乘以果縛尚在名為有餘身智俱灰名為無餘大乘以五住究盡乃名無餘此亦一往釋耳統論涅槃則有三種一性淨涅槃凡聖平等即法身德二圓淨涅槃出障圓明即般若德三方便淨涅槃為衆生故非生示生非滅示滅即解脫德又唯識明有四涅槃一自性清淨涅槃佛與衆生平等共有不關修得二有餘依涅槃謂真如出煩惱障餘依未滅三乘初證無學道時所得也三無餘依涅槃謂煩惱既盡苦依亦滅三乘無學身智盡時所證也四無住處涅槃謂真如兼復出所知障大悲般若常所輔翼不住生死不住涅槃盡未來際寂而常照利益衆生也今以四對三令義可識自性清淨即是性淨有餘無餘出煩惱障無住出所知障即是圓淨從體起用數數唱生唱滅而實非生非滅即方便淨唯識又云一切衆生但有初一二乘無學容有前三唯我世尊可言具四蓋性淨法身含生共有故皆有初一二乘證無學時是有餘依不名無餘逮入滅時既名無餘不名有餘此則先後不俱故云容有前三如來坐菩提樹成等正覺所有身心非復有漏苦依永盡名無餘依非苦依在謂真常五蘊名有餘依不住二邊名無住處此則四涅槃義同時具足故云可言具四由是言之初成正覺即已圓入四種涅槃今言中夜入寂是為同居鈍根示同二乘滅度耳乃方便淨之妙用非滅唱滅滅何嘗滅也哉二明滅後通經利益佛滅度後妙光菩薩持妙法蓮華經滿八十小劫為人演說日月燈明佛八子皆師妙光妙光教化令其堅固阿耨多羅三藐三菩提是諸王子供養無量百千萬億佛已皆成佛道其最後成佛者名曰然燈八百弟子中有一人號曰求名貪著利養雖復讀誦衆經而不通利多所忘失故號求名是人亦以種諸善根因緣故得值無量百千萬億諸佛供養恭敬尊重讚歎滅後明通經之時妙光明通經之人八十小劫明通經久近八子及求名等明通經利益堅固者久已先成求名者次補佛處雙顯佛道因緣全賴師友亦全由修證二俱不誣矣三結會古今彌勒當知爾時妙光菩薩豈異人乎我身是也求名菩薩汝身是也明通經利益引八子八百乃至結會古今者近則釋疑密開壽量也或疑彌勒補處不應問文殊非補處不應答今明彌勒在八百數宜應有問文殊先復為師弘通妙法故釋疑非謬又八子最小成然燈佛然燈乃授釋迦佛記今文殊本以師祖復為釋迦弟子師弟無定將密顯生非生滅非滅也問彌勒昔見諸佛曾聞法華何故疑問答時衆機宜應須扣發耳三廣舉曾見以答竟四分明判答今見此瑞與本無異是故惟忖今日如來當說大乘經名妙法蓮華教菩薩法佛所護念今昔六瑞既同惟忖決定不謬當說大乘決定前說法瑞也名妙法蓮華決定前雨華瑞也教菩薩法決定前衆喜瑞也佛所護念決定前地動瑞也為答之法先微後著故今明判顯向非疑豈文殊大聖先思後當耶答問序中初長文竟二偈頌二初頌廣舉曾見以答二頌分明判答初中二初頌一佛同二頌最後佛同不頌惟忖及略舉但頌廣舉就廣舉中但頌初後而略中間足可顯義不俟繁文也今初爾時文殊師利於大衆中欲重宣此義而說偈言我念過去世無量無數劫有佛人中尊號日月燈明世尊演說法度無量衆生無數億菩薩令入佛智慧此頌上時節名號及說法等二頌最後佛同為三初頌曾見事與今已同二頌曾見事與今現同三頌曾見事與今當同今初佛未出家時所生八王子見大聖出家亦隨修梵行二頌曾見事與今現同又二初頌現瑞同二頌疑念同初又二初頌此土六瑞同二頌他土六瑞同今初時佛說大乘經名無量義於諸大衆中而為廣分別佛說此經已即於法座上加趺坐三昧名無量義處天雨曼陀華天鼓自然鳴諸天龍鬼神供養人中尊一切諸佛土即時大震動佛放眉間光現諸希有事頌中長出天鼓自鳴表方便品初無問自說也現諸希有事即總頌諸瑞也二頌他土六瑞同長文但略云如今所見是諸佛土今頌則廣然文雖錯縱變化總不出六瑞意也此光照東方萬八千佛土示一切衆生生死業報處有見諸佛土以衆寶莊嚴琉璃玻瓈色斯由佛光照此頌見彼土六趣瑞而兼顯諸土淨穢不同及見諸天人龍神夜叉衆乾闥緊那羅各供養其佛此頌意顯六趣中有佛界機也又見諸如來自然成佛道身色如金山端嚴甚微妙如淨琉璃中內現真金像世尊在大衆敷演深法義此頌見彼佛及聞說法瑞也自然成佛道者方便道則加心修習發真道即任運自然與理合也藏佛一坐任運三十四心通佛一念相應不加功力別圓妙覺本得自然自然成佛道是報身琉璃是法身本淨金像是應物現形深法義即頓教大乘一一諸佛土聲聞衆無數因佛光所照悉見彼大衆或有諸比丘在於山林中精進持淨戒猶如護明珠此頌見彼土四衆得道瑞也舉聲聞以該藏教三乘舉比丘以該四衆或以第二偈屬下六度亦可又見諸菩薩行施忍辱等其數如恆沙斯由佛光照又見諸菩薩深入諸禪定身心寂不動以求無上道又見諸菩薩知法寂滅相各於其國土說法求佛道此頌見彼土菩薩行行瑞也六度既通四教以擬方等般若悉與東方及此土同初頌現瑞同竟二頌疑念同爾時四部衆見日月燈佛現大神通力其心皆歡喜各各自相問是事何因緣二頌曾見事與今現同竟三頌曾見事與今當同五初頌因人說法二頌時節三頌唱滅四頌授記五頌滅後通經今初天人所奉尊適從三昧起讚妙光菩薩汝為世間眼一切所歸信能奉持法藏如我所說法唯汝能證知世尊既讚歎令妙光歡喜說是法華經二頌時節滿六十小劫不起於此座所說上妙法是妙光法師悉皆能受持下文譬說周竟便告舍利弗云無智人中莫說此經等當知妙光悉皆受持正與今時舍利弗受佛付囑同也三頌唱滅佛說是法華令衆歡喜已尋即於是日告於天人衆諸法實相義已為汝等說我今於中夜當入於涅槃汝一心精進當離於放逸諸佛甚難值億劫時一遇文中有唱滅有囑纍囑纍如遺教也四頌授記世尊諸子等聞佛入涅槃各各懷悲惱佛滅一何速聖主法中王安慰無量衆我若滅度後汝等勿憂怖是德藏菩薩於無漏實相心已得通達其次當作佛號曰為淨身亦度無量衆文中有悲泣有慰喻因悲泣故慰喻因慰喻故授補處佛記例如今佛將未度衆生付彌勒也五頌滅後通經又三初頌示滅供養精進二頌滅後通經利益三頌結會古今今初佛此夜滅度如薪盡火滅分布諸舍利而起無量塔比丘比丘尼其數如恆沙倍復加精進以求無上道長文但云涅槃頌中兼明起塔及四衆精進求道所謂應以涅槃而得度者即現涅槃而度脫之也薪盡火滅者小乘以果報身為薪智慧為火慧依報身身滅智亡則一滅永滅大乘以機為薪逗應為火衆生機盡應形斯滅應遍法界不知其盡也二頌滅後通經利益是妙光菩薩奉持佛法藏八十小劫中廣宣法華經是諸八王子妙光所開化堅固無上道當見無數佛供養諸佛已隨順行大道相繼得成佛轉次而授記最後天中天號曰然燈佛諸仙之導師度脫無量衆是妙光法師時有一弟子心常懷懈怠貪著於名利求名利無厭多遊族姓家棄捨所習誦廢忘不通利以是因緣故號之為求名亦行衆善業得見無數佛供養於諸佛隨順行大道具六波羅蜜今見釋師子其後當作佛號名曰彌勒廣度諸衆生其數無有量三頌結會古今彼佛滅度後懈怠者汝是妙光法師者今則我身是初頌廣舉曾見以答竟二頌分明判答三初頌說法華經二頌教菩薩法三頌佛所護念今初我見燈明佛本光瑞如此以是知今佛欲說法華經二頌教菩薩法今相如本瑞是諸佛方便今佛放光明助發實相義諸人今當知合掌一心待佛當雨法雨充足求道者三頌佛所護念諸求三乘人若有疑悔者佛當為除斷令盡無有餘前文彌勒釋四伏難令文殊必答此分明判答中文殊斷四伏疑令彌勒莫更問也初第一疑因文殊廣引先佛曾說法華故彌勒潛疑欲問諸佛赴緣人時各異古佛雖名法華今佛何必如此文殊即以第一偈斷云我見燈明佛本光瑞如此以是知今佛欲說法華經此斷其疑名也彌勒因此又疑自有名同義同亦有名同義異此名何所顯召文殊即以第二偈斷云今相如本瑞是諸佛方便今佛放光明助發實相義此斷其疑體也彌勒又疑實相無相何人會之文殊即以第三偈斷云諸人今當知合掌一心待佛當雨法雨充足求道者此斷其疑宗也彌勒因此又疑佛雨法雨止洽菩薩亦潤二乘否耶文殊即以第四偈斷云諸求三乘人若有疑悔者佛當為除斷令盡無有餘此斷其疑用也彌勒聯翩構疑文殊頻煩為斷既事窮理盡即得之於懷可謂善於問答具二莊嚴矣事窮謂名等三理盡謂所顯之體迹門開權顯實中初序段竟
