body:
  text: 古吳後學藕益智旭述釋序品竟次釋方便品方便品第二此一經之正宗萬法之都會證信證此發起發此譬喻譬此乃至流通通此釋此為二先略次廣略中為二初正釋次料簡正釋有三一云方者法也便者用也法有方圓用有差會三權是矩是方一實是規是圓若智詣於矩則善用偏法逗會衆生若智詣於規則善用圓法逗會衆生如經令離諸著出三界苦是故如來殷勤稱歎方便蓋隨衆生欲非佛本懷此可釋他經非今品意二云方便者門也門為能通通于所通方便權略皆為真實作門真實得顯功由方便從能顯得名故以門釋方便如經開方便門示真實相此義可釋他經非今品意三云方者祕也便者妙也於昔成祕今開成妙妙達於方即是真祕點內衣裏無價寶珠與王頂上惟有一珠無二無別指客作人是長者子亦無二無別方便及門即是祕妙如經唯我知是相十方佛亦然止止不須說我法妙難思故以祕釋方以妙釋便正是今品意也次料簡者第一釋是體外方便化物之權隨他意語第二釋亦是體外方便自行化他之權是隨自他意語第三釋是同體方便即自行之權乃為隨自意語又第一釋方便非能入非所入第二釋方便是能入非所入第三釋方便即能入是所入又第一釋方便是祕而非妙第二釋方便祕堪入妙第三釋方便祕即是妙據正法華名善權品權即方便無二無別低頭舉手皆成佛道方便善權皆真實也先略釋竟次廣釋者破古不録今品是如來方便攝一切法如空包色若海納流豈可但以一枝一派釋法界之大都耶今明權實者先作四句謂一切法皆權一切法皆實一切法皆亦權亦實一切法皆非權非實一切法權者如文云諸法如是相性體力作因緣果報本末等介爾有言皆是權也有言不出千如百界一切法實者如文云如來巧說諸法悅可衆心衆心以入實為悅被機之意又云諸法從本來常自寂滅相諸法之本又云如來所說皆悉到於一切智地化儀之宗又云皆實不虗本行之源又大經云四句皆不可說也亡教之理諸文皆以入證為實故知有說無說無不皆以真實為本一切法皆亦權亦實者如文云諸法如實相是雙明一切亦權亦實例如不淨觀亦實亦虗治欲故實假想故虗秪此一觀是實是虛何妨一法亦權亦實一切法皆非權非實者如文云非如非異又云亦復不行上中下法有為無為實不實法非虗非實如實相也若一切法皆權何所不破縱令百千種師一一師作百千種說無不是權如來有所說尚復是權況復人師寧得非權若一切法皆實又何所不破唯此一事實餘二則非真但一究竟道寧得衆多究竟道耶諸師異解皆破入實寧復保其巢窟若一切法皆亦權亦實復何所不破一切悉有權有實那得自是一途非他異解一一法中皆有權實不得一向權一向實也若一切法皆非權非實復何所不破何復紛紜強生建立直列名尚自如此況論旨趣耶須曉四句秖一法性法性秖是真如實相如如涅槃以法性體不違諸法不受諸法不住諸法不入諸法故一一名字一一心法一一句偈一一因果一一凡聖一一依正乃至下文十雙無非法界自在無礙其義可成具如不二十門所說若本若末體理無殊說而不說不說而說照性非遠自在無窮雖復無窮不出四句四句無句無句而句句句遍收十方佛法但法華前教教四句句句未暢來至此會一味無殊具如藥草喻中差即無差無差即差今就第三亦權亦實句更開十法就十法中為八番解釋初列名二生起三解釋四引證五結十為三種權實六分別三種權實照三種二諦七約諸經判權實八約本迹判權實開章別釋者已知諸法互融遍入舉實即實中有權乃指此權為方便品舉權即是不思議權此權有實乃以此權名方便品舉亦權亦實則各有所歸此乃相即之兩亦攝三之兩亦故用即真實之方便為方便品舉非權非實則秪是方便之理理收三句皆方便品是則句句皆遍皆方便品何必約第三句更開十法一者名便具權實故二者義便所攝遍故餘句義便而名不便餘三雖有權義而權名不如第三即名即具用此即實而權為今品也故下十雙雙雙皆具權實之名皆取即實而權為方便品況初三總釋皆冠十文八門故也若不爾者非方便之事理乃至悉檀非列方便中法相之名乃至非今經之本迹十義十義無二本迹似殊本迹雖殊不思議一十義相別實相一如為衆生故列名生起乃至本迹事理乃至悉檀不同得意忘言言說解脫若見此意常默常說言行無違還以此旨而為觀境使彼觀境昭然可觀諸釋所無良由於此然此八中前七迹門第八本門本雖未至權實理遍故下文云是我方便諸佛亦然故方便之名通於本迹又此八門次第意者若不列名無以解釋若不生起迷於詮次解釋正示十文相狀引證為防不信者故結歸為明品元意故分別為令釋品有歸判釋令知粗妙有在如是方顯品之深旨又預辨本迹令識本地實權自他方顯大途久近之化初列名者一事理權實二理教權實三教行權實四縛脫權實五因果權實六體用權實七漸頓權實八開合權實九通別權實十悉檀權實二生起者從無住本立一切法無住者理也一切法者事也由理事故有教由教故有行由行故有縛脫由脫故成因果由果故體顯能用由用故有漸頓之化由開漸頓故有開合由開合故有通別益分別兩益故有四悉檀也此十雙中初五從因至果後五果家勝用因中若無前四則因義淺狹若無後五則果用粗近于中教是聖化且以受者得名又復文標能化義須對所故後五雙惟體用中一隻對所餘四並從能對得名又此亦與十妙義同若不爾者誰知方便須具十法誰知十法義遍一經若無十法乃成經文不詮因果及以能所是故十雙皆窮至要方是今經之十雙也若爾一經始終皆名方便並指前教以為所開方乃可云此經方便故知序中證信發起方便譬喻秪是比况方便因緣秪是往昔方便本門秪是久遠方便流通秪是諸佛菩薩通法方便由是方便故名真實若得此意如觀掌果法華一部方寸可知一代教門剎那便識因果自他共成一法十方三世無懷異求以十法乘而觀察之法華三昧投足有地無上佛果修途可期三解釋者一理事權實理是真如真如本淨有佛無佛常不變易故名理為實事是心意識等起淨不淨業改動不定故名事為權若非理則無以立事若非事則不能顯理事有顯理之功是故殷勤稱歎方便誰肯以三界有漏心等以為如來之所稱歎方便品耶若不爾者為令衆生其義安在世間相言如何消釋二理教權實總前理事皆名為理例如真俗俱稱為諦諸佛體之而得成聖聖者正實也欲以已法下被衆生因理設教教即權也非教無以顯理是故如來稱歎方便無明法性乃至界外一切諸法皆是所詮此心意識名之與體具足一切界外法故誰知法華之教以此等法而為所詮若不爾者邪見嚴王惡逆調達從何而得果教談此能詮亦權故知其教秪詮其理自非今經誰肯歎此詮迷之教為方便品若不爾者從三昧起所歎者何三教行權實依教求理則生正行行有進趣深淺之殊故行名權教無進趣深淺之異故教名實非教無以立行非行無以會教會教由行是故稱歎方便若不爾者如來方便波羅蜜等何所證耶四縛脫權實行違理則縛縛是虗妄故名權行順理則生解解冥於理故名實諸經地前尚自違理未開權故此經彈指無非佛因以顯實故非縛無由求脫得脫由縛如因尸渡海是故稱歎方便誰知此經佛以惡行亦得名為善巧方便死尸之譬遍通一切五因果權實因有進趣暫用故名權果有尅終永證故名實無果則因無所望無因則果不自顯果由因尅是故稱歎方便六體用權實前方便為因正觀入住為果且指圓初住為分證果住出為體用體即實相無有分別用即立一切法差降不同如大地一生種種芽初住百界作佛即能示十界法非地無以生物非生無以顯地尋流得源推用識體是故稱歎方便七漸頓權實統論修因證果從體起用俱有漸頓今明起用用漸為權用頓為實若非漸引無由入頓是故稱歎方便八開合權實從頓開漸漸自不合藏通兩教不廢小故亦不合頓三教菩薩不入實故故名為權漸令究竟還合于頓故名為實由開故合開有合力是故稱歎方便九通別權實通則半字無常之益別即滿字常住之益然常益道長易生退沒故以化城接引生安隱想然後息化引至寶所若無半益不得會常半有顯滿之功是故稱歎方便十悉檀權實世界為人對治三悉是世間故為權第一義悉是出世故為實非世不得出世由三悉檀得第一義是故如來殷勤稱歎方便三解釋竟四引證者此十義通大小教亘一切法且引今經不如三界見於三界三界是事不如三界見是理此證事理權實也諸法寂滅相不可以言宣是理以方便力故為五比丘說是教此證理教權實也須云若無性者為說人天乃至修羅為下品善乃至為說無作四諦故知從理俱不可說從事大小俱可得說若聞此經是善行菩薩道又汝等所行是菩薩道佛子行道已來世得作佛等此證教行權實也但離虗妄名為解脫其實未得一切解脫此證縛脫權實也小中虗妄名縛離即名脫若望大乘仍名為縛唯今名脫盡行諸佛所有道法是因道場得成果是果此證因果權實也我以佛眼觀是體見六道衆生是用此證體用權實始見我身聞我所說即皆信受入如來慧是頓除先修習學小乘者是漸此證漸頓權實窮子初逃中間除糞是開後則付財是合此證開合權實初息化城是通益後至寶所是別益此證通別權實種種欲種種性相憶念等此證悉檀權實已通引一部為證更別引一品雖不次第十文具足諸佛智慧甚深無量其智慧門難解難入者一切事理境智等悉名為實施設詮辨言教悉是智慧門此證理教論權實難解難入一切聲聞辟支佛所不能知即是縛脫論權實佛曾親近百千萬億無數諸佛盡行諸佛無量道法勇猛精進名稱普聞即是教行論權實成就甚深未曾有法隨宜所說意趣難解即是體用論權實吾從成佛已來者成佛是果果必有因即是因果論權實種種因緣種種譬喻廣演言教無數方便引導衆生令離諸著即是漸頓論權實如來方便知見波羅蜜皆已具足即是開合論權實如來能種種分別巧說諸法言辭柔軟悅可衆心即是通別益論權實取要言之無量無邊未曾有法佛悉成就即是三悉檀成就止舍利弗不須復說即是第一義悉檀是為四悉檀論權實佛所成就第一希有難解之法唯佛與佛乃能究盡諸法實相即是理所謂諸法如是相等即是事是為事理論權實此一段略明五佛權實佛佛皆爾四引證竟五結十為三種權實者先通結次別結先通者此十種通四教共四十權實若三藏中自證十法名自行權實說已十法利益衆生名化他權實化他之十有實有權皆合為權自行之十亦有實有權皆合為實名自行化他權實餘三教十法各就當教束為三種權實亦如是此通中通又當教各以事理教行縛脫因果四種為自行權實各以理教開合二種為化他權實各以體用漸頓通別悉檀四種為自他權實其名雖同其義各異此通中別次別結者前三教若通若別當分皆是化他權實隨他意語故圓教若通若別當分皆是自行權實隨自意語故化他之三若權若實皆名為權自行權實皆名為實次結成四句隨他意語即一切法權隨自意語即一切法實雙取即一切法亦權亦實雙遮即一切法非權非實次結成三番釋品若自行自意者此文稱道場所得法實也大經云修道得故權也攝大乘稱如理如量智如理是實如量是權皆是圓教自行權實隨自意語佛雖於此不可說法能方便說而衆生不堪若發軫單說此法取衆生者即不能得故言不可說不可說也復置此事以自行權實兼別教權實共取衆生大機利者直得鈍者曲得小機利鈍俱不得蓋華嚴意也復置此事但用半字權實取衆生大機利鈍密得顯不得小機利鈍但保於證取亦不得蓋三藏意也復置是事合用四教權實共取衆生大機利鈍曲直俱得小機利鈍保證俱不得蓋方等意也復置是事捨三藏權實用通別圓三種權實共取衆生大機利鈍俱得小機利鈍保證俱不得蓋般若意也復置是事捨前三權實單用圓教自行權實取衆生大小利鈍俱得蓋法華意也如來智慧靡所不達明照時宜用與可否故釋品云方者諸方法也便者善巧用也巧用方法取衆生得是故殷勤稱歎方便此約前四時三種法用不能至實故但成于初義釋品若至法華縱名法用亦成祕妙之法用也即可以用釋今品經則方法之名昔日通四今無復三復次如來自證權實俱不可說愍念衆生說自證之權為門於物非宜衆生不能得入故自證權亦不可說說別權實為門利者得入鈍者不入華嚴於物非宜別權實亦不可說說三藏權實為門利者密入鈍亦不入三藏於物非宜亦不可說說三種化他權實為門利者得入鈍亦不入方等於物非宜亦不可說說二種化他權實為門利者得入鈍亦不入般若亦不可說於物非宜捨三種化他權實但說自行之權利者鈍者俱得入從始至終以方便為門是故如來稱歎方便釋品云方便為入實之門即此意也前一番明如來能知方便能用方便此一番明行者能隨順方便初約方法中明如來能知能用方便法是能知用是能用衆生不知是佛方便今並開之令衆生知此一番明令衆生隨順方便者謂從門順實故也而亦不知方便即是所順之實今亦開之又二章並有機應二意但前多從應說且云如來後多從機說且云行者故殷勤稱歎之言並從佛得復次如來自證修道所得於一切方便即是真實而此真實不可得說雖能說之衆生不能即實以方便力帶不即說一即利者能即鈍不能即華嚴又純說一不即利者密即鈍者不即三藏又帶三不即說一即利者能即鈍者不即方等又帶二不即說一即利者能即鈍者不即般若又廢三不即純說一切即利鈍俱能即於方便得見真實法華上兩意用方便從方便此一意即方便即真實真實即圓因圓因即自行之方便如此自行方便今始證入故釋品云方者祕也便者妙也妙達於方即是真祕從自行方便得名故言方便品也五結十為三種權實竟六分別三種權實照三種二諦者前既通別當分結束權實通則十雙各三別則四自二他四自他共也今還約此智照義則易見若通以十種明自行二智者即照隨智二諦也通用十法逗緣者即照隨情二諦也若束四為二者即照隨情智二諦也每一教中皆束四為二謂自行權實皆束為實化他權實皆束為權故但成二此通中通也若當分照諦者事理教行縛脫因果悉是自證即照隨智二諦也理教開合兩屬化他即照隨情二諦也體用漸頓通別悉檀四通自他即照隨情智二諦也此通中別也又總束者三藏教三十種二智是化他二智皆照隨情二諦若通教別教共六十種二智是自他二智即照隨情智二諦通教或時與前三藏共為隨情二諦則別教三十種二智是自他二智照隨情智二諦先收通教為自他者以能通別通圓為大乘初門故次揀通教為但他者以當分不詮中理同灰斷故唯圓教三十種權實是自行二智照隨智二諦又三教若通若別還指通則十雙各三別則自四他二等皆是逗緣悉是化他二智照隨情二諦圓教若通若別皆是自行二智即照隨智二諦束三教之權實總為權束圓教之權實總為實即自他二智照隨情智二諦也六分別權實照二諦竟七約諸經判權實者初華嚴論教但是滿字論時但是乳論法是一自行一化他論人但是菩薩二乘如聾如啞今文云未曾向人說如此事也次三藏論教但是半字論時即是酪論法是一種化他論人但是二乘今文云住立門外著弊垢衣執除糞器也次方等論教對半明滿論時並酪明酥論法有三種化他一種自行論人小慕于大今文云心相體信入出無難也次般若論教帶半明滿論時挾生而熟論法有二種化他一種自行論人大資于小小教于大今文云出內取與皆使令知也今法華論教廢半明滿論時純是醍醐論法唯有自行論人此實我子我之所生我實是父付以家業授記作佛前教不說者今皆發之正直捨方便但說無上道故是自行之權名方便品自餘或是自他二智或化他二智教行理三前或已會若開人者前教所無復次華嚴對二菩薩說一自一他不擬二乘不聞不解三藏對二乘說一化他不擬菩薩故無自行方等具對小大對二乘說兩化他對菩薩說一自一他般若對二乘說一他對菩薩說一自一他法華普對機熟者但明一自不復有他文云菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛一切衆生悉入自行之方便故名方便品也七約諸經判權實竟八約本迹判權實者如來本地久已證得一切權實名為自行權實中間垂迹亦作兼帶等說今日垂迹寂場帶別化他說自行次說一化他次說三次說二次說廢三等皆名化他權實束本中權實名實束迹中權實名權即是自他合權實也結此則成四句一切實一切權一切亦權亦實一切非權非實舍利弗本證一切權實即自行權實迹在鹿苑單受化他在方等受一被三折在般若帶二轉一至法華廢三悟一皆是化他權實束本權實為實束迹權實為權即自他權實亦具四句可知若從佛迹說亦是化他之權實亦稱方便品若從引入圓因自行亦是方便品若從舍利弗迹權亦是方便品若從舍利弗迹入實亦是方便品為此諸義故稱方便品也二迹門正說為二初從今文至則生大歡喜是略開三顯一動執生疑次從爾時世尊告舍利弗汝已殷勤三請豈得不說至授學無學人記品是廣開三顯一斷疑生信初中二初略開顯二騰疑請初又二初長文重頌歎佛二智二偈頌正略開顯動執生疑初又二初長文二重頌長文為二初寄言歎二智二絶言歎二智初又二初明諸佛權實二明釋迦權實初又三初雙歎二雙釋三雙結今初爾時世尊從三昧安詳而起告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知爾時者文殊答問已竟時也佛常在定何故言起此有所示往古諸佛說此經時必前入無量義即入法華今佛亦爾此示世界悉檀哀從定起觀理觀機二俱審諦說必不謬增長物信此示為人悉檀哀從定起佛寂而常照尚須入定方乃說法況復散心妄有所說此示對治悉檀哀從定起入定緣理安心實相出定令他安心實相此示第一義悉檀哀從定起安此四法故言安詳而起也四教俱有四悉今須約開顯圓告舍利弗者小乘中智慧第一將欲因之而破小智顯大智此乃經家提起之文問此中告舍利弗與大品何別答何但大品始自四阿含終至此經處處有告各各不同四含中或為發起生滅法輪故告方等斥故告般若加故告今經開故告天親論云告身子不告餘聲聞者智慧深故不告諸菩薩者有五一為聲聞所作事故二回向大菩提故三令無怯弱故四為發餘人善思念故五令不起所作已辦心故當知五意兼異他經前顯露教不云聲聞得入佛智也諸佛智慧甚深無量者歎實智也非三種化他權實故言諸佛顯自行之實故言智慧此智慧體即一心三智豎徹如理之底故言甚深橫窮法界之邊故言無量此正稱歎之辭無量甚深深高橫廣譬如根深則條茂源遠則流長實智既然權智例爾其智慧門難解難入等者歎權智也自行道前方便有進趣之力故名為門四十位真因也從門入到道中妙覺果位道中稱實道前名權此即前十雙中約因果論權實十住始解故難解十地為入故難入非七方便人所能測度此正歎權之辭而別舉聲聞辟支不能知者執重故別破之耳藏通二乘通菩薩別三賢圓十信共名為七方便法身本意元以自行權實擬之無機逃走故言不知未結緣來名在法身結緣已後名無機等華嚴頓照如聾如啞故言不知方等彈斥保任草菴故言不知般若轉教無心希取故言不知今大機啓發放光動地彼此古今諸佛道同由懷疑惑故言不知利根菩薩節節能知鈍同二乘是亦不知也二雙釋所以者何佛曾親近百千萬億無數諸佛盡行諸佛無量道法勇猛精進名稱普聞佛曾親近等是釋實智良由外值佛多稟承至要故實智甚深良由內行純厚盡行道法故實智無量無量釋橫廣甚深釋豎高也勇猛精進等是釋權智良由勇猛精進能入難入之門既入門已澤被無疆物欽勝德故名稱普聞亦可勇猛精進能入法門即釋權智深名稱普聞即釋權智廣權智雖無深廣之語例實智此義則成三雙結成就甚深未曾有法隨宜所說意趣難解稱理究竟故言成就到彼岸底故言甚深此結成實智也稱機適會故言隨宜非七方便所知故言難解此結成權智也或成就甚深未曾有法結自行權實隨宜所說意趣難解結化他權實自行權實俱名為實化他權實俱名為權也初明諸佛權實竟二明釋迦權實三初雙歎二雙釋三雙結今初舍利弗吾從成佛已來種種因緣種種譬喻廣演言教無數方便引導衆生令離諸著實智不圓佛道不成既云成佛一成一切成即是歎實智也種種因緣下是歎權智四十餘年以三種化他權實逗會衆生故言種種因緣也譬喻者小乘中如芭蕉水沫等譬大乘中如乾城幻事等譬廣演者能於一法出無量義也無數方便即七種方便也引導等者說散十善離三途著說淨十善離欲界著說三藏離見思著說菩薩法離涅槃著說佛法離順道法愛著二雙釋所以者何如來方便知見波羅蜜皆已具足如來二字是釋實智從真如實相中來而得成佛故名如來也方便二字是釋權智由於方便善巧故能種種因緣譬喻廣演言教也知見波羅蜜即雙舉權實知見一切種智名實知佛眼名實見道種智名權知法眼名權見悉到事理邊際故悉名波羅蜜皆已具足者權實悉究竟也三雙結舍利弗如來知見廣大深遠無量無礙力無所畏禪定解脫三昧深入無際成就一切未曾有法廣大明橫深遠明豎實智非橫非豎寄言歎其橫豎照無限極如函大蓋大也無量者佛地大慈悲喜捨也無礙者佛地四辨也力者佛地十力也無所畏者佛地四無所畏也禪者實相禪也定者首楞嚴定也三昧者王三昧也深入無際結成權智豎深成就一切未曾有法結成權智橫廣初寄言歎二智竟二絶言歎二智為二初舉絶歎之由二正絶言歎初中二初正舉絶歎之由二指絶言之境今初舍利弗如來能種種分別巧說諸法言辭柔軟悅可衆心種種分別巧說諸法重舉權也言辭柔軟悅可衆心重舉實也上文見他土說頓云出柔軟音下文身子領解云聞佛柔軟音故言舉實衆心乃以得實為悅故也前寄言歎前實後權是明從實舒權今絶言歎前權後實是欲卷權歸實二指絶言之境舍利弗取要言之無量無邊未曾有法佛悉成就取要者創指之端猶云略而言之也無量無邊是指權未曾有法是指實言此二事佛悉成就修道得故此那可說若單明一事不應言悉悉者雙指權實也復次無量無邊皆未曾有則即權而實不可思議未曾有法無量無邊則即實而權不可思議初舉絶歎之由竟二正絶言歎為二初絶言歎二釋止歎意今初止舍利弗不須復說此法深寂言語道斷體不可說故止而歎之設慈悲為說聞不能解傷其善根是故止也二釋止歎意所以者何佛所成就第一希有難解之法唯佛與佛乃能究盡諸法實相所謂諸法如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等此釋止歎凡有兩意一者佛是最上人成就修得最上法故不可說即約能究盡之智慧言也二者甚深境界不可思議故不可說即約所究盡之諸法實相言也成就對不成就第一對不第一希有對不希有難解對不難解以果望因自他相對須約教味委悉簡他以顯佛最上人權實橫滿故不可說也唯佛與佛乃能究盡者初中分獲未盡其源如十四夜月光用未滿獨佛與佛究竟邊底如望夜月體無不圓光無不遍以顯權實豎深修道得故故不可說也諸法實相者略標甚深權實境也諸法謂百界千如即實之權也實相謂中道理體即權之實也所謂諸法如是相等廣釋甚深權實境也須作四番解釋一約十法界二約佛法界三約離合四約位經云諸法故用十法界釋經云佛所成就希有之法故用佛法界釋經云止止不須說我法妙難思故用離合釋經云唯佛與佛乃能究盡故用位釋也一約十法界者謂六凡四聖法雖無量數不出十一一界中雖復多派不出十如如地獄界當分自具相性乃至本末亦具畜生界相性本末乃至亦具佛法界相性本末無有缺減故阿毗曇毗婆沙云地獄道成就他化天法即是其例餘九法界亦如是當知一一界皆互具餘九界十如若照自位九界十如皆名為權照其自位佛界十如名之為實一中具無量無量中具一所以名為不可思議凡夫雖具絶理情迷自鄙無分故云絶理隨想異見故云情迷二乘雖具捨離求脫三道即是捨而不觀避空求空反資小脫菩薩雖具照則不周名不了了藏通照六別照次第故云不周如來洞覽橫豎具足一中無量為橫無量即一為豎多一相即故云具足唯獨自明了餘人所不見不可宣示故止止絶言耳上玄義中已說今不具記二約佛法界釋者佛界非相非不相而名如是相指萬善緣因故下文云衆寶莊校也佛界非性非不性而名如是性指智慧了因故下文云有大白牛也佛界非體非不體而名如是體指實相正因故下文云其車高廣也佛界非力非不力而名如是力指菩提道心慈善根力等故下文云又於其上張設幰蓋也佛界非作非不作而名如是作指任運無功用道故下文云其疾如風也佛界非因非不因而名如是因指四十一位故下文云乘是寶乘遊于四方也佛界非緣非不緣而名如是緣指一切助菩提道故下文云又多僕從而侍衛之也佛界非果非不果而名如是果指妙覺朗然圓因所尅故下文云直至道場也佛界非報非不報而名如是報指大般涅槃故下文云得無量無漏清淨之果報也佛界非本非末非不本非不末而言本末本即佛相末即佛報是自行權也佛界非等非不等而言究竟等指於實相故標章云實相是自行之實也即實而權故言本末即權而實故言為等問此中佛界與前十界中佛界何別答前則在迷在因通悟通果今乃唯果不通因迷故一一法皆用雙非非相即非假非不相即非空雖出雙非意存三諦下九準知乃至本末究竟等也如是方名究竟佛乘是故皆以大車文結此則于今品文是佛果家之諸法實相于彼譬說即至道場之莊嚴大車于彼宿世即極果佛之開權寶處于彼本門即久成佛之所契妙法若正宗可識則流通豈迷一句一偈之言彌可信也三德三軌之說皎若目前若得此意廣演于八年不出乎一念經五十小劫詎動于剎那例知一代逗機居于心性十方佛事宛然矚目法界根性覽而易通隨宜所說咸指藏理此是如來自行權實最為無上無上相乃至無上果報橫廣豎深而無有上故標章云諸法實相例亦應言諸法實性實體實力乃至實究竟等但略舉一以蔽諸耳如來遍照橫豎悉周如觀掌果秖為凡夫如雙盲二乘如眇目菩薩夜視朧不曉不可得說故止止絶言也三約離合釋者若佛心中所觀十界十如皆無上相乃至無上果報惟是一佛法界如海總萬流如千車共轍此即自行權實若隨他意則有九法界十如相性等即是化他權實化他雖復有實皆束為權自行雖復有權皆束為實即是自行化他權實隨他則開隨自則合橫豎周照開合自在雖開無量無量而一雖合為一一而無量雖無量一而非一非無量雖非一非無量而一而無量惟佛與佛乃能究盡凡夫則誹謗不信二乘則迷悶不受菩薩則塵未明為此義故止止絶言也四約位釋者如是相謂一切衆生皆有實相本自有之乃如來藏之相貌也如是性即是性德智慧第一義空也如是體即是中道法性之理也是為三德通十法界位位皆有若研此三德入十信位則名如是力如是作入四十一位則名如是因如是緣若至佛地則名如是果如是報初三名本後三名末初後同是三德名究竟等初位三德通惡通善通賢通聖通小通大通始通極雖在惡而不沉雖在善而不升雖在賢而不下雖在聖而不高雖在小而不窄雖在大而不寬雖在始而非新雖在極而非故故是不可思議不可得說所以止止絶言也復次三德究竟等者十界相性權實開合差別若干以平等大慧如實觀之究竟皆等若迷此境即有六界相性名為世諦若解此境即有二乘相性名為真諦達此非迷非解即有菩薩佛界相性中道第一義諦若以此慧等於俗諦俗諦非迷等于真諦真諦非解非解非迷雙非迷解但名平等若雙照者權即是實實即是權雖二而不二亦名究竟等也此約惑解等又權實不二之境七種方便不能以不二智而等不二之境惟有諸佛以不二智等不二境故言究竟等此約人等又今大乘機動不明九界相性直說一切相性悉入佛界相性昔教未說謂昔不與今等今教說之知昔與今等故言究竟等此約教等又所以四釋者明理攝遍故約十界釋明自證極故約佛界釋明佛化用故約離合釋明三德遍故約諸位釋也初歎佛二智中初長文竟二重頌二初頌寄言歎二智二頌絶言歎二智偈頌上文互有廣略令義易顯耳初中二初合頌歎二佛二智二合頌二佛釋歎結歎長文二佛各歎表化緣異故頌中二佛合歎示二智同故今初爾時世尊欲重宣此義而說偈言世雄不可量諸天及世人一切衆生類無能知佛者佛力無所畏解脫諸三昧及佛諸餘法無能測量者初一偈總頌二佛實智第二偈總頌二佛權智也諸餘法者指化他權實即以自行而為化他從一法中開出無量所有方便無不即權即實故亦無能測量二合頌二佛釋歎結歎本從無數佛具足行諸道甚深微妙法難見難可了於無量億劫行此諸道已道場得成果我已悉知見此頌上兩章釋結之意而文字變化不必句句分配蓋謂甚深微妙之權實二法最為難見難了由我與諸佛本從無數佛所具足盡行無量道法於無量劫行此道已乃坐道場得成佛果故能悉知悉見此權實微妙法也無量劫具足行道故權智滿道場成果故實智滿此亦約因果而論權實也初頌寄言歎二智竟二頌絶言歎二智為三初頌釋止歎意二正頌絶言歎三追頌絶言境今初如是大果報種種性相義我及十方佛乃能知是事此頌唯佛與佛乃能究盡諸法實相等也先舉果報之後次舉性相之初中間例知大果報者即妙果報種種性相者即百界千法差別不同義者即究竟等也二正頌絶言歎是法不可示言辭相寂滅諸餘衆生類無有能得解除諸菩薩衆信力堅固者此正頌止不須說之旨也是法即諸佛二智所照權實妙境所謂不可思議百界千如諸法實相也實相非方所故不可示非言語道故言辭相寂滅佛雖能說此不可說法而衆生無能得解故止不須說也然既無能得解則是法將終不可傳乎故曰除諸菩薩衆信力堅固者庶幾能得解耳信力堅固指圓教十信也以下正廣明諸餘衆生皆不能解諸佛弟子衆曾供養諸佛一切漏已盡住是最後身如是諸人等其力所不堪假使滿世間皆如舍利弗盡思共度量不能測佛智正使滿十方皆如舍利弗及餘諸弟子亦滿十方剎盡思共度量亦復不能知辟支佛利智無漏最後身亦滿十方界其數如竹林斯等共一心於億無量劫欲思佛實智莫能知少分新發意菩薩供養無數佛了達諸義趣又能善說法如稻麻竹葦充滿十方剎一心以妙智於恆河沙劫咸皆共思量不能知佛智不退諸菩薩其數如恆沙一心共思求亦復不能知初六句揀漏盡弟子不知次四句揀舍利弗不知第三有六句揀餘大弟子不知第四有八句揀辟支佛不知支佛逆順觀十二因緣故名利智佛實智者自行權實俱名為實也第五有十句揀發心菩薩不知或指六度三祇未斷惑者或指通別二教發心之人彼于當教各能了達四諦義趣依之發于四弘誓願各能敷演當教道法展轉望前皆稱妙智如藏教以超過世間名妙通教以了達即空為妙別教以仰信中道為妙也第六有四句揀不退菩薩不知通教斷界內惑雖得不退不知中道別理別教三賢雖得位行不退不知中道具一切法即一切法三追頌絶言境又告舍利弗無漏不思議甚深微妙法我今已具得唯我知是相十方佛亦然此正頌無量無邊未曾有法佛悉成就也最後二句亦是重頌唯佛與佛乃能究盡諸法實相等無漏者純一實相實相之外無餘法也不思議者心行處滅言語道斷也甚深微妙者唯是諸佛所證契也又依無漏義故前於十如約十法界釋十界十如收諸凡聖理性無漏失收三諦無漏失權實智無漏失也依不思議義故前於十如約開合釋即權而實即實而權故不可思議也依甚深微妙義故前於十如約佛法界釋依唯我知是義故前於十如約位釋二並可知初略開顯中初長文重頌歎佛二智竟二偈頌正略開顯動執生疑二初明諸佛顯實二明釋迦開三互明一邊耳今初舍利弗當知諸佛語無異於佛所說法當生大信力世尊法久後要當說真實諸佛語無異者此顯諸佛化道是同次兩句勸信後兩句正顯實可見從前所說皆非真實所以破昔之執生今之疑下文將非魔作佛正由聞此語也佛既實語勸信何事翻疑為防因疑起謗故須勸信耳二明釋迦開三告諸聲聞衆及求緣覺乘我令脫苦縛逮得涅槃者佛以方便力示以三乘教衆生處處著引之令得出初一偈正舉昔日所施之三聲聞為小乘緣覺為中乘三祇六度脫諸苦縛逮得涅槃者為大乘也次二句正斥皆是方便假說一總非實後二句釋出施三之意引令出著不得已耳初略開顯竟二騰疑請二初敘疑二請決初中二初經家敘二正生疑今初爾時大衆中有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷各作是念上斥三乘皆是方便今敘疑但在二乘者以其執重疑深故偏舉也若下文陳疑中即云求佛諸菩薩大數有八萬等故知三乘僉疑二正生疑今者世尊何故殷勤稱歎方便而作是言佛所得法甚深難解有所言說意趣難知一切聲聞辟支佛所不能及佛說一解脫義我等亦得此法到於涅槃而今不知是義所趣何故言佛所得法甚深難解是疑佛實智何故言有所言說意趣難知等是疑佛權智以佛昔說三乘智慧同證不差但餘習有盡不盡耳今忽稱歎如來二智非我所及是以生疑也佛說一解脫義下是自疑所得三乘聖道是真出要我修此理亦到涅槃而今忽言皆是方便未知何者真實故言不知是義所趣初敘疑竟二請決中文有三請二止并前文為三止初止為理深難解初請為自他求決次止為驚疑不信次請為久植必解後止為謗必墮惡後請為利根得益或佛豫知三周得益前後不俱故三抑俟其三請也第一請為二初長文二偈頌初長文二初陳疑二陳請今初陳疑疑二智也爾時舍利弗知四衆心疑自亦未了而白佛言世尊何因何緣殷勤稱歎諸佛第一方便甚深微妙難解之法二陳請陳已請衆請也我自昔來未曾從佛聞如是說今者四衆咸皆有疑惟願世尊敷演斯事世尊何故殷勤稱歎甚深微妙難解之法二偈頌五初頌疑二智二頌三乘四衆疑三頌自疑四頌佛子疑五總明同疑請今初爾時舍利弗欲重宣此義而說偈言慧日大聖尊久乃說是法自說得如是力無畏三昧禪定解脫等不可思議法道場所得法無能發問者我意難可測亦無能問者無問而自說稱歎所行道智慧甚微妙諸佛之所得是法指實智力無畏等指權智道場所得指自行權實我意難測指化他權實以是同體方便故難測也所行道結自行權佛所得結自行實無問自說即結成化他意也苟非欲以自行化他何故無問自歎二頌三乘四衆疑無漏諸羅漢及求涅槃者今皆墮疑網佛何故說是其求緣覺者比丘比丘尼諸天龍鬼神及乾闥婆等相視懷猶豫瞻仰兩足尊是事為云何願佛為解說初句明小乘第二句明六度大乘次偈明中乘及四衆等三頌自疑於諸聲聞衆佛說我第一我今自於智疑惑不能了為是究竟法為是所行道究竟法果也所行道因也上文佛斥所示三乘皆是方便今疑三乘各有因果依教修證未嘗有謬若云方便非真實者為是所證果非實耶為是所行因不真耶四頌佛子疑佛口所生子合掌瞻仰待願出微妙音時為如實說此指通別二教菩薩有疑若不疑者何故合掌瞻仰待耶五總明同疑請諸天龍神等其數如恆沙求佛諸菩薩大數有八萬又諸萬億國轉輪聖王至合掌以敬心欲聞具足道第一請竟第二止恐懷疑故爾時佛告舍利弗止止不須復說若說是事一切世間諸天及人皆當驚疑第二請騰宿根利故不懷疑舍利弗重白佛言世尊惟願說之惟願說之所以者何是會無數百千萬億阿僧祇衆生曾見諸佛諸根猛利智慧明了聞佛所說則能敬信爾時舍利弗欲重宣此義而說偈言法王無上尊惟說願勿慮是會無量衆有能敬信者第三止護增上慢故佛復止舍利弗若說是事一切世間天人阿修羅皆當驚疑增上慢比丘將墜於大坑爾時世尊重說偈言止止不須說我法妙難思諸增上慢者聞必不敬信第三請述饒益者多世世受化不起上慢爾時舍利弗重白佛言世尊惟願說之惟願說之今此會中如我等比百千萬億世世已曾從佛受化如此人等必能敬信長夜安隱多所饒益爾時舍利弗欲重宣此義而說偈言無上兩足尊願說第一法我為佛長子惟垂分別說是會無量衆能敬信此法佛已曾世世教化如是等皆一心合掌欲聽受佛語我等千二百及餘求佛者願為此衆故惟垂分別說是等聞此法則生大歡喜初略開三顯一動執生疑竟二廣開三顯一斷疑生信凡有三周初從此文至第二卷中盡回向佛道是法說一周上根得悟次從爾時舍利白佛言我今無復疑悔乃至授記品是譬說一周中根得悟三化城喻等三品是因緣說一周下根得悟亦名理事行三周今以十義料簡一有通有別二有聲聞無聲聞三惑有厚薄四根轉不轉五根有悟不悟六有領解無領解七有得記不得記八悟有淺深九益有權實十待時不待時一明通別者初周別名法說通則具三如優曇華時一現耳即譬說也若我遇衆生盡教以佛道即因緣說也第二周別名譬說通亦具三我先不言皆為一佛乘故又於一佛乘分別說三即法說也長者聞已驚入火宅方宜救濟即因緣說也第三周別名宿世因緣通亦具三涅槃時到衆又清淨令入佛慧即法說也有一導師即譬說也今從多從正從略從旁欲令名字不濫故置通取別耳二明有聲聞無聲聞者光宅謂定有實行聲聞若言無實權何所應開善謂定無實行聲聞引勝鬘經三乘初業不愚于法外凡已知一乘寧有二乘猶執小果經明有者權耳此二家偏執乖經失義若定有者經那言但化諸菩薩無聲聞弟子若定無者誰入化城亦無三可會權何所引難曰若言實有聲聞為權所引者亦應實有三藏佛為權三藏佛所引若實無三藏佛但有權佛者何意不許但有權聲聞無實聲聞耶答曰此義不例實有斷界內惑者呼此為實聲聞而權者應之何處有但斷界內惑之佛而有權佛應此佛哉今明有無不可偏執若從長者實智往觀則無客作人若就窮子根性則便自謂作人法華論明四種聲聞一決定二上慢三退大四應化前二未熟不與授記後二與記若依今經則應有五一者久習小乘今世道熟聞小教證果與論中決定聲聞同二者本是菩薩積劫修道中間疲厭生死退大取小大品經中稱為別異善根佛且成其小道為說共般若令其斷結取果是退大未久習小來近理應易悟與論中退大聲聞同三者以此二故諸佛菩薩內祕外現成就引接令入大道與論中應化聲聞同四者由見權實兩種聲聞能出生死因而欣樂涅槃修戒定慧微有觀慧未入似位薄有所得謂是證果此名未得謂得未證謂證與論中上慢聲聞同五者大乘聲聞即是以佛道聲令一切聞也若約決定退大兩種即有聲聞若約大乘理無灰斷不住化城終歸寶所實者既爾則無有權故無聲聞若增上慢人既未入位故不名實又非應化故不名權苟得此意有無泠然何須苦諍復次秖就佛道聲聞復論有無若權作應化外現小迹內隱大德則謂無大乘聲聞若從自行發迹顯本則言有大乘聲聞今開權顯實正為引決定退大二種聲聞令成大乘聲聞自行既立即能為應化聲聞若得此意則達有無也三明惑有厚薄者約無明別惑及約大乘根性言也即為四句一惑輕根利二惑重根利三惑輕根鈍四惑重根鈍若別惑輕大根利初聞即悟若惑重根利再聞方悟若惑輕根鈍三聞乃悟若惑重根鈍雖復三聞不能得悟止為結緣衆耳或可初兩句根利同為上根第三句為中根第四句為下根或可初句為上根第二第三兩句合為中根第四句為下根復次約初品無明有三重能覆初住中道初作法說上根人聞三重無明一時俱盡開佛知見入菩薩位得菩提記中根僅斷二重下根僅斷一重次作譬說中根斷第三重盡開佛知見得菩提記下根進斷第二重後作因緣說時下根斷三重盡得菩提記也四明根轉不轉者舊云上根初聞法說即悟而中根轉同上根下根轉同中根至譬說時中根前已成上即能得悟下根前已成中今轉同上至因緣說時下根先已成上所以得悟今謂若爾則悟者皆是上根何名三根若皆曰上根何名利鈍夫衆生心神不定遇惡緣則轉利為鈍遇善緣則轉鈍為利先世值佛聞法自有轉下中為上者俱於法說得悟自有轉下為中者俱于譬說得悟自有先世未轉者須待三周方悟如此轉根不同舊釋譬如三刀斫木利刀一斫即斷中者二斫斷鈍者三斫斷利鈍之名不失木斷之處是同刀譬根木譬惑執刀者譬機教斫者譬佛受教者譬聞法運刀譬用觀木斷譬證入曾磨譬先世根轉遇磨不同故有利鈍此中聞法得悟似屬信行非不兼于法行由于往世信法回轉相資不同故也然一坐中應無六十四番問三根入初住位猶有利鈍否答真修體顯則無差降問若爾則初住已上更起緣修有優劣否答此同位人無復勝負真修體融寧得有異五明根有悟不悟者經中多明菩薩為上根緣覺為中根聲聞為下根若爾菩薩皆應初周得悟耶義未必然始自三周乃至流通壽量有諸菩薩節節得悟無生忍者何得局在法說周也緣覺不局在譬說周亦可知問菩薩得悟通於始終二乘得悟亦應至後答三周定父子天性已竟則皆名菩薩設在後悟同名菩薩悟也六明有領解無領解者若三乘同悟何意但見聲聞領解其二則無今明無佛世出名獨覺聞佛說因緣法得悟名緣覺如大迦葉舍利弗等悉是中乘根性既入聲聞數中得悟領解不異菩薩無領解者聲聞教中不明得佛今經開其歸大之路自恐解謬故對佛述解菩薩不爾故無領解又其意有三一菩薩本意求佛設有異執而執輕終歸取佛無有不得之慮今聞三周之說但是正其觀慧故不須領解二菩薩悟大處處有文二乘作佛始自今教逐要流傳故略菩薩領解梵文或有漢略不書耳三菩薩位行深絶諸新小菩薩不敢領解說壽量竟彌勒總都領解初從無生法忍終訖餘一生在則是具足領解更求何物七明得記不得記者若同皆領解何故聲聞得記不見緣覺菩薩受記此亦三意一者昔明二乘入正位者不能發心何由得記今既悟大欣斯別決故為記劫國也菩薩發心求佛行滿自成故不欣急求佛亦不促授又前教處處授菩薩記此是恆說今但逐要傳譯二菩薩亦有記別調達龍女豈非記耶又法師品云求聲聞者求辟支佛者求佛道者如是等類咸於佛前聞法華經我皆與授三菩提記此豈非皆記耶三二乘昔來未曾得八相記故記其劫國菩薩先已曾記故不重明耳淺近之記初住已得菩薩所欣乃圓極妙覺遠記故壽量品中始從發心訖一生得妙因斯滿極果頓圓此乃授法身記何謂無記耶問若小乘既悟大道應同授法身記那得授八相記答八相是應記既得應記知必有本欲使物知聞共來結緣故與應記耳又此二乘若聞壽量即同增道損生得法身記也八明悟有淺深者一往同破無明入圓初住細尋必應明晦初聞法說既入佛慧者更聞譬說豈不重明又聞因緣理必增進更聞壽量彌復優深如聽法人重聞則勝前如寒得衣單復分厚薄九明益有權實者或云實行得益權行正為接引影響不論其益今明不爾若至壽量權實悉得益增道彌高損生彌盡鄰圓際極唯一生在豈非權者益耶所以初為影響共熟實行後說極果則自道明文云出入息利及遍他國息利在己即是己利實行得益由於權引化功歸己權亦得益故佛以一音演說法衆生隨類各得解又何必須待壽量方令權得益耶地涌菩薩云我等自亦欲得此真淨大法即是自益也十明待時不待時者爾前未悟必待法華悟者名為待時前教已悟者名不待時何以故佛有顯密二說若約顯說則法華之前二乘未悟大道要須五味調熟會在法華故云所以未曾說說時未至故今正是其時決定說大乘此即待時也若約密說未必具待五味在法華方會爾前有密入者名不待時此乃大判時不時若就三周亦是待時不待時迹本二門亦是待時不待時致有前後悟入也三周之中自論密者如法說時密聞大車及大通事而得悟入即不待時中周密聞準此可知問若三周及本有密說者玄文那云法華唯顯答言顯密者爾前偏圓互不相知今至此經同入一圓雖密而顯純一味故但於一座有待不待然知彰灼授記二乘顯露分明說壽長遠於茲一座無不聞知故名為顯問有一種根性于前四時既無密益不至法華復無顯得二時不攝者應是失時永不得悟耶答餘經或謂此為失時今經不爾此人雖于密顯兩時不悟生滅度想入于涅槃而于彼土得聞是經故無失時乃是待彼土之時耳問五千起去應是失時答此等應於如來滅後弘經人處受益亦是待時也十義料簡三周竟初法說周為五初正法說二身子領解三如來述成四與授記五四衆歡喜初中二初長文二偈頌初中三初許二受旨三正說初又三初順許二誡許三揀許今初爾時世尊告舍利弗汝已殷勤三請豈得不說汝已殷勤是順豈得不說是許也二誡許汝今諦聽善思念之吾當為汝分別解說上二句是誡後一句是許也諦聽是聞慧善思是思慧念之是修慧大經云一者親近善友二者聽聞正法三者思惟其義四者如說修行惟此四法是涅槃因若言苦行是涅槃因無有是處一善知識謂如來也後之三句即是三慧故佛誡之是涅槃近因緣也三揀許說此語時會中有比丘比丘尼優婆塞優婆夷五千人等即從座起禮佛而退所以者何此輩罪根深重及增上慢未得謂得未證謂證有如此失是以不住世尊默然而不制止爾時佛告舍利弗我今此衆無復枝葉純有貞實舍利弗如是增上慢人退亦佳矣汝今善聽當為汝說從初至退亦佳矣是揀汝今善聽是許也五千在座故如來三止今將許說威神遣去故名揀衆五濁障多名罪重執小翳大名根深未得三果謂得三果未證無學謂證無學如誤認四禪以為四果等名增上慢有如此失者謂障執慢三失也默不制止者上聞略開三顯一言簡義隱猶未生謗足為繫珠因緣去則有益若聞廣開三顯一乖情起謗住則有損是故不制止也無復枝葉者枝葉細末不任器用此等執方便之方便小乘四果已是方便更于暖頂妄計為極於大非器故大品經云攀枝附葉棄于根本是人為不黠即此義也退亦佳矣者既以小自翳復妨他大光今退無謗法之愆復無障他之過故云佳矣枝葉未去故如來三止貞實願聞故身子四請師弟鑒機非徒靳固也問佛大慈悲何不神力使其住而不聞如華嚴中之二乘聾啞何不強毒以大如喜根之於勝意答各有所以華嚴末席正已開漸未破小執故在座而隔今正欲滅化破菴宜須揀遣若去在俱謗宜如喜根強說今去則有益那忽令住住則有損那忽不遣喜根令遠得益慈故強說與其樂種如來護令不謗悲故發遣拔其當苦問五千在座即不蒙益去則何益答此非當機是結緣人耳昔大通佛時亦有無量衆生心生疑惑世世與師俱生今皆得度乃至如來滅後猶故未盡此五千人當知亦爾又說大經時有八萬五千億人於是經中不生信心是人于未來亦當得信例此則益在不久也初許竟二受旨舍利弗言唯然世尊願樂欲聞前已三請并此為第四請
