body:
  text: 古吳後學蕅益智旭述初正法説長文中初許二受旨竟三正説為二初四佛章廣上諸佛權實二釋迦章廣上釋迦權實上句逗少是文略總云諸佛是人略但開三顯一是義略此中章句多是文廣明五佛是人廣明六番是義廣六番者一歎法希有二説無虗妄三開方便四示真實五舉五濁釋權六揀偽敦信歎法令生尊重説無虗妄止其誹謗開方便使莫執小示真實使其悟大舉五濁示必施三揀偽要必真實於五佛章中一一應備六義而前後互出不具足者蓋如來巧説使略而無缺詣而不煩文耳又六義前後亦復無在生起宛然大體隨時以此六義共成開顯大旨如三世佛但各二章豈非極略而開顯無缺令權詣實略却四章令文不繁詣者至也前後無在者六章之要莫若開顯前後互無在餘四章但義存六共成一意不必次第也初四佛章為二初總明諸佛二列三世佛初中但四初歎法希有二説無虗妄三開方便四示真實缺二義者指後文也今初佛告舍利弗如是妙法諸佛如來時乃説之如優曇鉢華時一現耳此中法譬雙歎諸佛若出五濁必先開三如今世尊四十餘年始顯真實久久稀疏故言時乃説之久不説者為人不堪故時未至故五千未遣故今人已堪時已至五千已去決定説大乘故言時乃説之優曇華此云靈瑞三千年一現又現則金輪王出表三乘調熟已後方説妙法授法王記又隔跨酪及二酥三味乃説醍醐也觀心釋者即中妙觀通一切法至實相名為靈靈即靈通有此觀故必獲佛記名為瑞由有此觀方得佛果名為華二説無虗妄舍利弗汝等當信佛之所説言不虗妄此理至深與昔權理異此言至妙與昔權言反此行至普與昔權行乖此人至勝勝於昔劣還指客行四種之粗而今皆妙恐物疑謗故先勸信令信無虗妄人説無虗妄法也三開方便三初開二釋三結今初舍利弗諸佛隨宜説法意趣難解隨三種機宜巧説方便而佛意在實人莫能解也二釋所以者何我以無數方便種種因緣譬喻言辭演説諸法舉今佛之權能釋諸佛之方便巧慧同故借此釋彼當知諸佛開權亦如我也三結是法非思量分別之所能解唯有諸佛乃能知之此結成開權之意趣難解也蓋稟教者罔不謂三唯有諸佛乃知一耳此文兩向若作示真實者即屬後文初標勝人法也無分別法唯佛能知佛以無分別智解知無分別法故是顯實四示真實五初標勝人法二標出世意三重示四正釋五總結初文如前二標出世意所以者何諸佛世尊唯以一大事因緣故出現於世釋此為兩初總次分字初總者承上文言何故是法非思量分別所解唯有諸佛乃能知耶良以諸佛覺如實之相乘此實道出應於世秖令衆生得此實相更無他事實相無相微妙第一故非思量分別所能解也次分字釋者一則一實相也非三非五非七非九故言一也三即三乘五加人天七加通二乘九加通別菩薩其性廣博博三五七九等故名為大諸佛出世之儀式故名為事衆生有此機感故名為因如來乘機而應故名為緣是為出世之本意而先開三者為一弄引耳如人欲取先當與之雖説種種道其實為一乘也三重示舍利弗云何名諸佛世尊唯以一大事因緣故出現於世將欲解釋更重徵起以為言端又此大事佛所尊重如釋論中明父王欲多聞太子名數數説之無有厭足也四正釋破古不録夫既顯實則無量法皆一也如玄義中十妙則是十種一也若略和舊解且作四一言無量一者一色一香無非中道此義可知言十一者帖文整足雖不次第十義無減是法非思量分別之所能解是顯理一唯有諸佛乃能知之是顯智一唯以一大事者一即是理大即是智智能照境方達境大故大名智事即是行自行化他俱名事故理發智智導行逐此義便是顯行一知見者智知於理眼見諦法諦理無為則無分別以無為法而有差別約此知見論開示悟入以略擬廣有四十位是顯位一又取結句明一一即法身大即般若事即解脫為祕密藏是顯三法一出現於世顯感應一但教化菩薩顯眷屬一諸有所作顯神通一唯以佛之知見示悟衆生顯利益一但以一佛乘故為衆生説法顯説法一經文印義信如符契今略和舊解作四一者數同義異舊云果一今言理一依義依文依義者若無理一衆事顛倒悉是魔説非復佛經故須理一依文者文稱佛之知見今取所知見所見即諦所知即境境諦即實相理故名理一舊云因一語單義別今云行一通收因果人一教一名與舊同文即為四初明理一二明人一三明行一四明教一今初諸佛世尊欲令衆生開佛知見使得清淨故出現於世欲示衆生佛之知見故出現於世欲令衆生悟佛知見故出現於世欲令衆生入佛知見道故出現於世舍利弗是為諸佛以一大事因緣故出現於世釋此理一復為四意一約四位二約四智三約四門四約觀心一約四位者諦境不可知見約于智眼乃能知見二智四眼不能知見惟一切種智佛眼則能知見經云為令衆生開佛知見若偏語佛果即失衆生若偏語衆生則非佛知見故不可偏取前三教行人雖是衆生未得佛眼佛智故不能知見實相圓教四位亦是衆生而分得佛眼佛智則衆生義成佛知見義亦成故寄此四位以釋理一如瑞相中天雨四華表萬善同歸得入四位乘四位華以趣佛果故約位顯理也開者即圓十住初破無明開如來藏見實相理何者性德妙理被通別兩惑之所染著難可了知初心雖能圓信名字位圓受五品位圓伏十信位而未能斷不名為開內加觀行外藉法雨助破通別惑藏顯出真修性知見朗然開發如日出暗滅眼目有用故名為開緣修破惑故名使得清淨仁王經云入理般若名為住住於十住白華位也示者惑障既除知見體顯體備萬德法界衆德顯示分明故名為示即是十行大白華位也悟者障除體顯法界行明事理融通更無二趣如理智如量智理量不二故名為悟即十回向赤華位也入者事理既融自在無礙任運流注入于薩婆若海如理如量通達自在如量知見能持衆德如理知見能遮諸惑即是十地大赤華位也然圓道妙位一位之中即具四十一地功德秪開即具示悟入等更非異心但如理知見無有分別淺深之相欲顯如量知見故分別四位耳發心畢竟二不別如是二心先心難既云難易即知初心與畢竟心應有明晦淺深之別猶如月體初後俱圓而有朔望之殊四位知見皆明照實相而説開示悟入之異也二約四智者名出般若彼通三教今唯約圓一道慧見道實性實性中得開佛知見也二道種慧知十法界諸道種別解惑之相一一皆示佛知見也三一切智知一切法一相寂滅寂滅即悟佛知見也四一切種智知一切法一相寂滅相種種行類相貌皆識即入佛知見也智慧二字俱通因果及以總別今但云道慧故約因約總加一種字故約因約別智上有一切二字故約果約總又加一種字故約果約別也又道慧如理名開道種慧如量名示一切智理量不二稱悟一切種智理量雙照為入此亦約實理無淺深中而淺深分別也如彼俗境數量如于實理契之理量相即非因果總別而論因果總別四名便故初後理同三約圓教四門橫釋四句者空門一空一切空即開佛知見有門一有一切有即示佛知見亦空亦有門一切亦空亦有即悟佛知見非空非有門一切非空非有即入佛知見能通則四所通則一開示悟入是能通之門所知所見乃所通之理也四約觀心釋者觀于心性三諦之理不可思議此觀明淨名為開雖不可思議而能分別空假中心宛然無濫名為示空假中心即三而一即一而三名為悟空假中心非空假中而齊照空假中名為入是為一心三觀而分開示悟入之殊也所以四種釋者見理由位位立由智智發由門門通由觀觀故則門通門通故智成智成故位立位立故見理見理故名為理一也雖云理一而門即教一觀即行一位即人一此乃教行人三寄理以辨理既如是餘三例然釋義之妙無以加矣又前約位智則初住方得名開似乎凡夫絶分後約門約觀則名字初心造修有地況復衆生知見本來即是佛知見體如冰體即水但由惑障寒結舉水成冰苟信圓門觀心即是則有名字開示悟入乃至究竟開示悟入豈得高推聖境自鄙無分又豈得妄計初心即佛以凡濫極哉此中約位非豎而論豎約門非橫而論橫約智非亦橫亦豎而論亦橫亦竪約觀非非橫非豎而論非橫非豎又復雙照橫豎舍利弗下即結成理一義昔方便教亦得各論開示悟入而非佛知見故是權今明佛知見故是實實即理一也二明人一佛告舍利弗諸佛如來但教化菩薩就昔方便謂教化三乘理實但化菩薩如彼窮子自謂客作賤人長者觀之實是己子即是人一三明行一諸有所作常為一事唯以佛之知見示悟衆生三乘衆行名之為諸為圓故諸即是一事此行何所至到唯趣佛之知見即是行一意也四明教一舍利弗如來但以一佛乘故為衆生説法無有餘乘若二若三圓頓之教名一佛乘別教已去皆名有餘之説即不了義非一佛乘無有餘乘者無華嚴中所兼之別無二者無般若中所帶之二無三者無方等中所對之三也然上四文各有二義初文若取能知見即人一為便今取所知見則理一為便次文若取教化即教一為便今取菩薩則人一為便第三文諸有所作若就教主為言即教一為便今就行人為語則行一為便第四文若取乘運之義即行一為便今取為衆生説法則教一為便不過逐便釋耳四正釋竟五總結舍利弗一切十方諸佛法亦如是此句總結四一文簡義長何以言之序中因光橫見萬八千土文殊引古豎明二萬諸佛無不為實施權開權顯實皆與今佛出五濁世其意是同固不待言至于一切十方剎海無盡世界淨穢差別無盡諸佛出世亦有純説大者亦有純説小者純説大則不必施三固是四一純説小則不得顯實而久久之後究竟亦無不還成四一者但非可以劫數久近計之非可以等覺已下諸神通天眼測之耳下文開迹顯本如來三世化功若此此而不信安得名隨喜哉初總明諸佛竟二列三世佛為三初過去佛二未來佛三現在佛此中應具六義但出二種一開方便二顯真實兩則指上兩則指下歎法希有説無虗妄指前總章舉五濁釋權揀偽敦信指後釋迦章初過去佛舍利弗過去諸佛以無量無數方便種種因緣譬喻言辭而為衆生演説諸法是法皆為一佛乘故是諸衆生從諸佛聞法究竟皆得一切種智無量無數方便等是開權是法皆為等是顯實為一佛乘即教一衆生即人一能得種智即行一種智所知即理一二未來佛舍利弗未來諸佛當出於世亦以無量無數方便種種因緣譬喻言辭而為衆生演説諸法是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智三現在佛舍利弗現在十方無量百千萬億佛土中諸佛世尊多所饒益安樂衆生是諸佛亦以無量無數方便種種因緣譬喻言辭而為衆生演説諸法是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智舍利弗是諸佛但教化菩薩欲以佛之知見示衆生故欲以佛之知見悟衆生故欲令衆生入佛之知見故現在佛正是化主故先標出世之意次明開權顯實後結成開示悟入也少開句者但是文略初四佛章竟二釋迦章廣上釋迦權實于六義中無歎法希有但有五文初開權二顯實三舉五濁釋方便四揀偽敦信一實五明無虗妄今初舍利弗我今亦復如是知諸衆生有種種欲深心所著隨其本性以種種因緣譬喻言辭方便力而為説法先三後一如四佛不異故言亦復如是種種欲等者五乘根性欲也過去名根以能生為義現在名欲以取境為義未來名性以不改為義深心所著者宿習難轉即是根也方便者即是隨宜所開三乘權法此中感應相對衆生種種根性欲感也我佛知之以方便力而為説法應也二顯實舍利弗如此皆為得一佛乘一切種智故三舉五濁釋方便三初標意二舉五濁三結釋今初舍利弗十方世界中尚無二乘何況有三將舉五濁先標其意上已説諸佛開權顯實未明隱實施權今明稱實而觀則十方世界無非法界真如妙理尚無別教之二何況有藏通別教之三別教名二乘者中道逈出二邊不即二邊是中與邊為二故名為第二乘也別教之二已不可得況有通及藏教與別共成三種權耶特以出五濁世不得不隱一實施三權耳二舉五濁舍利弗諸佛出於五濁惡世所謂劫濁煩惱濁衆生濁見濁命濁劫者時也時無實法依於色心分位假立今言濁者謂四濁增盛聚在此時故下文云劫濁亂時也煩惱濁者通而言之五住三惑皆名煩惱今且以界內五鈍使為煩惱濁所謂貪瞋癡慢疑也衆生亦無別體依于色心五陰立此假名今言濁者由見煩惱所感粗弊色心果報醜劣故名衆生濁也見濁者通而言之界內界外諸分別惑皆名為見今且以界內五利使為見濁所謂身邊戒見邪也命根亦無實法依于識種之上一分連持色心不斷功能假立今言濁者惡異熟業所感識種能令色心住持短促故名為命濁也若約因果相由則以見煩惱為因感於三界色心為果依果立衆生名依衆生一期生死立命根名依此四法皆濁立劫濁名若依諸經次第則劫濁居初見煩惱衆生命如次列後今文不次義亦無在問此與大佛頂經所明五濁為同為異答大佛頂經五濁該于九界惟佛為清此經所舉五濁局在穢土減劫不約淨土不約增劫問此經最妙所舉五濁何反淺耶答此明諸佛隱實施三由於出五濁世事不獲已正顯善權方便不可思議何得以大佛頂經為並彼經別為一類利根直開圓解耳問五濁若能障大華嚴經中未除濁而聞悟何也答此應四句分別一大乘根利障重以根利故重障不能障此土華嚴初聞大乘者是也二根利障輕他方淨土頓聞大乘者是也三根鈍障輕他方淨土先聞三乘後悟一乘者是也四根鈍障重此土聞漸除濁方聞大乘者是也問五濁亦障小否答就小亦應四句分別一小乘根利障輕濁不能障如舍利弗大迦葉等二小乘根利障重濁亦不能為障如阿含經央掘魔羅三小乘根鈍障輕濁亦不能為障如般陀比丘四小乘根鈍障重此則成障佛世不聞小乘不得度脫者是也問自有不在華嚴不在三藏而得聞大聞小者何也答此應約四教總作四句又約四教各作四句總作四句者根利障輕隨於何時宜聞圓教根利障重隨于何時宜聞別教根鈍障輕隨于何時宜聞通教根鈍障重隨于何時宜聞藏教佛以口密而隨應之令其得益各作四句者四教各有四門根利障輕者聞非空非有門入也根利障重者聞亦空亦有門入也根鈍障輕者聞空門入也根鈍障重者聞有門入也統而言之不論有障無障貴在有根有乘種耳障由破戒種由熏習根由宿習有利有鈍致今值佛悟有待時不待時也若宿無乘種未植出世善根縱令障輕耽樂不悟四句不收四門不攝可奈何哉問五濁一往何故障大而不障小約初四句中之第四句問答衆生濁重妄計五陰而為四德障重也若聞大乘常樂我淨即執非為是根鈍也舊醫頑騃不知乳之好惡不識藥也不知病起根源不識病也不知藥餌開遮不知授藥法也無所知曉故濁障大也文云若但讚佛乘衆生沒在苦即此義也若聞無常苦無我不淨即厭生死欣涅槃破邪計執故五濁不障小文云作是思惟時十方佛皆現梵音慰喻我即此義也三結釋如是舍利弗劫濁亂時衆生垢重慳貪嫉妬成就諸不善根故諸佛以方便力於一佛乘分別説三初句即劫濁次句即衆生濁慳貪嫉妬即煩惱濁及見濁成就諸不善根即命濁也設非曲垂方便何以引出苦輪三舉五濁釋方便竟四揀偽敦信一實若佛弟子自能信解若不信解非真弟子亦非羅漢敦逼時衆令信受也文二初揀真偽二開除釋疑初又二初若不聞不知非真弟子二若聞不信受是增上慢今初舍利弗若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來但教化菩薩事此非佛弟子非阿羅漢非辟支佛如世弟子隨順師法繼道傳燈今不聞不知則無法可順何謂弟子如來昔為治五濁故方便施三汝得聞得知隨順修習名為弟子今五濁既除為汝顯一何意不聞不知不聞即不聞教一不知即不知行一非弟子即非人一總迷於理一也二若聞不信受是增上慢又舍利弗是諸比丘比丘尼自謂已得阿羅漢是最後身究竟涅槃便不復志求阿耨多羅三藐三菩提當知此輩皆是增上慢人所以者何若有比丘實得阿羅漢若不信此法無有是處佛設二乘原為五濁障重暫令息苦故權説見思斷盡名阿羅漢不受三界後有名最後身出同居土分段苦輪名為涅槃然使實得阿羅漢道證有餘脫今聞此經便應信受進求無上菩提何以故濁障既除又得聞此大法則當審自籌量無明別惑尚在何名羅漢變易生死浩然何名後身化城未是寶所何名究竟涅槃故實得阿羅漢者未有不信佛説此法者也倘自以為足不復志求菩提當知并未證阿羅漢但是增上慢耳初揀真偽竟二開除釋疑又二初開除二釋疑今初除佛滅度後現前無佛所以者何佛滅度後如是等經受持讀誦解義者是人難得恐有問曰若爾則一切羅漢皆必志求無上菩提耶故今開除之曰除佛滅後現前無佛則彼稟權説證羅漢者未必即能志求菩提又有問曰佛雖滅度此經住世彼何不信故今釋曰所以者何佛滅度後經雖住世而受持讀誦解義之人難得不遇其人則小果聖者安能自決了哉二釋疑若遇餘佛於此法中便得決了恐有疑曰若佛滅後諸阿羅漢不遇此經不遇受持讀誦解義之人則當永入小涅槃耶故今釋曰是人雖作滅度之想入于涅槃而生方便有餘國中仍得遇佛為説此法便得決了化城非實還必志求無上菩提斷無永入涅槃之理也故大智度論釋畢定品云羅漢身必應滅住在何處具足佛道答出三界外有淨佛土無煩惱名於是國土佛所聞法華經具足佛道即引此經證云有羅漢若不聞法華自謂得滅度我于餘國為説是事汝當作佛也又設於此土得遇受持讀誦解義之人亦得決了故南嶽師云餘佛者四依也羅漢遇之聞經決了又云羅漢修念佛定見十方佛為説此經便得決了若言念十方佛則是已發大心若復唯念釋尊乃因小感大亦是機發使之然耳四揀偽敦信一實竟五明無虗妄舍利弗汝等當一心信解受持佛語諸佛如來言無虗妄無有餘乘唯一佛乘先勸信釋迦實説次勸信諸佛誠言後結成唯一佛乘所以止疑謗也初正法説中初長文竟二偈頌為二初頌許答二頌正説今初爾時世尊欲重宣此義而説偈言比丘比丘尼有懷增上慢優婆塞我慢優婆夷不信如是四衆等其數有五千不自見其過於戒有缺漏護惜其瑕疵是小智已出衆中之糟粳佛威德故去斯人鮮福德不堪受是法此衆無枝葉唯有諸貞實舍利弗善聽上慢我慢不信四衆通有但出家二衆多修道得禪謬謂聖果起增上慢在俗矜高多起我慢女人智淺多生不信不自見其過者三失覆心藏玼揚德不能內省是無慚人也若自見過即有羞僧也於戒有缺漏者律儀有失名缺定共道共有失名漏乏定道故內起惡覺如玉含瑕缺律儀故外動身口如玉露玼覆罪自安不知發露故名護惜小智者不得學無學智而有世間小智妄計有漏以為無漏小中之小故言小智也未有無漏禪定滋潤但有世間味禪故如糟未有出世理慧但有文字薄解封文失旨故如粳又糟粳譬無大機枝葉譬非好器悉不任用故須遣之四偈皆頌揀許末一句頌誡許略不頌順許也二頌正説二初頌四佛章二頌釋迦章初中四初頌諸佛二頌過去佛三頌未來佛四頌現在佛初頌諸佛與長文共有三異一彼此互無長文有歎法而無五濁今有五濁而無歎法二前後間出長文先歎法次明不虗開權顯實今先開權顯實後明不虗三開合不同長文勸信與不虗合説今分勸信隔於不虗又長文以釋迦方便釋成諸佛之權今以釋迦顯一釋成諸佛之實是四異也文為五初頌施權二頌顯實三頌勸信四舉五濁五頌不虗今初諸佛所得法無量方便力而為衆生説衆生心所念種種所行道若干諸欲性先世善惡業佛悉知是已以諸緣譬喻言辭方便力令一切歡喜或説修多羅伽陀及本事本生未曾有亦説於因緣譬喻并祇夜優波提舍經鈍根樂小法貪著於生死於諸無量佛不行深妙道衆苦所惱亂為是説涅槃諸佛所得法者修道得於諸權法也良由自行因滿所感後得無分別智亦名為差別智正當自行體內權也即此法體亦不可説以方便故為衆生説成化他權照九界機説七方便九是所被教不出七説七被九漸令入實七九之中隨何等機聞何等法遇機便逗初無一定故云無量方便力而為衆生説也現起希望名為所念念即是欲習欲成性能為後種加以先業有善有惡差別若干誠非一緣一譬一種方便所能度脫惟佛悉能知之故能隨宜説九部法令其一切皆歡喜也歡喜則必生善滅惡入理舉初以該後耳九部者通論則大小各十二部別論則小或十一或但九部具如玄義中説鈍根樂小法下六句結施權意前世根鈍今世無機不堪聞大故言不行深妙道前世貪著障重今世衆苦所惱唯可聞小故言為是説涅槃也二頌顯實四初頌理一二頌人一三頌教一四頌行一今初我設是方便令得入佛慧未曾説汝等當得成佛道所以未曾説説時未至故今正是其時決定説大乘我此九部法隨順衆生説入大乘為本以故説是經佛慧即是一大事因緣也若約能知乃是行一若約所知則是理一又若約説經應是教一若約所詮則是理一蓋亦取便名為理一也二頌人一有佛子心淨柔軟亦利根無量諸佛所而行深妙道為此諸佛子説是大乘經我記如是人來世成佛道以深心念佛修持淨戒故此等聞得佛大喜充遍身佛知彼心行故為説大乘聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑此正頌上諸佛如來但教化菩薩也廣出諸方便人皆成實人有佛子心淨即別教人為諸佛子説大乘經得記心喜即成圓教真實之人聲聞若菩薩者聲聞兼得緣覺即是兩教二乘菩薩兼得藏通大士皆成佛無疑則七種方便無非佛子明矣此是極聖誠説奈何不信三頌教一十方佛土中唯有一乘法無二亦無三除佛方便説但以假名字引導於衆生説佛智慧故此正頌上如來但以一佛乘故為衆生説法無有餘乘若二若三也但以假名三教引導令入佛慧一教是故約方便説則可暫有約究竟論決無二三四頌行一諸佛出於世唯此一事實餘二則非真終不以小乘濟度於衆生佛自住大乘如其所得法定慧力莊嚴以此度衆生自證無上道大乘平等法若以小乘化乃至於一人我則墮慳貪此事為不可唯此一事實等頌上諸有所作常為一大事也佛自住大乘等頌上唯以佛之知見示悟衆生也後六句釋成不以小度之意二頌顯實竟三頌勸信二初舉果勸信二舉因勸信今初若人信歸佛如來不欺誑亦無貪嫉意斷諸法中惡故佛於十方而獨無所畏我以相嚴身光明照世間無量衆所尊為説實相印佛心清淨衆惡斷盡無畏説法此內德可信也妙相莊嚴光明炳著為衆所尊説大乘印此外德可信也二舉因勸信舍利弗當知我本立誓願欲令一切衆如我等無異如我昔所願今者已滿足化一切衆生皆令入佛道昔有誠誓今酬誓故説此昔願可信也菩提願滿化他同入尅果之因因則不虗彌可信也問本誓既普今衆生尚多願云何滿答佛三世益物無有已時今且約現在機熟名願滿也三頌勸信竟四舉五濁四初總明五濁障大二別明五障三明為五濁故説小四明為大施小小冶五濁大願得興今初若我遇衆生盡教以佛道無智者錯亂迷惑不受教衆生以苦惱自煎諸佛以大悲濟物悲與苦相對故言相遇又佛如衆生如一如無二如天性相關故言相遇夫盡教以佛道佛之本懷也無智迷惑而不受教五濁障大也彼既有障安得不設方便以漸誘之經云過去有佛號住無住發願使己國衆生同日同時成佛即日滅度又賢劫前有佛號曰平等亦願己國及十方衆生同日成佛即日滅度若爾今日有佛復有衆生云何耶佛言止止我前所言得人身者耳頗有發願令五道同日成佛否佛言不可以非器之身成無上道要先化三趣令得人天然後乃可如願三趣非善道何能成佛二別明五障我知此衆生未曾修善本堅著於五欲癡愛故生惱以諸欲因緣墜墮三惡道輪回六趣中備受諸苦毒此二偈別明衆生濁也真如實相名為善本不依此種善根故不能感大法五欲為諸惡本從癡有愛則衆惱競生受胎之微形世世常增長薄德少福人衆苦所逼迫此一偈別明命濁也處胎經從初七日乃至三十八七日具説漸漸增長之相即所謂世世常增長真可厭離觀心釋者一念心起即為未來作業業即胎胎業無窮世世不斷即是增長入邪見稠林若明若無等依止此諸見具足六十二此一偈別明見濁也五見交加如茂林稠密若有是常見若無是斷見依於二見成六十二見具如法數深著虗妄法堅受不可捨我慢自矜高諂曲心不實此一偈別明煩惱濁也略舉根本中貪慢小隨中諂以攝其餘於千萬億劫不聞佛名字亦不聞正法如是人難度此一偈別明劫濁也長時不聞佛法即是劫濁又上來四濁集在時中故名劫濁五濁障故不信一乘故難度也觀心釋者念念惡覺永無正觀以自覺是不聞佛名永不與八正道相應是不聞正法此心則難度也二別明五障竟三明為五濁故説小是故舍利弗我為設方便説諸盡苦道示之以涅槃四明為大施小小治五濁大願得興我雖説涅槃是亦非真滅諸法從本來常自寂滅相佛子行道已來世得作佛析三界妄盡滅色取空則非真滅以無明別惑尚在則界外變易生死正自浩然也若體達無明本空諸法何有如翳見空華華相本虗也法雖本寂若不修道無由契會故言佛子行道已來世得作佛如空華雖寂若不除翳無由覩淨空也四舉五濁竟五頌不虗我有方便力開示三乘法一切諸世尊皆説一乘道今此諸大衆皆應除疑惑諸佛語無異惟一無二乘先權後實巧為五濁施此方便誠言不虗勿生疑也初頌諸佛竟二頌過去佛二初略頌開顯二廣頌開顯今初過去無數劫無量滅度佛百千萬億種其數不可量如是諸世尊種種緣譬喻無數方便力演説諸法相是諸世尊等皆説一乘法化無量衆生令入於佛道初二偈明施三後一偈明開顯也説一乘法即教一化無量衆即人一入佛道即行一及理一二廣頌開顯二初總明方便助顯二別示開顯之相今初又諸大聖主知一切世間天人羣生類深心之所欲更以異方便助顯第一義天人群生是舉諸乘以明人一異方便是舉諸教諸行以顯教一行一第一義是理一也正因佛性即第一義若用圓妙正觀則是實相方便不稱為異今用五乘七方便等而助顯之名異方便即指下文六度乃至供養稱名等也良由衆生樂欲不同故使諸佛方便有異然方便雖異助顯則同既顯實已此異非異殷勤稱歎良由於此二別示開顯之相二初約衆善顯緣因功德二約聞經顯了因功德初中七初約六度明開顯二約戀慕心明開顯三約供舍利明開顯四約造佛像明開顯五約畫佛像明開顯六約供塔像明開顯七約稱佛名明開顯今初若有衆生類值諸過去佛若聞法布施或持戒忍辱精進禪智等種種修福慧如是諸人等皆已成佛道正因佛性生佛體同幻障若深永不值佛得值過去佛者則是內因力強得感出世緣也然其深心所欲不同所以諸佛説法亦異在彼一時或聞頓法或聞漸法或修布施或修持戒或修忍辱或修精進或修禪定或修智慧或單修一法一行或兼修餘法餘行或轉或助種種不同又或以相心修六度或以無相修六度或以非相非無相次第修六度更復種種不同由今觀之既得皆已成佛皆證理一則如是諸人即人一所修福慧即行一所聞諸法即教一矣此中聞法及智慧似宜屬于了因讓後聞法華經故但屬緣因也二約悲戀心明開顯諸佛滅度後若人善軟心如是諸衆生皆已成佛道承上文言不但值佛聞法修行六度者已成佛也即諸佛示滅能于如來起悲戀心一念之間捨惡從善化剛為軟在彼一時似屬人天二乘由今觀之亦皆已成佛道佛道既證理一則是諸衆生即人一善軟心即行一示滅即教一矣三約供舍利明開顯諸佛滅度已供養舍利者起萬億種塔金銀及玻璃磲與瑪瑙玫瑰琉璃珠清淨廣嚴飾莊校於諸塔或有起石廟旃檀及沉水木樒并餘材甎瓦泥土等若於曠野中積土成佛廟乃至童子戲聚沙為佛塔如是諸人等皆已成佛道承上文言又不但悲戀如來而生善軟心者已成佛也即諸佛滅後碎身為若干舍利是諸人等為供舍利起寶塔者下至起石廟者起土廟者乃至童戲為沙塔者或有舍利如芥子許或無舍利或以誠心或以戲心在彼一時則謂功德或大在小或有或無由今觀之亦皆已成佛道佛道既證理一則如是諸人即人一起塔起廟積土聚沙即行一碎身為舍利即教一矣按釋迦示滅既茶毗竟大迦葉言如來舍利非我等事自有國王王子大臣宰官長者居士婆羅門等樂福田者廣修供養我等事者宜應結集三藏勿令正法速滅由此觀之迦葉傳佛心印故以先務為急人天樂種福田則以供養為先就彼修供養時所發三乘五乘心願不同而由過去諸佛方便力故久久之後未有不歸於佛道者又按經中造塔之法如來十三級辟支佛五級阿羅漢四級阿那含三級斯陀含二級須陀洹一級輪王無級級者輪相也今時凡夫動輒起塔以凡濫聖為戾不輕語云君子愛人以德縱令弟子尊師豈可陷師於濫聖之罪又縱令死者冥冥寧不顯生者之碌碌耶四約造佛像明開顯若人為佛故建立諸形像刻雕成衆相皆已成佛道或以七寶成鍮鉐赤白銅白蠟及鉛鍚鐵木及與泥或以膠漆布嚴飾作佛像如是諸人等皆已成佛道承上文言又不但為供舍利起塔起廟者已成佛也隨用何物建立形像在彼一時物有粗妙價有高下心有誠否願有遠近亦似功德有大有小由今觀之亦皆已成佛道佛道是理一諸人即人一作像即行一如來分別造像功德即教一也然優婆塞戒經造像不許用膠得失意罪而此經用者古師云外國用樹膠耳有言大豆汁可代膠清又地持不許用雌黃臭物戒經不許造半身像又立佛像前不應坐坐佛像前不應臥又造像功德經略明十一功德一者世世眼目清潔二者生處無惡三者常生貴家四者身如紫磨金色五者豐饒珍寶六者生賢善家七者生得為王八者作金輪王九者生梵天壽命一劫十者不墮惡道十一者後生還能敬重三寶又云若人臨終發言造像乃至如麥能除三世八十億劫生死之罪當知此等功德並是華報果在佛地也五約畫佛像明開顯彩畫作佛像百福莊嚴相自作若使人皆已成佛道乃至童子戲若草木及筆或以指爪甲而畫作佛像如是諸人等漸漸積功德具足大悲心皆已成佛道但化諸菩薩度脫無量衆承上文言又不但建立佛像者已成佛也畫佛影像自作使人乃至童子戲畫在彼一時則謂功德或大或小或有或無由今觀之亦皆已成佛道佛道是理一諸人是人一漸漸積功德具足大悲心即行一但化諸菩薩即教一也又但化二句明彼成佛後事乃是自證四一復以四一度生六約供塔像明開顯若人於塔廟寶像及畫像以華香幡蓋敬心而供養若使人作樂擊鼓吹角貝簫笛琴箜篌琵琶鐃銅鈸如是衆妙音盡持以供養或以歡喜心歌唄頌佛德乃至一小音皆已成佛道若人散亂心乃至以一華供養於畫像漸見無數佛或有人禮拜或復但合掌乃至舉一手或復小低頭以此供養像漸見無量佛自成無上道廣度無數衆入無餘涅槃如薪盡火滅承上文言又不但起塔起廟造像畫像者已成佛也隨於何等塔廟寶像畫像之前修諸供養皆得成佛具論供養不出五塵華幡蓋等色塵也樂音歌唄聲塵也香即香塵禮拜即觸塵又衣服是觸塵飲食是味塵此略不言理必有之又供養須論三業敬心即意業頌德即口業禮拜合掌舉手低頭即身業約此五塵三業塵則或多或少業則或專或散在彼一時則謂功德必有差別由今觀之並成四一復以四一廣度衆生三惑薪盡二死火滅入無住處大般涅槃也經文若使人作樂者出家比丘比丘尼沙彌沙彌尼在家國王長者宰官居士並無自作音樂之理所以必曰使人至於歌唄頌德則出家在家通得為之然亦須知大體若梵音和雅則僧俗咸宜若濫同詞曲則律所不許每見近時唱讚多用曲家腔調又禮懺作梵不遵古式競引長聲只恐長他貪慢增已放逸福少過多思之擇之七約稱佛名明開顯若人散亂心入於塔廟中一稱南無佛皆已成佛道承上文言又不但五塵三業供塔供像者已成佛也即散心一稱佛名亦皆成佛南無此翻歸命亦翻度我亦翻敬從調達臨終稱南無未得稱佛便生身陷入地獄佛記其從地獄出當作辟支佛名曰南無西國有事天像者以金為像頭賊來盜之取不能得賊稱南無佛便得金頭明日衆人聚而議曰天像失頭便是無天來著耳著者云何失頭天即附一人語曰賊來取頭時稱南無佛諸天皆驚動是故得我便是故失頭衆人曰天不如佛耶既不如者何不事佛賊稱南無佛尚得天頭況賢者稱佛名十方尊神寧敢當之但精進勿懈怠那先經云如人持一石置水必沒無疑若持百石置船上必不沒有惡業人直爾死必墮泥犁如石置水若臨死稱南無佛佛力故令不入泥犁如船力故使石不沒又經云華林園第三大會九十二億人並是釋尊遺法中一稱南無佛人得見彌勒也又佛世有一老人遍求五百上座剃度上座觀其宿無善根咸不見許最後值佛佛即度令出家證阿羅漢上座問佛佛言此人于無量劫前入山採薪遇虎懼怖一稱南無佛今此稱名善根熟故所以得度由其別無他善所以久久流轉生死由其劫數長遠故非聲聞道眼所見所知夫既得證阿羅漢則亦必證無上菩提明矣夫散亂稱名尚必成佛況一心不亂哉一念相應一念佛一日相應一日佛是心作佛是心是佛此而不信吾末如之何也已矣初約衆善顯緣因功德竟二約聞經顯了因功德於諸過去佛在世或滅後若有聞是法皆已成佛道是法正指妙法華經開權顯實之法也上來六度乃至像教供養乃至稱名並是諸佛以異方便助顯真實尚得開之成妙緣因況復此經正顯真實若有聞者即了因種寧不成佛然約聞經之時或解不解有相無相至心散心事非一概亦得義論五乘差別而一歷耳根永為道種若遠若近終因斯脫未有一人不成佛者此是諸佛真語實語不可不深信也問何意約過去佛廣明五乘同皆入實答三世佛皆有開權但未來未起現在始行於證義弱過去開權已久受化之人皆成四一並於十方施權顯實證義則強構之虗言不如驗之實事故於過去佛廣約五乘顯實也二頌過去佛竟三頌未來佛二初頌施權二頌顯實今初未來諸世尊其數無有量是諸如來等亦方便説法二頌顯實四初頌人一二頌行一三頌教一四頌理一今初一切諸如來以無量方便度脫諸衆生入佛無漏智若有聞法者無一不成佛約聞法者無不成佛故是人一若約能度即教一也佛智所證即理一也入於佛智即行一也二頌行一諸佛本誓願我所行佛道普欲令衆生亦同得此道自行化他無非佛道故是行一三頌教一未來世諸佛雖説百千億無數諸法門其實為一乘諸佛兩足尊知法常無性佛種從緣起是故説一乘百千億無數諸法門者指五乘七方便等一切權説其實為佛乘者正明説權之意説雖在權意本在實權即實家之權故得開之同成了因也知法常無性者實相常住無自性無他性無共性無無因性性空無性亦無性相空一無性言具二無性即是無性性無相性也本自有之故曰常無知者照也具如止觀第五不思議境中一念三千非自他等既無四性一念亦無即是性空既無一念無念亦無即是相空乃不思議之二空也若本自二空即是性德若推檢入空即是修得推而不成須修萬行正助合行行中具足一切諸行方名緣因聞斯義已方乃名開問世間因緣可以四句了生無生今性本淨非關緣起何須以此四句推之答世法緣起亦本無生但由情計謂之為生理性亦爾由謂自他等故須推之二空不顯尚須更約續待推檢況因成耶問今文何故不立斯觀答經從利根者開也佛種從緣起者中道無性即是佛種迷此理者由無明為緣則有衆生起解此理者由教行為緣則有正覺起欲起佛種須一乘教故是頌教一也又無性者即正因佛性也佛種從緣起者即是緣了以緣資了正種得起一起一切起如此三性名為一乘也三因不改同名為性舉體成修復稱緣了是則理即位中苦為正因佛性惑為了因佛性業為緣因佛性此三佛性不縱橫不並別不可思議無自性乃至無無因性無性亦無性目此無性以為正因佛性也名字位中薄有微解亦有微行即是無性之性舉體而成微解微行乃至觀行相似位中解行漸著亦是無性之性舉體所成目此名字觀行相似位中不可思議三因以為緣因佛性也分真位中初住一發一切發正因理心發名法身德了因慧心發名般若德緣因善心發名解脫德不縱橫不並別不可思議目此分真位中不可思議三因以為了因佛性也究竟位中性德顯盡修德畢功故曰正種得起一起一切起即是顯果乘相依正主伴乃至酬因一塵一行一時俱起起者成也修性一合無復分張即是理性三因究竟圓顯故曰如此三性名為一乘也四頌理一是法住法位世間相常住於道場知已導師方便説是者指上性修不二之一乘也此一乘者即是法住亦名法位從無住本立一切法此無住本不可動故名為法住種種諸法總不出此範圍名為法位舉此法住法位而為正覺世間之相法住法位是常住故所以正覺世間之相亦是常住舉此法住法位而為衆生世間及器世間之相法住法位是常住故所以衆生及器世間之相亦是常住是則三世間相一一無非常住一一無非法住法位一一無非一乘但衆生迷暗不能覺知于常住中妄見生滅于一乘中妄見差別唯有大覺導師坐于道場如實知已於不可説離諸戲論寂滅理性能以方便説此理一又能以異方便助顯此理一也問悟此理性名為正覺世間以順性故性常相亦常是則可也迷此理性而為衆生世間既違性故性雖本常相必無常云何衆生器世間相亦常住耶答如冰與水同以濕為性濕即以冰水為相冰水無常即是濕性無常故目此濕性以為無性也濕相既常即冰水之相皆常故目此冰水之相以為常住也又一乘無性之理如屋本不轉如來悟之如醒人見其不轉九界迷之如醉人妄見其轉彼雖見轉本屋不轉故衆生世間相及器世間相彼雖妄見生滅其實是常住也以衆生及器世開即無性故即法住故即法位故又如翳眼妄見空華起滅而空華實無起滅以無性故以即空故世間常住其理如是一切衆生但有理常聞而能解為名字常念念體察心心無間名觀行常粗垢先落六根清淨為相似常豁然開悟證於四十一位真因為分證常圓滿顯發無餘無欠為究竟常始終平等故名為即升沉碩異故須辨六依於平等之體方有升沉之異如依虗空方論遠近故云全性起修通指逆順二修一任升沉迥異不離平等一體如遠與近不出虗空故云全修在性教來詮此故為教一行來契此故為行一人必會此故為人一三頌未來佛竟四頌現在佛天人所供養現在十方佛其數如恆沙出現於世間安隱衆生故亦説如是法知第一寂滅以方便力故雖示種種道其實為佛乘知衆生諸行深心之所念過去所習業欲性精進力及諸根利鈍以種種因緣譬喻亦言辭隨應方便説先頌為化之意次頌顯實後頌施權如是法者雙指權實法也第一寂滅即理一方便示種種道實為佛乘約能示即教一約所示即行一知衆生諸行等是施權也初頌四佛章竟二頌釋迦章二初略頌上權實為下文總譬作本二廣頌上六義為下文別譬作本初中二初頌顯實二頌施權今初今我亦如是安隱衆生故以種種法門宣示於佛道此文具頌四一今我亦如是者如於諸佛之是同以一實教化衆生即總頌顯實也安隱者涅槃祕藏是安隱處佛自住其中亦安置衆生同入此中安隱處即理一衆生即人一種種法門入佛道即行一宣示即教一二頌施權我以智慧力知衆生性欲方便説諸法皆令得歡喜智慧力即權智也知性欲鑒小機也説諸法正施權也皆歡喜稱機宜也上來二偈雖略收佛一化原始要終罄無不盡故稱略頌上文權實為下總譬六義本也一者今我亦如是我即釋迦是一化之主為下有大長者譬作本二者安隱即大涅槃常樂我淨無五濁障對顯三界五濁名不安隱為下火宅譬作本三者衆生即五道受化之徒為下五百人譬作本四者安隱法還對五濁不安隱法為下火起譬作本五者種種法門對不種種為下唯有一門譬作本六者知衆生性欲即五道中有三乘根性差別為下三十子譬作本初略頌上權實竟二廣頌上六義為下文別譬作本六初頌五濁為下見火譬作本二頌施方便化為下捨几用車譬作本三頌顯實為下等賜大車譬作本四頌歎法希有五頌不虗六頌揀衆敦信總為下無虗妄譬作本今初舍利弗當知我以佛眼觀見六道衆生貧窮無福慧入生死險道相續苦不斷深著於五欲如𤛆牛愛尾以貪愛自蔽盲瞑無所見不求大勢佛及與斷苦法深入諸邪見以苦欲捨苦為是衆生故而起大悲心初十一字明佛有能見之眼下文云宅主在門外立蓋佛在法身之地以常寂佛眼圓照群機若根利濁輕則以盧舍那像説一乘法若根鈍濁重則以老比丘像驚入火宅方便施三秖是于時鑒機故言我以佛眼觀見也夫觀色法應用天眼分別根機應用法眼今言以佛眼觀者舉勝兼劣又四眼入佛眼皆名佛眼也六道衆生下明所見五濁下文云汝諸子等先因遊戲來入此宅稚小無知歡娛樂著也貧窮無福慧頌衆生濁入生死二句頌命濁深著等四句頌煩惱濁不求等二句頌劫濁劫中無佛故名為濁劫若有佛雖濁能破深入等二句頌見濁或不求四句總頌見濁以邪見故不求大勢佛不求斷苦法乃以招苦之因妄冀捨于苦果豈可得哉四濁聚在此時即名劫濁故不必別頌也為是衆生故二句明起大悲應赴下文云長者聞已驚入火宅也二頌施方便化為下捨几用車譬作本二初念用大乘擬不得二念同諸佛用三乘稱宜可得初又三初明用大擬宜二明衆生無機三明念欲息化今初我始坐道場觀樹亦經行於三七日中思惟如是事我所得智慧微妙最第一始坐道場者至理無時假時化物為化之初故言始也事釋者初在此處修治得道故言道場坐此樹下得三菩提故名道樹感樹恩故觀察念地德故經行樹地無有分別豈須報恩未曾有經云秖以通化傳法名報恩耳過去因果經云佛成道初七日思惟我法妙無能受者二七日思惟衆生上中下根三七日思惟誰應先聞法即至波羅奈為五人説四諦陳如得法眼淨此約小機所見今明佛在法身地寂而常照恆以佛眼洞覽無遺豈始至道場淹留三七方思此事言三七者表欲三周説法也初七思法説次七思譬説後七思因緣説皆無機不得是故息大施小此獨就圓教大乘釋若通途約大乘釋者初七思説圓教次七思説別教後七思説通教皆無機不得是故息大説三藏三乘方便也觀心釋者樹即十二因緣之大樹也深觀緣起自成菩提欲以無漏法林蔭益衆生故言觀樹經行者大乘三十七品是行道法自以道品履實相地得成佛道欲以此法化度衆生是故起行三七者初七欲明中道觀中道妙難觀不得次七欲明即假觀即假觀分別智難生不得後七欲明即空觀即空巧度又不得乃明方便析法小觀也二明衆生無機衆生諸根鈍著樂癡所盲如斯之等類云何而可度智慧既微妙第一故非根鈍癡盲者所能領解下文云諸子無知雖聞父誨猶故樂著嬉戲不已也三明念欲息化爾時諸梵王及諸天帝釋護世四天王及大自在天并餘諸天衆眷屬百千萬恭敬合掌禮請我轉法輪我即自思惟若但讚佛乘衆生沒在苦不能信是法破法不信故墜於三惡道我寧不説法疾入於涅槃梵釋雖請佛知無機所以不説下文云諸子幼稚未有所識或當墮落為火所燒也初念用大乘擬不得竟二念同諸佛用三乘稱宜可得二初明化得二釋疑初中四初明三乘擬宜二明有小機三明施化四明受行悟入今初尋念過去佛所行方便力我今所得道亦應説三乘念彼雖無大機不容永捨須以方便而誘濟之非都不知施三意欲引同諸佛故云尋念也下文云即便思惟設諸方便二明有小機又二初明諸佛歎二明釋迦酬順上欲大化於彼無機故諸佛不歎今欲説小曲會根緣則始終得度所以佛歎也若不先小則大小俱失若先用小則終必大益故云始終得度今初作是思惟時十方佛皆現梵音慰喻我善哉釋迦文第一之導師得是無上法隨諸一切佛而用方便力我等亦皆得最妙第一法為諸衆生類分別説三乘少智樂小法不自信作佛是故以方便分別説諸果雖復説三乘但為教菩薩初三句釋迦自敘佛現由念佛方便力故契法契機所以佛現也次五句是諸佛稱歎釋迦以能為實施權故云善哉為一施三引入佛慧故云第一導師證微妙第一實智故云得無上法隨一切佛隱實施權故云用方便力次四句諸佛自明我等亦隱實施權次四句雙釋隱施之義為衆生少智不自信作佛所以隱實為樂小法所以施權説諸果也後二句雙結二義始雖説三終必顯一二明釋迦酬順舍利弗當知我聞聖師子深淨微妙音稱南無諸佛復作如是念我出濁惡世如諸佛所説我亦隨順行初一偈發言酬順南無此云敬從也後一偈念順物機二明有小機竟三明施化思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘説波羅奈即鹿苑也中道無性佛種之理此理非數又不可説今以方便作三教説又非生非滅而以方便作生滅説又偏真之理亦非可説以方便故作四門説初為五人説無常有門也初以權實相對實不可説説屬于權三權是數一實非數次以生滅不生滅相對即衍門不生滅故不可説且説生滅即大小相對也後以偏真小理對小四門偏真之理亦不可宣是則大小兩理俱不可説方便為物俱可得説雖俱可説佛意在實衆生于實非宜故思方便作生滅説耳四明受行悟入機會即受隨聞觀轉即暖法去名行至世第一名之為悟若得初果名之為入是名轉法輪便有涅槃音及以阿羅漢法僧差別名轉佛心中化他之法度入他心名轉法輪陳如初得見諦斷分別惑分證有餘涅槃涅槃之音起自於此由此得成無學便有阿羅漢名能説者名為佛所説三乘即法見諦阿羅漢等即僧三寶於是現世間也初明化得竟二釋疑從久遠劫來讚示涅槃法生死苦永盡我常如是説恐疑師云佛初未能鑒機尋念諸佛始知根性今釋云為欲引同故念諸佛非今始念方知從久遠來見其樂小已為讚示令盡衆苦所以聞小即得解脫也又恐疑弟子云云何一世暫聞即證無學今釋云從久遠來為其讚示稱于本習故速得道耳久遠即指大通結緣之後故下文云父知諸子先心各有所好也二頌施方便化為下捨几用車譬本竟三頌顯實為下等賜大車譬本舍利弗當知我見佛子等志求佛道者無量千萬億咸以恭敬心皆來至佛所曾從諸佛聞方便所説法我即作是念如來所以出為説佛慧故今正是其時舍利弗當知鈍根小智人著相憍慢者不能信是法今我喜無畏於諸菩薩中正直捨方便但説無上道菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛佛子以恭敬心來至佛所曾聞諸佛方便説法此顯三乘行人皆是佛子頌人一也為説佛慧故即是一切種智佛之知見頌理一也但説無上道頌教一也菩薩疑除羅漢作佛頌行一也又初兩偈明大乘機發亦云索果為下諸子索車譬本次兩偈一句明佛歡喜衆生堪得大乘益故為下見子免難歡喜譬本次三句正明顯實為下等賜諸子大車譬本後一偈明受行悟入為下諸子得車歡喜譬本初明由機發故索果應有四句自有障除機未發如諸羅漢在三藏時以樂小故濁障雖除大根鈍故妙機未發自有障未除大機發如法華中諸凡夫等雖未斷結以大根利故機發自有障即除機即發如説無量義時證小果即於此座大機發自有障未除機未發如五千退席等是也志求佛道是索大果索有三意一大機有感果之義機中論索二情中密索如下文云為得為不得三發言索即殷勤三請昔教之中已有二索但未發言至於今日具此三索問昔出宅索三若是機情索者文云如先所許乃是求三何關求一答出外不見必有異途將昔所許以求異意亦得是索一也咸以恭敬心皆來至我所者如舍利弗請云諸天龍神等合掌以敬心欲聞具足道也曾從諸佛聞方便所説法者具受前四時調熟也二明障除佛喜者佛為佛慧故出昔障重無機不得即説佛慧中間雖障除機未熟故又未得説今機發正是説時昔衆生根鈍智小畏其謗法墮惡今根利志大聞必信解故喜無畏不畏執小謗大起罪墮惡也三正顯實者五乘是曲而非直別通偏傍而非正今皆捨彼偏曲但説正直一道也四受行悟入者初聞略説謂久後要當説實三乘無非方便又謂不退菩薩不知佛智故菩薩羅漢咸墮疑網今開權顯實不惟羅漢除疑而三教菩薩無不除疑不惟菩薩作佛而羅漢悉亦作佛也四頌歎法希有如三世諸佛説法之儀式我今亦如是説無分別法諸佛興出世懸遠值遇難出使正於世説是法復難無量無數劫聞是法亦難能聽是法者斯人亦復難譬如優曇華一切皆愛樂天人所希有時時乃一出聞法歡喜讚乃至發一言則為已供養一切三世佛是人甚希有過於優曇華此正頌如是妙法諸佛如來時乃説之如優曇華時一現也妙法不出權實儀式者諸佛引物之權無分別法者諸佛所顯之實又權實本無分別為鈍根小智分別權實名為儀式今還悟入一三不二名無分別也諸佛興出世二句明人難次二句明法難如四十餘年久默斯要次二句明聞法難如五千退席佛世不聞次二句明聽信難如普會大衆唯舍利弗一人先能領解次舉喻但合聽信者難餘例可解五頌不虗為下無虗妄譬本汝等勿有疑我為諸法王普告諸大衆但以一乘道教化諸菩薩無聲聞弟子汝等舍利弗聲聞及菩薩當知是妙法諸佛之祕要初六句誡勿於可信人生疑次四句誡勿於可信法生疑夫世間人王言則不二況佛為法王豈有虗妄又方便權説尚能除濁況祕要妙法寧非真實乎六頌揀衆敦信又二初頌揀衆次頌敦信今初以五濁惡世但樂著諸欲如是等衆生終不求佛道當來世惡人聞佛説一乘迷惑不信受破法墮惡道有慚愧清淨志求佛道者當為如是等廣讚一乘道初四句頌上此非佛弟子何者若樂諸欲是行魔業故須揀之上文著涅槃尚非佛弟子此文著生死那是佛弟子互揀非耳凡小俱捨方堪授記又終不求佛道句兼頌上皆是增上慢人以未得上法謂得上法是故不復求佛道也當來世惡人四句頌上如來滅後受持讀誦解義者是人難得後四句頌上若遇餘佛便得決了次頌敦信舍利弗當知諸佛法如是以萬億方便隨宜而説法其不習學者不能曉了此汝等既已知諸佛世之師隨宜方便事無復諸疑惑心生大歡喜自知當作佛此頌上實得阿羅漢若不信此法無有是處也初六句敦信于權後六句敦信於實初法説周中初正法説竟
