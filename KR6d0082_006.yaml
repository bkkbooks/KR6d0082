body:
  text: 古吳後學蕅益智旭述釋方便品竟次釋譬喻品譬喻品第三釋此亦二先總次別總釋者譬是比況喻是曉訓托此比彼寄淺訓深前長文偈頌廣明五佛權實上根利智圓聞獲悟中下之流抱迷未遣大悲不已巧智無邊更復以類比況開曉令悟故言譬喻別釋者因緣約教本迹觀心因緣者以世間父子譬出世師弟因于曾有聞未曾有踊躍歡喜世界益也又以世資具譬出世資具使蒙佛音教不失大乘汝等所行是菩薩道為人益也又以世滅比出世滅拔其苦難令免燒煮我已得漏盡聞亦除憂惱對治益也又以世不生不滅比出世不生不滅乘是寶乘直至道場安住實智中我定當作佛第一義益也佛以一音説於譬喻巧令中下得四悉益故言譬喻品約教者佛意本讚佛乘為物不堪尋念先佛大悲方便趣于鹿苑稱歎三車二乘以下中自濟恩不及人菩薩駕牛運他出火故名摩訶薩此三藏教中譬喻也又三人同畏燒煮聲聞如麞直去不回緣覺如鹿母並馳並顧菩薩如大象身扞刀箭全群而出此通教中譬喻也又二乘發心近緣理淺智慧弱但斷通惑不能盡邊到底非波羅蜜菩薩發心久遠理深智強能斷別惑窮源盡性故大品云二乘如螢火菩薩如日光此別教中譬喻也又始見我身聞我所説即皆信受入如來慧如斯之人易可化度不令如來生于疲苦如華嚴中即事而真不須譬喻華嚴經中非無譬喻但彼入道不正由茲為未入者四十餘年更以異方便助顯第一義今日靈山決定説大乘普令一切開示悟入佛之智慧不令一人獨得滅度如今如始如始如今無二無異上根利智聞即能解不令如來生于疲苦亦不須譬喻秖為中下踟蹰岐道故須今日大車譬喻而得利益是名圓教中譬喻也本迹者迹中既有四教譬喻以迹例本本初成道亦應用諸譬喻成熟衆生又為蓮故華等以譬為本施迹等具如玄文觀心者空如白牛假如具度中如車體品題應在諸天説偈之後火宅譬喻之前出經者調卷故置此耳初法説周中有五段文上來初正法説竟二身子領解二初經家敘二身子自陳今初爾時舍利弗踊躍歡喜即起合掌瞻仰尊顏踊躍歡喜敘其內解合掌瞻仰敘其外儀也信解在心名歡喜喜動於形名踊躍從妙人聞妙法得妙解內外和合致此歡喜即世界釋也又改小學大棄貧事草菴受富豪家業今日乃知真是佛子是故歡喜此為人釋也又憂悔雙遣疑難並除內外妨障廓然大朗故曰我已得漏盡聞亦除憂惱此對治釋歡喜也又佛子所應得者皆已得之安住實智中我定當作佛是故歡喜此第一義釋也約教者歡喜喜於入位而阿羅漢出三界樊籠破四住子果對害不戚逢利不欣今言歡喜決非世間喜也若苦忍明發若盡無生智先已得之今不應重喜若三人同以無言説道體析雖異譬空一致一致之喜久已得之亦不重喜若二空觀為方便道假觀蕩二乘之隘陋空觀蕩凡夫之喧湫過二邊惡得大歡喜證道同圓即發心住亦得名歡喜住又初行名歡喜行初地亦名為歡喜地身子既是上根利智或是超入之歡喜縱不超入亦必是歡喜住也本迹者身子久已成佛號金龍陀迹輔釋迦為智慧弟子始從外道拔邪歸正示乳味歡喜利益凡夫次示酪味歡喜利益賢聖次示三酥歡喜利益菩薩今示醍醐歡喜利益學佛道者如此等歡喜皆迹所為耳觀心者觀心即空假中從名字歡喜乃至究竟歡喜也即起合掌者表其解權昔權實為二如掌不合今解權即實如二掌合瞻仰尊顏者表其解實無餘思念唯緣佛境也歡喜踊躍是總明三業領解歡喜即起合掌是身業瞻仰尊顏是意業下文而白佛言是口業具明三業領解也二身子自陳二初長文二偈頌初中三初標三喜二釋三結今初而白佛言今從世尊聞此法音心懷踊躍得未曾有今從世尊標我身親近佛身故名身喜聞此法音依于佛口聞而歡喜故名口喜得未曾有是我意能解佛意故名意喜二釋者提昔之失顯今之得又因昔感傷成今歡喜也所以者何我昔從佛聞如是法見諸菩薩受記作佛而我等不預斯事甚自感傷失於如來無量知見雖亦從佛聞如是法而自身不預斯事則身去佛遠故無身喜所謂雖近而遠者也又聞猶不聞故無口喜甚自感傷故無意喜見諸菩薩受記作佛者正指方等褒圓歎大復由彈斥所以感傷世尊我常獨處山林樹下若坐若行每作是念我等同入法性云何如來以小乘法而見濟度山林樹下是思念之所若坐若行是思念之儀言同入法性者藏通皆以偏真名為法性然正聞三藏時妄計大士實僅三祇伏惑自欣先證法姓不應思念良由聞方等時密得通益聞説諸法實相三人皆得既是同入真諦法性云何菩薩便得授記我等終住小果所以疑念不決殊不知依於大乘中道法性方有受記成佛義也以小乘法而見濟度此不聞大法故無口喜妄計同入法性不解權理故無意喜獨處坐行身遠于佛故無身喜是我等咎非世尊也所以者何若我等待説所因成就阿耨多羅三藐三菩提者必以大乘而得度脫然我等不解方便隨宜所説初聞佛説遇便信受思惟取證初作念時意謂如來有偏故以小乘見度久久思之引咎自歸故言是我等咎非世尊也所以者何下釋成己咎蓋由般若轉教付財密得別益已知界外中道法性乃是成就無上菩提之正因而我等根鈍既不能受擬待於高山先照之時復以欲速見小匇匇取證又不知稍停待於方等般若之教所以引咎自歸然猶未知所證非為真滅所行即菩薩道也不待説所因即不解實不解方便隨宜所説即不解權無權實妙解故無意喜信受初説故無口喜思惟取證偏真涅槃違遠如來常樂法身故無身喜皆以昔失釋成今得也二釋竟三結結成今日三喜也文二初結二成今初世尊我從昔來終日竟夜每自尅責而今從佛聞所未聞未曾有法斷諸疑悔身意泰然快得安隱牒前引咎自歸名自尅責顯今歡喜遍于三業也從佛是身近佛身結身喜聞法是金口圓音結口喜快得安隱是意同佛意結意喜言聞所未聞者高山先照不預法席所以未聞三藏權説不詮中理所以未聞方等彈訶焦敗無分所以未聞般若轉教但為菩薩所以未聞又三藏但聞偏真通教但聞即真別教但聞出于二邊乃名中道未聞方便即是真實所以名為未曾有法也云何以小見度是疑佛是我等咎是自悔今不復疑亦不復悔所以泰然安隱二成今日乃知真是佛子從佛口生從法化生得佛法分真是佛子身則近佛身喜義成從佛口生口喜義成從法化生意喜義成得佛法分謂分證三德祕藏也然身子初證阿羅漢時亦云為佛長子從佛口生從法化生由今望昔昔但在權故不名真今日乃真此約對待義也又方等般若時則謂菩薩乃名佛子聲聞無佛法分今日乃知元是真實佛子此約開顯義也初長文竟二偈頌三初頌標二頌釋三頌結今初爾時舍利弗欲重宣此義而説偈言我聞是法音得所未曾有心懷大歡喜疑網皆已除我聞者即是親從佛聞雙標身口也得未曾有標意也餘可知二頌釋二初補頌不失二正頌昔失今初昔來蒙佛教不失於大乘佛音甚希有能除衆生惱我已得漏盡聞亦除憂惱不失大乘釋身喜也佛音希有釋口喜也漏盡除惱釋意喜也昔元不失由己迷故妄謂失耳二正頌昔失我處於山谷或在林樹下若坐若經行常思惟是事嗚呼深自責云何而自欺我等亦佛子同入無漏法不能於未來演説無上道金色三十二十力諸解脫同共一法中而不得此事八十種妙好十八不共法如是等功德而我皆已失我獨經行時見佛在大衆名聞滿十方廣饒益衆生自惟失此利我為自欺誑此頌既聞方等彈斥密得通益事也無漏法即長文所稱法性謂偏真涅槃不漏落生死故我常於日夜每思惟是事欲以問世尊為失為不失我常見世尊稱讚諸菩薩以是於日夜籌量如是事今聞佛音聲隨宜而説法無漏難思議令衆至道場此頌既聞般若轉教密得別益事也日夜若作表法釋者日即涅槃夜即生死又凡夫生死二乘涅槃同名為夜中道法性乃名為日無漏難思議者中道法性不漏落二邊故也我本著邪見為諸梵志師世尊知我心拔邪説涅槃我悉除邪見於空法得證爾時心自謂得至於滅度此頌初聞佛説遇便信受思惟取證也二頌釋竟三頌結二初頌結二頌成初又三初正頌結二追敘疑網三敘今領解今初而今乃自覺非是實滅度若得作佛時具相三十二天人夜叉衆龍神等恭敬是時乃可謂永盡滅無餘佛於大衆中説我當作佛聞如是法音疑悔悉已除作佛具相結身喜説我作佛結口喜疑悔除結意喜也自覺非實滅度者但斷見思出分段尚有無明及變易故若得作佛轉九界無常五蘊獲證常樂五蘊是時五住究盡二死永亡乃可謂真滅也具相三十二且舉法身妙色言之相相無非相海無非性德圓顯故名為具二追敘疑悔初聞佛所説心中大驚疑將非魔作佛惱亂我心耶此明不惟方等時生疑般若時生悔也于此經中初聞略開三顯一時尚自驚悔所以三請不已三敘今領解佛以種種緣譬喻巧言説其心安如海我聞疑網斷佛説過去世無量滅度佛安住方便中亦皆説是法現在未來佛其數無有量亦以諸方便演説如是法如今者世尊從生及出家得道轉法輪亦以方便説世尊説實道波旬無此事以是我定知非是魔作佛我墮疑網故謂是魔所為聞佛柔軟音深遠甚微妙演暢清淨法我心大歡喜疑悔永已盡安住實智中此正具領五佛開顯之旨以結三喜也初頌結竟二頌成我定當作佛為天人所敬轉無上法輪教化諸菩薩但頌得佛法分一句則三喜並成若欲分別者天人所敬即身成轉無上輪即口成教化菩薩即意成也二身子領解竟三如來述成三初昔曾教大二中忘取小三還為説大初昔曾教大述其昔來蒙佛教之解不謬爾時佛告舍利弗吾今於天人沙門婆羅門等大衆中説我昔曾於二萬億佛所為無上道故常教化汝汝亦長夜隨我受學我以方便引導汝故生我法中無上道者十住毗婆沙云身無上謂相好初句是果受持無上謂自利利他身口意具足無上謂命見戒此二句即大乘六和智慧無上謂四無礙不思議無上謂六波羅蜜此二句是福智解脫無上能壞二障證行無上謂聖行梵行天行是所證病嬰是果用故但舉二也後六句皆是因又身無上名大丈夫受持無上名大慈悲具足無上名到彼岸智無上名一切智不思議無上名阿羅訶解脫無上名大涅槃行無上名三藐三佛陀此七皆從果立即以六因從果立稱今經明圓通無上道也長夜者昔雖大化未破無明惑暗心中隨佛受學也方便引導生我法中者一是昔以大化今生大解二是權以小引令證小果二中忘取小述其感傷疑悔之由舍利弗我昔教汝志願佛道汝今悉忘而便自謂已得滅度三還為説大述其今日得解不虗我今還欲令汝憶念本願所行道故為諸聲聞説是大乘經名妙法蓮華教菩薩法佛所護念三如來述成竟四與授記二初長文二偈頌夫既得大解自知作佛何須俟記記有四意一昔未記二乘故今須記二鈍根未悟以記勉勵之三令聞者結緣四滿其本願也長文為十初時節至十法住久近今初舍利弗汝於未來世過無量無邊不可思議劫問身子上根初周得悟即已開佛知見發圓初住便可立地成佛同彼龍女何今授記尚須過爾許劫耶答應佛成處須有機緣此諸聲聞昔來未曾攝取淨佛國土今蒙記後與物結緣物機不同致劫多少龍女雖畜以乘急故先習方便若據權迹又當別論為逗物宜隨機長短耳二因行供養若干千萬億佛奉持正法具足菩薩所行之道一者供佛二者持法乃能具菩薩道即是滿足福慧二種莊嚴也三得果當得作佛號曰華光如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊具記通別二號通號已如前釋別號為華光者覩佛放光説法華經最先得記故獲斯名也又華者福德光者智慧華者緣因佛性光者了因佛性四教皆論福慧皆論緣了今唯在圓又久證妙華光明三昧迹示未來成佛又觀心者即空即中之假名華即假即中之空名光即空即假之中名為如來四國土國名離垢其土平正清淨嚴飾安隱豐樂天人熾盛琉璃為地有八交道黃金為繩以界其側其傍各有七寶行樹常有華果先出土名次明土相無高下曰平無偏邪曰正安隱下明土受用琉璃下重明勝相皆是淨行所感與諸衆生作增上緣五説法華光如來亦以三乘教化衆生舍利弗彼佛出時雖非惡世以本願故説三乘法準同釋迦故云亦以舍利弗下釋疑也疑曰如上所明佛出五濁事不獲已方便説三今華光佛土清淨若此胡亦以三乘化耶釋曰以本願故本願者據大悲空藏經云舍利弗曾於六十劫行菩薩道因婆羅門乞眼退時願成佛日開三乘法也又極樂國土彌陀亦以三乘施化良由悲願深重攝取帶業往生之人非藉三乘不能漸入大約凡聖同居土中不論是淨是穢施三者多純一者少也又菩薩有二種一從始學大二習小入大論利鈍則似從始直學者利論力用則是淘汰漸入者強所以香積菩薩更學雙流當知直學少諳衆行例如始從畎畝具試衆職歷階淺深知物可否然後登極乃能垂衣裳而天下治也六劫名其劫名大寶莊嚴何故名曰大寶莊嚴其國中以菩薩為大寶故七衆數彼諸菩薩無量無邊不可思議算數譬喻所不能及非佛智力無能知者若欲行時寶華承足此諸菩薩非初發意皆久植德本於無量百千萬億佛所淨修梵行恆為諸佛之所稱歎常修佛慧具大神通善知一切諸法之門質直無偽志念堅固如是菩薩充滿其國八壽量舍利弗華光佛壽十二小劫除為王子未作佛時其國人民壽八小劫十二小劫直論其時節耳淨土無小三災非謂刀兵疾疫飢饉損傷民物乃名為劫也然論小劫時分長遠正可約此土一增一減以明其數下皆準知九補處華光如來過十二小劫授堅滿菩薩阿耨多羅三藐三菩提記告諸比丘是堅滿菩薩次當作佛號曰華足安行多陀阿伽度阿羅訶三藐三佛陀其佛國土亦復如是志念堅固善知一切法門故名堅滿若欲行時寶華承足故名華足安行華光如來以三乘化而其菩薩殊勝國土莊嚴若此奈何世人藐斥三乘徒跨一實寧知權實不二之體寧知開權顯實之宗十法住久近舍利弗是華光佛滅度之後正法住世三十二小劫像法住世亦三十二小劫初長文竟二偈頌二初頌長文二結歎初中八初超頌得果至八頌法住久近略不頌補處也今初爾時世尊欲重宣此義而説偈言舍利弗來世成佛普智尊號名曰華光當度無量衆二追頌行因供養無數佛具足菩薩行十力等功德證於無上道三頌時節并劫名過無量劫已劫名大寶嚴四頌國土世界名離垢清淨無瑕穢以琉璃為地金繩界其道七寶雜色樹常有華果實五頌衆數彼國諸菩薩志念常堅固神通波羅蜜皆已悉具足於無數佛所善學菩薩道六頌説法如是等大士華光佛所化七頌壽量佛為王子時棄國捨世榮於最末後身出家成佛道華光佛住世壽十二小劫其國人民衆壽命八小劫八頌法住久近佛滅度之後正法住於世三十二小劫廣度諸衆生正法滅盡已像法三十二舍利廣流布天人普供養正法住時有教有行有果與佛在世不異故云廣度衆生像法轉時有教有行而果證則希但以舍利普作佛事故名像法也初頌長文竟二結歎華光佛所為其事皆如是其兩足聖尊最勝無倫匹彼即是汝身宜應自欣慶四與授記竟五四衆歡喜二初長文二偈頌初中三初經家敘衆喜二陳供養三正領解今初爾時四部衆比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽等大衆見舍利弗於佛前受阿耨多羅三藐三菩提記心大歡喜踊躍無量二陳供養各各脫身所著上衣以供養佛釋提桓因梵天王等與無數天子亦以天妙衣天曼陀羅華摩訶曼陀羅華等供養於佛所散天衣住虗空中而自回轉諸天伎樂百千萬種於虗空中一時俱作雨衆天華上衣即貴服此中通語四衆八部若就比丘比丘尼言則是僧伽梨大衣也西國比丘受但三衣法者為多三衣並不可捨云何脫以供佛例如大品經中三百比丘聞般若已皆以僧伽梨而用供養智度論釋或云亡相為法或云當日更得也若約表法則袈裟壞色本是聲聞證真之道今脫以供佛表其捨小乘法執趣無上菩提也又天衣表寂滅法忍天華表大乘妙慧天樂表常樂解脫住虗空中而自回轉者表因果依正自他悉依法性自然而轉三正領解而作是言佛昔於波羅奈初轉法輪今乃復轉無上最大法輪先領昔施權次領今顯實也純明圓理故言無上不同兼但對帶之有上也絶待無外故名最大能開兼但對帶中之若大若小俱成一大也初長文竟二偈頌二初頌開權顯一實二自述得解隨喜回向今初爾時諸天子欲重宣此義而説偈言昔於波羅奈轉四諦法輪分別説諸法五衆之生滅今復轉最妙無上大法輪是法甚深奧少有能信者五衆即五陰陰是苦諦由集故生生必尋滅生滅既滅名為滅諦能滅苦集名為道諦餘可知二自述得解隨喜回向我等從昔來數聞世尊説未曾聞如是深妙之上法世尊説是法我等皆隨喜大智舍利弗今得受尊記我等亦如是必當得作佛於一切世間最尊無有上佛道叵思議方便隨宜説我所有福業今世若過世及見佛功德盡回向佛道初四句述解次十句隨喜後四句回向也我等亦如是者如身子之領解如身子之被述成如身子之得記也問迦葉善吉諸大聲聞尚未得解四衆何人而先獲悟答四衆天人亦具三根上同身子中同四人下同五百等也又身子迦葉等並是權行中下未開故迦葉滿慈示同不解淨名云衆生未愈菩薩亦未愈云云初法説周竟二譬説周為四初此品文正譬開三顯一二信解品明中根領解三藥草喻品是如來述成四授記品是與受決初中二初請二答今初爾時舍利弗白佛言世尊我今無復疑悔親於佛前得受阿耨多羅三藐三菩提記是諸千二百心自在者昔住學地佛常教化言我法能離生老病死究竟涅槃是學無學人亦各自以離我見及有無見等謂得涅槃而今於世尊前聞所未聞皆墮疑惑善哉世尊願為四衆説其因緣令離疑悔此中初自述無疑次是諸下是述同輩有惑三善哉下是普為四衆請説同輩是同行懷舊故須為請四衆是化境新運大悲故普為請也聞所未聞者指前法説乃至述成授記與昔所乘之教所得之證不同也因緣者何故前説三今説一須申明其所以然也問凡夫亦有一聽便悟今千二百人已聞略廣開顯及聞身子領述得記龍鬼尚能引例隨喜何故猶迷答有二義一者久執二者入位解即破執執破入住凡夫無此或當易領二答為三初發起二正譬説三勸信流通今初爾時佛告舍利弗我先不言諸佛世尊以種種因緣譬喻言辭方便説法皆為阿耨多羅三藐三菩提耶是諸所説皆為化菩薩故然舍利弗今當復以譬喻更明此義諸有智者以譬喻得解文中先抑後引我先不言下指上明權皆為阿耨句指上顯實皆為化菩薩者若權若實皆入佛道無住涅槃上已明言云何執教迷暗不解如此呵責是抑令憤勇也然舍利弗下是引接安慰令其速進前斥既切恐鄙懟自沉今許以譬説若能解者猶稱智也二正譬説二初長文二重頌初中二初立譬二法合然譬與合互有廣略若譬略合廣先攝合文來對譬竟至合更須委悉消之若譬廣合略世尊豈可徒施悠言須委消譬合但略對初又二初總譬二別譬初又六初長者譬二舍宅譬三一門譬四五百人譬五火起譬六三十子譬初長者譬譬我釋迦舍利弗若國邑聚落有大長者其年衰邁財富無量多有田宅及諸僮僕國邑聚落句彰其名行有大長者句正標位號其年衰邁等明其德業也名如賓行如主行有親疏實行親權行踈名有遠近故舉處所以顯名行封疆為國最遠宰治為邑居中聚落是鄰閭最近長者名行遍此三處近不見其細陋遠但挹其高風口無擇言身無擇行意無擇法名行相稱真實大人以譬如來三業隨智慧行稱機施化名稱普聞德周法界國譬實報土邑譬方便土聚落譬同居土從寂光本垂三土迹攝三土迹歸寂光本名行相稱洋溢周遍也世間長者須備十德一姓貴或帝皇之裔或貂插之家二位高輔弼阿衡三大富金豐饒四威猛尊嚴隆重不肅而成五智深胸如武庫權奇超拔六年耆蒼蒼稜稜物儀所伏七行淨白圭無點八禮備周旋中節九上歎一人所敬十下歸四海所宗具此十德名大長者以譬如來出世長者從三世真如實際中生一姓貴也功成道著十號無極二位高也法財萬德悉皆具滿三大富也十力雄猛降魔制外四威猛也一心三智無不通達五智深也早成正覺久遠若斯六年耆也三業隨智運動無失七行淨也具佛威儀心如大海八禮備也十方大覺所共稱譬九上歎也七種方便而來依止十下歸也四教果佛皆就當教各論十德圓教初住亦得分證圓家十德觀心者觀心之智從實相出生在佛家種性真正即姓貴也三惑不起雖未發真已是著如來衣稱寂滅忍即位高也三諦含藏一切功德即大富也正觀之慧降伏愛見即威猛也中道雙照權實並明即智深也久積善根能修此觀此觀出於七方便上即年耆也此觀觀於心性名為上定能令三業無過即行淨也歷緣對境威儀無失即禮備也能如此觀是為深信解相諸佛皆歡喜歎美持法者即上歎也天龍四部恭敬供養即下歸也下文云佛子住此地即是佛受用是為觀心長者此之十德不出境智行三雖未入位如王子胎故名觀行如來十德若對出世還隨其教觀別果別準教望觀因果自分即以三觀對于四教具覽德相以歎于觀使後學者修因具足以觀十德成果十德以能一心具照三法即是觀心十德具足故引佛子等文以為觀心之證又此十德即十法成乘次第合之甚有深致何者實相即是不思議境緣理起誓故名住忍由心安理稱理含藏除三諦惑得破遍名中道雙照無塞不通無作道品過七方便助使三業于理無過對境無失由依真位信解既深故能安忍不生法愛方感下供三教十法展轉釋出令成今經觀心十法如此十觀不但橫在觀行位中初心至後十觀具足故此十德義復豎深復與橫豎十乘泯合明德業中德有內外內則智略外則資財年高則博達古今譬佛智德衰邁則根志純熟譬佛斷德財富譬外德無量總譬萬德也田能養命別譬禪定資于般若宅可棲身別譬實境為智所托如十八空門等若論福德無行而不修若論智慧無境而不照故云多有田宅也僮僕者給侍使人譬方便知見皆已具足和光六道曲順群機即實智之僮僕也二舍宅譬譬上安隱對不定隱不安隱即是三界其家廣大衆生役役皆宅三界如來應化統而家之故言廣大三一門譬譬上以種種法門宣示於佛道唯有一門文云以佛教門出三界苦得涅槃證當知理為教所詮今取詮理之教為門理既是一教不容二故且云一也又有宅門車門宅者生死也門者出生死之路也此方便教之詮也車者大乘法也門者圓教之詮也若宅門即車門出火宅時即應得于大車何須待索若宅門非車門正索車時秖是從火宅出寧有別路又復得宅門已未得車門住在何處當知斥則車宅永殊開則二門不異宅與車一二門何殊是故三乘具有二義承教出宅不見小車中間已經二味調熟乃從父索先所許車既索須與開彼小門無非大教門下小理終無別途絶理無二粗妙體一法住法位世間相常三界尚如何別之有若不先異何所論同沒苦之人于今咸會四五百人譬譬上衆生即五道也多諸人衆一百二百乃至五百人止住其中一百即天二百即人乃至五百即三惡趣不言修羅者修羅或攝入鬼趣或四趣所攝如大佛頂經五火起譬譬上安隱法對不安隱法不安隱法謂五濁也文又為二初出所燒之宅相譬六道果報次明能燒之火譬八苦五濁今初堂閣朽故牆壁隤落柱根腐敗梁棟傾危堂譬欲界閣譬色無色界朽譬三界弊惡無常故譬三界非今所造牆壁譬四大隤落譬減損柱根譬命腐敗譬危殆不久梁棟譬意識傾危譬遷變不停無色雖無粗四大色約定果色亦是牆壁三界皆以意識維持但約三界正報因果釋之便攝依報不須依正合喻依報止是第八識相分之少分耳又如成壞各二十中已無有情如何釋濁燒義稍隔故不用之又約觀解者堂譬身之下分閣譬頭等上分牆壁譬皮肉隤落譬老朽柱根譬兩足腐敗譬衰頽梁棟譬脊骨傾危譬大期也次明能燒之火周匝俱時欻然火起焚燒舍宅八苦遍在四大四生故言周匝並皆無常故云俱時欻然譬本無今有本無此苦無明故有五火起譬竟六三十子譬譬上知衆生性欲即指三乘行人長者諸子若十二十或至三十在此宅中曾習佛法天性相關目此已結緣者為子若十是菩薩子二十三十是二乘子此機俱得出宅若無此機則是五百人也或者辟支出沒不同或小乘攝或中乘攝皆言十者悉有十智之性故也一世智二他心智三苦智四集智五滅智六道智七法智八比智九盡智十無生智初總譬竟二別譬四初長者見火譬二捨几用車譬三等賜大車譬四無虗妄譬初長者見火譬譬上佛見五濁而起大悲心也長者見是大火從四面起即大驚怖而作是念我雖能於此所燒之門安隱得出而諸子等於火宅內樂著嬉戲不覺不知不驚不怖火來逼身苦痛切己心不厭患無求出意此中其文有四其意但三一長者見標出能見譬上我以佛眼觀見也二是大火從四面起標出所見譬上所見六道衆生也三即大驚怖譬上為是衆生故而起大悲心也四而諸子等下廣前第二所見之火還是釋成驚怖義也身受心法即宅之四面從此四面起淨樂常我四倒則八苦皆集若知身不淨苦無常無我受等亦爾則煩惱火滅業苦並熄即大驚怖者念其退大善故驚憂其將起重惡故怖驚即是慈念其無樂怖即是悲憂其有苦我雖能此所燒之門安隱得出者釋成驚怖之義雖是未盡之辭明佛以智慧力能尋正教見所詮諦不為五濁八苦所危故安四倒暴風所不能動故隱蕭然纍外故云得出而衆生不爾為火所燒如來慈悲猶為憂火所熾故言雖也所燒之門者門必有件有空非件無以標門非空無以通致件可灰燼空不可燒以譬教有能詮所詮若非詮辨無以為教若非所詮何以得出詮辨可是無常所詮非復無常得教所詮故名安隱得出能詮磨滅故言所燒之門不從所燒之門何由安隱得出藉于言教契于所詮大經云因無常故而果是常此之謂也若小乘無常教門是從所燒門出若大乘常住教門文字即解脫者此教即理體達燒即無燒而安隱得出若就如來權智即是從所燒門出若就實智即是體于所燒安隱得出故先作衣裓几案出之不得後以無常出之即此意也樂著嬉戲者著見名嬉著愛名戲又耽湎四見名嬉唐喪其功名戲耽湎五塵名嬉空無所獲名戲空生徒死而無厭離如彼兒戲都不言有火名不覺不解火是熱法名不知既不知火熱不慮傷身名不驚不畏斷命名不怖以譬衆生全不覺五陰八苦不知四倒三毒既不識惑云何畏慮惑侵法身斷失慧命如是不覺苦不知集不驚傷道不怖失滅以不聞四諦教則無聞思二慧名不覺不得修慧名不知不得見解名不驚不得思惟解名不怖見諦即驚悟思惟即厭怖又不覺現在苦不知未來苦故下文云現受衆苦後受地獄等苦也火來逼身者五識身也五識通三受三受即三苦念念與三受相應故云苦痛切己心不厭患者第六識也同時意識與五識俱唯知分別三受起貪恚癡更立苦因何能厭患求出故云無求出意也嬉戲譬見濁煩惱濁不覺不知不驚不怖譬衆生濁火來逼身苦痛切已譬命濁心不厭患無求出意譬劫濁二捨几用車譬譬上施方便化為二初捨几譬二用車譬初捨几譬譬上念用大乘擬不得也又二初勸門擬宜不得二誡門擬宜不得上文不分勸誡兩門但總明三意一用大擬宜二衆生無機三念欲息化今兩門各明擬宜無機而息化一意但是暗含也初勸門擬宜不得舍利弗是長者作是思惟我身手有力當以衣裓若以几案從舍出之復更思惟是舍惟有一門而復狹小諸子幼稚未有所識戀著戲處或當墮落為火所燒作是思惟譬上三七思惟也身譬神通荷負手譬智慧提拔依三昧斷德則有神通依智慧智德則有説法智斷之力能成法身此之智斷還從勸誡兩門入勸即為人悉檀誡即對治悉檀此二悉檀為第一義悉檀而作方便如來初欲勸門擬宜令衆善奉行成就十力四無所畏一切種智而衆生不堪次欲誡門擬宜令諸惡莫作證大涅槃而亦不堪無機息化故知念用大乘秖是勸誡兩悉檀神通智慧耳定慧力莊嚴以此度衆生即其義也前歎長者其年衰邁即譬智斷智斷即身手有力也衣裓是西國盛華之器以譬如來知見几譬四無所畏案譬十力蓋略中廣之異耳略説名如來知見知即一切種智見即佛眼名略義玄譬如衣裓一足而多含處中説名四無所畏用對四諦如几于法小廣于物小安隱廣説名十力橫豎該括如案多足於法則廣物則大安于三七日思欲説此廣略佛法是為勸門擬宜也復更思惟下是明無機惟有一門而復狹小者門指大乘車門釋此有別有通別者分字別釋一謂一理一道清淨門謂正教通于所通小謂斷常七方便等皆不能入若論教理寬博則非狹小衆生不能以此理教自通欲談無機故言狹小耳通者理教行三一一通明一門狹小理者理純無雜故言一即理能通故言門微妙難知故言狹小教者十方諦求更無餘乘唯一佛乘故言一此教能通故言門此教微妙凡夫不知出處是不知權不知入處是不知實二乘因聞少知出要永不知入菩薩雖自知出亦不知入奪七方便皆不知出入故云若但讚佛乘衆生沒在苦不能以教自通將談無機故言狹小行者圓因自行行大直道無留難故故名一善行菩薩道直至道場故名門妙行難行方便無機故言狹小耳諸子幼稚等者雖于二萬佛所教無上道而大乘善根微弱名為幼稚若聞大乘能生謗毀名未有所識此善弱也初退大時深著見愛受八苦時深著依正欲界著五塵色界著味禪無色界著定故名戀著戲處此惡強也墮落有二一者幼稚憶本戲處故墮落譬著五欲墮在三塗二者無識執物不堅故墮落譬謗大乘墮在三塗故曰衆生諸根鈍著樂癡所盲云何而可度又云若但讚佛乘破法不信故墜於三惡道也勸既無機義含息化二誡門擬宜不得我當為説怖畏之事此舍已燒宜時疾出無令為火之所燒害作是念已如所思惟具告諸子汝等速出父雖憐愍善言誘諭而諸子等樂著嬉戲不肯信受不驚不畏了無出心亦復不知何者是火何者為舍云何為失但東西走戲視父而已對治之相如大品中説四念處是摩訶衍以不可得故異于小乘也既著戲處故説怖事令得免離言五陰舍已被五濁火燒宜急捨離若久住著必斷善根故言無令為火之所燒害此擬宜也父雖憐愍下是明無機不驚不畏如上釋不識八苦五濁能燒善根如不知火不識陰界入法是諸苦器如不知舍不知喪失法身之由如不知者何為失背明向暗生死往還如東西馳走復起見愛如戲也不從大教故言視父而已誡又無機義含息化初捨几譬竟二用車譬譬上念同諸佛用三乘稱宜可得為四初擬宜一車譬二知子先心所好譬三歎三車希有譬四適子所願譬初擬宜三車譬譬上尋念過去佛亦作三乘化也爾時長者即作是念此舍已為大火所燒我及諸子若不時出必為所焚我今當設方便令諸子等得免斯害大乘化功為父命衆生大善為子命大善若盡即子命斷子命斷則化功亦廢即父命斷故云若不時出必為所焚也上文能於所燒之門安隱得出今何以云若不時出必為所焚前得出者即是法身出今言若不時出即是應身同疾若衆生有善則與應身同出若衆生善斷不與應身時出即是俱為所焚蓋欲以應身擬宜令其時出也我今當設方便即是擬欲施權二知子先心所好譬譬上作是思惟時十方佛皆現等父知諸子先心各有所好種種珍玩奇異之物情必樂著昔曾習小是其先心性欲不同是各有所好又衆生昔曾習大大習未濃是為大弱欣慕涅槃是為小強如身子六心中退知本習大名知先心知其退慕涅槃名知各有所好三歎三車希有譬譬上思惟是事已即趣波羅奈等而告之言汝等所可玩好希有難得汝若不取後必憂悔如此種種羊車鹿車牛車今在門外可以遊戲汝等於此火宅宜速出來隨汝所欲皆當與汝汝等所可下以譬勸轉如此種種下以譬示轉隨汝所欲皆當與汝以譬證轉或問車三使二城一城有車無俱譬方便何以不同答凡立譬者各從一義不可執一而疑異途故一二三但是離合為對三周信解等異是故別耳皆譬方便其義不殊車則通舉方便故三使則從難別對故二城是二三之處故一當知城亦從人故二故云息處説二車亦從難但二使亦義兼菩薩此三俱有人理教行城若説化故亦無車依造作故還有使約權同故亦有權乃非實故亦無權實相對俱通四句從權化故俱有從實義故俱無俱通權實故有無同約一理故雙廢四適子所願譬譬上受行悟入是名轉法輪等爾時諸子聞父所説珍玩之物適其願故心各勇鋭互相推排競共馳走爭出火宅前偈本略今譬事廣廣明修因至果之相言適其願者機教相稱即聞慧也四念處勇鋭者即是思慧思心動慮正勤方便也四正勤互相推排者推四真理排伏見惑歷觀上下八諦三十二行名為互相此入修慧屬暖頂位也競者爭取勝理是忍法位縮觀趣苦法忍也共者是世第一位同觀苦諦下四隨一行與苦法忍不別也馳走者入見道位一十六心速疾見理譬上便有涅槃音見道則分得涅槃也爭出者思惟道也爭出三界成無學果斷思惑盡方出火宅即譬上偈及以阿羅漢法僧差別名也觀心釋者中道正觀直觀實相心法相稱名適其願境無邊故觀亦無邊名勇境研心利名鋭心境相研名互相推排心王心數緣境速疾名競共馳走遍歷一切陰界入等無非實相名出火宅約教則有四教修因至果之相今且在藏約觀亦有四教差別今唯在圓二捨几用車譬竟三等賜大車譬譬上顯實為四初父見諸子免難歡喜譬二諸子索車譬三等賜諸子大車譬四諸子得車歡喜譬前偈本中先機發後佛喜今先佛喜後索車文有先後義無先後也初父見諸子免難歡喜譬上今我喜無畏是時長者見諸子等安隱得出皆於四衢道中露地而坐無復障礙其心泰然歡喜踊躍四衢道譬四諦觀露地譬三界思盡坐者譬住果不進也子果縛盡故無復障礙生安隱想故其心泰然子既免難父則歡喜二諸子索車譬譬上大乘機發咸以恭敬心皆來至佛所也時諸子等各白父言父先所許玩好之具羊車鹿車牛車願時賜與三車以譬三乘果位為求三乘果所以出三界既出三界已實無三乘果證可得而又方等彈訶般若淘汰今經彰言方便非實所以殷勤三請名為索車指昔所許三權正是請今一實故名大乘機發也須知在方等時屢被挫折不知所云便有機索至般若時轉教付財但自未知得與不得便有情索今法華會發言三請更加口索也三等賜諸子大車譬譬上正明顯實正直捨方便但説無上道也又為三初標章二釋車等三釋心等今初舍利弗爾時長者各賜諸子等一大車各賜諸子者以子等故心必等也譬一切衆生皆有佛性佛性既同等是佛子佛心無偏也等一大車者以法等故無非佛法譬一切法皆摩訶衍也但點所習無非妙乘秖由性同賜義則等謂各隨本習四諦因緣六度四等乃至色心逆順依正行理因果自他解惑大小福慧無量諸法各于舊習開示真實舊習不同故言各皆摩訶衍一攝一切遍具遍入故言大車二釋車等又二初正明車體二釋有車之由今初其車高廣衆寶莊校周匝欄楯四面懸鈴又於其上張設幰蓋亦以珍奇雜寶而嚴飾之寶繩交絡垂諸華纓重敷婉筵安置丹枕駕以白牛膚色充潔形體姝好有大筋力行步平正其疾如風又多僕從而侍衛之假名車有高廣相譬如來知見深遠橫周法界邊際豎徹三諦源底也法界三諦並非橫豎雖無橫豎法界從遍言橫則便三諦名異言豎則便不二互顯思之可見衆寶莊校譬萬行修飾也周匝欄楯譬陀羅尼能持萬善遮衆惡也四面懸鈴譬四無礙辨下化衆生也張設幰蓋譬四無量心不思議梵行也衆德之中慈悲最高普覆一切亦以珍奇雜寶而嚴飾之譬真實萬善嚴此慈悲故大經云慈若具足十力無畏等名如來慈也寶繩交絡譬四弘誓願堅固大慈心也垂諸華纓譬四攝神通等悅動衆生亦譬七覺妙鬘也重敷婉筵譬觀練熏修一切諸禪重沓柔軟也安置丹枕者丹即赤光譬無分別法枕有內外若車外枕亦名為軫隨所到處須此支昂譬即動而靜即靜而動若車內枕休息身首譬一行三昧息一切行身智首也駕以白牛者譬無漏般若能導諦緣度等一切萬行到薩婆若白是色本即與本淨無漏想應體具萬德如膚充煩惱不染如色潔又圓四念處為白牛四正勤二世善滿如膚充二世惡盡如色潔四如意足稱行者心如形體姝好筋譬五根住立能生力譬五力摧伏幹用行步平正譬定慧均等又譬七覺調平其疾如風譬八正道中行速疾到薩婆若也僕從譬方便波羅蜜能屈曲隨人給侍使令魔外二乘皆隨方便智用故淨名云皆吾侍者又果地神通運役隨意名為僕從觀心釋者現前一念心性豎無初後橫絶邊涯即空即假即中故高具足百界千如故廣性德過于恆河沙數故名衆寶莊校心外無法舉心則攝一切世出世法故名周匝欄楯心能普應一切演諸音教故名四面懸鈴心為諸法中最無法不覆故名張設幰蓋心王作觀則有諸善心所與之相應故名亦以珍奇雜寶而嚴飾之善心心數互作等無間緣故名寶繩交絡善心心所出生無量智慧福德故名垂諸華纓秖此一念心性具足柔軟輕安之法重重無盡故名重敷婉筵觀此心性即動即靜能靜能動動靜不二故名安置丹枕心性之理由妙觀顯故名駕以白牛稱性妙觀具諸功德故名膚充不雜煩惱故名色潔圓融自在故名形體姝好圓觀最能生長善根故有大筋圓觀最能摧伏界內界外一切愛見故有大力圓觀即止即觀定慧不二故名行步平正圓觀稱性無作任運入于無功用道故名其疾如風圓觀普攝諸法一切諸法皆任圓觀之所使令故名又多僕從而侍衛之當知車體非高非廣而論高廣即正因理性也白牛即了因慧性衆具即緣因善性三法不縱橫不並別不可思議名為佛乘一切衆生但有性德佛乘聞此佛乘能生信解則為名字佛乘念念觀心靡間靡雜則為觀行佛乘粗垢先落六根清淨則為相似佛乘開示悟入遊于四方則為分證佛乘直至道場衆行都息則為究竟佛乘自行已滿運他不休窮未來時利樂無盡是為觀心大白牛車也又此一文具足十乘觀法其車高廣即不思議境圓攝具度白牛而為其體張設幰蓋即真正發菩提心以大慈故遍與十界道滅之樂以大悲故遍拔十界苦集之苦也安內丹枕即巧安止觀可坐可臥善自調適也其疾如風即遍破諸法一心三觀無惑不破也安外丹枕即善識通塞可行則行可止則止也駕以白牛即道品調適圓妙三十七品如前説僕從侍衛即對治助開用前三教種種方便助顯第一義也既云行步平正必遊四方而至道場終不以凡濫聖即是能知次位既云有大筋力必能安忍內外順逆諸障既云其疾如風必不染著似道法愛也上根但觀不思議境於一法中圓悟十法中根從二至六隨何法中圓悟十法下根展轉具用十法方得開悟一家教觀莫此為要思之修之又其車高廣即如是體種種具度即如是相白牛即如是性是為性德三法生佛平等若研此三法至五品十信名如是力如是作若至開示悟入名如是因如是緣若至妙覺極位名如是果如是報衆生性具三法名之為本如來修得三法名之為末性德修得無二無別名究竟等是則大白牛車人人自有何關佛賜然非佛説則日用不知又非法華開顯則謂獨一大乘逈超九界誰知三乘權行乃至世間依正色心惑業苦等一一無非摩訶衍哉二釋有車之由所以者何是大長者財富無量種種諸藏悉皆充溢由財富藏溢故能各賜諸子等一大車也財富無量譬果地福慧圓滿種種諸藏謂行藏理藏一切法趣檀是趣不過戒忍等亦如是是約行為如來藏也一切法趣色是趣不過受想行識乃至界入等亦如是是約理明如來藏也自行此行理名充化他名溢實智滿名充權智用名溢入中道名充雙照故名溢非但藏多又皆充溢有何一法非摩訶衍故大乘無量也陰界入等隨拈一法無非理藏達此理藏故使諸度咸成行藏不達理藏諸行徒修二釋車等竟三釋心等而作是念我財物無極不應以下劣小車與諸子等今此幼童皆是吾子愛無偏黨我有如是七寶大車其數無量應當等心各各與之不宜差別所以者何以我此物周給一國猶尚不匱何況諸子假使富而非子或應有吝假使是子而貧或不能給今自行既滿故財富無量化緣已熟故是子無偏言各各與之者不移本習而示真實如身子于智慧開佛知見具一切佛法目連于神通開佛知見具一切佛法餘可例知又阿含方等般若等一切教念處正勤根力覺道等一切行種種異名皆開示實相乃至歷一切法亦如是故言其數無量也所以者何下舉況釋成一國譬寂光理性土也諸子譬同居結緣人也初釋財多尚周一國況復諸子譬大圓因普該善惡遍益法界理亦不窮況同居土結緣人耶次釋子等非子尚充何況是子譬佛無緣者尚度況有緣耶言非子者且貶正因不同緣了故抑言非然而佛慈普蔭畢竟無偏況結緣子故約無緣大慈對本有理則一切衆生無非佛子寄化儀説且以宿世未結緣者而為非子如來常給子自不歸大慈通覆故云周給人天善惡體即法界故父果車即子理車但開其情假名等賜衆生無盡車亦不窮不窮故不匱不匱故無偏望迷為閉悟本非開無緣尚度者緣了之子是先結緣者而熟脫之正因之子是未結緣者為其下種也番番種番番熟番番脫盡未來際無有已時是名出世長者大慈悲父三等賜諸子大車譬竟四諸子得車歡喜譬譬上受行悟入疑網皆已除等是時諸子各乘大車得未曾有非本所望本求羊鹿水牛期出分段今得白牛盡於變易過本所望豈不歡喜三等賜大車譬竟四無虗妄譬譬上不虗令勿疑法王祕要法也又三初問二答三述歎今初舍利弗於汝意云何是長者等與諸子珍寶大車寧有虗妄不二答舍利弗言不也世尊是長者但令諸子得免火難全其軀命則便非為虗妄何以故若全身命便為已得玩好之具況復方便於彼火宅而拔濟之世間玩好孰有重于身命者得全身命便非虗妄況費種種方便乃得拔濟豈可以虗妄責長者耶意顯但令得全小乘五分法身入空慧命便為已得昔來玩好況方便拔濟乃令得大乘法身慧命耶是為免難不虗亦名以重奪輕不虗也世尊若是長者乃至不與最小一車猶不虗妄何以故是長者先作是意我以方便令子得出所以假説三車以是因緣無虗妄也何況長者自知財富無量欲饒益諸子等與大車在長者是不乖本心故不虗在諸子是過本所望故不虗也三述歎佛告舍利弗善哉善哉如汝所言重言善哉述其二不虗也問佛何不自説不虗答佛許三與一自説為難身子説不虗取信為易也初立譬竟二法合二初合總譬二合別譬初中二初合長者等三譬二合三十子等三譬與前立譬文不次第義則無缺今初舍利弗如來亦復如是則為一切世間之父於諸怖畏衰惱憂患無明暗蔽永盡無餘而悉成就無量知見力無所畏有大神力及智慧力具足方便智慧波羅蜜大慈大悲常無懈倦恆求善事利益一切而生三界朽故火宅如來合長者譬利益一切一切即合五百人譬而生三界朽故火宅合舍宅譬也則為一切世間之父通指同居方便實報三土合上國邑聚落於諸怖畏乃至永盡無餘顯佛斷德而悉成就無量知見顯佛智德合上其年衰邁之內德也力無所畏合上外德財富無量也有大神力者深修禪定所得合上多田及智慧力者智必照境如身托處合上多宅具足方便合上多諸僕從大慈大悲等合上多諸人衆乃至五百人以慈悲故所被則多也三界即是其家廣大二合三十子等三譬為度衆生生老病死憂悲苦惱愚癡暗蔽三毒之火教化令得阿耨多羅三藐三菩提為度衆生指有緣多合三十子譬也生老病死乃至三毒之火合火起譬也教化令得菩提合唯有一門譬也初合總譬竟二合別譬四初合見火譬二合捨几用車譬三合等賜大車譬四合無虗妄譬今初見諸衆生為生老病死憂悲苦惱之所燒煮亦以五欲財利故受種種苦又以貪著追求故現受衆苦後受地獄畜生餓鬼之苦若生天上及在人間貧窮困苦愛別離苦冤憎會苦如是等種種諸苦衆生沒在其中歡喜遊戲不覺不知不驚不怖亦不生厭不求解脫於此三界火宅東西馳走雖遭大苦不以為患舍利弗佛見此已便作是念我為衆生之父應拔其苦難與無量無邊佛智慧樂令其遊戲此中見之一字合上長者見也諸衆生乃至種種諸苦合上大火從四面起即是八苦之火從四倒起也衆生沒在其中乃至不以為患超合上而諸子等乃至無求出意也不觀苦集故不生厭不觀道滅故不求解脫舍利弗佛見此已等追合上即大驚怖等也拔苦難是大悲與佛樂是大慈二合捨几用車譬又二初合捨几二合用車初合捨几但合勸門不合誡門前法説中亦但勸善不明誡惡當知勸修為正誡惡是傍又勸善即誡惡誡惡即勸善今合勸善即知合誡惡也文又為二初正合捨几二提譬帖合今初舍利弗如來復作是念若我但以神力及智慧力捨於方便為諸衆生讚如來知見力無所畏者衆生不能以是得度所以者何是諸衆生未免生老病死憂悲苦惱而為三界火宅所燒何由能解佛之智慧若我但以等合上擬宜所以者何下合上不得也神力合身力智慧力合手力如來知見合衣裓力合案無所畏合几未免生老病死等合上諸子幼稚何由能解佛之智慧合上唯有一門而復狹小二提譬帖合舍利弗如彼長者雖復身手有力而不用之但以殷勤方便勉濟諸子火宅之難然後各與珍寶大車如來亦復如是雖有力無所畏而不用之提譬具明寢大施權後乃顯實帖合且明無機寢大而施權顯實二意自在下文初合捨几譬竟二合用車譬三初合擬宜三車并知子先心二合歎三車希有三合適子所願今初但以智慧方便於三界火宅拔濟衆生為説三乘聲聞辟支佛佛乘智慧方便即合擬宜為説三乘即合知子先心所好也二合歎三車希有又三初合示轉二合證轉三追合勸轉今初而作是言汝等莫得樂住三界火宅苦諦勿貪粗弊色聲香味觸也若貪著生愛則為所燒集諦汝速出三界當得三乘聲聞辟支佛佛乘道滅二諦合上三車今在門外汝等於此火宅宜速出來二合證轉我今為汝保任此事終不虗也汝等但當勤修精進如來以是方便誘進衆生合上隨汝所欲皆當與汝三追合勸轉譬中先勸故云追合復作是言汝等當知此三乘法皆是聖所稱歎自在無繫無所依求乘是三乘以無漏根力覺道禪定解脫三昧等而自娛樂便得無量安隱快樂合上汝等所可玩好希有難得也三乘皆是諸佛方便引物儀式故是聖所稱歎得無生智為自在得盡智為無繫我生已盡不受後有名無所依所作已辦梵行已立名無所求根力覺道等通漏無漏賢位三十七品屬有漏學無學位三十七品屬無漏禪即四禪定即無色四定亦通有漏無漏今指無漏解脫即八解脫三昧即三三昧此唯無漏等即等取觀練熏修諸禪無量安隱快樂謂真空涅槃永離災患也二合歎三車希有竟三合適子所願舍利弗若有衆生內有智性從佛世尊聞法信受殷勤精進欲速出三界自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅若有衆生從佛世尊聞法信受殷勤精進求自然慧樂獨善寂深知諸法因緣是名辟支佛乘如彼諸子為求鹿車出於火宅若有衆生從佛世尊聞法信受勤修精進求一切智佛智自然智無師智如來知見力無所畏愍念安樂無量衆生利益天人度脫一切是名大乘菩薩求此乘故名為摩訶薩如彼諸子為求牛車出於火宅內有智性者宿習三乘樂欲成三乘智性故佛得施三乘教也聞法信受即聞慧合上適其願故也殷勤即思慧合上心各勇鋭也精進即修慧合上推排排惡去故精推理明故進也欲速出三界等合上競共馳走爭出火宅也如羊不顧後群名聲聞乘求自然慧者十二因緣本自有之非佛天人等所作又辟支多分是法行人從他聞少自推義多故取譬于鹿鹿不依人也求一切智謂欲遍知一切世出世法不同二乘唯求出世此智復名佛智以非二乘所能得故又名為自然智以超然自覺悟故又名為無師智佛為天人大師更無有為佛師者故且約三藏佛果釋此四智當知四教四智名同義實逈別此不繁述菩薩望此修因安忍運載故取譬于牛也二合捨几用車譬竟三合等賜大車譬譬文有四一免難二索車三等賜四歡喜今但合免難義兼索車但合等賜義兼歡喜文分為二初雙牒免難等賜二譬二雙合今初舍利弗如彼長者見諸子等安隱得出火宅到無畏處自惟財富無量等以大車而賜諸子二雙合如來亦復如是為一切衆生之父若見無量億千衆生以佛教門出三界苦怖畏險道得涅槃樂此先合免難也以佛教門者依教所詮真理而起三乘聖行故得出苦如來爾時便作是念我有無量無邊智慧力無畏等諸佛法藏是諸衆生皆是我子等與大乘不令有人獨得滅度皆以如來滅度而滅度之是諸衆生脫三界者悉與諸佛禪定解脫等娛樂之具皆是一相一種聖所稱歎能生淨妙第一之樂此次合等賜也我有無量乃至諸佛法藏合上財富無量諸藏充溢即有車之由也是諸衆生皆是我子乃至娛樂之具合上心等諸佛禪定解脫並依中道實相故與二乘禪定解脫不同也皆是一相乃至第一之樂合上正明車體譬文廣今文略但點三德以收衆義一相是實相即法身德一種是種智即般若德能生淨妙第一之樂樂即無苦是解脫德三德不可思議名為高廣大車三合等賜大車譬竟四合無虗妄譬二初牒譬二正合今初舍利弗如彼長者初以三車誘引諸子然後但與大車寶物莊嚴安隱第一然彼長者無虗妄之咎二正合如來亦復如是無有虗妄初説三乘引導衆生然後但以大乘而度脫之何以故如來有無量智慧力無所畏諸法之藏能與一切衆生大乘之法但不盡能受舍利弗以是因緣當知諸佛方便力故於一佛乘分別説三能與一切衆生大乘之法猶所云以我此物周給一國猶尚不匱也不盡能受故不得已為一施三三由衆生非佛本意今説大乘不乖本心故不虗也前舍利弗問云願為四衆説其因緣今故答云以是因緣分別説三二正譬説中初長文竟
