body:
  text: 古吳後學蕅益智旭述正譬説中二重頌為二初頌立譬二頌法合初中二初頌總譬二頌別譬初又四初頌長者二頌家宅三頌五百人四頌火起略不頌一門及三十子也今初佛欲重宣此義而説偈言譬如長者但頌位號即兼名行歎德如舉佛號便知萬德二頌家宅有一大宅其宅久故而復頓弊堂舍高危柱根摧朽梁棟傾斜基陛隤毀牆壁圮坼泥塗阤落覆苫亂墜椽梠差脫周障屈曲雜穢充遍因緣釋者有一大宅且指同居大千三界三界無始為久非今所造為故無常卑鄙名頓弊色界為堂欲界為舍不免墮落為高危命根支持為柱四相所遷為摧朽意識綱維為梁棟諸苦所壞為傾斜過去行業為基陛業運遷滅為隤毀四大為牆壁互相損害為圮坼皮膚為泥塗壯色不停為阤落四威儀不正為覆苫亂墜五識不利不相主境為椽梠差脫意識處處馳逐為周障遍歷六根取境為屈曲遍于六塵起貪恚癡為雜穢充遍此總約三界色心為宅體也觀心釋者現前一念五陰身心其性本自豎窮橫遍名一大宅無始以來暗識相傳無有作者名為久故念念無常迷情惡劣名為頓弊腹為堂背為舍兩足為柱根脊骨為梁棟臀䏶為基陛皮肉為牆壁膚色為泥塗鬚髮為覆苫牙齒骨節為椽梠遍身之內為周障小腸大腸等為屈曲大小不淨為雜穢充遍如此一身身外更無別物名一大宅而為理即長者所有若能念念觀察知此五陰身心所有苦性即法身德所有惑染即般若德所有業行即解脫德則轉為名字長者乃至轉為究竟長者自覺覺他利益無盡若不觀察則盡未來際恆居火宅燒已復燒終不知此大宅體即大白牛車哀哉哀哉三頌五百人有五百人止住其中譬五道也既有五道即有三乘根性兼得三十子也四頌火起四初頌地上事譬欲界二頌穴中事譬色界三頌穴外事譬無色界四總結衆難非一問經文已自有譬有合何故譬中復約譬釋答譬廣合略理應釋譬況鴟梟雕鷲乃至夜叉餓鬼等若不譬利鈍諸使何用列此冗雜名物豈佛有無義語耶初中四初明所燒之類二明火起之由三正明火起之勢四明被燒之相初明所燒之類譬十使衆生也鴟梟雕鷲烏鵲鳩鴿蚖蛇蝮蠍蜈蚣蚰蜒守宮百足鼬貍鼷鼠諸惡蟲輩交橫馳走屎尿臭處不淨流溢𧏙蜋諸蟲而集其上狐狼野干咀嚼踐踏嚌齧死尸骨肉狼藉由是群狗競來搏撮飢羸慞惶處處求食鬪諍摣掣啀喍嘷吠其舍恐怖變狀如是此先譬五鈍使也鴟梟等八鳥以譬慢使衆生自舉輕他如鳥陵高下視陵他名慢自恃名憍故以憍釋慢文殊問經明八憍今用配八鳥盛壯憍如鴟姓憍如梟富憍如雕自在憍如鷲壽命憍如烏聰明憍如鵲行善憍如鳩色憍如鴿次蚖蛇等二句以譬瞋使蚖者黑蛇也蚖蛇不觸而吸譬非理瞋蝮者虺也長三寸大如指鼻上有針蝮蠍觸之則螫譬執理瞋赤頭者名蜈蚣不赤者名蚰蜒譬戲論瞋次守宮等八句總譬癡使守宮即蝘蜒也守宮百足兀然無知譬獨頭無明鼬似鼠而亦噉鼠貍即貓類鼷即甘口鼠此四譬相應無明諸惡蟲輩交橫馳走結上獨頭相應二種無明遍緣三界故交橫紛起速疾故馳走即是從癡根本備起諸結也屎尿二句明癡心所著之境皆無常苦無我不淨𧏙蜋二句明迷事無明妄計以為常樂我淨而生染著也狐狼等八句總譬貪使狐狼譬有力貪以威勢取野干譬無力貪從他乞索咀嚼譬有用而取踐踏譬不用而取又少則咀嚼多則踐踏也嚌齧譬貪噬無厭死尸譬粗弊五欲骨肉狼藉譬積聚五塵不知止足由是群狗競來搏撮譬王賊等有大力者舉彼有力無力所積之物皆能強取之也飢譬常不知足羸譬求不稱意慞惶譬種種營覓所謂多欲之人雖富而貧也又愛心貪貪五塵之肉見心貪貪道理之骨推求知見遂多所解即是多骨須骨之狗競來搏取于見心中未得正法之食名飢不能伏斷見惑名羸處處求解名為慞惶互相是非名為鬪諍意謂為非如向前摣復謂為是如向後掣發言論決是非之理如啀喍嘷吠此即合前由是群狗等四句共有六句皆譬疑使其舍恐怖變狀如是總結上五鈍使也見屬利使自在後文今約鈍中之利故推道理而起于疑也聚唇露齒名啀喍出聲大吼名嘷吠處處皆有魑魅魍魎夜叉惡鬼食噉人肉毒蟲之屬諸惡禽獸孚乳産生各自藏護夜叉競來爭取食之食之既飽惡心轉熾鬪諍之聲甚可怖畏鳩槃茶鬼蹲踞土埵或時離地一尺二尺往返遊行縱逸嬉戲捉狗兩足撲令失聲以腳加頸怖狗自樂復有諸鬼其身長大裸形黑瘦常住其中發大惡聲叫呼求食復有諸鬼其咽如針復有諸鬼首如牛頭或食人肉或復噉狗頭髮髼亂殘害凶險飢渴所逼叫喚馳走此次譬五利使也處處皆有二句總明五種利使遍于三界五陰四諦造次恆有也山怪曰魑宅怪曰魅木石變怪曰魍魎夜叉等三偈別譬邪見人肉譬出世善報食噉人肉譬撥無出世因果也毒蟲禽獸孚乳産生各自藏護譬世間因果因能有果名藏必得不失名護爭取食之譬撥無世間因果也食之既飽譬邪見成就惡心轉熾譬邪見增廣鬪諍之聲譬撥無因果邪論甚可怖畏譬聞此邪論能使人墮落三塗也鳩槃等兩偈半別譬戒取鳩槃茶可畏鬼也虗坐名蹲實坐名踞地形高處名土埵譬外道依于戒取修行十善能生欲界六天高處也或時離地一尺二尺者譬依戒取修得四禪生在色界名離地一尺或依戒取得四空定生無色界名離地二尺也往返遊行者往譬生上二界返譬還生欲界縱逸嬉戲者譬不入正道終無實詣也捉狗兩足譬妄計苦行為淨撲令失聲譬妄計苦行不得苦果以腳加頸譬以苦行希求樂果怖狗自樂譬以苦行暫伏煩惱或時稍得味禪也復有諸鬼其身長大等六句別譬身見豎入三世計我名長橫遍五陰計我名大計我自在不修善法即無慚愧故名裸形以惡莊嚴故名黑無功德資故名瘦妄計有我永不能出三界故云常住其中發言宣説種種我相故云發大惡聲妄計有我能得涅槃故名叫呼求食也次復有諸鬼其咽如針別譬見取咽細命危而保其壽如非想無常而妄計涅槃也次復有諸鬼首如牛頭等二偈別譬邊見依于身見起斷常二見如牛頭二角斷常二見能斷出世善根如食人肉能斷世間善根如或復噉狗有時計斷有時計常前後回轉如頭髮髼亂計常破害無常正理計斷破害緣起正理計常墮常坑計斷墮斷坑故云殘害凶險無智慧食無禪定飲故云飢渴所逼宣唱斷常邪論故云叫喚輪回生死不息故云馳走也夜叉餓鬼諸惡鳥獸飢急四向窺看窗牖如是諸難恐畏無量此總結欲界利鈍煩惱衆生之相也並是有漏之心常乏道味故云飢急邪觀空理慕仰道味故云四向窺看滯著心多不會正理如窗牖觀空不得無礙初明所燒之類竟二明火起之由譬起五濁之由也是朽故宅屬于一人其人近出未久之間於後宅舍忽然火起三界是佛應化之處從發心來誓願度脫故云屬于一人長者在宅能令慎火由出去後諸子無知故令火起譬佛近于大通佛時常教是等令伏五濁衆生感盡如來捨應此等于後便起五濁也他土赴緣非是永去故言近出又已證無生不生三界故名為出不久應來故名為近壽量品云數現涅槃即是出宅意也三界為宅五陰為舍三正明火起之勢譬正起五濁也四面一時其焰俱熾棟梁椽柱𪹼聲震裂摧折墮落牆壁崩倒四面譬身受心法也頓起四倒五濁八苦故云一時其焰俱熾命斷為𪹼風刀解體為裂氣斷骨離為摧折墮落四大解散為牆壁崩倒由濁倒故身命無常四明被燒之相譬八苦五濁逼惱利鈍衆生也諸鬼神等揚聲大叫雕鷲諸鳥鳩槃茶等周慞惶怖不能自出諸鬼神等等取一切利鈍諸使也揚聲大叫恐怖無措也雕鷲諸鳥別舉鈍使中之勝者鳩槃茶別舉利使中之勝者然皆周慞惶怖不能自出故知若非三寶四諦四念處法縱令天龍神聖決定不免輪回初頌地上事譬欲界竟二頌穴中事譬色界三初譬所燒之類二明火起之由及火起之勢三明被燒之相今初惡獸毒蟲藏竄孔穴毗舍闍鬼亦住其中孔穴雖復不及門外敞豁猶得免于猛炎以譬四禪雖復不及界外安樂猶得免于欲界粗惡也惡獸毒蟲總舉鈍使衆生毗舍闍鬼略舉利使衆生並能得禪生于色界也毗舍闍此云噉精氣二明火起之由及火起之勢薄福德故為火所逼共相殘害飲血噉肉薄福德故一句是火起之由為火所逼等是火起之勢也孔穴之中雖無猛炎猶有熱惱譬四禪中雖無欲界惡法亦有愛味細苦展轉厭下欣上以上伏下名共相殘害但著默然如飲血但著支林功德如噉肉也三明被燒之相野干之屬並已前死諸大惡獸競來食噉臭煙熢㶿四面充塞野干譬欲界貪故已前死諸大惡獸譬色界貪能吞欲界貪也欲界四倒八苦猶如猛炎色界四倒譬以臭煙亦通身受心法及以四大故言四面充塞也二頌穴中事譬色界竟三頌穴外事譬無色界二初明所燒之類二明被燒之相今初蜈蚣蚰蜒毒蟲之類為火所燒爭走出穴鳩槃茶鬼隨取而食厭患色籠是苦粗障欣向無色為淨妙離故云為火所燒爭走出穴既取上定隨滅下緣故云鳩槃茶鬼隨取而食也然通而言之利鈍二使並堪得無色定今別約鈍使厭下故攀上利使證上故滅下也二明被燒之相又諸餓鬼頭上火然飢渴熱惱周慞悶走四空諸天並乏無漏飲食故如餓鬼雖居三界之頂不免無常所燒故如頭上火然無正道食故飢無助道漿故渴猶為微細八苦所逼故熱猶有微細諸惑現行故惱猶在生死輪回數中不知出要故云周慞悶走也三頌穴外事譬無色界竟四總結衆難非一其宅如是甚可怖畏毒害火災衆難非一初頌總譬竟二頌別譬三初頌長者見火譬二頌捨几用車譬三頌等賜大車譬略不頌無虗妄譬也今初是時宅主在門外立聞有人言汝諸子等先因遊戲來入此宅稚小無知歡娛樂著長者聞已驚入火宅初三句頌能見次五句頌所見後二句頌驚怖也門外者法身地也立者常懷大悲欲救衆生不處第一義空座也上文云見今頌云聞以聞代見顯見聞不二也有人言者法是佛師謂三昧法也若入三昧則能見機三昧令佛見故云聞有人言也先因遊戲來入此宅者有二義一者初發心時即名為出未登不退仍起見思故云遊戲來入此宅二者理性本淨非三界法因無明故而起戲論妄有生死故云遊戲來入此宅稚小者大善未著也無知者癡惑所纏也驚入者大悲起應也二頌捨几用車譬二初頌捨几二頌用車初頌捨几前法合中但合勸門今但頌誡門亦互顯也方宜救濟令無燒害告喻諸子説衆患難惡鬼毒蟲災火蔓延衆苦次第相續不絶毒蛇蚖蝮及諸夜叉鳩槃茶鬼野干狐狗雕鷲鴟梟百足之屬飢渴惱急甚可怖畏此苦難處況復大火諸子無知雖聞父誨猶故樂著嬉戲不已前四偈半頌誡門擬宜後一偈頌不得也方宜者擬以大教逗其宜也告喻者即是誡門説衆患難也惡鬼毒蟲句總立所燒即利鈍十使衆生災火蔓延三句總明燒勢及以燒相毒蛇等二偈廣明所燒雜列利鈍諸使不復次第此苦難處二句即是況結三界因果已不堪處況又起五濁耶諸子無知即是無大乘機不肯信受子既深著見思嬉戲不已父誨所不能化即含有息化之意二頌用車三初頌擬宜三車二頌歎三車希有三頌適子所願略不頌知子先心也今初是時長者而作是念諸子如此益我愁惱今此舍宅無一可樂而諸子等耽湎嬉戲不受我教將為火害即便思惟設諸方便初一偈明擬宜意次一偈明用小之由由著見思故唯施小次二句明用小之意若不用小則大小並亡故云將為火害次二句正思用小二頌歎三車希有告諸子等我有種種珍玩之具妙寶好車羊車鹿車大牛之車今在門外汝等出來吾為汝等造作此車隨意所樂可以遊戲初四句頌勸轉次三句頌示轉汝等出來句重頌勸轉後一偈頌證轉也吾能造車即是引己所證而明不謬三頌適子所願諸子聞説如此諸車即時奔競馳走而出到於空地離諸苦難聞説頌聞慧奔競頌思修馳走而出頌見諦到于空地頌無學也二頌捨几用車譬竟三頌等賜大車譬四初頌父見諸子免難歡喜譬二頌諸子索車譬三頌等賜諸子大車譬四頌諸子得車歡喜譬今初長者見子得出火宅住於四衢坐師子座而自慶言我今快樂此諸子等生育甚難愚小無知而入險宅多諸毒蟲魑魅可畏大火猛焰四面俱起而此諸子貪樂嬉戲我已救之令得脫離是故諸人我今快樂住于四衢謂了了見四諦也坐師子座者宅主初在門外猶有憂畏故云立今見子免難方得無畏故云坐方便品云今我喜無畏即此義也又前是大機未會故云立今是小化已周故云坐立者冥利坐者顯益也而自慶言者得所化機是故慶快二萬億佛所教以大乘是故云生中間小熟是故云育經此多時數數將養故云甚難善根尚微故云愚小妄惑所覆故云無知無知則起濁起濁則招果故云入宅多諸毒蟲二句總述三界利鈍之相大火猛焰二句總述三界八苦之勢而此諸子二句明其起見起愛不能自拔我已救之二句明其歡喜之由是故諸人二句結成歡喜之意二頌諸子索車譬爾時諸子知父安坐皆詣父所而白父言願賜我等三種寶車如前所許諸子出來當以三車隨汝所欲今正是時惟垂給與知父安坐者索車時也正同將説法華時也皆詣父所者索車儀也正同此會咸以恭敬心皆來至佛所也願賜我等三種寶車者正請索也如前所許者執昔而疑今也前云實有三乘可隨我欲今既斥為方便必當別垂給與也三頌等賜諸子大車譬長者大富庫藏衆多金銀琉璃硨磲碼瑙以衆寶物造諸大車莊校嚴飾周匝欄楯四面懸鈴金繩交絡真珠羅網張施其上金華諸纓處處垂下衆綵雜飾周匝圍繞柔軟繒纊以為茵褥上妙細氎價直千億鮮白淨潔以覆其上有大白牛肥壯多力形體姝好以駕寶車多諸儐從而侍衛之以是妙車等賜諸子初二句超頌有車之由次六偈半皆頌正明車體後二句追頌標章略不頌心等然車等子等則心必等明矣屋盛物曰庫可喻六根具一切法地盛物曰藏可喻諸行具一切法又陰界入等具一切法可喻以藏約理如地故道品六度等具一切法可喻以庫約修如屋故其實一一法中具一切行及一切法一一行中具一切法及一切行故名庫藏衆多而大富也性具諸法總名衆寶從性起修名之為造子多行多車則隨多名之為諸一一車體無不高廣名之為大又須示方知子修名造以性泯修造還本有乃車體也莊校下皆具度也初四句如前釋真珠羅網二句即頌幰蓋慈門非一猶如網孔一一孔中皆一真珠如衆慈門並稱于實也金華諸纓二句即頌垂諸華纓以明衆機遍悅也衆綵雜飾明垂化之處設應不同周匝圍繞明攝物之宜無所闕少柔軟繒纊即頌婉字以為茵褥即頌筵字上妙細氎四句即追頌重敷二字意顯種種事禪並即實相不同凡小雜諸煩惱故鮮白淨潔而上妙也大白牛如前釋儐從即僕從餘皆可知四頌諸子得車歡喜譬諸子是時歡喜踊躍乘是寶車遊於四方嬉戲快樂自在無礙乘中道妙慧橫遊四種四門四種四諦豎遊四十一位證於究竟常樂我淨四德也初頌立譬竟二頌法合二初頌合總譬二頌合別譬初中四初頌合長者二頌合五百人三頌合家宅四頌合火起今初告舍利弗我亦如是衆聖中尊世間之父我亦如是句頌合位號下二句頌合名行兼歎德也二頌合五百人兼得三十子義一切衆生皆是吾子深著世樂無有慧心一切指三界五道也三十是緣因子一切是正因子三頌合家宅兼得一門義三界無安猶如火宅四頌合火起衆苦充滿甚可怖畏常有生老病死憂患如是等火熾然不息初二句標次二句釋後二句結也初頌合總譬竟二頌合別譬四初頌合見火二頌合捨几用車三頌合等賜大車四頌合無虗妄今初如來已離三界火宅寂然間居安處林野今此三界皆是我有其中衆生悉是吾子而今此處多諸患難唯我一人能為救護初一偈頌合能見正由寂然在王三昧寂而常照故能見也次六句頌合所見後二句頌合驚怖入宅二頌合捨几用車二初頌合捨几二頌合用車今初雖復教詔而不信受於諸欲染貪著深故初一句頌擬宜第二句頌不得後兩句釋成不信之由兼含息化之意二頌合用車以是方便為説三乘令諸衆生知三界苦開示演説出世間道是諸子等若心決定具足三明及六神通有得緣覺不退菩薩初二句頌合擬宜次四句頌合歎三車希有後六句頌合適子所願也若心決定總頌三乘馳走之位具足等四句別頌三乘爭出之位不退義通兼前三教二頌合捨几用車竟三頌合等賜大車二初頌合等賜二頌合歡喜略不頌免難索車今初汝舍利弗我為衆生以此譬喻説一佛乘汝等若能信受是語一切皆當成得佛道此先頌皆是我子等與大乘乃至皆以如來滅度而滅度之合心等也是乘微妙清淨第一於諸世間為無有上佛所悅可一切衆生所應稱讚供養禮拜此即頌皆是一相一種聖所稱歎能生淨妙第一之樂合車體也無量億千諸力解脫禪定智慧及佛餘法得如是乘此追頌我有無量無邊智慧力無畏等諸佛法藏合有車之由也初頌合等賜竟二頌合歡喜令諸子等日夜劫數常得遊戲與諸菩薩及聲聞衆乘此寶乘直至道場以是因緣十方諦求更無餘乘除佛方便初七句正明各得大乘法喜後四句結成勸信也日夜者初得佛知見中道智光如日餘無明在如夜自得中道智如日慈悲入生死如夜常行二法故言遊戲也廣化三乘同得一乘故言與諸菩薩及聲聞衆乘此寶乘此乘圓頓無委曲相故言直至道場次結成唯一無三因緣可知三頌合等賜大車竟四頌合無虗妄告舍利弗汝諸人等皆是吾子我則是父汝等纍劫衆苦所燒我皆濟拔令出三界我雖先説汝等滅度但盡生死而實不滅今所應作唯佛智慧若有菩薩於是衆中能一心聽諸佛實法諸佛世尊雖以方便所化衆生皆是菩薩初四句先定父子天性至情即是頌如來亦復如是無有虗妄也次四句即頌初説三乘引導衆生也次十四句即頌然後但以大乘而度脫之也若人小智深著愛欲為此等故説於苦諦衆生心喜得未曾有佛説苦諦真實無異若有衆生不知苦本深著苦因不能暫捨為是等故方便説道諸苦所因貪欲為本若滅貪欲無所依止滅盡諸苦名第三諦為滅諦故修行於道離諸苦縛名得解脫此超頌衆生不盡能受大乘之法故佛以方便力為説生滅四諦也苦本即集諦方便説道猶云方便説言第三諦即滅諦餘可知是人於何而得解脫但離虗妄名為解脫其實未得一切解脫佛説是人未實滅度斯人未得無上道故我意不欲令至滅度我為法王於法自在安隱衆生故現於世此追頌如來有無量智慧力無所畏諸法之藏能與一切衆生大乘之法也但離虗妄者離見思也一切解脫者如來大涅槃也未實滅度者變易生死尚在也無上道者一切種智也法王現世為安衆生許三與一寧有虗妄重頌竟譬説周四大段中初正譬開三顯一有請有答答中有三初發起二正譬説竟三勸信流通信者信佛説不説也勸者勸可通不可通有此二義故言勸信文為二初標兩章二釋今初汝舍利弗我此法印為欲利益世間故説在所遊方勿妄宣傳初四句標説不説者我此實相法印為欲利益世間故説也若四十餘年未是説時若五千未退則不説也次二句標可通不可通者勿妄宣傳也惡者強説令其墮苦善者不説誤其得樂大悲愍惡則不宜通大慈念善則應可通也按此文佛囑身子若此即與日月燈明囑妙光同至于身子先佛入滅不過小機所見耳今日得聞法華未始不仍是身子流通力也二釋為二初釋可説不可説二釋可通不可通今初若有聞者隨喜頂受當知是人阿惟越致若有信受此經法者是人已曾見過去佛恭敬供養亦聞是法若人有能信汝所説則為見我亦見於汝及比丘僧并諸菩薩斯法華經為深智説淺識聞之迷惑不解一切聲聞及辟支佛於此經中力所不及汝舍利弗尚於此經以信得入況餘聲聞其餘聲聞信佛語故隨順此經非己智分此正明如來利益世間之相也通論三世利益別論令二乘入信初一偈是觀現在益為説梵語阿惟越致此云不退次六句是觀過去善為説次六句是觀未來善為説下文云若深信解者見佛常在靈鷲即此義也次四句結上起下如來觀彼深智三世利益是故為説淺識不解則不為説也後三偈正明二乘由信得入非己智分實得阿羅漢必信佛語故智力雖弱亦可為説若五千增上慢人佛則不為説矣二釋可通不可通又二初約大悲門莫為惡説二約大慈門應為善人説今初又舍利弗憍慢懈怠計我見者莫説此經凡夫淺識深著五欲聞不能解亦勿為説若人不信毀謗此經則斷一切世間佛種此經所詮純談實相以實相印遍印諸法故使纖善微解同成緣了而見思重者聞之則有二過一者不信二者謬解言不信者由淺智故執權疑實言謬解者由依文故直以外道所計常樂我淨而謂與此圓理無殊譬如舊醫專用毒乳此之二過同名毀謗此經皆斷世間佛種何以故此經以緣了而為佛種若執權疑實則不信小善成佛是斷世間緣因種也亦自斷了因種也若謬解常樂則不辨乳之好惡是斷世間了因種也又自謂惑即般若業即解脫不復修諸善法亦自斷緣因種也今初一偈是見惑重次一偈是思惑重後一偈是總出其過或復顰蹙而懷疑惑汝當聽説此人罪報若佛在世若滅度後其有誹謗如斯經典見有讀誦書持經者輕賤憎嫉而懷結恨此人罪報汝今復聽其人命終入阿鼻獄具足一劫劫盡更生如是展轉至無數劫從地獄出當墮畜生若狗野干其形𩑔瘦黧黮疥癩人所觸嬈又復為人之所惡賤常困飢渴骨肉枯竭生受楚毒死被瓦石斷佛種故受斯罪報若作馲駝或生驢中身常負重加諸杖捶但念水草餘無所知謗斯經故獲罪如是有作野干來入聚落身體疥癩又無一目為諸童子之所打擲受諸苦痛或時致死於此死已更受蟒身其形長大五百由旬聾騃無足宛轉腹行為諸小蟲之所咂食晝夜受苦無有休息謗斯經故獲罪如是若得為人諸根暗鈍矬陋癵躄盲聾背傴有所言説人不信受口氣常臭魑魅所著貧窮下賤為人所使多病痟瘦無所依怙雖親附人人不在意若有所得尋復忘失若修醫道順方治病更增他疾或復致死若自有病無人救療設服良藥而復增劇若他反逆抄劫竊盜如是等罪橫罹其殃如斯罪人永不見佛衆聖之王説法教化如斯罪人常生難處狂聾心亂永不聞法於無數劫如恆河沙生輒聾啞諸根不具常處地獄如遊園觀在餘惡道如己舍宅駝驢豬狗是其行處謗斯經故獲罪如是若得為人聾盲瘖啞貧窮諸衰以自莊嚴水腫乾痟疥癩癰疽如是等病以為衣服身常臭處垢穢不淨深著我見增益瞋恚淫欲熾盛不擇禽獸謗斯經故獲罪如是告舍利弗謗斯經者若説其罪窮劫不盡以是因緣我故語汝無智人中莫説此經此具明謗經所招惡報誡令勿妄宣傳也問謗經生罪則經非罪緣乎答佛之説經唯為生福迷者不信自獲罪殃如四大本為養育人物愚者犯之自取損害耳今佛諄諄告諭既令弘法觀機兼使彼知避苦可謂徹底大悲矣初約大悲門莫為惡説竟二約大慈門應為善人説又二初明五雙善人之相可為宣説二總結可説今初若有利根智慧明了多聞強識求佛道者如是之人乃可為説若人曾見億百千佛植諸善本深心堅固如是之人乃可為説利根強識是現在見佛植善是過去此過現一雙也若人精進常修慈心不惜身命乃可為説若人恭敬無有異心離諸凡愚獨處山澤如是之人乃可為説修慈是愍下恭敬是尊上又精進修慈不滯涅槃離諸凡愚不滯生死此福慧一雙也又舍利弗若見有人捨惡知識親近善友如是之人乃可為説若見佛子持戒清潔如淨明珠求大乘經如是之人乃可為説捨惡親善是外求名愧持戒如珠是內護名慚此慚愧一雙也若人無瞋質直柔軟常愍一切恭敬諸佛如是之人乃可為説復有佛子於大衆中以清淨心種種因緣譬喻言辭説法無礙如是之人乃可為説質直敬佛是自行譬喻説法是化他此自他一雙也若有比丘為一切智四方求法合掌頂受但樂受持大乘經典乃至不受餘經一偈如是之人乃可為説如人至心求佛舍利如是求經得已頂受其人不復志求餘經亦未曾念外道典籍如是之人乃可為説四方求法是請益之始頂受專修是歸憑之終此始終一雙也問華嚴云受一非餘是名魔業今何得云乃至不受餘經一偈耶答若滯隨情之説則受一者必至非餘故名魔業若秉開顯之談則一外無餘便能以一貫餘故為法器也初明五雙善人相竟二總結可説告舍利弗我説是相求佛道者窮劫不盡如是等人則能信解汝當為説妙法華經善信甚多略舉十相以示流通方法耳第二譬説周中初正譬開三顯一竟上來釋譬喻品竟次釋信解品信解品第四夫根有利鈍惑有厚薄説有法譬悟有前後文云世尊往昔説法既久我時在座身體疲懈但念空無相無作於菩薩法不生一念好樂之心初聞略説動執生疑廣聞五佛蒙籠未曉今聞譬喻歡喜踊躍信發解生疑去理明歡喜是世界信生是為人疑去是對治理明是第一義圓融四悉一時俱得故名為信解品又凡稟小大教革凡成聖各有次位小乘從聞生解苦忍明發信則稱行歷法觀察苦忍明發法則稱行若信行轉入修道則名信解若法行轉入修道則名見得準小望大亦應如此今中根人聞説譬喻初破疑惑入大乘見道故名為信進入大乘修道故名為解文云無上寶聚不求自得我等今日真是聲聞以佛道聲令一切聞聞圓教入圓位故名為信解品本迹者四大弟子久入大乘成就佛法迹引中根示初信解故名為信解品觀心者了達心外無法名信于現前一念介爾心中見一切法名解從名字信解乃至究竟信解二譬説周中第二明中根領解近領火宅遠領方便也文為二初經家敘喜二白佛自陳今初爾時慧命須菩提摩訶迦栴延摩訶迦葉摩訶目犍連從佛所聞未曾有法世尊授舍利弗阿耨多羅三藐三菩提記發希有心歡喜踊躍即從座起整衣服偏袒右肩右膝著地一心合掌曲躬恭敬瞻仰尊顏初文先敘內心即從座起下次敘外儀也善吉獨稱慧命三人稱摩訶者通論皆大皆慧別論善吉解空空慧為命此約行也因緣諸慧人中佛慧第一佛于般若命其轉教慧人所命故云慧命約教三弟子被命少摩訶如前釋此中亦具三業領解發希有心心領解也即從座起身領解也而白佛言口領解也從佛所聞未曾有法即近指火宅譬喻遠指廣略法説又聞世尊授身子記同行相例知必有分所以發希有心歡喜踊躍也外儀如文若約表法則從座起者捨小乘空證也整衣服者即聲聞智斷為菩薩法忍也偏袒右肩者右表于權昔未開權如右肩被覆今已開權故偏袒也右膝著地者地表一實知權即一實也合掌表權實不二不二即是非權非實之一心也躬非直非曲而能直能曲直表實曲表權今曲躬恭敬瞻仰尊顏表以我之權趣佛之實也二白佛自陳二初長文重頌正陳得解次十三偈歎佛恩深初中二初長文二重頌初中二初就法略領解二約譬廣領解初又二初正法説二略舉譬初又二初明昔稟三故不求二明今會一故自得初又二初標二釋今初而白佛言我等居僧之首年並朽邁自謂已得涅槃無所堪任不復進求阿耨多羅三藐三菩提一居僧首故不求法臘既高晚學以我為軌倘忽改途易轍棄小求大恐為後人所嫌自固護彼所以不求然執小臘則大法全闕不棄小由未識開三自固則小執未移護彼乃迷于大軌此一失也二年朽邁故不求若作菩薩當任大道廣度衆生今既老朽無所堪任所以不求然一生斷證是以自鄙年高敗種未袪是以妄見不任此二失也三得涅槃故不求高原陸地不生蓮華已入無為正位不堪復發大心所以不求然昔迷實義徒計正位之功由斯固情不知所行是菩薩道此三失也二釋世尊往昔説法既久我時在座身體疲懈但念空無相無作於菩薩法遊戲神通淨佛國土成就衆生心不喜樂所以者何世尊令我等出於三界得涅槃證又今我等年已朽邁於佛教化菩薩阿耨多羅三藐三菩提不生一念好樂之心在座疲懈即釋居僧首故不求次超釋得涅槃後追釋年朽邁並如文初明昔稟三故不求竟二明今會一故自得我等今於佛前聞授聲聞阿耨多羅三藐三菩提記心甚歡喜得未曾有不謂於今忽然得聞希有之法深自慶幸獲大善利由聞略廣法譬重重開顯而得信解獨舉授聲聞記者授記必由開顯故也初正法説竟二略舉譬無量珍寶不求自得昔般若領教謂為菩薩豈圖于今全蒙等賜也初就法略領解竟二約譬廣領解二初立譬二法合初中二初咨發二正立譬今初世尊我等今者樂説譬喻以明斯義猶如世禮欲有所決須先咨發也二正立譬四初父子相失譬二父子相見譬三追誘譬四領付家業譬初父子相失譬領上總譬及方便品中略頌也又為四初子背父去二父求子中止三子遇到父城四其父憂念初又二初背父而去二向本而還今初譬若有人年既幼稚捨父逃逝久住他國或十二十至五十歲譬若有人者二乘自譬也年幼稚者譬善根微弱也父譬如來應身指二萬億佛所教無上道已成父子應身息化之後退大心故名為捨父無明自覆名逃趣向生死名逝輪回三界五欲名久住他國天道為或十人道為二十具歷五道為至五十歲此領諸子先因遊戲來入此宅之意也問應身息化衆生起惑是父離子非子捨父答由衆生不感故應身去世還成子捨父義又約觀心釋者本覺名父始覺種子名子種子力微為幼稚背於本覺而起無明為捨父逃逝寂光理性為本國五欲生死為他國經歷五道為五十歲也二向本而還年既長大加復窮困馳騁四方以求衣食漸漸遊行遇向本國年既長大者譬大乘善根冥熏欲著也加復窮困者譬退大既久殘福漸盡具受八苦不得出要故窮八苦所燒故困也馳騁四方者遍歷身受心法遍推有無雙亦雙非也以求衣食者于中求正道食求助道衣也漸漸遊行遇向本國者不期而會名之曰遇外道厭苦求理雖復不當亦得為可化之緣佛初出時諸外道等皆先得度即此意也初子背父去譬竟二父求子中止其父先來求子不得中止一城其家大富財寶無量金銀琉璃珊瑚琥珀玻璃珠等其諸倉庫悉皆盈溢多有僮僕臣佐吏民象馬車乘牛羊無數出入息利乃遍他國商估賈客亦甚衆多退大以後求機不會故云求子不得不為一子而廢家業譬佛不以一處無機而廢餘方施化故云中止一城謂方便土在實報同居兩楹名中約有餘涅槃名城住此權理名止即此權理便是實相故名其家具足萬德故為大富五度福德為財般若智慧為寶導一切法皆摩訶衍故為無量金銀等七寶即圓乘三十七道品此領上長者大富義也倉庫盈溢者盛米為倉譬禪定能生百八三昧盛物為庫譬實相能發十八空智自資為盈外化為溢此領上多有田宅義也僮僕譬方便波羅蜜即領上及諸僮僕也又兩教二乘通教菩薩別三十心悉如僮僕圓十地如臣十向如佐十行如吏十住如民初入佛境界率土皆王民十行修習諸法種種驅馳故如吏十回向事理稍深職近王邊故如佐十地輔佛行化降魔制敵故如臣象譬一心三觀運圓教大乘馬譬次第三觀運別教大乘牛譬即空析空二觀運通教等大乘羊譬析法自行觀運聲聞乘不言鹿者特是文略又辟支值佛入聲聞數故也無數者權實諸法皆名車乘權實觀智名象馬牛羊非但教法甚多觀智亦復無數也出入者二而不二是入入中不二而二是出出中又不二而二是入入空入有二而不二是出出于空有此二番互融約三諦説無量還一是入一中無量是出此一番約二諦説化他用為出自行用為入此一番約自他説秖是用前三諦二諦出法益衆生為息化功歸己為利遍于三土為乃遍他國唯法性土名己國耳行貨曰商居貨曰賈譬諸菩薩遍入三土以求法利故云甚多或此土菩薩往他方聽法或他方大士來此士聞經又應化二身譬如商賈將實法遍入三土化益衆生而歸法身故云甚多如世間人令他捉財興生亦自興生也三子遇到父城時貧窮子遊諸聚落經歷國邑遂到其父所止之城此譬退大已後備遭諸苦深起厭患欲求出離以彼斷常邪慧觀察五陰聚落十八界國十二入邑處處求于正助衣食由此苦境為機感佛大悲有得涅槃之義故云遂到父所止城也四其父憂念父每念子與子離別五十餘年而未曾向人説如此事但自思惟心懷悔恨自念老朽多有財物金銀珍寶倉庫盈溢無有子息一旦終沒財物散失無所委付是以殷勤每憶其子復作是念我若得子委付財物坦然快樂無復憂慮父每念子下正念失子之苦復作是念下懸念得子為樂也如來自昔至今恆思諸子大機故言每念開鬼道出修羅故言五十餘年未曾説者未曾向方便土中臣佐吏民説有此子機緣彼臣佐等非全不知窮子機性但約窮子説時未至主伴相與覆實未宣權從物機故云不説又應世已來自昔華嚴方等般若諸座亦未曾彰灼向諸大士説此聲聞本是佛子也心懷悔恨者悔昔不勤教詔致令無訓逃逝恨子不惟恩義疏我親他以譬如來悔不殷勤令入內凡遂使退失本解恨其不能精進固志疏我正法親他六塵也自念老朽者化期將畢大法未傳如老朽而無子問法身所化諸菩薩等悉堪補處何遽此憂答法身所化本無興廢誰談老朽今明化身眷屬則有二種一者法身大士共相影響迹雖弟子本或是師亦不約此自念老朽也二者同居凡夫初從化佛發道心者名此為子子繼父業令胤族不斷若身子受記作華光佛則一方佛種相續不斷大乘家業遞相傳付倘身子無可化機則大乘法財現無付囑後來佛種安寄老朽興歎正為此也有可度機名為得子與授佛記名付財物稱于本心名為快樂初父子相失譬竟二父子相見譬領上長者見火譬及方便品中頌五濁也然法譬並明父前見子此中則明子前見父蓋就佛則靈智先知約生則機成扣應機應不前不後不可思議特前後互舉耳文為二初子見父二父見子今初世尊爾時窮子傭賃展轉遇到父舍住立門側遙見其父踞師子牀寶几承足諸婆羅門剎利居士皆恭敬圍繞以真珠瓔珞價直千萬莊嚴其身吏民僮僕手執白拂侍立左右覆以寶帳垂諸華幡香水灑地散衆名華羅列寶物出內取與有如是等種種嚴飾威德特尊窮子見父有大勢力即懷恐怖悔來至此竊作是念此或是王或是王等非我傭力得物之處不如往至貧里肆力有地衣食易得若久住此或見逼迫強使我作作是念已疾走而去此文凡有四意初見父之由由于傭賃二見父之處處在門側三見父之相踞師子牀乃至威德特尊四生畏避即見父有大勢力悔來至此等也初傭賃展轉者由厭苦欣樂推求理味漸漸積習資助出世善根以此善根扣佛慈悲故言遇到父舍也父譬道後法身舍譬無緣慈悲大小二機雙扣此舍有大機故故言遙見其父有小機故故言住立門側若唯小無大不應遙見尊特之身父亦不應歡喜財物庫藏今有所付若唯大無小不應住立門側亦不應言非我傭力得物之處也第二意中言門側者二觀為方便如門二邊圓中之機當門正見二乘偏真譬以門側但空三昧偏真慧眼傍窺法身耳扣召事遠是故言遙也第三意中言踞師子牀者圓報法身安處第一義空法性之座無復通別二惑八魔等畏也寶几承足者定慧為足實諦為几無生定慧依真如境也婆羅門名淨行貴族高潔譬華嚴會中等覺位離垢菩薩也剎利王種譬華嚴會中九地乃至初地諸大菩薩也居士富而未貴譬華嚴會中三十心菩薩也真珠瓔珞譬究竟戒首楞定一切種慧法音陀羅尼四瓔珞也價直千萬譬四十地功德以嚴法身也吏民僮僕者若約異門明義即以民譬稟方便教斷通惑人吏譬稟別教斷通惑人若約同門明義還譬方便波羅蜜也內與實智同外與機緣同譬如吏民有內奉外役之義也白拂譬權智之用右譬入空智用拂四住塵左譬入假智用拂無知塵此二為中道方便故言侍立也寶帳譬真實慈悲華譬四攝幡譬神通香水灑地譬法水灑諸菩薩心地以淹惑塵亦譬定水灑散心也散衆名華譬七淨華也一者三聚淨戒二者首楞大定三者實慧四者斷二諦疑五者行于非道通達佛道六者智德圓滿了了見性七者斷德成就永盡無明羅列寶物者譬羅列諸地真實功德也出內取與如前釋威德特尊者光明無邊色像無邊相海隨好巍巍堂堂也第四意中有大力勢者智大名大力神通大名大勢猶上文身手有力義也恐怖者小機劣弱怯懼大道也悔來至此者佛本欲以大法擬之應不稱機但有退大之意也竊作是念者機中潛密冥有此意非是顯對見勝應身也蓋父子相見雖譬感應道交不可思議然約化事論之則父先見子是如來鑑機道理如此今云子先見父相及處等並非已見秖約機應具述始末受化元由而已此或是王或是王等者波旬為王徒輩為等小機灰斷無言説道絶於色像既遙見勝應非天人所及所説法相逈異二乘小智薄德未曾見聞便謂是魔或魔徒輩也且如略開三顯一之時身子尚自狐疑將非魔作佛嬈亂我心耶況復初成道時設即用大擬小能不疑佛為魔又法身是王報身與法相稱名為王等大乘法報非是小乘得益之處故云非我傭力得物之處譬小機不能受大化也貧里譬但空之理不含萬德或譬四見之境肆力有地譬偏空稱于小智或譬四見稱于世智衣譬行行食譬慧行衣食易得譬能得有餘涅槃無漏衣食或譬能得世間味禪也若久住此等者行大乘道經無量劫故云久住我本厭怖生死若修大乘必入生死廣學萬行故言逼迫我本樂小而今令我發大乘心是為強使捨大取小故言疾走二父見子時富長者於師子座見子便識心大歡喜即作是念我財物庫藏今有所付我常思念此子無由見之而忽自來甚適我願我雖年朽猶故貪惜此文亦有四意初師子座是見子之處如來法身居第一義空無畏之境明照機也二見子便識知是往昔結緣衆生也三見子歡喜佛恆伺子機今機來稱慈是故歡喜此領譬喻中即大驚怖方便中起大悲心前明拔苦故言驚怖今明與樂故言歡喜也四見子適願昔見衆生退大之後馳騁四方以求衣食傭賃展轉常欲與財無機不得今日機來稱大慈心故言庫藏今有所付衆生流轉生死衆苦所逼為大悲所痛故言我常思念雖欲救拔無機叵濟故云無由見之今有可度之機故云而忽自來稱大悲心故云甚適我願一期化訖故言年朽且約示從然燈受決乃至兜率降神出家成道即是一期化事將畢也未見大機法無委付將來之徒從誰得脫為可度者故言貪惜也二父子相見譬竟三追誘譬領上捨几用車譬及方便品中施方便化意也文為二初遣旁人追二遣二人誘今初即遣旁人急追將還爾時使者疾走往捉窮子驚愕稱怨大喚我不相犯何為見捉使者執之逾急強牽將還于時窮子自念無罪而被囚執此必定死轉更惶怖悶絶躃地此雙領勸誡兩門皆無機也旁人者智是能遣教是所遣從佛出十二部經也又臣佐等為旁人如華嚴經中法慧菩薩説十住功德林菩薩説十行金剛幢菩薩説十回向金剛藏菩薩説十地等也急追將還者用頓教法勸門擬宜也疾走往捉者大乘明羲顯露正直用此赴機疾趣菩提若以菩薩為旁人者菩薩自有神力又被佛加亦能令彼疾入菩提也窮子驚愕等是譬勸門無機既現無機縱昔曾發廢久不憶卒聞大教乖心故驚不識故愕小乘以煩惱為怨生死為苦若勸煩惱即菩提則大喚稱怨枉若聞生死即涅槃則大喚稱苦痛我不干求大乘何為用大捉我也使者執之逾急強牽將還譬大乘誡門擬宜為説怖畏之事也窮子自念無罪等是譬誡門無機罪者譬慈悲也衆生罪故入生死獄菩薩慈悲入獄救之二乘無此大慈大悲故言無罪令入生死是被囚執也無大方便而入生死必當永失三乘慧命故言此必定死思此等事故言轉更惶怖小智不解大教故言悶絶溺無明地故言躃地也父遙見之而語使言不須此人勿強將來以冷水灑面令得醒悟莫復與語所以者何父知其子志意下劣自知豪貴為子所難故雖審知是子而以方便不語他人云是我子於時使者語之我今放汝隨意所趣窮子歡喜得未曾有從地而起往至貧里以求衣食此雙領勸誡兩門息化蓋是探取佛意佛雖勸門擬宜無機意猶未息更作誡門擬宜事不獲已然後息化也文亦四意初即思惟息化言父遙見者小去大遠故名遙也語使言者若約教為使則智本説教智知無機智息故教息若約人為使則如淨名中攝汝身香無令彼諸衆生而起惑著又如普賢入此娑婆促身令小等皆其義也勿強將來者既無大機恐傷其善根也冷水灑面者知有小志宜以灰斷理水灑彼向涅槃面令得離煩悶漸悟四諦也莫復與語者決定應息大乘教也第二所以者何下釋成息大化意厭苦欣空故志意下劣悲智未發故畏難豪貴審知二萬億佛所曾發道心實是佛子為將護故不語他人即從阿含乃至般若未嘗彰言二乘作佛也第三使者語之下正明息于大化我今放汝即是知大機弱隨意所趣即是知小善強也第四窮子歡喜下即是息化稱機不為大教所逼是故歡喜逗之以小可得醒悟故言從地而起於但空理求正助道或于四見求正助道故言往至貧里以求衣食也初遣旁人追竟二遣二人誘為二初齊教領二取意領初齊教領者近領三車救子遠領波羅奈施權也又為四初領擬宜三車二領知子先心三領歎三車四領適願爭出火宅今初爾時長者將欲誘引其子而設方便密遣二人形色憔悴無威德者汝可詣彼徐語窮子此有作處倍與汝直窮子若許將來使作若言欲何所作便可語之雇汝除糞我等二人亦共汝作既息大化不容孤棄擬設方便故云將欲四大弟子齊已分領不涉菩薩故云密遣二人約法即四諦十二因緣約理即有作真俗約人即聲聞緣覺而言密遣者約教則隱滿字為密指半字為遣約理則隱實為密指權為遣約人則內祕菩薩行為密外現是聲聞為遣也二乘教中不修相好但説苦無常無我不淨故言形色憔悴不具十力四無所畏故言無威德者以此小教而擬小機故言汝可詣彼小教明理迂隱不同大乘直走往捉故言徐語窮子見修兩道是斷惑作處故言此有作處外道六行但能伏惑生上二界今修諦緣則能斷惑出生死海故言倍與汝直窮子若許者有機是許則設教無機是不許不設教也二乘唯欲除惑取證不論淨佛國土成就衆生故言雇汝除糞我等二人亦共汝作者約教則二乘鈍根憑教行行方能修業約理則智諦相資約人則權人共實人修行也二領知子先心三領歎三車時二使人即求窮子既已得之具陳上事審知有機故言得之即領知子先心也具陳上事雇使共作除苦集糞與道滅直即領歎三車也四領適願爭出火宅爾時窮子先取其價尋與除糞其父見子愍而怪之慕滅方肯修道故云先取其價尋與除糞猶云先問其價也取價是適願除糞是爭出愍者愍其取小乘果怪者怪其不求佛道初齊教領竟二取意領者領法身地久照方便非至道樹始知用小早鑑衆生畏難尊特親狎垢衣故追領往前以成今解也問四大弟子何因能知法身久照答推近知遠若至道樹始知無有大機不應兜率降神正慧託胎乃至現有煩惱納妃生子三十四心後身斷結驗知脫相海微妙纓絡著丈六粗弊垢衣鑒機蓋已久矣文分為四初領權智久欲擬宜二領久知小法是其玩好三領久知須歎三車四領久知適願受行今初又以他日於窗牖中遙見子身又者鄭重辭也將欲取意領法身地知機施化之妙重述佛意故標章稱又也他者指法身也二乘自謂權理為己故以實理望己而名他也日者時也亦智也依法身之時用智照機故言他日前齊教領領化身用事故二乘稱為己日今取意領領法身用事故二乘稱為他日又就如來法身説者實智照實為己權智照方便為他又自行權實為己化他權實為他又化他照實為己化他照權為他今正探領法身之時用化他權智照權機之若有若無照權用之若可若否故言他日也窗牖者在屋曰窗在牆曰牖既非中門明處又狹譬權智照偏機也遙者小去大遠也見者擬欲接之也子者昔曾結緣也此由子隔窗牖之外非關長者偏視之非二領久知小法是其玩好羸瘦憔悴糞土塵坌污穢不淨修因智力少故羸修因福力少故瘦內怖無常故憔外遭八苦故悴四住為糞土無知為塵坌三領久知須歎三車即脫纓絡細軟上服嚴飾之具更著粗弊垢膩之衣塵土坌身右手執持除糞之器狀有所畏即脫等者譬隱報身無量功德所謂四十二地戒定慧陀羅尼纓絡寂滅忍細軟上服大小相海嚴飾之具蓋容服若盛子則驚畏二乘不宜見此相好是故脫之更著等者現丈六形名粗生忍法忍名弊示有煩惱有為有漏名塵土坌身也右手譬權用除糞之器譬治見思法門自以此法斷結成佛又用此以化人故名執持示同怖畏生死又示寒風馬麥等報故名狀有所畏四領久知適願受行語諸作人汝等勤作勿得懈息以方便故得近其子後復告言咄男子汝常此作勿復餘去常加汝價諸有所須盆器米鹽醋之屬莫自疑難亦有老弊使人須者相給好自安意我如汝父勿復憂慮所以者何我年老大而汝少壯汝常作時無有欺怠瞋恨怨言都不見汝有此諸惡如餘作人自今已後如所生子即時長者更與作字名之為兒爾時窮子雖欣此遇猶故自謂客作賤人由是之故於二十年中常令除糞此文具譬道品七科法門以顯除糞之相領上諸子心各勇鋭互相推排競共馳走爭出火宅也一者語諸作人句譬説四念處法是除糞之器斷結之境即聞慧外凡位也二者汝等勤作勿得懈怠譬四正勤能發暖位暖是內凡故云得近其子三者後復告言等譬四如意足咄是驚覺之辭令捨散入靜也正勤屬智如男子是陽性如意足屬定如女人是陰性若但正勤䇿動不得與真相應故咄令修如意足也念處正勤動不專一不名為常四如意中定不異緣思惟則定思惟則斷定斷專一故云汝常此作不復紛動故云勿復餘去此是頂位也如意觀中能發無漏故云當加汝價有漏無漏助道正道皆從如意觀求欲須即得故云諸有所須莫自疑難盆器譬四禪體含支林米譬生空智粗譬法空智細藏教中亦有法空非大乘法空也此屬正道鹽譬十六行觀中無常醋譬于苦此屬助道如米難食須鹽醋和之譬正道難顯須助道佐之也亦有老弊使人者譬如意觀能發神通以代手足但神通劣弱故云老弊又九想十想八背捨等助道法門譬以使人如意觀中亦有此法須此助于正道即成俱解脫人故云須者相給也四者好自安意譬于五根若得五根則安固難壞此忍位也五者我如汝父等譬于五力世第一位似解鄰真故云我如汝父乃至如所生子所以者何下釋成如父之意佛居道終已具智斷故言老大汝居道始未有智斷故言少壯有信力故無欺有精進力故無怠有念力故無瞋有定力故無恨有慧力故無怨言餘作人者遠譬外道諸見求理近譬四念處等四位亦未免五過也六者即時更與作字名之為兒譬七覺八正入見道位世第一心無間證真故云即時從此轉凡成聖故云更與作字阿含説五種佛子謂四果及辟支佛菩薩不斷結子義未成即此義也七者爾時窮子雖欣此遇下譬修道位七覺八正以其不知堪任紹大故云猶故自謂客作賤人以其但稟權教修行盡苦故云二十年中常令除糞即是見諦一無礙一解脫思惟道九無礙九解脫也三追誘譬竟四領付家業譬近領火宅中等賜大車遠領方便中頌顯實也文為二初領家業二付家業初中二初相體信二命領業今初過是已後心相體信入出無難然其所止猶在本處此正譬方等彈訶時也由其得涅槃價事既不虗今為菩薩説大乘法亦必不虗子信父也佛知此等見思已斷聞大不謗無漏根利能微生信父信子也由此見尊特身聞大乘教名之為入復被訶折猶見丈六説小乘法名之為出大小出入雖無疑難猶謂大乘是菩薩事非己智分不肯回心向大故云所止猶在本處二命領業又二初命知家事二受命領知今初世尊爾時長者有疾自知將死不久語窮子言我今多有金銀珍寶倉庫盈溢其中多少所應取與汝悉知之我心如是當體此意所以者何今我與汝便為不異宜加用心無令漏失此正譬般若轉教時也將死不久者有機則應為生機盡應謝為死今化機將畢應謝非久也金譬中理銀譬真理理則非多約種種門亦得言多例如空非十八約破十八法名十八空也勸學中明一切法門皆是珍寶倉譬定門即百八三昧庫譬慧門即十八空境定慧倉庫包藏一切禪定智慧無所缺少內充外溢故云盈溢其中多少者譬般若廣略二門菩薩行般若應知廣略相略則為少廣則為多自行為取化他為與大品中云汝當為菩薩説故云汝悉知之我心如是者佛以般若為心當體此意者誡令同我體法空也今我與汝便為不異者有三義一是加被令説故與佛説不異二以諸法皆如故得不異所謂善吉如如來如一如無二如三就今日始悟父子天性本來不異而二乘人向自謂被加異耳如般若云豈二乘人敢有所説有所説者皆是佛力由機未轉且言被加宜加用心無令漏失者有二義一是約教為菩薩説不可漏失二是約理此即汝物不可漏失也二受命領知爾時窮子即受教敕領知衆物金銀珍寶及諸庫藏而無希取一餐之意然其所止故在本處下劣之心亦未能捨無希取者如善吉雖説般若自謂我無其分也止本處者猶保小乘果證也未捨下劣心者雖復恥小未即回心向大也問二乘至般若時密得別益何云無希取意答領知無量差別法門故名別益無心希取故名密得若肯希取即是顯得何名密得耶初領家業譬領上免難歡喜意竟二付家業譬為二初正付家業二得付歡喜初正付家業領上索車及等賜大車二意也復經少時父知子意漸以通泰成就大志自鄙先心臨欲終時而命其子并會親族國王大臣剎利居士皆悉已集即自宣言諸君當知此是我子我之所生於某城中捨我逃走竛竮辛苦五十餘年其本字某我名某甲昔在本城懷憂推覓忽於此間遇會得之此實我子我實其父今我所有一切財物皆是子有先所出內是子所知復經少時譬般若後正説無量義經之時既聞本從一法生無量法必思無量諸法理應還入一法如此思時漸以通泰故得大乘機發乃至今經發言三請名為自鄙先心此領索車意也臨欲終時者如後文云如來不久將入涅槃正指法華時也命其子者二萬億佛所受化之人大機既熟十方雲集也并會二字貫于下文言親族者十方法身菩薩影響衆也言國王者一切漸頓諸經當機益物部部不同名之為國皆言第一即各稱王今經會通諸經故名并會國王也等覺菩薩為大臣十地菩薩為剎利三十心菩薩為居士諸君當知下是正結會父子實從我學故云此是我子從我得解故云我之所生於某城中者此經西國文多或可説昔名字國土例如大通智勝因緣今文簡略但言某某也背大乘法遁入生死故言捨我逃走備經六趣故云五十餘年法身地中常覓可化之機故云昔在本城懷憂推覓始于今日感應道交故云忽于此間遇會得之也今我所有下是正付與家業一切財物即大乘萬行萬德先所出內即追指廣略般若共不共法先已領知今但付與所以法華但論開示悟入佛之知見不復廣説一切行相此領等賜大車意也二得付歡喜領上得車歡喜意也世尊是時窮子聞父此言即大歡喜得未曾有而作是念我本無心有所希求今此寶藏自然而至譬三藏中本心不求方等中雖恥小自謂望絶故不求般若中雖領知自謂非己分故不求如此不求而今自得也然此歡喜之由有遠有近若不先教傭作與一日之價豈得心相體信委業付財譬由三藏斷結方堪並聞大集受折淨名轉教般若而致今日開顯授記耳故傭作取價即是遠由體信委知即是近由又前誘引譬中共有二意一齊教領始自道樹終訖出宅二取意探領始自法身終訖思盡今于領付譬中亦有二意一探領慈悲四味調熟二終領付財究竟一味遠近始終合論五味何者即遣旁人旁人所説譬華嚴圓頓此教最初旁人譬牛所説譬乳故云從佛出十二部經即初味也若以此擬二乘人則無機不受迷悶躃地全生如乳也次明密遣二人説除糞法此譬鹿苑説三於小即信革凡成聖如轉乳為酪故云從十二部出修多羅即第二味也次明心相體信出入無難譬説方等淨名諸經揚大折小二乘聞大不謗折小不退良以三藏斷結取一日價故得恣其褒貶倘未斷結則不堪聞揚大如前不受勸門亦不堪聞折小如前不受誡門而今不謗不退者心相體信故也既親證小故信大不虗得涅槃價故體折不瞋雖非己事而不疑謗此心淳熟如從酪出生酥故云從修多羅出方等經第三味也次長者自知將死不久下譬般若會中使其領教為大菩薩説摩訶般若既領知衆物貫統法門心明口辨彌益慕樂但恨住小非是己物脫更開許豈不樂哉於是心漸通泰成就大志如從生酥出於熟酥故云從方等出摩訶般若第四味也次臨欲終時而命其子譬般若之後判天性定父子會三歸一付財與記説法華教開佛知見示真實相菩薩疑除聲聞作佛悉以如來滅度而滅度之如從熟酥出于醍醐故云從摩訶般若出大涅槃第五味也四大弟子深得佛意探領一化五味之教始終次第其文出此此為最鈍聲聞須經五味若稍利者四三二味即得入實故此別五時教止約一類根性所聞不可執別而難通也又華嚴如日照高山阿含如日照幽谷照幽谷時未嘗不照高山説阿含時何得不説華嚴方等般若例此可知今人僅讀四教儀一書不知廣習習台宗寧知如來大機大用初立譬竟二法合甚略譬中已委故不更論貴在得意不俟費辭也文為四初合父子相失二合父子相見三合追誘四合領付家業今初世尊大富長者則是如來我等皆似佛子似有二義一取大機為子昔未逃逝既非真位猶居外凡故名似也二取小機為子子既逃父貶之言似即以似字而合相失二合父子相見如來常説我等為子但合長者見子便識即得子見父父見子二文八義三合追誘二初合旁人追二合二人誘今初世尊我等以三苦故於生死中受諸熱惱迷惑無知樂著小法三苦謂壞苦行苦苦苦也受諸熱惱即五濁障重迷惑無知即不受勸誡樂著小法即但有小志不堪大化也二合二人誘又二初合齊教領二合取意領今初今日世尊令我等思惟蠲除諸法戲論之糞我等於中勤加精進得至涅槃一日之價既得此已心大歡喜自以為足便自謂言於佛法中勤精進故所得弘多令我等思惟等是合具陳上事勤加精進是合尋與除糞得至涅槃等是合先取其價也二合取意領然世尊先知我等心著弊欲樂於小法便見縱捨不為分別汝等當有如來知見寶藏之分上言又以他日遙見子身今云先知上言羸瘦憔悴今云心著弊欲等上言即脫瓔珞今言不為分別等三合追誘竟四合領付家業二初合領家業二合付家業今初世尊以方便力説如來智慧我等從佛得涅槃一日之價以為大得於此大乘無有志求我等又因如來智慧為諸菩薩開示演説而自於此無有志願所以者何佛知我等心樂小法以方便力隨我等説而我等不知真是佛子以方便力説如來智慧合上心相體信出入無難也於此大乘無有志求合上所止猶在本處也又因如來智慧為諸菩薩開示演説合上受命領知也而自於此無有志願合上無希取也所以者何下釋出無希取意佛方便力以實相法共二乘説我等不識不共之意也二合付家業又二初合付業二合歡喜今初今我等方知世尊於佛智慧無所吝惜所以者何我等昔來真是佛子而但樂小法所以如來萬不得已權施小法若我等有樂大之心佛則為我説大乘法於此經中唯説一乘而昔於菩薩前毀訾聲聞樂小法者意欲我等捨偽取真然佛實以大乘教化二合歡喜是故我等説本無心有所希求今法王大寶自然而至如佛子所應得者皆已得之中根領解二白佛自陳中初長文竟
