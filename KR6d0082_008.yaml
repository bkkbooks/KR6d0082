body:
  text: 古吳後學蕅益智旭述中根領解白佛自陳中二重頌二初頌法說二頌譬說今初爾時摩訶迦葉欲重宣此義而說偈言我等今日聞佛音教歡喜踊躍得未曾有佛說聲聞當得作佛無上寶聚不求自得二頌譬說二初頌立譬二頌法合初中四初頌父子相失二頌父子相見三頌追誘四頌領付家業初又四初頌子背父去二頌求子中止三超頌其父憂念四追頌遇到父城今初譬如童子幼稚無識捨父逃逝遠到他土周流諸國五十餘年周流諸國譬輪回三界五十餘年譬備經六趣也二頌求子中止其父憂念四方推求求之既疲頓止一城造立舍宅五欲自娛其家巨富多諸金銀硨磲碼瑙真珠琉璃象馬牛羊輦輿車乘田業僮僕人民衆多出入息利乃遍他國商估賈人無處不有千萬億衆圍繞恭敬常為王者之所愛念群臣豪族皆共宗重以諸緣故往來者衆豪富如是有大力勢四方推求譬觀四生覔可度之機也頓止一城譬有餘國方便淨涅槃也起慈悲舍立性空宅受用勝妙五塵稱性法樂良由佛居方便是即實報亦即寂光故也王譬法身及自受用身今是勝應故為王所愛念也群臣豪族譬法身大士往來者衆譬諸土菩薩來往聽法三超頌其父憂念而年朽邁益憂念子夙夜惟念死時將至癡子捨我五十餘年庫藏諸物當如之何四追頌遇到父城爾時窮子求索衣食從邑至邑從國至國或有所得或無所得饑餓羸瘦體生瘡癬漸次經歷到父住城歷十二處及十八界以求正道助道故云從邑至邑從國至國也約有漏善則或有所得約無漏善則或無所得無大乘法食為饑餓無大力用為羸無大功德為瘦迷于諦理而起見思為體生瘡癬初頌父子相失竟二頌父子相見二初頌子見父二頌父見子今初傭賃展轉遂至父舍爾時長者於其門內施大寶帳處師子座眷屬圍繞諸人侍衛或有計算金銀寶物出內財産注記券疏窮子見父豪貴尊嚴謂是國王若國王等驚怖自怪何故至此覆自念言我若久住或見逼迫強驅使作思惟是已馳走而去借問貧里欲往傭作初二句頌見父之由次十句頌見父之相上明見父之處在於門側今言長者於其門內即兼得處也菩薩行願多明事數故云計算以廣顯略為注授決為記四弘誓為券修行為疏次窮子見父下十四句頌生畏避可知二頌父見子但頌見子處及見即識不頌歡喜適願長者是時在師子座遙見其子默而識之二頌父子相見竟三頌追誘二初頌旁人追二頌二人誘今初即敕使者追捉將來窮子驚喚迷悶躃地是人執我必當見殺何用衣食使我至此長者知子愚癡狹劣不信我言不信是父二頌二人誘二初頌雇作即齊教領二頌教作即取意領今初即以方便更遣餘人眇目矬陋無威德者汝可語之云當相雇除諸糞穢倍與汝價窮子聞之歡喜隨來為除糞穢淨諸房舍眇目譬偏空小智矬者豎短譬不窮實相之源陋者橫狹譬不具萬善之飾非四無所畏故無威非常樂我淨故無德淨諸房舍者淨六根房五陰舍也二頌教作長者於牖常見其子念子愚劣樂為鄙事於是長者著弊垢衣執除糞器往到子所方便附近語令勤作既益汝價并塗足油飲食充足薦席厚暖如是苦言汝當勤作又以軟語若如吾子初二句頌權智久欲擬宜次二句頌久知小法是其玩好次四句頌久知須歎三車次十句頌久知適願受行也語字頌四念處令勤作三字頌四正勤既益汝價六句頌四如意足塗足油者油能除風譬禪定復能履水譬神通飲食即米麵鹽醋薦席厚暖譬觀練熏修諸禪如是苦言汝當勤作結前咄男子汝常此作等也又以軟語若如我子即頌好自安意以下五根五力七覺八正等文三頌追誘竟四頌領付家業二初頌領業二頌付業今初長者有智漸令入出經二十年執作家事示其金銀真珠玻瓈諸物出入皆使令知猶處門外止宿草菴自念貧事我無此物初二句頌心相體信次六句頌受命領知後四句頌無希取也經二十年者教菩薩斷界外見思與前二十年除糞不同二頌付業二初頌正付業二頌得付歡喜今初父知子心漸已曠大欲與財物即聚親族國王大臣剎利居士於此大衆說是我子捨我他行經五十歲自見子來已二十年昔於某城而失是子周行求索遂來至此凡我所有舍宅人氏悉以付之恣其所用二十年者或約二乘自行即除糞二十年也或除糞之後方名為子則以轉教執作名二十年或約二乘之名為二十年二頌得付歡喜子念昔貧志意下劣今於父所大獲珍寶并及舍宅一切財物甚大歡喜得未曾有初頌立譬竟二頌法合三初頌合相失相見二頌合追誘三頌合領付家業今初佛亦如是知我樂小我樂小故與父相失佛知我故與子相見也二頌合追誘未曾說言汝等作佛而說我等得諸無漏成就小乘聲聞弟子初二句頌合追次四句頌合誘也三頌合領付家業二初頌合領家業二頌合付家業初中二初頌合受命領知二頌合心無希取今初佛敕我等說最上道修習此者當得成佛我承佛教為大菩薩以諸因緣種種譬喻若干言辭說無上道諸佛子等從我聞法日夜思惟精勤修習是時諸佛即授其記汝於來世當得作佛一切諸佛祕藏之法但為菩薩演其實事而不為我說斯真要合中具合體信委業今但頌合委業也最上道即摩訶般若二頌合心無希取此文則廣又為三初牒譬總明無希取二釋無希取意三結無希取今初如彼窮子得近其父雖知諸物心不希取我等雖說佛法寶藏自無志願亦復如是二釋無希取意我等內滅自謂為足唯了此事更無餘事我等若聞淨佛國土教化衆生都無欣樂所以者何一切諸法皆悉空寂無生無滅無大無小無漏無為如是思惟不生喜樂我等長夜於佛智慧無貪無著無復志願而自於法謂是究竟我等長夜修習空法得脫三界苦惱之患住最後身有餘涅槃佛所教化得道不虗則為已得報佛之恩初一偈由具小斷故不希大斷次一偈由具小智故不欣大智次二偈釋成小斷次一偈半釋成小智次偈半重釋小斷後一偈重釋小智也三結無希取我等雖為諸佛子等說菩薩法以求佛道而於是法永無願樂導師見捨觀我心故初不勸進說有實利由我無願樂故導師見捨乃由觀我心非是吝大法也初頌合領業竟二頌合付家業二初頌合付業二頌合歡喜今初先六句牒譬後六句正合如富長者知子志劣以方便力柔伏其心然後乃付一切財物佛亦如是現希有事知樂小者以方便力調伏其心乃教大智二頌合歡喜我等今日得未曾有非先所望而今自得如彼窮子得無量寶世尊我今得道得果於無漏法得清淨眼我等長夜持佛淨戒始於今日得其果報法王法中久修梵行今得無漏無上大果我等今者真是聲聞以佛道聲令一切聞我等今者真阿羅漢於諸世間天人魔梵普於其中應受供養得道者得實相道得果者分得無上菩提大乘習果無漏法者中道不漏二邊得清淨眼者分得佛眼此明開佛知見也淨戒成真實緣因故得妙報梵行成真實了因故得妙果所知所見即正因理性法身德也真是聲聞真阿羅漢者圓初住位一分真一切分真即是分證十界三德但就本位開顯故云聲聞阿羅漢也初長文重頌正陳得解竟次十三偈歎佛恩深世尊大恩以希有事憐愍教化利益我等無量億劫誰能報者手足供給頭頂禮敬一切供養皆不能報若以頂戴兩肩荷負於恆沙劫盡心恭敬又以美膳無量寶衣及諸臥具種種湯藥牛頭栴檀及諸珍寶以起塔廟寶衣布地如斯等事以用供養於恆沙劫亦不能報諸佛希有無量無邊不可思議大神通力無漏無為諸法之王能為下劣忍于斯事取相凡夫隨宜為說諸佛於法得最自在知諸衆生種種欲樂及其志力隨所堪任以無量喻而為說法隨諸衆生宿世善根又知成熟未成熟者種種籌量分別知已於一乘道隨宜說三世尊大恩者一佛始建慈悲拔六道苦與四聖樂普十法界入四弘中此如來室恩二如來行菩薩道示教利喜曾教我大乘雖復中忘智願不失蓋如來室清涼溫暖大慈與樂恩三衆生遭苦視父而已佛伺其宜如犢逐母備行六度以利衆生蓋如來室遮寒障熱大悲拔苦恩四佛成道已應受寂滅無為之樂而隱其神德用貧所樂法五戒十善冷水灑面令得醒悟蓋是佛衣遮貪欲熱恩五示老比丘像方便附近與一日價蓋是佛衣除見寒愛熱恩六過是已後心相體信彈訶貶斥令恥小慕大蓋是佛衣遮醜陋恩七命領家業金銀庫藏皆悉令知蓋是佛衣與我莊嚴恩八會親族定父子付以家業無上寶聚不求自得蓋如來座恩九十既坐座已身意泰然快得安隱以佛道聲令一切聞普于天人應受供養蓋如來座令我具足自行化他恩兩肩荷負等所不能報此之謂也牛頭栴檀者華嚴經云出離垢山若用塗身火不能燒此中十恩室三衣四座三當知室得衣故有覆育之恩室有座故成與拔之用座假衣室令自他行成衣假座室令初後理顯是故三義合成大恩正論荷恩難報不得直以亡報釋之二譬說周中第二明中根領解竟
