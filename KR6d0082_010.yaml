body:
  text: 古吳後學蕅益智旭述釋授記品竟次釋化城喻品化城喻品第七化者神力所為也以神力故無而倐有名之為化防非禦敵稱之為城譬二乘涅槃城權智所為也化以權智力無而說有用教為化防思禦見名為涅槃蘇息引入三藏蘇息二酥引法華入實未究竟化而言滅度城權假施設故言化城喻如前釋此因緣釋也若從機說無而倐見見已生喜即世界益得入蘇息即為人益防非禦敵即對治益而言滅度第一義益若從應說權立此城即世界化為生小善即為人化且除見思即對治化終引入大即第一義化約教者三藏於涅槃生安隱想生滅度想通教二乘與三藏同菩薩不爾釋論云如父過險一腳入城一腳門外憶其子故從城入險誓扶餘習入生死而不以空為證也別教不道城如化用城防險從城門徑過將城作方便斷見思惑不道此為極也圓教知無賊病亦不須城故言化城今是圓教意故題為化城喻品圓教言化者在昔斥奪但云不堪亦未曾云涅槃是化故至今教勤執開權方云是化乃至顯實化乃成真即寶處故故知藏通謂極非化別教非極非化圓教非極是化亦可是極是化亦可是極非化與藏通教言同意別言今是圓教意者亦從破計故且云化若開顯已無非真實本迹者若從機說應云本住三德之城迹入化城若從應說則迹示說化也觀心者觀因緣生法即空是入化城因緣即假是出化城因緣即中是歸寶處又觀空即中則了化非化即權而實又化城寶所通論六即心性本空無不空時理即化城也心性本中無不中時理即寶所也聞此理性能生信解為名字化城寶所圓伏五住為觀行化城寶所乃至究竟例此可知問此品說因緣事下根得悟應名宿世品答品初廣說因緣末則結譬化城若從初應稱宿世經家從末故言化城又上根疑薄但取道樹三七思惟以明機緣中根疑厚加以譬喻探取二萬億佛所教無上道以明機緣下根疑更厚故明宿世久遠機緣若從久遠之始則名宿世若從中間則言化城若從究竟則言寶所經家處中標品收得初後從此義便故言化城喻品正法華名往古品所以有此問答問化城是權寶所是實何意棄實從權答由知城是化則知寶所是實故標化不失實也三因緣說周二初正說因緣二授下根記其領解述成二意文或前後不定又領解或默念發言不同文少不足分品故皆入授記段中初正說因緣二初先明知見久遠二正明宿世因緣初中二初長文二重頌長文為三初出所見事二舉譬明久遠三結見昔如今今初佛告諸比丘乃往過去無量無邊不可思議阿僧祇劫爾時有佛名大通智勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其國名好城劫名大相諸比丘彼佛滅度已來甚大久遠二舉譬明久遠譬如三千大千世界所有地種假使有人磨以為墨過於東方千國土乃下一點大如微塵又過千國土復下一點如是展轉盡地種墨於汝等意云何是諸國土若算師若算師弟子能得邊際知其數不不也世尊諸比丘是人所經國土若點不點盡抹為塵一塵一劫彼佛滅度已來復過是數無量無邊百千萬億阿僧祇劫三結見昔如今我以如來知見力故觀彼久遠猶若今日此顯如來三達遠明所引往事分明不虗然後說宿緣也當知十世古今的確始終不離當念離此當念心性之外別無去來實法可得由無明故妄計遷滅于遷滅中有憶有忘就彼所憶有遠有近然所憶若遠若近之事並是現前一念所變相分非于心外別有他物也且如吾人追憶十年二十年事亦復宛在目前便可例知心性本來豎徹三世三世不出現前一念但由無明不能遠見佛既無明斷盡心性洞朗故豎極三際之始終橫極法界之邊際炳然知見何足致疑長文竟二重頌三初頌所見事二頌舉譬明久遠三頌見昔如今今初爾時世尊欲重宣此義而說偈言我念過去世無量無邊劫有佛兩足尊名大通智勝二頌舉譬明久遠如人以力磨三千大千土盡此諸地種皆悉以為墨過於千國土乃下一塵點如是展轉點盡此諸塵墨如是諸國土點與不點等復盡抹為塵一塵為一劫此諸微塵數其劫復過是彼佛滅度來如是無量劫三頌見昔如今如來無礙智知彼佛滅度及聲聞菩薩如見今滅度諸比丘當知佛智淨微妙無漏無所礙通達無量劫即空故淨即假故微即中故妙又三智一心故淨一心三智故微非一非三而三而一故妙體圓滿故無漏用通達周遍故無所礙初先明知見久遠竟二正明宿世因緣二初廣述二重頌初中二初結緣之由二正結緣初又二初遠由二近由初又二初明大通智勝成佛二明十方梵王請法初又五初佛壽長遠二成道前事三正明成道四明成道後眷屬供養五請轉法輪今初佛告諸比丘大通智勝佛壽五百四十萬億那由他劫二成道前事其佛本坐道場破魔軍已垂得阿耨多羅三藐三菩提而諸佛法不現在前如是一小劫乃至十小劫結加趺坐身心不動而諸佛法猶不現前諸佛道同為緣事異釋迦苦行六年彌勒即日得道彼佛十劫猶不現前非根有利鈍道有難易也但緣宜賖促應示長短耳一切八相垂迹之處皆先破魔準說法華亦應先漸復云破魔似同穢土若準壽長復非穢土故知同居淨穢其相蓋多成道等事不必全同此土三藏爾時佛未坐道場前忉利諸天先為彼佛於菩提樹下敷師子座高一由旬咸作是念佛於此坐當得阿耨多羅三藐三菩提逮佛適坐此座時諸梵天王雨衆天華面百由旬香風時來吹去萎華更雨新者如是不絶滿十小劫供養於佛乃至滅度常雨此華四王諸天為供養佛常擊天鼓其餘諸天作天伎樂滿十小劫至於滅度亦復如是二正明成道諸比丘大通智勝佛過十小劫諸佛之法乃現在前成阿耨多羅三藐三菩提四明成道後眷屬供養其佛未出家時有十六子其第一者名曰智積諸子各有種種珍異玩好之具聞父得成阿耨多羅三藐三菩提皆捨所珍往詣佛所諸母涕泣而隨送之其祖轉輪聖王與一百大臣及餘百千萬億人民皆共圍繞隨至道場咸欲親近大通智勝如來供養恭敬尊重讚歎到已頭面禮足繞佛畢已一心合掌瞻仰世尊以偈頌曰大威德世尊為度衆生故於無量億歲爾乃得成佛諸願已具足善哉吉無上世尊甚希有一坐十小劫身體及手足靜然安不動其心常憺怕未曾有散亂究竟永寂滅安住無漏法今者見世尊安隱成佛道我等得善利稱慶大歡喜衆生常苦惱盲瞑無導師不識苦盡道不知求解脫長夜增惡趣減損諸天衆從冥入於冥永不聞佛名今佛得最上安隱無漏道我等及天人為得最大利是故咸稽首歸命無上尊十六王子若約表法即自行化他八正道也五請轉法輪爾時十六王子偈讚佛已勸請世尊轉於法輪咸作是言世尊說法多所安隱憐愍饒益諸天人民重說偈言世雄無等倫百福自莊嚴得無上智慧願為世間說度脫於我等及諸衆生類為分別顯示令得是智慧若我等得佛衆生亦復然世尊知衆生深心之所念亦知所行道又知智慧力欲樂及修福宿命所行業世尊悉知已當轉無上輪既云令得是智慧又云若我等得佛又結云當轉無上輪當知即是請滿字教如今佛華嚴也初明大通智勝成佛竟二明十方梵王請法二初威光照動二梵王來請今初佛告諸比丘大通智勝佛得阿耨多羅三藐三菩提時十方各五百萬億諸佛世界六種震動其國中間幽冥之處日月威光所不能照而皆大明其中衆生各得相見咸作是言此中云何忽生衆生又其國界諸天宮殿乃至梵宮六種震動大光普照遍滿世界勝諸天光佛降神時初生時成道時法爾世界震動大光普照但有緣者遠在他方亦覺無緣者近亦不知耳觀心釋忽生衆生者心性本淨陰入界覆之則暗若修觀慧本性理顯又兩山是二諦其間是中道日月光是二智佛光是中道無分別智光照本有三諦洞明也二梵王來請五初東方二東南方三南方四總舉餘六方五上方初東方六初覩瑞驚駭二互相問決三尋光見佛四三業供養五請轉法輪六如來默許今初爾時東方五百萬億諸國土中梵天宮殿光明照曜倍於常明諸梵天王各作是念今者宮殿光明昔所未有以何因緣而現此相二互相問決是時諸梵天王即各相詣共議此事時彼衆中有一大梵天王名救一切為諸梵衆而說偈言我等諸宮殿光明昔未有此是何因緣宜各共求之為大德天生為佛出世間而此大光明遍照於十方三尋光見佛爾時五百萬億國土諸梵天王與宮殿俱各以衣裓盛諸天華共詣西方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪四三業供養即時諸梵天王頭面禮佛繞百千匝即以天華而散佛上其所散華如須彌山并以供養佛菩提樹其菩提樹高十由旬華供養已各以宮殿奉上彼佛而作是言惟見哀愍饒益我等所獻宮殿願垂納處時諸梵天王即於佛前一心同聲以偈頌曰世尊甚希有難可得值遇具無量功德能救護一切天人之大師哀愍於世間十方諸衆生普皆蒙饒益我等所從來五百萬億國捨深禪定樂為供養佛故我等先世福宮殿甚嚴飾今以奉世尊惟願哀納受問梵天雨華如須彌山樹座猶下其相如何答不思議事彼此不礙五請轉法輪爾時諸梵天王偈讚佛已各作是言惟願世尊轉於法轉度脫衆生開涅槃道時諸梵天王一心同聲而說偈言世雄兩足尊惟願演說法以大慈悲力度苦惱衆生既云度苦衆生即是請半字教如今鹿苑六如來默許爾時大通智勝如來默然許之諸佛受請之儀法爾皆是默許隨順先佛規則故生人尊重渴仰故不同凡夫外道故能令目擊道存故初東方竟二東南方六初覩瑞驚駭至六如來默許今初又諸比丘東南方五百萬億國土諸大梵王各自見宮殿光明照曜昔所未有歡喜踊躍生希有心二互相問決即各相詣共議此事時彼衆中有一大梵天王名曰大悲為諸梵衆而說偈言是事何因緣而現如此相我等諸宮殿光明昔未有為大德天生為佛出世間未曾見此相當共一心求過千萬億土尋光共推之多是佛出世度脫苦衆生三尋光見佛爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣西北方推尋是相見大通智勝如來處於道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪四三業供養時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言惟見哀愍饒益我等所獻宮殿願垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰聖主天中王迦陵頻伽聲哀愍衆生者我等今敬禮世尊甚希有久遠乃一現一百八十劫空過無有佛三惡道充滿諸天衆減少今佛出於世為衆生作眼世間所歸趣救護於一切為衆生之父哀愍饒益者我等宿福慶今得值世尊五請轉法輪爾時諸梵天王偈讚佛已各作是言惟願世尊哀愍一切轉於法輪度脫衆生時諸梵天王一心同聲而說偈言大聖轉法輪顯示諸法相度苦惱衆生令得大歡喜衆生聞此法得道若生天諸惡道減少忍善者增益此亦同前請半字教也六如來默許爾時大通智勝如來默然許之二東南方竟三南方六初覩瑞驚駭至六如來默許今初又諸比丘南方五百萬億國土諸大梵王各自見宮殿光明照曜昔所未有歡喜踊躍生希有心二互相問決即各相詣共議此事以何因緣我等宮殿有此光曜而彼衆中有一大梵天王名曰妙法為諸梵衆而說偈言我等諸宮殿光明甚威曜此非無因緣是相宜求之過於百千劫未曾見是相為大德天生為佛出世間三尋光見佛爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣北方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪四三業供養時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言惟見哀愍饒益我等所獻宮殿願垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰世尊甚難見破諸煩惱者過百三十劫今乃得一見諸饑渴衆生以法雨充滿昔所未曾覩無量智慧者如優曇鉢華今日乃值遇我等諸宮殿蒙光故嚴飾世尊大慈愍惟願垂納受五請轉法輪爾時諸梵天王偈讚佛已各作是言惟願世尊轉於法輪令一切世間諸天魔梵沙門婆羅門皆獲安隱而得度脫時諸梵天王一心同聲以偈頌曰惟願天人尊轉無上法輪擊于大法鼓而吹大法螺普雨大法雨度無量衆生我等咸歸請當演深遠音既云無上法輪又云大法鼓大法螺即是請對半明滿之教如今方等也六如來默許爾時大通智勝如來默然許之三南方竟四總舉餘六方西南方乃至下方亦復如是列十方梵正法華中先四方次四維次上下並是隨譯者意未知梵本次第如何五上方五初覩瑞驚駭至五請轉法輪十方請竟世尊即說故無默許也今初爾時上方五百萬億國土諸大梵王皆悉自覩所止宮殿光明威曜昔所未有歡喜踊躍生希有心二互相問決即各相詣共議此事以何因緣我等宮殿有斯光明時彼衆中有一大梵天王名曰尸棄為諸梵衆而說偈言今以何因緣我等諸宮殿威德光明曜嚴飾未曾有如是之妙相昔所未聞見為大德天生為佛出世間三尋光見佛爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣下方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪四三業供養時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言惟見哀愍饒益我等所獻宮殿願垂納處時諸梵天王即於佛前一心同聲以偈頌曰善哉見諸佛救世之聖尊能於三界獄勉出諸衆生普智天人尊哀愍群萌類能開甘露門廣度於一切於昔無量劫空過無有佛世尊未出時十方常暗瞑三惡道增長阿修羅亦盛諸天衆轉減死多墮惡道不從佛聞法常行不善事色力及智慧斯等皆減少罪業因緣故失樂及樂想住於邪見法不識善儀則不蒙佛所化常墮於惡道佛為世間眼久遠時乃出哀愍諸衆生故現於世間超出成正覺我等甚欣慶及餘一切衆喜歎未曾有我等諸宮殿蒙光故嚴飾今以奉世尊惟垂哀納受願以此功德普及於一切我等與衆生皆共成佛道前東南方云百八十劫空過無佛南方云百三十劫乃得一見今云于昔無量劫空過無有佛機緣不同見佛奢促若此蒙光並集豈偶然哉以古例今理無二致一見一聞咸從感應聞法之士宜何如作欣幸難遭想也五請轉法輪爾時五百萬億諸梵天王偈讚佛已各白佛言惟願世尊轉於法輪多所安隱多所度脫時諸梵天王而說偈言世尊轉法輪擊甘露法鼓度苦惱衆生開示涅槃道惟願受我請以大微妙音哀愍而敷演無量劫習法既云以大微妙音敷演無量劫習法又云度苦衆生等即是請帶半明滿之教如今般若也然佛法道同不應偏請如今佛自始至終具轉五味法輪一一皆是酬梵王請彼亦應然今寄文便十六王子初請華嚴乃至上方請于般若十六王子後請法華節目宛然今古一致也初明結緣遠由竟二近由由佛受請說法故得覆講結緣也文為二初轉半字法輪二轉廢半明滿法輪初中三初受請二正轉三聞法得道今初爾時大通智勝如來受十方諸梵天王及十六王子請二正轉此中應說三乘如序品文而今不說者正為下根論結緣開顯等略不言六度耳又彼佛成道亦必演大華嚴以非結緣正由故略不說就文為二初明四諦二明十二因緣今初即時三轉十二行法輪若沙門婆羅門若天魔梵及餘世間所不能轉謂是苦是苦集是苦滅是苦滅道三轉者一示轉二勸轉三證轉也示轉者謂此是苦三界二十五有果報皆是生死苦法樂是壞苦苦是苦苦不苦不樂是行苦真實是苦不可令樂此是苦集三界見思煩惱及有漏善不善不動三業的是招苦之因更無異因此是苦滅謂見思滅故有漏滅有漏滅故生死滅惟有此處寂靜安隱更無餘處此是苦滅道因戒生定因定發慧依四念處具足三十七品入三脫門乃為滅苦之道更無餘道也勸轉者謂此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修也證轉者謂此是苦我已知不復更知此是集我已斷不復更斷此是滅我已證不復更證此是道我已修不復更修也何故三轉諸佛說法法至于三為衆生有三根故為生聞思修三慧故為生見修無學三道故十二行者一約教二約行約教者即示勸證是也三四十二約行者三轉皆生眼智明覺謂苦法忍為眼苦法智為智苦類忍為明苦類智為覺餘三諦亦爾故成十六心三根人各得十六心故成四十八行且約一諦名十二行也十二諦是教法輪十二行是行法輪教十二為能轉行十二為所轉教輪則能轉唯是一權智所轉有十二教也若行法輪能轉之教有十二所轉之行亦十二或通三人或約一人今就見諦道三乘利根聞示轉即各生眼智明覺三人合舉故言十二行也輪者轉也將佛心中所悟法門度入彼心故言輪也又輪者摧碾也衆生聞教起行摧破諸惑故名輪也沙門不聞尚不能知何況能轉支佛雖悟口不能說婆羅門雖聞其名不解其理天魔梵等亦爾故云所不能轉也然此四諦義通大小及以偏圓所謂生滅無生無量無作隨智所解各各不同略如玄義中明華嚴經有四聖諦品文殊承佛力所宣豈可判作但聲聞法二明十二因緣及廣說十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅及廣說者十二因緣還是別相說于四諦故也無明行愛取有五支還是集諦其養七支還是苦諦無明滅則行滅乃至老死滅還是滅諦觀因緣智即是道諦故云及廣說也此十二法亦通大小偏圓所謂思議生滅思議不生滅不思議生滅不思議不生滅略如玄義中明華嚴經六地菩薩十種觀察十二因緣成就般若無分別智豈可判作但辟支法今且依唯識稍示思議生滅之相一無明者謂發業無明即是異熟果愚不可善惡定有果報及真實義愚不了三界是苦空故能發正招生死之業雖瞋慢等皆能發業無明是主故偏說之二行者即彼無明所發善惡不動三種有漏之業能感將來真異熟果此二共名能引支也二識者由無明行為能引故所引將來總報種子四名色者由有總報識種子故即具將來初受生時歌邏羅等種子受想行識四陰為名色陰為色五六入者既有識名色種即具將來六處種子謂眼耳鼻舌身意六觸者既有識名色六入種即具將來六根觸境之時觸心所種七受者既有識名色六入觸種即具將來領納違順等境三受心所種子此五皆名為所引支以無明不發引業則已既發引業法爾即引此五種子不失不壞故名為所引支也八愛者謂由無明與行既引將來識等五種得成就已復由迷事無明不了境虗妄于所受而生貪愛雖于逆境亦起瞋等而愛習如水最能潤生故偏說之九取者謂由愛故種種追求所愛境界深生染著十有者謂由愛取所起業力數數滋潤識等五支之種子故種子被潤而生有芽定感將來異熟果報此三共名能生支也十一生者謂後有之芽既已成就捨此生已即受彼生十二老死者謂既生已漸漸衰變名之為老終歸無常名之為死此二皆名所生支也前十是因同約現在後二是果別約未來由前世十支感得今世生死由今世十支復感後世生死三世因果輪回不絶故名十二因緣生相即苦集二諦而廣說之者也若厭老死知老死由生故有次即厭生知生由有知有由取知取由愛愛由于受受由于觸觸由六入六入由于名色名色由識識由于行行由無明無明止是妄想顛倒故有更無所由正念觀察不愚于異熟果深信為惡得殃為善得樂不愚于真實義深信三界內是苦出三界是樂是名觀因緣智以是智故無明則滅無明滅則行滅乃至老死憂悲苦惱皆滅故名十二因緣滅相即道滅二諦而廣說之者也料簡十二支義更有多門非此所急故不備録分段生死既爾變易生死亦有緣生緣滅之相分段十二即思議生滅也若達即空即思議不生滅也變易十二即不思議生滅也若達即中即不思議不生滅也又復若悟不思議不生滅者則分段十二亦即不思議不生滅也故曰惑即般若業即解脫苦即法身當處清淨當處自在當處究竟一清淨一切清淨一自在一切自在一究竟一切究竟二正轉竟三聞法得道佛於天人大衆之中說是法時六百萬億那由他人以不受一切法故而於諸漏心得解脫皆得深妙禪定三明六通具八解脫第二第三第四說法時千萬億恆河沙那由他等衆生亦以不受一切法故而於諸漏心得解脫從是已後諸聲聞衆無量無邊不可稱數不受一切法者即不受四見證初果也於諸漏心得解脫者即脫盡見思諸縛證無學也深妙禪定者觀練熏修諸禪即俱解脫也問四諦十二因緣既通四教亦有證大者不答例如釋迦初說三歸五戒尚有八萬諸天悟無生忍佛佛道同彼安得無今文意在略敘結緣之由何暇廣述往古祕密不定等益初轉半字法輪竟二轉廢半明滿法輪七初諸子出家二請法三所將亦出家四佛受請五時衆有解不解六時節七說已入定今初爾時十六王子皆以童子出家而為沙彌諸根通利智慧明了已曾供養百千萬億諸佛淨修梵行求阿耨多羅三藐三菩提諸根通利即六根清淨也又六根互用曰通證佛境界曰利智慧明了即開示悟入也初約相似位釋次約分證位釋二請法俱白佛言世尊是諸無量千萬億大德聲聞皆已成就世尊亦當為我等說阿耨多羅三藐三菩提法我等聞已皆共修學世尊我等志願如來知見深心所念佛自證知彼佛初說圓頓諸子大乘功德悉已具足愍諸方便重請佛開權顯實也聲聞皆已成就者明其障除機動是故為請我等志願如來知見者此法華經但明佛之知見唯志於此即正請滿字廢半之文也三所將亦出家爾時轉輪聖王所將衆中八萬億人見十六王子出家亦求出家王即聽許四佛受請爾時彼佛受沙彌請過二萬劫已乃於四衆之中說是大乘經名妙法蓮華教菩薩法佛所護念說是經已十六沙彌為阿耨多羅三藐三菩提故皆共受持諷誦通利過二萬劫者上施三既久不容中間無事望下頌意二萬劫中必說方等般若頌云說六波羅蜜及諸神通事般若是行神通是事諸方等經多明不可思議事行也頌中又云分別真實法即是大品明實相般若意也五時衆有解不解說是經時十六菩薩沙彌皆悉信受聲聞衆中亦有信解其餘衆生千萬億種皆生疑惑信受則能弘通信解則能入實疑惑不解千萬億衆即與十六子結法華緣者也問自佛受請以來已過二萬劫矣何故十六王子猶不進具而稱沙彌既是沙彌云何復稱菩薩答十六子本是菩薩急于學大乘故無暇進具始終現童子身也沙彌得受菩薩大戒自是諸佛常規何足致疑雖受大戒位仍沙彌未嘗僭越比丘以亂住持僧寶之體例如文殊大聖一切行坐皆讓摩訶迦葉經有明文人自不察耳問千萬億衆既不能解何不令如五千退席何不移置他方佛土乃令生疑惑耶答生疑亦得作結緣衆故不遣也若生謗墮苦乃須遣耳即今佛說法華時安保無生疑者六時節佛說是經於八千劫未曾休廢問相傳釋迦說法華經僅得八載已自難信謂開權顯實開迹顯本要言不煩故也彼佛于八千劫未曾休廢不知所說云何答只此開權顯實四字假使恆河沙劫說亦不盡何況僅八千劫僅八年耶且如諸法實相數語義理浩然該徹百界千如性修因果橫豎三法罄無不盡便可窮未來際而演說之何況開迹顯本具明曠劫不思議事耶又如地涌菩薩以諸菩薩種種讚法而讚於佛便經五十小劫諸佛出廣長舌現神力時便即滿百千歲奈何以凡夫心欲測如來無上甚深微妙法耶七說已入定說是經已即入靜室住於禪定八萬四千劫此正是結緣之近由由佛入定諸疑惑衆無處咨問十六王子為不解者覆講說經也文中明入定處所即是靜室正入定即是住於禪定入定時節即是八萬四千劫然諸佛無不定心寧有出入秖因時衆機緣在十六子結緣齊限應爾許時耳初結緣之由竟二正結緣二初法說結緣二譬說結緣初中三初明昔共結緣二明中間更相值遇三明今日還說法華初中二初覆講利生二佛起稱歎今初是時十六菩薩沙彌知佛入室寂然禪定各升法座亦於八萬四千劫為四部衆廣說分別妙法華經一一皆度六百萬億那由他恆河沙等衆生示教利喜令發阿耨多羅三藐三菩提心沙彌升座不惟十六菩薩為然只今毗尼藏中亦有明文重在解而不在年也令發大菩提心即名為度誓願當作佛已過于世間即是度七方便彼岸義也二佛起稱歎二初正稱歎二勸親信今初大通智勝佛過八萬四千劫已從三昧起往詣法座安詳而坐普告大衆是十六菩薩沙彌甚為希有諸根通利智慧明了已曾供養無量千萬億數諸佛於諸佛所常修梵行受持佛智開示衆生令入其中二勸親信汝等皆當數數親近而供養之所以者何若聲聞辟支佛及諸菩薩能信是十六菩薩所說經法受持不毀者皆當得阿耨多羅三藐三菩提如來之慧此昔佛普懸授記之文也初明昔共結緣竟二明中間更相值遇佛告諸比丘是十六菩薩常樂說是妙法蓮華經一一菩薩所化六百萬億那由他恆河沙等衆生世世所生與菩薩俱從其聞法悉皆信解以此因緣得值四萬億諸佛世尊于今不盡值遇有三種一者從初常受大乘中間皆已成就不至于今二者初受大中遇退大仍接以小此則中間猶故未盡今得還聞大教三者但論遇小不論遇大或初雖受大退後無機則中間未度于今亦不盡乃至滅後得道者是也此人即以初聞小時為初結緣復于中間唯習于小今遇王子初且聞小人見釋迦一代教中一分聲聞未發心者便即判云永滅不發是則不知如來長遠之化問如上塵數多劫今始得阿羅漢當知無生法忍何易可階答一云大聖善巧依四悉檀作如是說或說佛道長遠或說佛道易得或隨世間所欲或為發生宿善或對治厭道長者說短於道生輕易想者說長或為聞說長短即得入第一義當知言如許劫方今得羅漢者乃是權行四悉檀引諸實行令入道耳又理無長短長短在機但須不篤自勤何須論他時長時短三明今日還說法華二初先結會古今二正明還說法華初中二初結師之古今二會弟子古今今初諸比丘我今語汝彼佛弟子十六沙彌今皆得阿耨多羅三藐三菩提於十方國土現在說法有無量百千萬億菩薩聲聞以為眷屬其二沙彌東方作佛一名阿閦在歡喜國二名須彌頂東南方二佛一名師子音二名師子相南方二佛一名虗空住二名常滅西南方二佛一名帝相二名梵相西方二佛一名阿彌陀二名度一切世間苦惱西北方二佛一名多摩羅跋旃檀香神通二名須彌相北方二佛一名雲自在二名雲自在王東北方佛名壞一切世間怖畏第十六我釋迦牟尼佛於娑婆國土成阿耨多羅三藐三菩提十六沙彌是古八方作佛是今也阿閦此云無動二會弟子古今四初明本結大緣二釋今住聲聞疑三正結會古今四釋未來弟子疑今初諸比丘我等為沙彌時各各教化無量百千萬億恆河沙等衆生從我聞法為阿耨多羅三藐三菩提此明初聞法時皆為無上菩提所謂三乘初心不愚于法也但此後有退不退致使得脫前後差別耳二釋今住聲聞疑此諸衆生于今有住聲聞地者我常教化阿耨多羅三藐三菩提是諸人等應以是法漸入佛道所以者何如來智慧難信難解先明此諸衆生大通佛時從我聞法便為無上菩提何故直至于今猶有尚住聲聞地者釋曰我常教化之以無上菩提但由是諸人等應以是權小法漸入佛道故也又有疑曰何故是人應以是法漸入釋曰良以如來智慧難信難解故也三正結會古今爾時所化無量恆河沙等衆生者汝等諸比丘及我滅度後未來世中聲聞弟子是也汝等諸比丘即結會于今有住聲聞地者之古今也及我滅度後聲聞弟子即結會於今不盡之古今也四釋未來弟子疑我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想當入涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度更無餘乘除諸如來方便說法疑者云現在聲聞得聞佛說法華開顯悟入可是結緣之流未來者不聞法華而入滅度豈能捨小而入一乘釋云彼雖生涅槃想仍生方便有餘土中受變易身我于彼土仍必為說是經必令入一乘道更無餘乘也除諸如來方便說法正斷疑也三是方便假說其實決無三也初先結會古今竟二正明還說法華二初明應時故說二釋前開三意今初諸比丘若如來自知涅槃時到衆又清淨信解堅固了達空法深入禪定便集諸菩薩及聲聞衆為說是經世間無有二乘而得滅度唯一佛乘得滅度耳涅槃時到者諸佛出世化道將畢時也如迦葉佛日月燈明佛等說此經竟即入涅槃釋迦亦于此經唱滅不久故此經為最後極唱也衆清淨即斷德成就信是四不壞信解是無漏正解了達空法是證于真諦皆即智德成就智斷既立又復深入禪定具二解脫堪聞大教能信受也又衆清淨者得三藏教益免火宅難也信解堅固者得方等教益心相體信也了達空法者得般若教益能轉教人也集諸菩薩是會親族也及聲聞衆是命其子也假使涅槃時到而衆不清淨亦不能說此經如多寶如來以現世無機緣故不得說法華經所以留全身塔誓于滅後處處作證也二釋前開三意比丘當知如來方便深入衆生之性知其志樂小法深著五欲為是等故說於涅槃是人若聞則便信受若實無二乘得滅度者何故如來前說權教釋云如來深知衆生有小性欲著干五塵弊于五濁故先說三令破濁免難後說一也初法說結緣竟二譬說結緣二初立譬二法合初中二初導師譬二將導譬今初譬如五百由旬險難惡道曠絶無人怖畏之處若有多衆欲過此道至珍寶處有一導師聰慧明達善知險道通塞之相五百由旬者若約果報則同居分段處為三百方便變易處為四百實報變易處為五百若約煩惱則三界見思為三百塵沙為四百無明為五百入空觀能過三百入假觀能過四百入中觀能過五百也險難惡道譬生死因果分段變易即果險難見思五住即因險難由此因果故言惡道也道有二種一雖曠絶有人可依二者曠絶無人可依譬生死中有涅槃煩惱中有菩提則雖曠絶有人可依若生死煩惱無涅槃菩提藥中無病病中無藥則曠絶無人怖畏處也別圓二教非曠有人通教二乘曠而有人三藏二乘曠而無人故為此人設化若有多衆者譬王子所化未脫之衆也欲過此道至珍寶處者譬發心為求無上菩提也有一導師者譬第十六王子也耳清淨曰聰意清淨曰慧眼清淨曰明餘根清淨曰達總而言之即六根清淨也又慧即一心三智明即具足五眼又三明為明十力為達善知險道通塞之相者雖是險道有塞有通具方便者即塞成通乏善巧者即通成塞資糧器械膽識勇力皆須具足前路水草皆須諳識也二將導譬三初所將人衆譬二中路懈退譬三滅化引至寶所譬今初將導衆人欲過此難譬本結緣未得脫者本緣不失而為導師所將也二中路懈退譬又二初退大二接小今初所將人衆中路懈退白導師言我等疲極而復怖畏不能復進前路猶遠今欲退還中路非半途也但以發心為始至佛為終此兩楹間而起退意故名中路白導師者大機已退小機可生以此冥感法身慈悲義如白也疲極者譬善根微弱無明所翳也怖畏者譬憚惡生死也前路猶遠者譬三惑難斷也由乏大乘勇力故疲極由乏大乘膽識及資糧器械故怖畏由不諳識前路水草故云前路猶遠二接小二初方便設化二歡喜前入今初導師多諸方便而作是念此等可愍云何捨大珍寶而欲退還作是念已以方便力於險道中過三百由旬化作一城告衆人言汝等勿怖莫得退還今此大城可於中止隨意所作若入是城快得安隱若能前至寶所亦可得去多諸方便譬如來權智能擬宜也此等可愍知其無大機也化作一城知其可小接也汝等勿怖莫得退還即是勸令前進譬勸轉也今此大城可於中止隨意所作即是示城可住譬示轉也若入是城快得安隱即是讚城功德譬證轉也若能前至寶所亦可得去者今佛未開顯前不得彰灼而有此語若論密聞則便不妨若論宿世應有是言何者王子既知彼等退意即教化云汝等若畏生死且取涅槃消息然後更行大道亦可隨意也又開權顯實後即得說之如涅槃經中諸取羅漢者皆是其義二歡喜前入是時疲極之衆心大歡喜歎未曾有我等今者免斯惡道快得安隱於是衆人前入化城生已度想生安隱想大歡喜譬聞慧歎未曾有譬暖位免惡道譬頂位快安隱譬忍位前入化城譬見諦位已度想譬得盡智安隱想譬得無生智又已度想譬具智德安隱想譬證斷德也二中路懈退譬竟三滅化引至寶所譬爾時導師知此人衆既得止息無復疲倦即滅化城語衆人言汝等去來寶處在近向者大城我所化作為止息耳既得止息譬免難無復疲倦譬大乘機發寶處在近譬顯實大城化作譬廢權也寶所有二義若約究竟則以極果為寶所如上文云唯佛與佛乃能究盡諸法實相也若約分入即以初發心住為寶所如上文云無上寶聚不求自得又云得佛法分如佛子所應得者皆已得之也問凡五處開三顯一為有何異答通論無異別論有差方便品約教開三顯一文云如來但以一佛乘故為衆生說法無有餘乘若二若三也火宅約行門三顯一車是運義運則譬行文云各乘大車遊于四方嬉戲快樂也信解約人開三顯一結會作人即長者子文云我等昔來真是佛子也藥草約差別無差別明權實不的去取但衆生不知佛令其知若知七種差別即知權同依一理無差別即知實差而無差無差而差令知此意耳終不說言無一有一此約自行權實二智隨自意語故佛能知而衆生不知也亦是通前通後知不知明權實也今化城正約理開三顯一寶所化城是大小兩理破除二乘權理顯如來真實一理也下文五百領解舉衣珠為譬亦是約理也此隨文相一往而說仍一一文並具四一並是如來能知衆生不知知即開佛知見矣初立譬竟二法合二初正合二舉譬帖合初中二初合導師譬二合將導譬今初諸比丘如來亦復如是今為汝等作大導師知諸生死煩惱惡道險難長遠應去應度如來合導師也汝等合多衆也生死合果險難煩惱合因險難也長遠合五百由旬也應去應度合善知通塞之相亦合欲至寶處也二合將導譬若衆生但聞一佛乘者則不欲見佛不欲親近便作是念佛道長遠久受勤苦乃可得成佛知是心怯弱下劣以方便力而於中道為止息故說二涅槃若衆生住於二地如來爾時即便為說汝等所作未辦汝所住地近於佛慧當觀察籌量所得涅槃非真實也但是如來方便之力於一佛乘分別說三若衆生三字合所將人衆譬也但聞一佛乘至乃可得成合中路懈退譬也佛知是心至說二涅槃合化作一城譬也已出同居未到實報兩楹之間名為中道有餘無餘名二涅槃亦是聲聞緣覺二人所證名二涅槃也若衆生住於二地以下合滅化引至寶所譬也初正合竟二舉譬帖合如彼導師為止息故化作大城既知息已而告之言寶處在近此城非實我化作耳化作大城帖合施三寶處在近帖合顯一初廣述竟二重頌二初頌結緣之由二頌正結緣初中二初頌遠由二頌近由初又二初頌大通智勝成佛二頌十方梵王請法今初爾時世尊欲重宣此義而說偈言大通智勝佛十劫坐道場佛法不現前不得成佛道諸天神龍王阿修羅等衆常雨於天華以供養彼佛諸天擊天鼓并作衆伎樂香風吹萎華更雨新好者過十小劫已乃得成佛道諸天及世人心皆懷踊躍彼佛十六子皆與其眷屬千萬億圍繞俱行至佛所頭面禮佛足而請轉法輪聖師子法雨充我及一切初三偈頌第二成道前事次一偈頌第三正明成道後二偈頌第五請轉法輪兼第四眷屬供養略不頌第一佛壽長遠也二頌十方梵王請法二初頌威光照動二頌梵王來請今初世尊甚難值久遠時一現為覺悟群生震動於一切二頌梵王來請東方諸世界五百萬億國梵宮殿光曜昔所未曾有諸梵見此相尋來至佛所散華以供養并奉上宮殿請佛轉法輪以偈而讚歎佛知時未至受請默然坐三方及四維上下亦復爾散華奉宮殿請佛轉法輪世尊甚難值願以本慈悲廣開甘露門轉無上法輪前三偈頌東方後二偈總頌九方也初頌遠由竟二頌近由二初頌轉半字法輪二頌轉廢半明滿法輪今初無量慧世尊受彼衆人請為宣種種法四諦十二緣無明至老死皆從生緣有如是衆過患汝等應當知宣暢是法時六百萬億姟得盡諸苦際皆成阿羅漢第二說法時千萬恆沙衆於諸法不受亦得阿羅漢從是後得道其數無有量萬億劫算數不能得其邊初半偈頌受請次偈半頌正轉後三偈頌聞法得道言無明至老死皆從生緣有者謂此有故彼有即指無明為行之生緣行為識之生緣乃至生為老死之生緣也知其過患則當用觀智力滅彼無明此滅故彼滅矣二頌轉廢半明滿法輪時十六王子出家作沙彌皆共請彼佛演說大乘法我等及營從皆當成佛道願得如世尊慧眼第一淨佛知童子心宿世之所行以無量因緣種種諸譬喻說六波羅蜜及諸神通事分別真實法菩薩所行道說是法華經如恆河沙偈彼佛說經已靜室入禪定一心一處坐八萬四千劫初二句頌第一諸子出家次六句頌第二請法略不頌第三所將亦出家但以營從二字該之佛知下二偈頌第四受請中二萬劫先說方等般若次二句頌受請正說法華略不頌第五有解不解及第六時節後一偈頌第七說已入定也初頌結緣之由竟二頌正結緣二初頌法說二頌譬說初中三初頌昔共結緣二頌中間更相值遇三頌今日還說法華今初是諸沙彌等知佛禪未出為無量億衆說佛無上慧各各坐法座說是大乘經於佛宴寂後宣揚助法化一一沙彌等所度諸衆生有六百萬億恆河沙等衆二頌中間更相值遇彼佛滅度後是諸聞法者在在諸佛土常與師俱生三頌今日還說法華二初頌結會古今二頌正明還說法華今初是十六沙彌具足行佛道今現在十方各得成正覺爾時聞法者各在諸佛所其有住聲聞漸教以佛道我在十六數曾亦為汝說是故以方便引汝趣佛慧初一偈頌結師之古今次二偈但頌會現在弟子古今略不頌未來弟子也二頌正明還說法華以是本因緣今說法華經令汝入佛道慎勿懷驚懼但頌應時故說略不頌釋開三意初頌法說竟二頌譬說二初頌立譬二頌法合初中二初頌導師譬二頌將導譬今初譬如險惡道逈絶多毒獸又復無水草人所怖畏處無數千萬衆欲過此險道其路甚曠遠經五百由旬時有一導師強識有智慧明了心決定在險濟衆難長文云曠絶無人今頌云逈絶多毒獸人譬菩提涅槃獸譬煩惱生死獸多且毒正以小機見思惑重五濁障深不得行大直道也水譬禪定草譬智慧強識二句頌聰慧明達在險一句頌善知險道通塞之相餘可知二頌將導譬二初頌所將人衆中路懈退二頌滅化引至寶所初中二初頌衆人退大二頌導師接小今初衆人皆疲倦而白導師言我等今頓乏於此欲退還二頌導師接小又二初頌方便設化二頌歡喜前入今初導師作是念此輩甚可愍如何欲退還而失大珍寶尋時思方便當設神通力化作大城郭莊嚴諸舍宅周匝有園林渠流及浴池重門高樓閣男女皆充滿即作是化已慰衆言勿懼汝等入此城各可隨所樂內曰城外曰郭譬有餘無餘二涅槃也舍譬二乘生緣慈悲宅譬二乘生空智境園林譬二乘總持無漏法林渠流譬九次第定浴池譬八解脫重門譬空無相無願三三昧門亦譬二乘重空三昧謂生空法空乃至無願亦無願也與大乘二空不同高樓閣譬盡智無生智逈出三界也男譬智慧女譬禪定觀心釋者智體周備如城善法圓足如郭畢竟空為舍宅性具萬行為園林九種大禪為渠流浴池生法二空為重門一心三智為高樓閣直善能成自行如男幹家慈悲能外化他如女外適觀心釋化亦通四教今須約圓二頌歡喜前入諸人既入城心皆大歡喜皆生安隱想自謂已得度初頌所將人衆中路懈退竟二頌滅化引至寶所導師知息已集衆而告言汝等當前進此是化城耳我見汝疲極中路欲退還故以方便力權化作此城汝今勤精進當共至寶所初頌立譬竟二頌法合二初頌正合二頌舉譬帖合初中二初頌合導師二頌合將導今初我亦復如是為一切導師二頌合將導見諸求道者中路而懈廢不能度生死煩惱諸險道故以方便力為息說涅槃言汝等苦滅所作皆已辦既知到涅槃皆得阿羅漢爾乃集大衆為說真實法諸佛方便力分別說三乘唯有一佛乘息處故說二今為汝說實汝所得非滅為佛一切智當發大精進汝證一切智十力等佛法具三十二相乃是真實滅初一句頌合所將人衆次三句頌合中路懈退次一偈頌合方便設化次四偈頌合滅化引至寶所也三乘約能趣權行二約所趣權理即有餘無餘之二亦聲聞緣覺果證之二也一切智是般若三十二相是法身真實滅是解脫三德不縱不橫即是如來祕密之藏又一切智即法性識十力等即法性受想行三十二相即法性色獲得究竟常樂我淨法性五陰盡未來際不生不滅乃名為真實滅豈同二乘妄計灰斷仍受變易生死耶初頌正合竟二頌舉譬帖合諸佛之導師為息說涅槃既知是息已引入於佛慧初二句帖合施權次二句帖合顯實也三因緣說周中初正說因緣竟
