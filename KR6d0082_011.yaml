body:
  text: 古吳後學蕅益智旭述釋化城喻品竟次釋五百弟子受記品五百弟子受記品第八此品具記千二百而但標五百者五百得記名同五百口陳領解故也因緣説周中二授下根記二初此品授千二百記二學無學品授二千人記初中二初授滿慈子二授千二百人初又二初序默領解二如來述記初又二初敘其得解歡喜二敘其默念領解今初爾時富樓那彌多羅尼子從佛聞是智慧方便隨宜説法又聞授諸大弟子阿耨多羅三藐三菩提記復聞宿世因緣之事復聞諸佛有大自在神通之力得未曾有心淨踊躍即從座起到於佛前頭面禮足却住一面瞻仰尊顏目不暫捨先敘得解之由有四一者聞法譬二周開三顯一智慧是領二處顯實方便隨宜是領二處開權也二者聞授舍利弗等五人記諸大弟子即領開權授菩提記即領顯實也三者復聞宿世因緣先教無上道今還説法華是顯實常與師俱生漸教以佛道是開權也四者復聞大自在神通力觀彼久遠猶若今日權立化城如彼導師亦各具權實二義也次敘內解歡喜得未曾有者從昔未聞開顯而今始得聞也心淨者除涅槃愛破無明惑也踊躍者開佛知見大樂歡喜也後敘外形恭敬如文若約本迹則是慶諸實行耳觀心如前説二敘其默念領解而作是念世尊甚奇特所為希有隨順世間若干種性以方便知見而為説法拔出衆生處處貪著我等於佛功德言不能宣唯佛世尊能知我等深心本願文有二意初明默念領解次唯佛世尊下明默求發迹請記問前二周得悟皆發言領解此何默念答前為下根未悟事須彰言勸動今下根已悟無所勸動故默念也世界又上來但領解不求發迹言明不嫌今亦解亦發亦解故念避物譏嫌故默默念允宜也對治又默念領解是大領解如淨名默然是真入不二法門也為人又權實不可思議非言非念而言而念非言而言故前來口陳領解非念而念故今則默念領解也第一義問前來何意不求發迹答為下根未悟故今下根已解權化事足若下根發迹則知中上亦權若約上中先發則于下根不便也世尊甚奇特所為希有領實智也隨順世間若干種性而為説法領權智也此領方便中開顯意也拔出衆生處處貪著領火宅中開顯意也我等於佛功德言不能宣領藥草中如來復有無量功德等也求發迹中言我等者通念請發諸人迹也深心者三世助佛宣化之本懷也本願者本求無上大菩提也從深心故須發迹從本願故須授記初敘默領解竟二如來述記二初長文二偈頌初中二初述本迹二與授記初又三初就釋迦世行因發迹二約過去世顯其本行三約三世佛所修因今初爾時佛告諸比丘汝等見是富樓那彌多羅尼子不我常稱其於説法人中最為第一亦常歎其種種功德精勤護持助宣我法能於四衆示教利喜具足解釋佛之正法而大饒益同梵行者自捨如來無能盡其言論之辨標言汝等見不者有二意一見其迹為小不二見其本功德不衆人但見迹為聲聞而不能知本是菩薩故云見不也我常稱其下是標其迹迹於説法人中最為第一若非法身妙本無以垂於第一勝迹此舉迹以顯本也亦常歎其下是標其本本地福慧萬行莊嚴故云種種本地既有種種功德何但迹為一乘此舉本以明迹也精勤護持下是釋本迹助宣我法即是迹中助宣半滿之法也迹在三藏悟四真諦是護持助宣酪法迹在方等示受彈訶是護持助宣生酥法迹領般若轉教菩薩是護持助宣熟酥法迹在法華三周得悟是護持助宣醍醐法具足權實功德而迹起五味助佛調熟實行衆生故云亦常歎其種種功德也能于四衆示教利喜是述其迹中助宣半字法門具足解釋佛之正法是述其迹中助宣滿字法門而大饒益同梵行者是助佛饒益半滿弟子自捨如來者謂降妙覺已下皆無能知此即述其本地功德也二約過去世顯其本行汝等勿謂富樓那但能護持助宣我法亦於過去九十億諸佛所護持助宣佛之正法於彼説法人中亦最第一又於諸佛所説空法明了通達得四無礙智常能審諦清淨説法無有疑惑具足菩薩神通之力隨其壽命常修梵行彼佛世人咸皆謂之實是聲聞而富樓那以斯方便饒益無量百千衆生又化無量阿僧祇人令立阿耨多羅三藐三菩提為淨佛土故常作佛事教化衆生顯本有二一遠本二近本遠本冥邈為信良難故略而不述但舉九十億近本有宿命智能知近本故舉近以證遠就九十億文具明助佛宣揚權實之教調伏衆生護持助宣佛之正法即總明權實皆正法也又於空法明了等即別明助宣為實施權了知析空即空第一義空建立差別用擬阿含方等般若三味也彼佛世人咸皆謂之實是聲聞者于時既未發迹但謂三藏實證方等被訶般若被加令説不知是大菩薩也又化無量令立菩提即別明助宣開權顯實同今法華醍醐味也然于過去佛所豈不亦助單半單滿等法但由今佛出五濁世宜引施開廢會等化是故皆從同類以説例如光照東方文殊敘古豈無餘途引同類耳又單半單滿為化不難施開廢會方盡如來應病與藥之妙三約三世佛所修因諸比丘富樓那亦於七佛説法人中而得第一今於我所説法人中亦為第一於賢劫中當來諸佛説法人中亦復第一而皆護持助宣佛法亦於未來護持助宣無量無邊諸佛之法教化饒益無量衆生令立阿耨多羅三藐三菩提為淨佛土故常勤精進教化衆生亦例前助宣半滿五味利益大小也初述本迹竟二與授記五初明因圓果滿二明國土廣淨三明劫國名字四明佛壽法住五明滅後供養舍利今初漸漸具足菩薩之道過無量阿僧祇劫當於此土得阿耨多羅三藐三菩提號曰法明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊初一句牒前明因圓過無量下明果滿也二明國土廣淨又五初明國大嚴淨二明純是善道三明人天福慧具足四明菩薩聲聞衆數甚多五總結莊嚴今初其佛以恆河沙等三千大千世界為一佛土七寶為地地平如掌無有山陵溪澗溝壑七寶臺觀充滿其中諸天宮殿近處虗空人天交接兩得相見地平如掌者或云海底有石名掌此石無有一微塵許不平或云賢劫經正明如佛手掌非引人掌也二明純是善道無諸惡道亦無女人一切衆生皆以化生無有淫欲有女人而無惡道如阿閦佛國雖有女人而無女事也今惡道女人俱無則如阿彌陀國清淨最為第一三明人天福慧具足得大神通身出光明飛行自在志念堅固精進智慧普皆金色三十二相而自莊嚴其國衆生常以二食一者法喜食二者禪悅食聞法歡喜以資慧命名法喜食入禪適悅以持法身名禪悅食不須分段飲食也四明菩薩聲聞衆數甚多有無量阿僧祇千萬億那由他諸菩薩衆得大神通四無礙智善能教化衆生之類其聲聞衆算數校計所不能知皆得具足六通三明及八解脫五總結莊嚴其佛國土有如是等無量功德莊嚴成就二明國土廣淨竟三明劫國名字劫名寶明國名善淨四明佛壽法住其佛壽命無量阿僧祇劫法住甚久五明滅後供養舍利佛滅度後起七寶塔遍滿其國二如來述記中長文竟二偈頌二初頌發迹二頌授記初中二初總發諸聲聞迹二頌發富樓那迹今初爾時世尊欲重宣此義而説偈言諸比丘諦聽佛子所行道善學方便故不可得思議知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺以無數方便化諸衆生類自説是聲聞去佛道甚遠度脫無量衆皆悉得成就雖小欲懈怠漸當令作佛內祕菩薩行外現是聲聞少欲厭生死實自淨佛土示衆有三毒又現邪見相我弟子如是方便度衆生若我具足説種種化現事衆生聞是者心則懷疑惑小欲謂志樂小乘懈怠謂不求大乘也示衆有三毒等者非但示為聲聞亦作三毒凡夫及邪見外道也又如身子示瞋難陀示貪調達示癡等二頌發富樓那迹今此富樓那於昔千億佛勤修所行道宣護諸佛法為求無上慧而於諸佛所現居弟子上多聞有智慧所説無所畏能令衆歡喜未曾有疲倦而以助佛事已度大神通具四無礙智知諸根利鈍常説清淨法演暢如是義教諸千億衆令住大乘法而自淨佛土未來亦供養無量無數佛護助宣正法亦自淨佛土常以諸方便説法無所畏度不可計衆成就一切智先五偈頌約過去顯本後二偈頌約未來佛所行因略不頌現佛及七佛也初頌發迹竟二頌授記三初頌因圓果滿二超頌國劫名字三頌國土廣淨略不頌佛壽法住及滅後起塔也今初供養諸如來護持法寶藏其後得成佛號名曰法明二超頌國劫名字其國名善淨七寶所合成劫名為寶明三頌國土廣淨菩薩衆甚多其數無量億皆度大神通威德力具足充滿其國土聲聞亦無數三明八解脫得四無礙智以是等為僧其國諸衆生淫欲皆已斷純一變化生具相莊嚴身法喜禪悅食更無餘食想無有諸女人亦無諸惡道富樓那比丘功德悉成滿當得斯淨土賢聖衆甚多如是無量事我今但略説初授滿慈子記竟二授千二百人記三初念請二與記三領解今初爾時千二百阿羅漢心自在者作是念我等歡喜得未曾有若世尊各見授記如餘大弟子者不亦快乎二與記二初長文二偈頌初中三初總記千二百二別記憍陳如三別記五百今初佛知此等心之所念告摩訶迦葉是千二百阿羅漢我今當現前次第與授阿耨多羅三藐三菩提記二別記憍陳如於此衆中我大弟子憍陳如比丘當供養六萬二千億佛然後得成為佛號曰普明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊陳如最初得度為僧上座故別授記三別記五百其五百阿羅漢優樓頻螺迦葉伽耶迦葉那提迦葉迦留陀夷優陀夷阿䨲樓陀離婆多劫賓那薄拘羅周陀莎伽陀等皆當得阿耨多羅三藐三菩提盡同一號名曰普明迦留陀夷此云黑光佛成道後父王遣令請佛佛命出家者也據寶積經則善來得道以神通力轉化父王據阿含毗尼則是六羣比丘之一雖出家後仍犯多過年七十餘方得調伏證阿羅漢勸化第一所化夫婦俱見諦者足一千家故知大小兩機所見各別如此何但佛之身密不可思議即諸大弟子身密亦皆不可思議也優陀夷亦云優波離亦云塢波離梵音輕重耳持律第一周陀此云大路證阿羅漢能持三藏作大法師即是兄名莎伽陀此云小路亦云繼道即是弟名其兄授以一句伽陀一百日中不能成誦兄逐出房佛親授以我拂塵我除垢六字猶復得前遺後得後遺前教以調息方證聖果具大神力降毒火龍此四尊者前列衆中未有名字故今釋出又列衆中有憍梵波提畢陵伽婆蹉摩訶拘絺羅難陀孫陀羅難陀凡五人不見別授或是梵文未來或總攝在五百人及千二百人中長文竟二偈頌二初頌記陳如及五百二頌總授一切聲聞記今初爾時世尊欲重宣此義而説偈言憍陳如比丘當見無量佛過阿僧祇劫乃成等正覺常放大光明具足諸神通名聞遍十方一切之所敬常説無上道故號為普明其國土清淨菩薩皆勇猛咸升妙樓閣遊諸十方國以無上供具奉獻於諸佛作是供養已心懷大歡喜須臾還本國有如是神力佛壽六萬劫正法住倍壽像法復倍是法滅天人憂其五百比丘次第當作佛同號曰普明轉次而授記我滅度之後某甲當作佛其所化世間亦如我今日國土之嚴淨及諸神通力菩薩聲聞衆正法及像法壽命劫多少皆如上所説長文略偈頌廣先頌授陳如中初二句明行因次二偈明得果次二偈半明國淨次一句明佛壽次二句明正像次法滅天人憂句結上起下次三偈半頌授五百記也二頌總授一切聲聞記迦葉汝已知五百自在者餘諸聲聞衆亦當復如是其不在此會汝當為宣説餘諸聲聞指千二百人中已授五百餘七百人并總指一切聲聞也其不在此會者無論在與不在得記是同也授千二百記中二與記竟三領解二初長文二偈頌初中二初經家敘喜二自陳領解今初爾時五百阿羅漢於佛前得受記已歡喜踊躍即從座起到於佛前頭面禮足悔過自責歡喜踊躍是慶今得解悔過自責是愧昔不解也二自陳領解二初法説二譬説今初世尊我等常作是念自謂已得究竟滅度今乃知之如無智者所以者何我等應得如來智慧而便自以小智為足自謂已得究竟滅度是悔責昔迷今乃知之如無智者是慶今始悟方知從前小智竟同無智亦自責根鈍不能早悟也所以者何下釋成無智之意今日乃知應得如來大智而向日便以小智為足封小失大豈非竟同無智乎二譬説二初立譬二法合初中二初醉酒譬譬自謂滅度小智為足二親友覺悟譬譬今乃知之應得如來智慧初又二初繫珠譬領上王子結緣二醉臥不覺譬領上中間退大二起已遊行譬領上接之以小今初世尊譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去有人即五百自譬也親友譬昔日第十六王子也家譬大乘教為家也醉酒而臥譬無明從未醒也醉有二義一重醉都不覺知譬一句一偈結緣未曾登品二輕醉微覺尋忘亦名不覺譬薄有聞慧在五品初未入似位也官事當行譬王子餘處機興逗緣往應也弘法化他非是私務故云官事無價寶珠譬一乘實相真如智寶也繫其衣裏者衣譬彼時慚愧忍辱及信樂心由聞法時微生信樂得成了因智願種子也二醉臥不覺譬其人醉臥都不覺知此譬無明心重尋復不憶領中間懈退不受大法三起已遊行譬起已遊行到於他國為衣食故勤力求索甚大艱難若少有所得便以為足起已遊行譬善根欲發厭苦求樂也到於他國譬無明覆解不知還向大乘本國也衣食譬正助二道也求索艱難譬未入正法時空無證獲也得少為足譬秉權教修行得小乘果正領中間以小接也初醉酒譬竟二親友覺悟譬領上以是本因緣今説法華經等賜諸子白牛大車也文亦為三初訶責二示珠三勸貿今初於後親友會遇見之而作是言咄哉丈夫何為衣食乃至如是會遇見之譬大乘機發也咄哉訶責譬動執生疑也三周中皆有此意法説中云我令脫苦縛等譬説中云我先不言皆為三菩提耶因緣中云宿世因緣我今當説皆訶責之辭也二示珠我昔欲令汝得安樂五欲自恣於某年日月以無價寶珠繫汝衣裏今故現在而汝不知勤苦憂惱以求自活甚為癡也安樂譬無上大涅槃也五欲自恣譬大乘稱性真實受用如所云實報勝妙五塵能令迦葉起舞者是也某年日月譬大通佛覆講法華時也今故現在譬正顯實法説中廣明五佛譬説中等賜大車因緣中還為説大皆示珠之義也三勸貿汝今可以此寶貿易所須常可如意無所乏短珠雖價直無量仍須貿易方有濟用譬了因內解雖復究竟必以種易現以昔一解一切解而貿一行一切行珠體不竭貿亦無窮故須更聽更修方顯寶之功用如華嚴中得摩尼珠十種瑩治方能雨寶解行相稱方堪佛記從是以後則具有寂滅忍衣首楞嚴食自行化他無量衆寶無功用位彼此不窮故云常可如意無所乏短也法説中身子得記譬説中四人得記因緣中千二二千得記皆即勸貿之義初立譬竟二法合二初合醉酒二合覺悟初中三初合繫珠二合醉臥不知三合起已遊行得少為足今初佛亦如是為菩薩時教化我等令發一切智心二合醉臥不知而尋廢忘不知不覺三合起已遊行得少為足既得阿羅漢道自謂滅度資生艱難得少為足由三界內資生艱難故於小果自謂為足也然無大乘功德法財則亦仍是資生艱難初合醉酒譬竟二合親友覺悟譬三初合訶責二合示珠三合勸貿今初一切智願猶在不失今者世尊覺悟我等作如是言諸比丘汝等所得非究竟滅二合示珠我久令汝等種佛善根以方便故示涅槃相而汝謂為實得滅度三合勸貿世尊我今乃知實是菩薩得受阿耨多羅三藐三菩提記以是因緣甚大歡喜得未曾有三領解中初長文竟二偈頌二初頌內心得解二頌自陳領解今初爾時阿若憍陳如等欲重宣此義而説偈言我等聞無上安隱授記聲歡喜未曾有禮無量智佛今於世尊前自悔諸過咎初一偈頌歡喜得解次半偈頌悔過自責也二頌自陳領解二初頌法説二頌譬説今初於無量佛寶得少涅槃分如無智愚人便自以為足二頌譬説二初頌立譬二頌法合初中二初頌醉酒譬二頌親友覺悟譬今初譬如貧窮人往至親友家其家甚大富具設諸肴膳以無價寶珠繫著內衣裏默與而捨去時臥不覺知是人既已起遊行詣他國求衣食自濟資生甚艱難得少便為足更不願好者不覺內衣裏有無價寶珠初七句頌繫珠譬第八一句頌醉臥不覺譬後二偈頌起已遊行譬也凡夫未有修德名貧窮人諸佛菩薩與諸衆生同一心性名為親友具足權實種種功德名為大富諸方便教名為肴膳一乘圓頓教理名為寶珠慚愧忍辱名為外衣信樂之心名為內衣初結緣時具足二衣退大墮惡則無外衣若約現無信樂乃似內衣亦無而種子仍在但是衣弊非全無也餘如文二頌親友覺悟譬與珠之親友後見此貧人苦切責之己示以所繫珠貧人見此珠其心大歡喜富有諸財物五欲而自恣初頌立譬竟二頌法合二初頌合醉酒二頌合覺悟今初我等亦如是世尊於長夜常愍見教化令種無上願我等無智故不覺亦不知得少涅槃分自足不求餘初一偈頌合繫珠次半偈頌合醉臥不知後半偈頌合起已遊行得少為足也二頌合覺悟今佛覺悟我言非實滅度得佛無上慧爾乃為真滅我今從佛聞授記莊嚴事及轉次授決身心遍歡喜初半偈頌合訶責次半偈頌合示珠後一偈頌合勸貿初授千二百記竟釋五百弟子受記品竟次釋授學無學人記品授學無學人記品第九研真斷惑慕求勝見名之為學即三果四向真無漏慧也真窮惑盡勝見已極無所復學名為無學即阿羅漢果也學無學別即世界研真即為人斷惑即對治真窮惑盡即第一義約教者析法研真名學惑盡真窮名無學三藏意也體法研真名學無真無惑名無學通意也自淺之深名學通別惑盡權實理窮名無學別意也研如來藏有學無學法性實相非學非無學而學而無學圓意也是二千人或是學或是無學同是一流一時受記同一名號故別為一品也本迹者阿難迹為學人羅睺羅迹為無學而本地不可思議以例餘二千人亦應各有本迹觀心者名字乃至分證四位名為學究竟一位名無學理即一位非學非無學又六即通皆非學非無學分證已去而學而無學又可理即學無學乃至究竟學無學授下根記中二授二千人記二初請記二授記初中二初二人請次二千人請初又二初默念請二發言請今初爾時阿難羅睺羅而作是念我等每自思惟設得授記不亦快乎二發言請又二初引例二引望今初即從座起到於佛前頭面禮足俱白佛言世尊我等於此亦應有分唯有如來我等所歸二引望又我等為一切世間天人阿修羅所見知識阿難常為侍者護持法藏羅睺羅是佛之子若佛見授阿耨多羅三藐三菩提記者我願既滿衆望亦足準前列衆二人皆在多知識中今與學無學二千人同受記者為引實故四悉檀故初二人請竟次二千人請爾時學無學聲聞弟子二千人皆從座起偏袒右肩到於佛前一心合掌瞻仰世尊如阿難羅睺羅所願住立一面但有引例一意而無引望故但默念請不發言也初請記竟二授記二初記二人次記二千人初中二初記阿難二記羅睺羅初又五初長文二重頌三新發意者生疑四如來釋疑五阿難述歎今初爾時佛告阿難汝於來世當得作佛號山海慧自在通王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊初明得果當供養六十二億諸佛護持法藏然後得阿耨多羅三藐三菩提二明行因教化二十千萬億恆河沙諸菩薩等令成阿耨多羅三藐三菩提三明説法度人國名常立勝幡其土清淨琉璃為地劫名妙音遍滿四明國劫名字其佛壽命無量千萬億阿僧祇劫若人於千萬億無量阿僧祇劫中算數校計不能得知五明佛壽正法住世倍於壽命像法住世復倍正法六明法住阿難是山海慧自在通王佛為十方無量千萬億恆河沙等諸佛如來所共讚歎稱其功德七明諸佛稱讚二重頌爾時世尊欲重宣此義而説偈言我今僧中説阿難持法者當供養諸佛然後成正覺號曰山海慧自在通王佛其國土清淨名常立勝幡教化諸菩薩其數如恆沙佛有大威德名聞滿十方壽命無有量以愍衆生故正法住倍壽像法復倍是如恆河沙等無數諸衆生於此佛法中種佛道因緣三新發意者生疑爾時會中新發意菩薩八千人咸作是念我等尚不聞諸大菩薩得如是記有何因緣而諸聲聞得如是決四如來釋疑爾時世尊知諸菩薩心之所念而告之曰諸善男子我與阿難等於空王佛所同時發阿耨多羅三藐三菩提心阿難常樂多聞我常勤精進是故我已得成阿耨多羅三藐三菩提而阿難護持我法亦護將來諸佛法藏教化成就諸菩薩衆其本願如是故護斯記五阿難述歎阿難面於佛前自聞授記及國土莊嚴所願具足心大歡喜得未曾有即時憶念過去無量千萬億諸佛法藏通達無礙如今所聞亦識本願爾時阿難而説偈言世尊甚希有令我念過去無量諸佛法如今日所聞我今無復疑安住於佛道方便為侍者護持諸佛法初記阿難竟二記羅睺羅二初長文二重頌今初爾時佛告羅睺羅汝於來世當得作佛號蹈七寶華如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養十世界微塵等數諸佛如來常為諸佛而作長子猶如今也是蹈七寶華佛國土莊嚴壽命劫數所化弟子正法像法亦如山海慧自在通王如來無異亦為此佛而作長子過是已後當得阿耨多羅三藐三菩提二重頌爾時世尊欲重宣此義而説偈言我為太子時羅睺為長子我今成佛道受法為法子於未來世中見無量億佛皆為其長子一心求佛道羅睺羅密行唯我能知之現為我長子以示諸衆生無量億千萬功德不可數安住於佛法以求無上道初記二人竟次記二千人三初長文二重頌三得記歡喜今初爾時世尊見學無學二千人其意柔軟寂然清淨一心觀佛佛告阿難汝見是學無學二千人不唯然已見阿難是諸人等當供養五十世界微塵數諸佛如來恭敬尊重護持法藏末後同時於十方國各得成佛皆同一號名曰寶相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊壽命一劫國土莊嚴聲聞菩薩正法像法皆悉同等二重頌爾時世尊欲重宣此義而説偈言是二千聲聞今於我前住悉皆與授記未來當成佛所供養諸佛如上説塵數護持其法藏後當成正覺各於十方國悉同一名號俱時坐道場以證無上慧皆名為寶相國土及弟子正法與像法悉等無有異咸以諸神通度十方衆生名聞普周遍漸入於涅槃三得記歡喜爾時學無學二千人聞佛授記歡喜踊躍而説偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌二迹門正説竟釋授學無學人記品竟次釋法師品法師品第十此品明五種法師一受持二讀三誦四解説五書寫大論明六種法師一信力故受二念力故持三看文為讀四不忘為誦五宣傳為説六聖人經書難解須解釋今經合受持為一合解説為一足書寫為五若別論則四是自行解説一種是化他若通論則自軌五法名自行法師教他五法名化他法師何以言之法者軌則也師者訓匠也法雖可軌體不自弘通之在人五種通經皆得稱師舉法成其自行皆以妙法為師師於妙法自行成就故名法師又五種人能以妙法訓匠於他故舉法目師名為法師若自軌法若法匠他俱得稱法師品此因緣釋也自行化他不同即世界自行成就即生善化他除惡即對治自他俱得名法師即第一義約教者四教各有能詮所詮俱名為法各論自行化他俱得稱師今唯在圓也就圓教五種若作減數説者束五為四即四安樂行如後説又束為三即是三業受持是意業讀誦説是口業書寫是身業別論則口業是化他身意是自行通論則三業自軌即自行法師三業教詔即化他法師故言法師品又是三門行此五法以自熏修即福德門弘宣五法廣利益他即化他門自修益彼皆順佛教即報恩門別論則自修報恩名自行益彼即是化他通論則自軌軌他皆稱法師故言法師品又是三軌讀誦書寫是外行即如來衣受持是內行即如來座解説益他即如來室別論則室是匠他衣座自匠通論則慈悲覆物惠利歸己名之如室遮彼惡障己醜名之為衣安心於空方能安他安他安已名之為座此則自軌三法亦名法師化他三法亦名法師利物必以慈悲入室為首涉有必以忍辱為基濟他必以亡我為本能行三法大教宣通堪為世間依止故名法師品又束為二謂自行化他此易可知又束為一謂如來行具一切行通論則悲拔一切苦謂四趣三界二乘菩薩等苦慈與一切樂謂人天涅槃常住等樂柔和衣障一切醜謂四住無知無明等醜空座亡一切相謂有相無相非有非無相別論則慈悲生一切善柔和遮一切惡空座蕩一切相又慈忍立一切福德空座成一切智慧智慧是目福德是足又慈悲勝一切聲聞緣覺柔和勝一切凡夫外道空座勝析體偏等菩薩又慈悲破天魔柔和破陰魔空破煩惱魔死魔又慈忍故能問空座故能答具二莊嚴又觀空故能問慈忍故能答又慈忍故能種能立能資空慧故能耘能破能導又慈悲故何所隔柔和故何所礙空座故何所諍故經言一切善法慈為根本忍辱第一道無相最上無相即諸法空若論圓行説不可盡具如玄義一心五行攝一切行也問何故約三法明法師答若一往事論者必須登堂整服坐座乃可敷弘故約三耳若事理合論者迷惑不出三種一約苦果起惑須用慈悲與拔二約結業起惑須用柔忍遠離三約諦理起惑須用法空了達也初二屬事後一屬理事理並是所迷之境若單約理者迷真故墮苦須用慈悲門迷俗故沉空受樂須用和忍門迷中故成智障須用法空門也本迹觀心可解迹門第三流通段凡五品經非止蔭益當時復欲津洽來世故也一法師品二寶塔品皆明弘經功深福重利益廣大三達多品引往古弘經彼我兼益以證功德深重四持品八萬大士忍力成者此土弘經新得記者他土弘經五安樂行品外凡初心欣斯勝福見聲聞畏憚聞菩薩擯辱顧己力弱無益自他便生退沒佛為此人説安樂行依之弘法不慮危苦又法師品釋尊自説弘經功福命覓流通寶塔品多寶分身且證且助勸覓流通寶塔證法華經故來分身助開寶塔故集初法師品二初歎美能持法人二歎美所持之法及示通經方軌初中二初明稟道弟子功深福重二明授道師功深福重初又二初佛世弟子二滅後弟子今初爾時世尊因藥王菩薩告八萬大士藥王汝見是大衆中無量諸天龍王夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人及比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求佛道者如是等類咸於佛前聞妙法華經一偈一句乃至一念隨喜者我皆與授記當得阿耨多羅三藐三菩提因者憑寄也告者普語也藥王菩薩為法焚身八萬大士忍力深固故今流通妙法先因藥王普告八萬欲其精勤護持助宣故也汝見是大衆等者普授記也不惟身子四人滿慈五百及千二二千得記而已舉凡八部四衆求三乘人但聞一偈一句一念隨喜皆得成佛決定無疑故今普皆與授記也一偈一句者舉少以況多也一念隨喜者舉淺以況深也所聞不論何偈何句但令義合權實本迹十妙四一之流功福皆爾隨喜未論讀誦修行但令能于一念心中深解開權顯實即是理本非權非實所以能權能實權實不二事理圓融具煩惱性能知如來祕密之藏又復即于一念心中廣解一切心及一切法皆是佛法無有障礙若欲分別辨説無窮法既如此人亦如是下文常不輕授四衆記即是得此意也故大經云寧願少聞多解義味此義至後釋隨喜品當更説之二滅後弟子佛告藥王又如來滅度之後若有人聞妙法華經乃至一偈一句一念隨喜者我亦與授阿耨多羅三藐三菩提記滅後聞經隨喜其功福與佛現在是同故亦同授記也初明稟道弟子功深福重竟二明授道師功深福重二初長文二偈頌初中二初別明二總明別者人有下上時有現未總者不論下上及以現未通明逆之得罪順之得福也初別中二初明現世二明來世初又二初明下品師二明上品師皆約凡位判也今初若復有人受持讀誦解説書寫妙法華經乃至一偈於此經卷敬視如佛種種供養華香瓔珞末香塗香燒香繒蓋幢幡衣服技樂乃至合掌恭敬此先明下品師相也一受持二讀三誦四解説五書寫即是五種法師一華二香三瓔珞四末香五塗香六燒香七繒蓋幢幡八衣服九技樂十合掌即是十種供養藥王當知是諸人等已曾供養十萬億佛於諸佛所成就大願愍衆生故生此人間藥王若有人問何等衆生於未來世當得作佛應示是諸人等於未來世必得作佛何以故若善男子善女人於法華經乃至一句受持讀誦解説書寫種種供養經卷華香瓔珞末香塗香燒香繒蓋幢幡衣服技樂合掌恭敬是人一切世間所應瞻奉應以如來供養而供養之當知此人是大菩薩成就阿耨多羅三藐三菩提哀愍衆生願生此間廣演分別妙法華經此廣明下品師功報也已曾供養等是先因深愍衆生故等明現功大若有人問等明未來報重二明上品師何況盡能受持種種供養者藥王當知是人自捨清淨業報於我滅度後愍衆生故生於惡世廣演此經先況出上品師相次藥王當知下略明上品師功報也悲願牽故仍是業生眷屬未是神通應生願兼於業具如玄義眷屬妙説初明經世竟二明來世亦二初明下品師二明上品師今初若是善男子善女人我滅度後能竊為一人説法華經乃至一句當知是人則如來使如來所遣行如來事竊為一人極言所化之少乃至一句極言所説之少良以有慧無聞未堪處衆廣演此明下品師相也然此經是如智所説説於如理今行人秉此如教而宣如理故即是如來使如來之所遣也又如智照如理為事今行人依如教行如理故是行如來事也又以如智如理化衆生為事今行人能有大悲以此經中真如之理為餘人説令得利益故名行如來事此明下品師功報也觀心釋者智心觀境境即真如境來發智智為如所使也如來所遣者觀智從如中來也行如來事者歷一切法無不真如真如即佛事也二明上品師何況於大衆中廣為人説以竊為一人況出普為大衆以乃至一句況出廣説此是上品師相功報之大不言可知初別明竟二總明現未下上法師逆之得罪順之得福藥王若有惡人以不善心於一劫中現於佛前常毀罵佛其罪尚輕若人以一惡言毀訾在家出家讀誦法華經者其罪甚重此先明逆之得罪也夫罪福重輕或時論田或時論心或論損益有重有輕今正約損益重輕論也且如惡人以不善心心既重矣現前罵佛田又尊矣一劫常罵業又久矣而云尚輕者非謂罪報果輕但尤未若毀訾讀誦法華之罪為尤重耳何以故佛證平等大慈恆于惡人生悲愍心又非惡人所能逼惱故彼罵者始則譬如以禮送人而人不受持禍自歸墮落三塗百千億劫終則譬如打罵栴檀亦染香氣反受佛化畢竟得成出世因緣今初心行人讀誦法華忍力未成易于退沒倘一言毀訾阻礙勝事是斷佛種損害尤深故其罪甚重也藥王其有讀誦法華經者當知是人以佛莊嚴而自莊嚴則為如來肩所荷擔其所至方應隨向禮一心合掌恭敬供養尊重讚歎華香瓔珞末香塗香燒香繒蓋幢幡衣服肴饌作諸技樂人中上供而供養之應持天寶而以散之天上寶聚應以奉獻所以者何是人歡喜説法須臾聞之即得究竟阿耨多羅三藐三菩提故此次明順之得福也佛以定慧莊嚴此人能修定慧故言以佛莊嚴而自莊嚴也在背為荷在肩為擔修非權非實法身之體即是為如來荷具能權能實二智之用即是為如來擔其所至方應隨向禮者此人有所趣向悉與實相相應皆可敬順順即是向敬即是禮教而順之及興供養也應持天寶等舉重況輕天寶尚應奉供況僅人中上供耶所以者何下釋成應禮應供之意須臾即得究竟以能圓顯究竟妙理故也仍須分別始從名字究竟乃至究竟究竟二明授道師功深福重中初長文竟二偈頌三初獎勸自行利他二重頌別總兩義三結歎經最第一今初爾時世尊欲重宣此義而説偈言若欲住佛道成就自然智常當勤供養受持法華者其有欲疾得一切種智慧當受持是經并供養持者二重頌別總兩義二初頌別明二頌總明初中二初頌現世二頌來世今初若有能受持妙法華經者當知佛所使愍念諸衆生諸有能受持妙法華經者捨於清淨土愍衆故生此當知如是人自在所欲生能於此惡世廣説無上法應以天華香及天寶衣服天上妙寶聚供養説法者初二句頌下品師次二句頌下品功報次二句頌上品師後十句頌上品功報也二頌來世吾滅後惡世能持是經者當合掌禮敬如供養世尊上饌衆甘美及種種衣服供養是佛子冀得須臾聞若能於後世受持是經者我遣在人中行於如來事初二句超頌上品師次六句明上品功報長文不言今偈則有次二句追頌下品師後二句頌下品功報也初頌別明竟二頌總明若於一劫中常懷不善心作色而罵佛獲無量重罪其有讀誦持是法華經者須臾加惡言其罪復過彼有人求佛道而於一劫中合掌在我前以無數偈讚由是讚佛故得無量功德歎美持經者其福復過彼於八十億劫以最妙色聲及與香味觸供養持經者如是供養已若得須臾聞則應自欣慶我今獲大利初二偈頌逆之得罪後四偈頌順之得福也讚佛功德固為無量佛不因讚而有增進若讚持法華經經典所在即為有佛功德已同又使持經者從此增進所以福倍勝也二重頌別總兩義竟三結歎經最第一藥王今告汝我所説諸經而於此經中法華最第一此經中猶言此諸經中通即舉一代所説始自華嚴終至涅槃也諸大乘經各各稱為第一之説然是對待第一未若此經絶待第一故名最第一也初歎美能持法人竟二歎美所持之法及示通經方軌二初長文二偈頌初中二初歎經法二示方軌初又五初約法歎二約人歎三約處歎四約因歎五約果歎今初爾時佛復告藥王菩薩摩訶薩我所説經典無量千萬億已説今説當説而於其中此法華經最為難信難解藥王此經是諸佛祕要之藏不可分布妄授與人諸佛世尊之所守護從昔已來未曾顯説而此經者如來現在猶多怨嫉況滅度後已説指般若已前漸頓諸説也今説指同一座席無量義經也當説指大涅槃經也般若等漸頓諸經皆帶方便取信為易無量義經明一生無量未明無量還一取信亦易今法華經論法則一切差別融通歸一論人則師弟本迹俱甚久遠二門悉與昔反難信難解當鋒難事法華已説涅槃在後則易可信也祕要之藏者隱而不説名之為祕總一切法名之為要真如實相包蘊無外名之為藏不可分布者法妙難信惟有深智乃可授與無智益罪故不可妄授也從昔已來未曾顯説者於三藏中不説二乘作佛亦不明師弟本迹方等般若雖説實相如來藏理亦未説五乘作佛亦未發迹顯本頓漸諸經皆未融會故名為祕此經具説昔所祕法即是開祕密藏亦即是祕密藏如此祕藏昔為一類根熟衆生雖有密説而四十餘年未曾彰灼顯説也猶多怨嫉者如五千退席佛世尚爾何況未來理在難化也二約人歎藥王當知如來滅後其能書持讀誦供養為他人説者如來則為以衣覆之又為他方現在諸佛之所護念是人有大信力及志願力諸善根力當知是人與如來共宿則為如來手摩其頭此法在人則人尊貴如來衣覆者即是修學大忍為衣也諸佛護念者實相為佛實智為子尊崇實相發生實智即為諸佛所護念也圓教四不壞信為大信力圓四弘誓為志願力圓妙大智為善根力信則信理理即法身志願是立行行即解脫善根根固難動即是般若當知三力即三德祕藏初心棲此與佛不殊故名與如來共宿又信力修畢竟空如來智如來棲畢竟空舍此人亦學畢竟空故與如來共宿以志願力善根力自行權實而為機感機感名頭如來以化他權實二智之手開發此人自行權實之頭感應道交故言摩頭摩頭即授記也三約處歎藥王在在處處若説若讀若誦若書若經卷所住處皆應起七寶塔極令高廣嚴飾不須復安舍利所以者何此中已有如來全身此塔應以一切華香瓔珞繒蓋幢幡技樂歌頌供養恭敬尊重讚歎若有人得見此塔禮拜供養當知是等皆近阿耨多羅三藐三菩提此法在處即處尊貴夫佛生處得道處轉法輪處入涅槃處皆應起塔此經是法身生處得道之場法輪正體大涅槃窟故應起塔供養也不須復安舍利者釋論云碎骨是生身舍利經卷是法身舍利也已有如來全身者生身舍利有碎有全碎如釋迦全如多寶法身舍利亦有碎全諸方便教為碎法華一實為全也四教五時委簡或純碎無全或全碎相半唯法華為純全四約因歎藥王多有人在家出家行菩薩道若不能得見聞讀誦書持供養是法華經者當知是人未善行菩薩道若有得聞是經典者乃能善行菩薩之道餘經帶方便因名為拙度此經正顯圓因聞解圓因方名巧度巧度為善行也大論通以衍門為巧今經別以一實為巧五約果歎又五初明近果二立譬三法合四釋近五揀非今初其有衆生求佛道者若見若聞是法華經聞已信解受持者當知是人得近阿耨多羅三藐三菩提阿耨菩提有二義一者初心菩提即圓初住二者後心菩提即妙覺極果今言近者正近初住菩提也前約因歎修通別因即是未善去圓果遠若修圓因即是善行去圓果近今以圓如實智為因還以為果道前真如雖有三因同名正因理即道中真如亦有三因同名緣因名字即觀行即相似即亦名了因分證即道後真如亦只三法轉名圓果究竟即故普賢觀云大乘因者諸法實相是大乘果者亦諸法實相是釋論云初觀實相名因觀竟名果就理而論真如實相不當因果亦非前後今約修行則有前後及以因果也二立譬藥王譬如有人渴乏須水於彼高原穿鑿求之猶見乾土知水尚遠施功不已轉見濕土遂漸至泥其心決定知水必近釋此為二一約觀門二約教門觀門者衆生之心具諸煩惱名高原修習觀智名穿掘方證理味如得清水約通觀則乾慧地如乾土性地為濕土泥見諦為得清水約別觀則從假入空但見于空不見不空斷四住惑如掘乾土去水尚遠從空入假先知非假今知非空因是二觀得入中道能伏無明轉見濕土去水則近若圓觀中道非空非假而照空假四住已盡無明已伏已得中道相似圓解故云如漸至泥若入初住發真中解即破無明如泥澄清得見中道如得清水故法華論云佛性水當知次第也教門者土譬經教水譬中道教詮中道如土含水三藏未詮中道猶如乾土方等般若帶方便説中道猶如濕土法華正直顯露説中道猶如泥因法華教然聞思修即悟中道真見佛性所發真慧不復依文如獲清水無復土相故華嚴云初發心時便成正覺成就慧身不由他悟也三法合菩薩亦復如是若未聞未解未能修習是法華經當知是人去阿耨多羅三藐三菩提尚遠若得聞解思惟修習必知得近阿耨多羅三藐三菩提於法華中獲聞思惟即是圓家三慧方能近果非乾濕等教中三慧也四釋近所以者何一切菩薩阿耨多羅三藐三菩提皆屬此經此經開方便門示真實相是法華經藏深固幽遠無人能到今佛教化成就菩薩而為開示一切菩薩指諸權因阿耨菩提指諸權果權因權果皆攝屬于此經如乾濕等土悉依于水也開方便門示真實相者昔所不説今皆説之昔説二觀為方便門今皆開之即是真實寧復是門昔説小乘方便及小乘果小乘果尚非實相況小方便而常是門今皆開之即是實相汝等所行是菩薩道決了聲聞法是諸經之王乃至治世語言資生業等昔何嘗説是方便今皆開之即是實相不相違背咸令衆生開示悟入佛之知見一色一香無非佛法若門若非門悉皆開之示真實相顯佛性水若不開者則深固幽遠無人能到而今開之即得見水無乾土也五揀非藥王若有菩薩聞是法華經驚疑怖畏當知是為新發意菩薩若聲聞人聞是經驚疑怖畏當知是為增上慢者新發意菩薩增上慢聲聞既于此經驚疑怖畏悉是乾土尚非濕土況能見水耶初歎經法竟二示方軌二初正明方法二明五利益初中三初標章二解釋三勸修今初藥王若有善男子善女人如來滅後欲為四衆説是法華經者云何應説是善男子善女人入如來室著如來衣坐如來座爾乃應為四衆廣説斯經二解釋如來室者一切衆生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是大慈悲室者若就同體即法身也若被衆生即解脫也能令衆生會於同體即般若也柔忍衣者若就所覆即法身也若就能覆嚴身即般若也若就和光利物即解脫也法空座者若就能坐即般若也若就所坐即法身也身座冥稱即解脫也又大慈安樂即資成軌柔和伏瞋斷惑即觀照軌坐座即真性軌安樂行中還廣此三法也上云以佛莊嚴又云以衣覆之即此衣也上云如來肩所荷擔又云手摩其頭即此座也上云與如來共宿即此室也三勸修安住是中然後以不懈怠心為諸菩薩及四衆廣説是法華經既勸安住三法仍勸不懈怠心然後廣説故知此勗觀行初心人耳至相似位任運妙音遍滿三千不待勸也初正明方法竟二明五利益藥王我於餘國遣化人為其集聽法衆一遣化人亦遣化比丘比丘尼優婆塞優婆夷聽其説法是諸化人聞法信受隨順不逆二遣化四衆若説法者在空間處我時廣遣天龍鬼神乾闥婆阿修羅等聽其説法三遣八部我雖在異國時時令説法者得見我身四見佛身若於此經忘失句讀我還為説令得具足五與總持若初心未淳止可遣化人未可遣化四衆八部若見天龍倚此自高妨損其道故不可令見也若心無倚著則堪見佛兼得總持證大利益況復天龍等耶二歎經法及示方軌中初長文竟二偈頌三初總勸二頌長文三結勸今初爾時世尊欲重宣此義而説偈言欲捨諸懈怠應當聽此經此經難得聞信受者亦難二頌長文二初但頌約果歎二頌方軌初中二初頌立譬二頌法合略不頌近果釋近及揀非也今初如人渴須水穿鑿於高原猶見乾燥土知去水尚遠漸見濕土泥決定知近水二頌法合藥王汝當知如是諸人等不聞法華經去佛智甚遠若聞是深經決了聲聞法是諸經之王聞已諦思惟當知此人等近於佛智慧初但頌約果歎竟二頌方軌二初頌正明方法二頌明五利益今初若人説此經應入如來室著於如來衣而坐如來座處衆無所畏廣為分別説大慈悲為室柔和忍辱衣諸法空為座處此為説法若説此經時有人惡口罵加刀杖瓦石念佛故應忍初偈半頌標章次一偈頌解釋後一偈頌勸修也二頌明五利益我千萬億土現淨堅固身於無量億劫為衆生説法此總明如來以五事利益之意正由應身遍滿十方能為五事守護行人也若我滅度後能説此經者我遣化四衆比丘比丘尼及清淨士女供養於法師此超頌第二遣四衆也引導諸衆生集之令聽法若人欲加惡刀杖及瓦石則遣變化人為之作衛護此追頌第一遣化人也若説法之人獨在空間處寂寞無人聲讀誦此經典我爾時為現清淨光明身若忘失章句為説令通利此超頌第五與總持也若人具是德或為四衆説空處讀誦經皆得見我身此頌第四令見佛也具是德謂室衣座三德若人在空間我遣天龍王夜叉鬼神等為作聽法衆是人樂説法分別無罣礙諸佛護念故能令大衆喜此追頌第三遣八部也二頌長文竟三結勸若親近法師速得菩薩道隨順是師學得見恆沙佛法師品竟
