body:
  text: 古吳後學蕅益智旭述見寶塔品第十一塔具云塔婆或云偷婆新云窣堵波此翻方墳亦翻靈廟亦翻高顯亦翻浮圖有舍利者名塔無舍利者名支提舍利復論全碎如釋迦碎身為八斛舍利阿育王後造八萬四千寶塔以供養之遍布天下名山今多寶佛全身舍利不散故唯一塔又按律中四處起塔謂佛生處得道處轉法輪處入涅槃處今法華實相諸佛三身皆從此生諸佛於此而坐道場諸佛於此而轉法輪諸佛於此而般涅槃秖此法華即是三世佛之四塔先佛已居今佛並坐當佛亦然此塔出來明顯此事四衆皆覩故言見寶塔品世界瓔珞經云供養一佛舍利起塔滿四天下不如供養如來生身由色身有舍利故又起塔滿大千供養色身不如供養法身由法身有色身故當知見色不及聞經以由聞經有法身故經有偏圓即法身全碎功德不等今經純詮圓理是全法身故持經功深弘宣力大多寶佛塔從地涌出證明此事四衆皆覩故言見寶塔品為人三周說法已竟從地涌出出大音聲再歎善哉印成實說即是證前為開塔故須集分身既開塔已入塔並坐大聲普告召本弟子由疑地涌方明壽量展轉為由即是請後正為證前請後從地涌出四衆皆覩故言見寶塔品對治多寶示滅全身舍利儼然不散又聞其言則是滅而不滅可表法身釋尊入塔二身相稱如智稱境可表報身分身雲集可表應身三佛三身而不一異令四衆覩故言見寶塔品第一義塔出有兩意一發音聲以證前三周說法流通功德皆是真實不同兼但對帶之談即約教義二因開塔以起後聲徹下方召本弟子乃明長壽頓破寂場近成之疑即本迹義又久遠之塔從地涌出開自在神通之力顯過去世益物也發大音聲開師子奮迅之力顯現在十方開權顯實也有大誓願未來諸佛若說此經我之寶塔皆到其所為作證明開大勢威猛之力顯未來常住不滅也觀心釋者依經修觀與法身相應境智必會如塔來證經境智既會則大報圓滿如釋迦與多寶同坐一座大報圓故則隨機出應如分身皆集由多寶出故三佛得顯由持經故即具三身普賢觀云佛三種身從方等生即此義也迹門流通中第二見寶塔品為二初長文二偈頌初中三初明多寶涌現二明分身遠集三明釋迦唱募初又六初現塔之相二諸天供養三多寶稱歎四時衆驚疑五大樂說問六如來答今初爾時佛前有七寶塔高五百由旬縱廣二百五十由旬從地涌出住在空中種種寶物而莊校之五千欄楯龕室千萬無數幢幡以為嚴飾垂寶瓔珞寶鈴萬億而懸其上四面皆出多摩羅跋栴檀之香充遍世界其諸幡蓋以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成高至四天王宮七寶表性德七覺七聖法財也塔表實相之境法身所依處也四教各論七覺七財今唯在圓因位亦有七覺七財今約極果七覺七財皆是修得今明全性起修全修顯性故是無作性德高五百由旬者是二萬里豎表因中萬行果中萬德也縱廣二百五十由旬者是一萬里橫表萬善莊嚴也地表無明心地空表第一義空以無所破破無明地以無所住住第一義空故言從地涌出住在空中此亦證前起後七方便人藏理未開無明所隱如塔在地今聞三周開顯開佛知見顯出法身如塔涌空此即證前修得法身久已明著如塔在空無能開者表本地久成衆所不識若發迹顯本了達無疑此即起後也若塔從地出表法身顯與餘經亦同亦異菩薩顯法身則同二乘顯法身則異若塔在空開門見佛表發迹顯本與餘經永異若塔來證前事已彰灼蓋不須疑塔來起後則密有其意衆所未知也種種寶物者表衆多定慧而莊校也欄楯表總持龕室表無量慈悲室亦表無量空舍幢幡表神通勝相垂諸瓔珞表四十地戒定慧陀羅尼功德上嚴法身下被衆生也寶鈴表八音四辨四面出香表無作四諦道風吹四德香也七寶幡蓋高至四天王宮表神通慈力皆是性德七覺七財所成皆窮無作四諦之理也二諸天供養三十三天雨天曼陀羅華供養寶塔餘諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等千萬億衆以一切華香瓔珞幡蓋技樂供養寶塔恭敬尊重讚歎事解可知更約理者三十三天即表住行向為三十十地為一等覺為一妙覺為一合為三十三同依實相第一義境也雨天曼陀羅華者初心亦具四十二地功德後心亦爾皆以四十地所有因華歸向法身也餘諸天龍下即表內凡外凡等亦依寶相向果行因也三多寶稱歎爾時寶塔中出大音聲歎言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實善哉善哉歎其契理契機也平等有二義一法平等即中道理二生平等一切衆生同得佛慧大者如前高廣義也如是如是者一如法性實理之是二如衆生根性之是故皆是真實也此正證前開權顯實不虗四時衆驚疑爾時四衆見大寶塔住在空中又聞塔中所出音聲皆得法喜怪未曾有從座而起恭敬合掌却住一面皆得法喜顯領證前怪未曾有起住一面密助起後也五大樂說問爾時有菩薩摩訶薩名大樂說知一切世間天人阿修羅等心之所疑而白佛言世尊以何因緣有此寶塔從地涌出又於其中發是音聲准下答意問亦有三一問何因有此塔二問何故塔從地出三問何故發是音聲也六如來答為三初超答何故涌出二追答何因有塔三答何故發是音聲今初爾時佛告大樂說菩薩此寶塔中有如來全身乃往過去東方無量千萬億阿僧祇世界國名寶淨彼中有佛號曰多寶其佛行菩薩道時作大誓願若我成佛滅度之後於十方國土有說法華經處我之塔廟為聽是經故涌現其前為作證明讚言善哉此明寶塔為證法華所以從地涌出也問前云地涌今曰東方何耶答東是述其本緣涌乃申其昔願不相乖也若約表法則東方為羣方之首所以表開地涌所以表顯二追答何因有塔由彼佛命令造此塔也彼佛成道已臨滅度時於天人大衆中告諸比丘我滅度後欲供養我全身者應起一大塔三答何故發是音聲由有神通本願故也其佛以神通願力十方世界在在處處若有說法華經者彼之寶塔皆涌出其前全身在於塔中讚言善哉善哉大樂說今多寶如來塔聞說法華經故從地涌出讚言善哉善哉釋論明多寶佛不得說法而取滅度南嶽師云彼佛告諸比丘比丘即受化之人何謂全不說法當是但得施三不得顯一故云不得說法耳以是義故雖復滅度在在處處有說法華便皆隨喜作證也問十方世界豈無他佛不得開顯若不開顯皆應發願何獨多寶若不發願佛道不同若發願者皆合聽經又諸佛化皆預照機豈待成佛不得開顯方始發願答同與不同開與不開有願無願皆是隨緣若宜有願皆悉盡來何慮不集後方發願亦是鑑機初明多寶涌現竟二明分身遠集七初大樂說請見多寶二明應集分身三大樂說請集四放光遠召五諸佛同來六嚴淨國界七與欲開塔今初是時大樂說菩薩以如來神力故白佛言世尊我等願欲見此佛身欲開塔須集佛集佛即付囑付囑即召下方下方出即應開近顯遠此是大事之由故是如來神力令問也二明應集分身佛告大樂說菩薩摩訶薩是多寶佛有深重願若我寶塔為聽法華經故出於諸佛前時其有欲以我身示四衆者彼佛分身諸佛在於十方世界說法盡還集一處然後我身乃出現耳大樂說我分身諸佛在於十方世界說法者今應當集須集分身乃可開塔正密示本地功德也根深則枝茂源遠則流長分身既爾橫遍十方本地寧不豎超塵劫三大樂說請集大樂說白佛言世尊我等亦願欲見世尊分身諸佛禮拜供養四放光遠召爾時佛放白毫一光即見東方五百萬億那由他恆河沙等國土諸佛彼諸國土皆以玻瓈為地寶樹寶衣以為莊嚴無數千萬億菩薩充滿其中遍張寶幔寶網覆上彼國諸佛以大妙音而說諸法及見無量千萬億菩薩遍滿諸國為衆說法南西北方四維上下白毫相光所照之處亦復如是分身諸佛多是淨土惟此娑婆乃是穢土佛能于此娑婆穢土說法華經蓋是難中之難然因茲穢土所以必須為實施權又因施權所以必須開權顯實因此顯實方得具明如來設化之妙原始要終罄無不盡可謂蓮出淤泥也又復應知此土釋迦則指諸佛為分身各土之佛又指餘佛及釋迦為分身此土說法華經諸佛既來與欲開塔各土有說法華經處諸佛及此土釋迦亦必同往與欲開塔是則淨穢交徹彼此互融賓主歷然能所不二一乘實相之旨法界無礙之宗昭昭在視聽間矣五諸佛同來爾時十方諸佛各告衆菩薩言善男子我今應往娑婆世界釋迦牟尼佛所并供養多寶如來寶塔六嚴淨國界三初變娑婆二變八方各二百萬億那由他三更變八方各二百萬億那由他今初時娑婆世界即變清淨琉瑙為地寶樹莊嚴黃金為繩以界八道無諸聚落村營城邑大海江河山川林藪燒大寶香曼陀羅華遍布其地以寶網幔羅覆其上懸諸寶鈴唯留此會衆移諸天人置於他土是時諸佛各將一大菩薩以為侍者至娑婆世界各到寶樹下一一寶樹高五百由旬枝葉華果次第莊嚴諸寶樹下皆有師子之座高五由旬亦以大寶而校飾之爾時諸佛各於其座結加趺坐如是展轉遍滿三千大千世界而於釋迦牟尼佛一方所分之身猶故未盡二變八方各二百萬億那由他時釋迦牟尼佛欲容受所分身諸佛故八方各更變二百萬億那由他國皆令清淨無有地獄餓鬼畜生及阿修羅又移諸天人置於他土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第嚴飾樹下皆有寶師子座高五由旬種種諸寶以為莊校亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地三更變八方各二百萬億那由他釋迦牟尼佛為諸佛當來坐故復於八方各更變二百萬億那由他國皆令清淨無有地獄餓鬼畜生及阿修羅又移諸天人置於他土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第莊嚴樹下皆有寶師子座高五由旬亦以大寶而校飾之亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地爾時東方釋迦牟尼佛所分之身百千萬億那由他恆河沙等國土中諸佛各各說法來集於此如是次第十方諸佛皆悉來集坐於八方爾時一一方四百萬億那由他國土諸佛如來遍滿其中三變土淨正由三昧三昧有三初變娑婆是背捨力能變穢為淨次變八方各二百萬億那由他是勝處力轉變自在三變八方更各二百萬億那由他是十一切處力廣普無礙又初一變表淨除見思第二變表淨除塵沙第三變表淨除無明也問華嚴經中十方同名諸佛菩薩來證所說法門但云充滿十方不云變穢為淨正顯淨穢平等淨穢無性又顯自他不隔大小無礙也今變穢為淨則淨穢未忘移諸天人則自他相隔欲容分身而更變土則大小宛存得無不及華嚴耶答諸經所用神通不論多少廣狹貴在被機顯理華嚴獨被大機直顯圓理故神力境界雖多且廣未是難事今經開小成大即偏明圓如破徑敵故為希有況淨穢設實有性何能變穢為淨自他設果有隔何能安然被移大小設果有礙何能通為一土當知融絶淨穢彼此大小之事而顯理者猶是事理無礙門也不壞淨穢彼此大小之事而即顯無淨無穢無彼無此無大無小之理雖顯無淨無穢無彼無此無大無小之理而淨穢彼此大小之事仍歷然者正是事事無礙門也是故若約平等大慧則華嚴方等般若法華不應妄計優劣若約開權顯實開迹顯本則法華獨擅其功善讀經者貴達體宗用相不當徒以事迹而妄較評致于如來所說大法一讚一毀如讚帝釋而毀憍尸迦也問三變土淨應是首楞嚴三昧力何以仍用小乘事禪答小乘背捨僅變小千勝處僅變中千十一切處僅變大千今開權顯實即小事禪是首楞嚴故名雖附小力用則大也問若爾則隨一三昧便能三變何必定用三三昧耶答亦正不壞諸法假名故也問若小乘三種三昧不能遍破三惑若佛果三種三昧不應次第破惑答既首楞嚴即理之事自能一一圓破三惑今約三昧正論功用復約所表故云破惑功用在佛所表在機機雖三根已破三惑後來仍當更破故也六嚴淨國界竟七與欲開塔又五初諸佛問訊說欲二釋迦開塔三四衆皆同見聞四二佛分座而坐五四衆請加處空今初是時諸佛各在寶樹下坐師子座皆遣侍者問訊釋迦牟尼佛各齎寶華滿掬而告之言善男子汝往詣者闍崛山釋迦牟尼佛所如我辭曰少病少惱氣力安樂及菩薩聲聞衆悉安隱不以此寶華散佛供養而作是言彼某甲佛與欲開此寶塔諸佛遣使亦復如是諸佛同與欲開塔如僧中作法與欲意也大集明若干佛與欲大品亦明千佛同說般若然皆不云即是釋迦分身準今經者應是分身彼帶方便故不顯說耳今經非但數多亦直說是分身咸來與欲也二釋迦開塔爾時釋迦牟尼佛見所分身佛悉已來集各各坐於師子之座皆聞諸佛與欲同開寶塔即從座起住虗空中一切四衆起立合掌一心觀佛於是釋迦牟尼佛以右指開七寶塔戶出大音聲如却關鑰開大城門以右指開表用權也開塔表開權見佛表顯實即是證前又將開後故以如却關鑰表却障開大城門密表開迹也三四衆同皆見聞即時一切衆會皆見多寶如來於寶塔中坐師子座全身不散如入禪定又聞其言善哉善哉釋迦牟尼佛快說是法華經我為聽是經故而來至此爾時四衆等見過去無量千萬億劫滅度佛說如是言歎未曾有以天寶華聚散多寶佛及釋牟尼佛上四二佛分座而坐爾時多寶佛於寶塔中分半座與釋迦牟尼佛而作是言釋迦牟尼佛可就此座即時釋迦牟尼佛入其塔中坐其半座結加趺坐五四衆請加處空爾時大衆見二如來在七寶塔中師子座上結加趺坐各作是念佛坐高遠惟願如來以神通力令我等輩俱處虗空即時釋迦牟尼佛以神通力接諸大衆皆在虗空問衆俱在空分身何故猶處於地答時衆已聞迹門開權初入常寂光土故以空居表之分身示迹各有所化之土故居地以表之又釋迦不久顯本亦先居空以表之各有其致不須疑也二明分身遠集竟三明釋迦唱募以大音聲普告四衆誰能於此娑婆國土廣說妙法華經今正是時如來不久當入涅槃佛欲以此妙法華經付囑有在一募誰能廣說謂於此娑婆二明付囑時至謂當入涅槃三明付囑有在此復二意一者近明有在意指法師品初八萬大士持品之初二萬菩薩及世尊所視八十萬億那由他諸菩薩衆二者遠明有在意指地涌本弟子衆令觸處流通又發起壽量也初長文竟二偈頌三初頌多寶二頌分身三頌付囑今初爾時世尊欲重宣此義而說偈言聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法此佛滅度無央數劫處處聽法以難遇故彼佛本願我滅度後在在所往常為聽法二頌分身又我分身無量諸佛如恆沙等來欲聽法及見滅度多寶如來各捨妙土及弟子衆天人龍神諸供養事令法久住故來至此為坐諸佛以神通力移無量衆令國清淨諸佛各各詣寶樹下如清淨池蓮華莊嚴其寶樹下諸師子座佛坐其上光明嚴飾如夜暗中然大炬火身出妙香遍十方國衆生蒙熏喜不自勝譬如大風吹小樹枝以是方便令法久住上明分身遠集共有七文今頌甚略初三偈頌第二應集義兼初請見多寶及三請集次一偈頌淨國界後四偈半頌諸佛同來三頌付囑二初舉三佛以勸流通二舉難持之法以勸流通初中三初募覓其人二正舉三佛以勸持經三釋勸意今初告諸大衆我滅度後誰能護持讀說斯經今於佛前自說誓言二正舉三佛以勸持經其多寶佛雖久滅度以大誓願而師子吼多寶如來及與我身所集化佛當知此意諸佛子等誰能護法當發大願令得久住三釋勸意其有能護此經法者則為供養我及多寶此多寶佛處於寶塔當遊十方為是經故亦復供養諸來化佛莊嚴光飾諸世界者若說此經則為見我多寶如來及諸化佛能護持經即為供養三佛若說此經即為具見三佛所以釋勸意也初舉三佛以勸流通竟二舉難持之法以勸流通二初正舉勸二釋勸意初中三初誠勸二正舉難持以勸三釋難持意今初諸善男子各諦思惟此為難事宜發大願二正舉難持以勸諸餘經典數如恆沙雖說此等未足為難若接須彌擲置他方無數佛土亦未為難若以足指動大千界遠擲他國亦未為難若立有頂為衆演說無量餘經亦未為難若佛滅後於惡世中能說此經是則為難假使有人手把虗空而以遊行亦未為難於我滅後若自書持若使人書是則為難若以大地置足甲上升於梵天亦未為難佛滅度滅於惡世中暫讀此經是則為難假使劫燒擔負乾草入中不燒亦未為難我滅度後若持此經為一人說是則為難若持八萬四千法藏十二部經為人演說令諸聽者得六神通雖能如是亦未為難於我後後聽受此經問其義趣是則為難若人說法令千萬億無量無數恆沙衆生得阿羅漢具六神通雖有是益亦未為難於我滅後若能奉持如斯經典是則為難八萬四千法藏十二部經俱通大小弘通前四味教皆帶方便故猶易持說此經純明一實故倍難也三釋難持意我為佛道於無量土從始至今廣說諸經而於其中此經第一若有能持則持佛身不但此土四十餘年未曾顯說即無量土中從始至今所說雖多亦未有如此經之深談佛意者此經體宗用三衣座室三即是佛之三身能持即持佛身此意豈易初正舉勸竟二釋勸意三初重募持經之人二明能持難持則諸佛喜歎三明即成自行化他勝行今初諸善男子於我滅後誰能受持讀誦此經今於佛前自說誓言二明能持難持則諸佛喜歎此經難持若暫持者我則歡喜諸佛亦然如是之人諸佛所歎三明即成自行化他勝行是則勇猛是則精進是名持戒行頭陀者則為疾得無上佛道能於來世讀持此經是真佛子住淳善地此自行勝行也佛滅度後能解其義是諸天人世間之眼於恐畏世能須臾說一切天人皆應供養此化他勝行也見寶塔品竟提婆達多品第十二提婆達多亦言達兜亦云調達此翻天熱以其應行三逆所以生時人天心熱因此立名即因緣釋也問惡人出世何名感應答令無量人不敢造惡亦具四悉見者喜己身不作即世界不作生善即為人不作惡即對治無障果事即第一義約教者前三教逆秖是逆今即逆而順是圓教意本迹者本地清涼衆生煩惱故菩薩示熱同其病行而度脫之大經云提婆達多必不破僧報恩經云若有人言提婆達多實是惡人入阿鼻獄者無有是處大雲經云提婆達多不可思議所有行業同於如來觀心者究竟斷彼異相諸陰和合積集名為破僧究竟斷彼諸使習氣種子名為害阿羅漢究竟斷彼七種識身煩惱所知種種染汙名為惡心出佛身血出楞伽經第三什師譯經竟宮人請此品淹留在內江東僅傳二十七品梁有滿法師講經百遍於長沙郡燒身仍以此品安持品前南嶽大師亦以此品次寶塔品後後見長安舊本方知二師深得經意此迹門流通第三品來意引古弘經傳益非謬明今宣化事驗不虗舉往勸今使流通也文為二初明昔日達多通經釋迦成道二明今日文殊通經龍女作佛稟教尚然宣通之功益豈不大故達多受記文殊可以意知初中三初明往昔師弟持經之相二結會古今三勸信初又二初長文二偈頌長文又四初明求法時節二正明求法三求得法師四受法奉行今初爾時佛告諸菩薩及天人四衆吾於過去無量劫中求法華經無有懈倦二正明求法又二初明發願二明修行今初於多劫中常作國王發願求於無上菩提心不退轉二明修行又二初明欲滿檀那勤行布施二明為滿般若勤求妙法今初為欲滿足六波羅蜜勤行布施心無吝惜象馬七珍國城妻子奴婢僕從頭目髓腦身肉手足不惜軀命二明為滿般若勤求妙法時世人民壽命無量為於法故捐捨國位委政太子掣鼓宣令四方求法誰能為我說大乘者吾當終身供給走使二正明求法竟三求得法師時有仙人來白王言我有大乘名妙法華經若不違我當為宣說四受法奉行王聞仙言歡喜踊躍即隨仙人供給所須采果汲水拾薪設食乃至以身而為牀座身心無倦于時奉事經於千歲為於法故精勤給侍令無所乏初長文竟二偈頌四初頌時節及正求法二頌求得法師三頌受法奉行四結證勸信今初爾時世尊欲重宣此義而說偈言我念過去劫為求大法故雖作世國王不貪五欲樂椎鐘告四方誰有大法者若為我解說身當為奴僕二頌求得法師時有阿私仙來白於大王我有微妙法世間所希有若能修行者吾當為汝說三頌受法奉行時王聞仙言心生大喜悅即便隨仙人供給於所須采薪及果蓏隨時恭敬與情存妙法故身心無懈倦普為諸衆生勤求於大法四結證勸信亦不為己身及以五欲樂故為大國王勤求獲此法遂致得成佛今故為汝說初明往昔師弟持經之相竟二結會古今二初正結會二明師弟功報俱滿今初佛告諸比丘爾時王者則我身是時仙人者今提婆達多是二明師弟功報俱滿又二初明弟子圓因報滿二明法師妙果當成今初由提婆達多善知識故令我具足六波羅蜜慈悲喜捨此先明因圓也問提婆達多世世為佛怨云何而言是善知識答入大乘論云若是怨者云何能得世世相值如二人行東西各去步步轉遠豈得為伴耶六度義甚多今當略說如大論云捨依正名檀防止七支名戒打罵不報名忍為事始終名精進四禪八定名禪分地息諍名般若又束十善為六度者不殺至不妄語是檀不兩舌是尸不惡口是忍不綺語是進不貪瞋是禪不邪見是般若又菩薩善戒經第十云六波羅蜜有三種一對治謂慳惡瞋怠亂癡二相生謂捨家持戒遇辱須忍忍已精進進已調五根根調知法界三果報謂大富饒財諸根具足容色端正有大威力壽命安康辨才無礙又餘經云施報富戒報善道忍報端正進報神通禪報生天慧報破煩惱如是等例皆是三藏明六度相也若施者受者財物三事皆空名檀不見持犯名戒能忍所忍不可得名忍身心不動名精進不亂不味名禪非智非愚名般若如此流例即通教中六度相若言檀有十利一伏慳煩惱二捨心相續三與衆生同資産四生豪富家五生生施心現前六四衆愛樂七處衆不怯畏八勝名遍布九手足柔軟十乃至詣道場恆值善知識戒有十利一滿一切智二如佛所學三智者不毀四誓願不退五安住正行六棄捨生死七慕樂涅槃八得無纏心九得勝三昧十不乏信財忍有十利一二三四火刀毒水皆不能害五非人所護六身相莊嚴七閉惡道八生梵天九晝夜常安十身不離喜樂精進有十利一他不能折伏二佛所攝三非人所護四聞法不忘五未聞能聞六增長辨才七得三昧性八少病惱九隨食能消十如優鉢華增長禪有十利一安住儀式二行慈境界三無悔熱四守護諸根五得無食喜六離愛欲七修禪不空八解脫魔羂九安住佛境十解脫成熟般若有十利一不取施相二不依戒三不住忍力四不離身心精進五禪無所住六魔不能擾七他言論不能動八達生死底九起增上慈十不樂二乘地復次四事應修檀一破慳貪故二莊嚴菩提故三自他利益故欲施施時施已皆歡喜名自利饑渴者得除名利他四得後世大善果謂尊貴饒財故四事應持戒一自修善法滅惡戒二莊嚴菩提攝衆生三臥安覺安不悔恨於諸衆生無害心四後受人天得涅槃樂四事應修忍一除不忍二莊嚴菩提攝衆生三彼此離怖畏後世無瞋眷屬不壞不受苦惱四得人天涅槃樂四事應修精進一破懈怠二莊嚴菩提攝衆生三增善法是自利不惱他是利他四後得大力致菩提四事應修禪一破亂心二莊嚴菩提攝衆生三身心寂靜是自利不惱衆生是利他四後受清淨身安隱得涅槃四事應修般若一破無明二莊嚴菩提攝衆生三智慧自樂是自利能教衆生是利他四能壞煩惱及智障是大果如此流例是別教明六度相也月藏第一云若衆生唯依讀誦求菩提是人為著世俗尚不調己煩惱何能調他是人著嫉妬名利富貴高心自是輕慢毀他尚不得欲界善根況色無色善根況二乘菩提況無上菩提如星火不能乾海口氣不能動山蕅絲不能稱嶽當知世俗不能滿菩提何等是第一義謂造一切福事及修身修心修慧以第一義熏修則速滿六波羅蜜若行若坐捨攀緣想是檀捨攀緣不犯是尸於境界不生瘡疣是羼不捨於離是精進於事中不放逸是禪於諸法體性無生是般若復次於陰捨是檀不計念陰是尸於陰無我想是羼於陰起怨想是進於陰不熾然是禪於陰畢竟棄是般若於界捨是檀於界不擾濁是尸於界捨因緣是羼於界數數捨是進於界不起發是禪於界如幻想是般若如是等是名第一義諦善巧方便甚深法要能滿六波羅蜜以此法自為為他三世菩薩悉修是法成菩提故非世俗也此法能息衆生煩惱道苦道安置菩提道又華嚴明七地菩薩念念具足十波羅蜜當知諸地皆悉念念具足為存教道故至七地說之諸如此例是圓教六度相也今明釋迦因行須知迹示四相本行惟圓次慈悲喜捨各有生緣法緣無緣三種不同三藏生緣二乘但為自調止可攝入定學菩薩為度一切別修四無量心若至果成得名大慈大悲大喜大捨通教法緣三乘同修而亦自他利別別教次第修三圓教一心圓具迹四本一例前六度可知三十二相八十種好紫磨金色十力四無所畏四攝法十八不共神通道力成等正覺廣度衆生此次明果圓也三十二相具在法界次第初門及法數等文句亦略出之茲不暇録三藏以精進持戒而為相本若不持戒尚不能得人天之身況佛身相通教以空無生為相本別教以道種智為相本圓教以實相為相本今聞法華令我具足即是稱性發得亦能迹修前三也八十種好十力神通等具如法數例須先識四教不同之相然後結歸圓宗皆因提婆達多善知識故此結證由通經者益也初明弟子圓因報滿竟二明法師妙果當成三初明正果成二明所化度三明滅後利益今初告諸四衆提婆達多却後過無量劫當得成佛號曰天王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊世界名天道因名天熱果名天王國名天道總由徹悟性德第一義天非逆非順而逆而順故也非逆而逆其逆不可思議即逆而順故名天熱非順而順其順不可思議統逆成順故名天王行於非道通達佛道故名天道也問毗尼藏中明調達臨入獄時得無根信口稱南無未及稱佛身即陷墜佛記其三劫罪畢出獄為人當得辟支佛果號曰南無既悟道已持鉢受供甫得食時以宿命通自觀宿行知是臨終一稱南無善根之力愧不受食遂取滅度與此經授記何碩異耶答諸大菩薩遊戲神通普門示現三十二應具十界身遍于法界盡于未來例如央掘魔羅薩遮尼犍迦留陀夷等事大小兩機所見碩異皆由分得如來三密故也若知此意則知釋尊久遠成佛仍於大通威音等世示行因行乃至今品之明求法然燈之得受記一一無非垂迹利生善權方便殷勤稱歎方便良有以也二明所化度時天王佛住世二十中劫廣為衆生說於妙法恆河沙衆生得阿羅漢果無量衆生發緣覺心恆河沙衆生發無上道心得無生忍至不退轉三明滅後利益時天王佛般涅槃後正法住世二十中劫全身舍利起七寶塔高六十由旬縱廣四十由旬諸天人民悉以雜華末香燒香塗香衣服瓔珞幢幡寶蓋技樂歌頌禮拜供養七寶妙塔無量衆生得阿羅漢果無量衆生悟辟支佛不可思議衆生發菩提心至不退轉二結會古今竟三勸信佛告諸比丘未來世中若有善男子善女人聞妙法華經提婆達多品淨心信敬不生疑惑者不墮地獄餓鬼畜生生十方佛前所生之處常聞此經若生人天中受勝妙樂若在佛前蓮華化生淨心信敬者不于善惡之迹妄生分別名為淨心深知生生示現為怨正是成就作佛之大爐鞴名之為信于彼為怨為惱之人能起真實善知識想名之為敬了達鐘以扣鳴刀以磨利金以練精梅以寒香但取其益不計其非如子食乳不譏母醜如人採果不嫌枝曲名不生疑惑如是方是聞慧思慧修慧方能永離三塗常奉諸佛恆聞妙法蓮華化生也初明昔日達多通經釋迦成道竟二明今日文殊通經龍女作佛二初明通經二明利益初中五初智積請退二釋尊止之三文殊尋來四智積問五文殊答今初於時下方多寶世尊所從菩薩名曰智積白多寶佛當還本土問多寶已示入滅何得尚有所從菩薩答應是彼土奉侍供養寶塔之人能以神通願力隨從寶塔處處聽經亦由多寶如來神力所引攝故二釋尊止之釋迦牟尼佛告智積曰善男子且待須臾此有菩薩名文殊師利可與相見論說妙法可還本土智積意謂多寶佛塔秪為證經故出今勸物流通既訖是故請還釋迦則以迹門雖訖本門未彰故托在文殊以留多寶佛之密意非菩薩所知也三文殊尋來爾時文殊師利坐千葉蓮華大如車輪俱來菩薩亦坐寶蓮華從於大海娑竭羅龍宮自然涌出住虗空中詣靈鷲山從蓮華下至於佛所頭面敬禮二世尊足修敬已畢往智積所共相慰問却坐一面問序中文殊在座今何自海而來答凡有三義一者不起此會於海化物聖境隱顯非凡所測二者在序一時益訖去時豈必白知來時大益方生與衆自海而至三者梵文甚廣傳譯甚略彼處或具有出會之語例如華嚴入法界品等也問三千之外各有四百萬億那由他土無復大海文殊何故仍云海來答事釋未爽況不思議今以三義通之一者既移天人及變大海今神通力遠從所移處來應無遠弊二者海衆縱移而龍宮不動龍謂不動而所居已變從變而不變處來有何不可三者無緣者被徙有緣者今來此不思議山海宛然令衆不見但是變見非謂改體文殊既不起而往其土亦即穢而淨故淨名云移置他土都不使人有往來相此中乃使有往來相而本不移故知應有機者則土變衆移而尚來其無緣者則土復衆來而不至所以理雖無動化事成規故使所見不同來往時異菩薩化儀尚爾豈佛設變同凡問不起而往何故云來答示彼此衆知經功力識稟教益故須云來不往而往不來而來皆為利物何須此難故知此土雖云移去他土未必見來彼不見來此不見去不來不去而移事灼然如淨名經中如來足指按地是時大衆自見坐寶蓮華而土穢如故四智積問智積菩薩問文殊師利仁往龍宮所化衆生其數幾何五文殊答又四初答利益甚多二蒙益者集證三文殊結益四智積偈讚今初文殊師利言其數無量不可稱計非口所宣非心所測且待須臾自當證知二蒙益者集證所言未竟無數菩薩坐寶蓮華從海涌出詣靈鷲山住在虗空此諸菩薩皆是文殊師利之所化度具菩薩行皆共論說六波羅蜜本聲聞人在虗空中說聲聞行令皆修行大乘空義坐寶蓮華無數菩薩具有二種一者本發大心二者本是聲聞今蒙文殊法化同歸一實也大乘空義即諸法實相三文殊結益文殊師利謂智積曰於海教化其事如是四智積偈讚爾時智積菩薩以偈讚曰大智德勇健化度無量衆今此諸大會及我皆已見演暢實相義開闡一乘法廣導諸衆生令速成菩提初明通經竟二明利益九初文殊自敘二智積問三文殊答四智積執別教為疑五龍女明圓釋疑六身子挾三藏權難七龍女以一實除疑八時衆聞見得益九智積身子默然信受今初文殊師利言我於海中唯常宣說妙法華經二智積問智積問文殊師利言此經甚深微妙諸經中寶世所希有頗有衆生勤加精進修行此經速得佛不三文殊答文殊師利言有娑竭羅龍王女年始八歲智慧利根善知衆生諸根行業得陀羅尼諸佛所說甚深祕藏悉能受持深入禪定了達諸法於剎那頃發菩提心得不退轉辨才無礙慈念衆生猶如赤子功德具足心念口演微妙廣大慈悲仁讓志意和雅能至菩提智慧善知衆生總持能受佛藏皆圓慧也深入禪定了達諸法即圓定也定慧平等故能於剎那頃發菩提心所謂悟無生者方見剎那即是剎那際三昧也達此剎那無生無性頓入不可思議法界所謂介爾有心三千具足三千即空得位不退三千即假得行不退三千即中得念不退了知不縱不橫雙照橫豎故辨才無礙自悟心性與諸佛同愍念衆生同體在迷故慈念猶如赤子既能上合諸佛下同衆生所以功德具足能至菩提也心念口演四句皆是歎其圓行四智積執別教為疑智積菩薩言我見釋迦如來於無量劫難行苦行積功纍德求菩提道未曾止息觀三千大千世界乃至無有如芥子許非是菩薩捨身命處為衆生故然後乃得成菩提道不信此女於須臾頃便成正覺智積侍從寶塔專證圓經豈應不信蓋是為物騰疑耳釋迦苦行示迹同別乃化他之權龍女發心即登不退乃自行之實此但對偏為權以圓為實也須臾即上文所云剎那頃也然權實不二事理互融釋迦埀迹遍行難事既先久證圓理龍女示現剎那發心亦必久積資糧況無量劫解之元即一念而須臾頃性具十世古今如瞿目仙人執善財手于一念間備歷剎塵數劫承事諸佛行菩薩道理性不動佛事灼然若謂別教一向屬事圓教一向屬理則事理分張仍墮邊執事非理何以自立理非事何以自彰願讀經者思之五龍女明圓釋疑言論未訖時龍王女忽現於前頭面禮敬却住一面以偈讚曰深達罪福相遍照於十方微妙淨法身具相三十二以八十種好用莊嚴法身天人所戴仰龍神咸恭敬一切衆生類無不宗奉者又聞成菩提唯佛當證知我闡大乘教度脫苦衆生此由龍女持經得解故矢口讚佛即所以明圓而釋疑也初兩偈半讚佛明圓後一偈引證釋疑初言深達罪福相遍照於十方者罪福相秖是十法界相三塗為罪人天為福有漏為罪無漏為福偏空為罪出假為福二邊為罪中道為福但中為罪圓中為福既舉十法界相則性體乃至果報無不全收此十法界罪福相等皆是因緣生法當體即空即假即中三藏秖達因緣一句照六而不照十達則不深照則不遍通教秖達六界因緣即空達亦不深照亦不遍別次第達亦次第照猶不得名深達遍照唯有圓人了知現前一念豎徹三諦之底橫該十界之邊無一諦而非十界則豎非豎無一界而非三諦則橫非橫非豎非橫而橫而豎故言深達罪福相遍照於十方也又束此橫豎同名性德性德非橫非豎以諸凡聖常平等故且說為橫攬性成修須明六即修亦非橫非豎以無為法而有差別且說為豎理即在迷達而不達照而不照名字已去得達照名至究竟時達乃最深照乃最遍今讚究竟佛德故言深達罪福相遍照於十方也微妙淨法身者三千即假故微三千即中故妙三千即空故淨三德不縱橫不並別即是諸佛所證法身法身無相無所不相實相為大小相海之本故具三十二相八十種好一一相好皆即法界本是法身所具還用莊嚴法身所謂全性成修全修顯性也天人等四句如文可知又聞成菩提者牒上文殊稱讚龍女於剎那頃能至菩提也唯佛當證知者引佛為證釋寶積之疑問也我闡大乘教度脫苦衆生者意顯不久當往南方無垢世界成等正覺轉大法輪也六身子挾三藏權難時舍利弗語龍女言汝謂不久得無上道是事難信所以者何女身垢穢非是法器云何能得無上菩提佛道懸曠經無量劫勤苦積行具修諸度然後乃成又女人身猶有五障一者不得作梵天王二者帝釋三者魔王四者轉輪聖王五者佛身云何女身速得成佛身子於淨名經中曾與天女問答便已了知男女無有定相況今初周得悟登圓初住已與龍女所證是同何得實有此難亦是為物騰問耳七龍女以一實除疑爾時龍女有一寶珠價直三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速於此寶珠表修得圓因上佛表將因尅果佛即受之表獲果甚速也觀心釋者始覺為寶珠本覺為佛始覺合乎本覺為以珠上佛佛即受之當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺三十二相八十種好普為十方一切衆生演說妙法問胎經云魔梵釋女皆不捨身不受身悉於現身得成佛今乃變成男子然後成佛權實云何答胎經明現身成佛者約自行破無明惑言也實也此經明變成男子者約化他八相成道言也權也須知依圓頓教而修妙行的可立地成佛故云法性如大海不說有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌由其實行甚疾故以權行示現而證成之令人深信不疑也問女變成男即坐道場既無降神住胎出家等相何名八相成道答淨穢土別八相何必盡同又法身示現不可思議此土自見變女成男彼土仍見始終八相亦奚不可問舍利弗等已登圓住亦能八相作佛何以授記猶在曠劫之後答自行從實則所證理齊化他從權則物機不等況諸大弟子並是法身應現處處垂迹不同安知不于他界示成佛耶問設使舍利弗等已於他界作佛何必此中又示受記答此中受記使物見聞更結來緣令于未來得度如此橫則周遍十方豎則番番不已廣度衆生衆生之界仍不可盡安可以情計心測度法界大事八時衆見聞得益爾時娑婆世界菩薩聲聞天龍八部人與非人皆遙見彼龍女成佛普為時會人天說法心大歡喜悉遙敬禮彼土無量衆生聞法解悟得不退轉無量衆生得受道記無垢世界六反震動娑婆世界三千衆生住不退地三千衆生發菩提心而得受記先明遙見遙聞故遙敬禮次明彼土得益後明此土得益蓋南方緣熟宜以八相作佛此土緣薄秖以龍女教化皆是從體起用普現色身三昧之力得一身一切身能隨宜示現也九智積身子默然信受智積菩薩及舍利弗一切衆會默然信受提婆達多品竟持品第十三二萬菩薩奉命弘經故名持品重勸八十萬億那由他弘經故名勸持品此迹門流通第四品也文分為二初明受持二明勸持初中三初二萬菩薩奉命此土持經二聲聞發誓他國流通三諸尼請記今初爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬菩薩眷屬俱皆於佛前作是誓言惟願世尊不以為慮我等於佛滅後當奉持讀誦說此經典後惡世衆生善根轉少多增上慢貪利供養增不善根遠離解脫雖難可教化我等當起大忍力讀誦此經持說書寫種種供養不惜身命二聲聞發誓他國流通爾時衆中五百阿羅漢得受記者白佛言世尊我等亦自誓願於異國土廣說此經復有學無學八千人得受記者從座而起合掌向佛作是誓言世尊我等亦當於他國土廣說此經所以者何是娑婆國中人多弊惡懷增上慢功德淺薄瞋濁諂曲心不實故問此諸聲聞已成大士何故不能此土弘經答為引初心始行菩薩未能惡世苦行通經復欲開於安樂行品也三諸尼請記四初記大愛道及六千尼二記耶輸陀羅三諸尼領解四諸尼發願今初爾時佛姨母摩訶波闍波提比丘尼與學無學比丘尼六千人俱從座而起一心合掌瞻仰尊顏目不暫捨於時世尊告憍曇彌何故憂色而視如來汝心將無謂我不說汝名授阿耨多羅三藐三菩提記耶憍曇彌我先總說一切聲聞皆已授記今汝欲知記者將來之世當於六萬八千億諸佛法中為大法師及六千學無學比丘尼俱為法師汝如是漸漸具菩薩道當得作佛號一切衆生喜見如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊憍曇彌是一切衆生喜見佛及六千菩薩轉次授記得阿耨多羅三藐三菩提憍曇彌亦云喬答摩即瞿曇也梵音輕重耳此翻地最勝乃是剎利尊姓故以呼之二記耶輸陀羅爾時羅睺羅母耶輸陀羅比丘尼作是念世尊於授記中獨不說我名佛告耶輸陀羅汝於來世百千萬億諸佛法中修菩薩行為大法師漸具佛道於善國中當得作佛號具足千萬光相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊佛壽無量阿僧祇劫三諸尼領解爾時摩訶波闍波提比丘尼及耶輸陀羅比丘尼并其眷屬皆大歡喜得未曾有即於佛前而說偈言世尊導師安隱天人我等聞記心安具足四諸尼發願諸比丘尼說是偈已白佛言世尊我等亦能於他方國廣宣此經謙讓此土意與上聲聞同又或尼及聲聞皆是他方緣熟故也初明受持竟二明勸持二初長文二偈頌初中四初佛眼視二菩薩請敕三念佛默然四順佛意發誓今初爾時世尊視八十萬億那由他諸菩薩摩訶薩眼視默勸而不告敕者上來雖不別命而舉持經功德深厚引證分明多寶分身遠來勸發此之殷勤事義已足有欲應命宜即發誓不煩復言又為將護聲聞他方之願故不稱揚也二菩薩請敕是諸菩薩皆是阿惟越致轉不退法輪得諸陀羅尼即從座起至於佛前一心合掌而作是念若世尊告敕我等持說此經者當如佛教廣宣斯法三念佛默然復作是念佛今默然不見告敕我當云何四順佛意發誓時諸菩薩敬順佛意并欲自滿本願便於佛前作師子吼而發誓言世尊我等於如來滅後周旋往反十方世界能令衆生書寫此經受持讀誦解說其義如法修行正憶念皆是佛之威力惟願世尊在於他方遙見守護二明勸持中初長文竟二偈頌是孤起諸菩薩等請護弘經所以自述弘經方軌蓋由佛於法師品中說方軌竟寶塔募覓用方軌人達多引往用方軌者釋迦即是稟法軌衆故云以身為牀坐等今品即是惡世方軌安樂行是始行方軌故云住忍辱地等如後廣明若不爾者則弘經無軌如赤身入陳自損不虗被鎧之言不徒設也就文為四初明著衣弘經二明入室弘經三明坐座弘經四總結請知初中三初總論時節以明著衣二別明所忍之境三明著衣意今初即時諸菩薩俱同發聲而說偈言惟願不為慮於佛滅度後恐怖惡世中我等當廣說二別明所忍之境三初通明邪人即俗衆也二明道門增上慢者三明僭聖增上慢者於中初猶可忍第二過前第三最甚以後後者轉難識故今初有諸無智人惡口罵詈等及加刀杖者我等皆當忍二明道門增上慢者惡世中比丘邪智心諂曲未得謂為得我慢心充滿三明僭聖增上慢者或有阿練若納衣在空間自謂行真道遂乃輕賤在人間弘法華者彼為貪著利養故誑妄與白衣說相似法為世間無知人之所恭敬外現威儀猶如六通羅漢然而是人雖居阿練若實懷惡心常念世俗名利之事但是假名阿練若耳彼偏好出我等弘通大乘人之過而作如是謗言此諸比丘等為貪利養故說外道論議自作此經典誑惑世間人為求名聞故分別於是經彼等常在大衆之中欲毀我等弘法華人故向國王大臣婆羅門居士及餘比丘衆誹謗說我惡謂是邪見人說外道論義阿練若亦阿蘭若亦阿蘭那亦阿練兒此翻無諍亦翻無喧雜處凡居阿練若處為調煩惱今自舉蔑他非無諍行故云假名阿練若也毗尼藏中及大寶積經寶梁聚會并寶雲經佛藏經等一一廣明阿練若行若未相應且宜尋師進道何遽守愚自是願諸行者審自思之二別明所忍之境竟三明著衣意我等敬佛故悉忍是諸惡雖為斯人之所輕言汝等自作此經悉皆是佛然於如此輕慢之言皆當忍受之又濁劫惡世中多有諸恐怖惡鬼入其身罵詈毀辱我我等敬信佛當著忍辱鎧為說是經故忍此諸難事我不愛身命但惜無上道我等於來世護持佛所囑世尊自當知濁惡世比丘不知佛方便隨宜所說法惡口而嚬蹙數數見擯出遠離於塔寺如是等衆惡念佛告敕故皆當忍是事鎧者甲也忍辱鎧者以能忍辱則雖入惡世而不受傷猶入陳有甲不被刀箭之所害也須知四教皆各有忍辱鎧如中阿含經黑齒比丘訴佛云舍利弗罵我說我佛即喚舍利弗問之汝實罵說黑齒比丘不舍利弗言心不定者或說罵我心已定云何說罵如折牛角不觸嬈人如殘童子恥不惱彼我心如地水火風淨與不淨大小便利涕唾受而不罵心如掃淨不淨俱掃又如破器盛脂置之日中渧渧恆漏自觀九孔常漏不淨云何罵說於他又如死蛇狗等繫淨童子頸慚恥自愧不罵說他佛問如是惡人汝云同觀舍利弗答言人有五一身善口意不善但念其善不念不善如納衣比丘見糞聚弊帛左捉右舒截棄不淨而取於淨念用其身淨以規我身棄其口意以誡我口意二口行淨身意不淨亦念其口棄其身意如熱渴者值多草池披草掬水涼身止渴三意淨身口不淨亦念其意不用其身口如行路熱渴唯牛跡少水若用手掬水則渾濁應兩膝跪兩手憑地口就吸之以除熱渴四三業皆不淨者雖無可用當痛念之如路見病人安置使穩念此不淨使得值善知識治其三業勿令墮落三塗五三業皆淨常念是人以自訓況念齊願齊如清涼池多諸華草熱渴入中以自蘇息常念境界以去我惡此是三藏教中用苦無常不淨無我空為鎧也儒者云見賢思齊見不賢而內自省又云三人行必有我師擇其善者而從之其不善者而改之亦此義也毗婆沙云念罵是一語餘皆喚聲終日喚聲於我何為阿拘盧奢此言罵拘盧奢此言喚聲我今不應念其阿字若有阿字是名為罵若無阿字即是喚聲又此方是卑陋語他方是稱讚語我若念此卑語無處得樂此例甚多如尸羅羼提於此未為美辭彼方乃是二波羅蜜又就此土南北異稱浙閩殊喚於彼為讚於此為毀不可枚舉又觀此字罵若顛倒此字即成讚如見客去若云去早即名為留若云早去即名發遣發遣是罵留即是讚又如正食遇客若云來早即是罵也若云早來即是讚也世人執覽定有前後共為讚罵妄情積聚言聲性空又罵是一界少分一入少分一陰少分罵少不罵多十八界中是聲界少分十二入中是聲入少分于五陰中是色陰少分縱此少分是罵其餘非罵又誰成就罵罵是我就成就自彼於我何為彼自攬聲以成名句而謂是罵如醜在彼面於鏡何干又罵是一字一字不成罵二字成罵無有一時稱二字者若稱後字前字已滅又能罵所罵一時同一剎那俱滅於我何為如是等用析空為鎧也又能罵所罵皆同幻人罵字罵聲皆同谷響諦觀實我實法了不可得云何不忍此即空為鎧也又凡夫不了罵空起諸憂惱增長三毒故有三塗法界或強制安忍故有人天法界聖人了罵是空自斷結使故有二乘法界復于罵者生大悲心念拔其苦如子狂迷而罵其母母常憐念冀子病愈故有諸佛菩薩法界如此次第觀察罵中出生十界差別不同用即假為鎧也今經明念佛告敕故皆當忍是事佛即佛寶告敕即法寶佛法不二即僧寶一體三寶凡聖平等諸佛已悟衆生尚迷我為衆生翻迷歸悟持說此經了知我心上等諸佛下等衆生諸佛之悟即我心悟衆生之迷即我心迷如此之鎧即慈悲室即法空座一鎧一切鎧乃圓教鎧也初明著衣弘經竟二明入室弘經諸聚落城邑其有求法者我皆到其所說佛所囑法三明坐座弘經我是世尊使處衆無所畏我當善說法願佛安隱住四總結請知我於世尊前諸來十方佛發如是誓言佛自知我心持品竟
