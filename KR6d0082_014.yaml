body:
  text: 古吳後學蕅益智旭述釋安樂行品竟次釋從地涌出品從地涌出品第十五師嚴道尊鞠躬祇奉如來一命四方奔踊故言從地涌出品道在師故道尊師有道故師嚴師嚴故命不可違道尊故有命必赴命者一由寶塔品末云佛欲以此妙法華經付囑有在此命猶通二由此品之初他方菩薩請弘佛止之曰我娑婆世界自有六萬恆河沙等即別命也此世界悉檀也三世化物惠利無疆一月萬影孰能思量召過以示現弘經以益當故言從地涌出品為人悉檀虗空湛然無早無晚惑者執迹而暗其本召昔示今破近執而顯遠事故言從地涌出品虗空譬理理無早睌依理成事事有本迹或執近迹以失遠本本迹尚迷況不思議一故本弟子居下虗空本地之家師經久虗空今之師弟在今虗空久空今空下空上空雖則體一然本弟子元知近迹今之弟子猶迷遠本為破近執召昔示今今弟子因疑致請聞說方破執近之惡對治悉也寂場少父久服種智還年之藥故老而若少寂光老兒亦久稟常住不死之方故少而若老示其藥力咸令得知故言從地涌出品第一義悉文云是從何所來以何因緣集當知四悉檀因緣故涌出也然初一悉文在今品第二意兼後品三四二悉探用後品皆是助後以成顯遠善生惡破見本故也故知世界即後三悉之由今涌出品專在世界二本門開近顯遠三初從此至汝等自當因是得聞是序段二從爾時釋迦牟尼佛告彌勒菩薩下訖分別功德品初彌勒說偈是正說段三從爾時佛告彌勒訖常不輕品共三品半是流通段初序為二初涌出二疑問初中三初他方菩薩請弘經二如來不許三下方涌出今初爾時他方國土諸來菩薩摩訶薩過八恆河沙數於大衆中起合掌作禮而白佛言世尊若聽我等於佛滅後在此娑婆世界勤加精進護持讀誦書寫供養是經典者當於此土而廣說之他方菩薩已聞迹門說流通竟慕此通經勝福故願住此弘宣也二如來不許爾時佛告諸菩薩摩訶薩衆止善男子不須汝等護持此經所以者何我娑婆世界自有六萬恆河沙等菩薩摩訶薩一一菩薩各有六萬恆河沙眷屬是諸人等能於我滅後護持讀誦廣說此經如來止之凡有三義一者汝等各各自有己任若住此土廢彼利益二者他方菩薩此土結緣事淺雖欲宣授必無巨益三者若復許之則不得召下下若不來不得破近顯遠也問諸佛菩薩分身散影普遍十方誘化一切有何彼此而言己任及廢彼耶答佛菩薩心實無彼此但機有在無無始法爾初從此佛菩薩結緣還於此佛菩薩成熟由此須召下方也召下方來亦有三義一者是我弟子應弘我法二者以緣深廣能遍此土遍分身土而作利益三者得開近顯遠也各有己任無世界益結緣事淺無為人益不得破近無對治益不得顯遠無第一義益以無四益所以止之子弘父法有世界益結緣深廣有為人益開近有對治益顯遠有第一義益具有四益所以召之三下方涌出二初經家敘相二明問訊初中五初涌出二身相三住處四聞命五眷屬今初佛說是時娑婆世界三千大千國土地皆振裂而於其中有無量千萬億菩薩摩訶薩同時涌出地覆本時眷屬如迹隱本今開迹顯本故裂地以表之二身相是諸菩薩身皆金色三十二相無量光明三住處先盡在此娑婆世界之下此界虗空中住在此世界之下則不屬此世界此界虗空中住則不屬彼下界非此非彼即表中道常寂光土也常即常德寂即樂德光即淨我常即法身寂即解脫光即般若三德無不常樂我淨四德無非即空假中是為不縱不橫祕密之藏不即此界不離此界故以世界之下此界虗空表之住者以不住法住於祕藏也當知本有四德以為所依修得四德以為能依能所並有能依之身依於能所所依之土二義齊等方是毗盧遮那身土之相是故一人成佛時法界皆為此佛之依正一佛既爾當知一切諸佛亦復如是重重互遍重重互入重重互現重重互融又諸佛既爾當知一切菩薩之所分證亦復如是又諸佛菩薩滿分修德既爾當知一切衆生所有性德亦復如是無不互遍互入互現互融但迷悟攸分故即而常六然法性平等故六而常即所以阿鼻依正全處極聖之自心遮那身土不離下凡之一念也四聞命是諸菩薩聞釋迦牟尼佛所說音聲從下發來即是聞命故來弘法故來破執故來顯本故來也五眷屬一一菩薩皆是大衆唱導之首各將六萬恆河沙眷屬況將五萬四萬三萬二萬一萬恆河沙等眷屬者其數轉多況復乃至一恆河沙半恆河沙四分之一乃至千萬億那由他分之一其數轉多況復千萬億那由他眷屬其數轉多況復億萬眷屬其數轉多況復千萬百萬乃至一萬其數展轉倍多況復一千一百乃至一十其數展轉倍多況復將五四三二一弟子者其數展轉倍多況復單己樂遠離行其數展轉倍多如是等比無量無邊算數譬喻所不能知一一皆是導師之德能引衆人至於寶所當知一己非獨六萬恆沙眷屬非多也若約法門者一即一道清淨二即福智三即戒定慧四即四諦五即五眼六即六度一一度具十法界一一界各有十十即有百百即具千十善即有萬一度具萬六度即六萬法門多不為多一不為一非多非一而多而一初經家敘相竟二明問訊五初三業供養二陳問訊之辭三佛答安樂四偈頌隨喜五如來述歎初中三初正明供養二明所經時節三明佛神力加持今初是諸菩薩從地出已各詣虗空七寶妙塔多寶如來釋迦牟尼佛所到已向二世尊頭面禮足及至諸寶樹下師子座上佛所亦皆作禮右繞三匝合掌恭敬以諸菩薩種種讚法而以讚歎住在一面欣樂瞻仰於二世尊作禮右繞是身業供養種種讚歎是口業供養欣樂瞻仰是意業供養以此不思議三業供不思議三身而為能感故佛以神力應之令諸大衆長時謂短即狹見廣也二明所經時節是諸菩薩摩訶薩從初涌出以諸菩薩種種讚法而讚於佛如是時間經五十小劫是時釋迦牟尼佛默然而坐及諸四衆亦皆默然種種讚法而讚於佛遂經五十小劫何止百千恆河沙偈故知梵文積至八里未足為多也問釋迦住世僅八十年說法四十九載相傳八年說法華經何得有此五十小劫答如維摩丈室得容三萬二千師子之座一一座高八萬四千由旬既橫論大小小可容大則豎論久暫暫豈不容久耶問若爾則是延半日以為五十小劫也何故下云佛神力故令諸大衆謂如半日答非延半日而為五十小劫乃納五十小劫于半日中亦猶遠將燈王國中大師子座而入丈室非變丈室為師子座也問時無實法長短本空何得戲論有納入耶答若約真諦則大小久暫悉皆平等若約俗諦則大小久暫仍自歷然若約迷情不知全俗即真故言俗之時則大自大小自小久自久暫自暫不相容攝言真之時則一味掃蕩若約諸佛菩薩了達真俗不二故不惟一事攝一切理而且一事攝一切事所以丈室容師子座師子座不小丈室不大則知半日容五十劫五十劫不促半日不延也又若論寂光實報境界則下方菩薩常面稱揚如來默然常受其讚盡未來時無有疲厭亦不休歇若論同居穢土機緣則住世八旬事須唱滅故令大衆謂如半日若論方便淨土機緣則已破三界見思未破無明別惑應見菩薩讚歎經五十劫是知即此靈山橫論四土衆生福薄見佛入滅是同居土相也五十小劫讚歎于佛儼然未散方便土相也於阿僧祇劫常在靈鷲山衆生見劫盡我此土安隱實報寂光土相也問若方便土菩薩讚歎五十小劫今猶未散則此後十三品經何從得有答佛之神力不可思議為彼示長為此示短三世互入亦無所在如安樂行人一夢尚可經于千萬億劫豈不能攝未來之事令入現在俾此土衆生得沾滅後流通益耶三明佛神力加持五十小劫佛神力故令諸大衆謂如半日爾時四衆亦以佛神力故見諸菩薩遍滿無量百千萬億國土虗空若約真諦則時劫本空今約俗諦則五十小劫是實故已破無明者知見五十小劫未破無明者不堪耐久由佛神力令其謂如半日不生疲倦也又諸菩薩遍滿無量國土虗空豈惟肉眼不能遠矚縱令天眼何可盡瞻而今四衆以佛神力則能遍見當知長而謂短由迷情未袪狹而見廣由妙機當發又長而謂短意表本為迹隱此迹須開狹而見廣意表迹含於本此本須顯又自佛眼觀則長短平等廣狹平等如理則非本非迹自四眼觀則解者見長見廣如知遠本惑者見短見狹如執近迹今迷長謂短亦云佛之神力是顯佛能隨情即狹見廣亦云佛之神力是顯佛能破情又壽量未談故長令見短下方已涌故狹令見廣夫見雨猛知龍大見華盛知池深見所化如此之多則知能化甚大久遠既開顯已衆豈終惑所以下文神力品中滿百千歲然後還攝舌相不復更云謂如半日也初三業供養竟二陳問訊之辭是菩薩衆中有四導師一名上行二名無邊行三名淨行四名安立行是四菩薩於其衆中最為上首唱導之師在大衆前各共合掌觀釋迦牟尼佛而問訊言世尊少病少惱安樂行不所應度者受教易不不令世尊生疲勞耶爾時四大菩薩而說偈言世尊安樂少病少惱教化衆生得無疲倦又諸衆生受化易不不令世尊生疲勞耶初標四導師者欲擬開示悟入四十位耳如華嚴經但舉法慧德林金剛幢金剛藏說四十位也四皆名行者安樂行成也上行者開佛知見超于九界也無邊行者示佛知見一行一切行也淨行者悟佛知見事理融妙也安立行者入佛知見自安安他猶如大地也問辭有長文重頌各有二意一問如來安樂二問衆生易度安樂即自行易度即化他自行化他總不出于衣座室三衣座室三即安樂行前品用勗始行菩薩今地涌問佛亦不過云安樂行不而已故知圓行始終理同佛是究竟安樂行菩薩是分證安樂行前品是明觀行安樂行乃至一切衆生無非理即安樂行也三佛答安樂爾時世尊於菩薩大衆中而作是言如是如是諸善男子如來安樂少病少惱諸衆生等易可化度無有疲勞所以者何是諸衆生世世已來常受我化亦於過去諸佛恭敬尊重種諸善根此諸衆生始見我身聞我所說即皆信受入如來慧除先修習學小乘者如是之人我今亦令得聞是經入於佛慧佛答安樂易度兩事相成安樂故易度易度故安樂也所以者何下釋成易度之由由諸衆生世世受化故也然有二種一者種諸善根則始見我身聞說華嚴即皆信受入如來慧或聞方等般若亦入佛慧二者先修習小則漸漸調伏來至法華亦令聞經得入佛慧方等般若小乘亦有密得入者但不彰灼故此不言是知華嚴方等般若法華佛慧不殊不當優劣然佛慧雖同教相稍異且約華嚴法華對辨略明十異第一始見今見華嚴初成道時名為始見法華久後說實故名今見始見今見佛慧不殊也第二開合不開合華嚴日照高山即說於頓故不須開合為不入者開頓說漸展轉調伏令漸歸頓故法華為開已得合開合雖殊二頓無別也第三橫豎廣略華嚴頓直豎入入於法界故言豎廣不歷方便故言橫略法華備歷五味即是橫廣得入佛慧亦是豎廣然既入法界自當通達一切方便二經不殊也第四本迹不同華嚴以遮那為本千百億釋迦為迹法華以久成為本寂場為迹則華嚴之本秖是法華之迹又華嚴雖云或見如來初成道或見如來成道已無量劫意亦密顯于本而未彰灼明言成道久遠若斯是則非本非迹法界理同久本近迹隱顯事異也第五加說不加說華嚴唯阿僧祇及隨好品是佛自說餘皆菩薩被加而說法華迹門三周本門壽量等並佛自說雖加說自說理常平等而化儀有異也第六變土不變土華嚴即穢而淨表圓直大道故不須變法華轉穢為淨表會權歸實故須三變若變不變淨土不毀則無殊也第七多處不多處華嚴七處九會是為多處法華靈鷲虗空故不多處處雖多少理常平等也第八斥奪不斥奪華嚴初會永無聲聞故無斥奪法華正破小執故有斥奪又入法界品二乘如聾如啞故有斥奪法華皆與佛記故無斥奪華嚴但被界外兩機如醫輕重兩種不死之病收功猶易法華能治定性聲聞如令敗種復生于芽收功更奇也第九直顯開顯華嚴行大直道名直顯實法華決了聲聞法名開權顯實所顯之實終無二也第十根利根鈍利者華嚴即悟鈍者法華方悟利鈍雖殊悟理則一能令鈍悟功亦倍難也經宜不同略為十異種智法界等無差別故云始見我身聞我所說即皆信受入如來慧除先修習學小乘者我今亦令得聞是經入於佛慧明文在茲不須疑也諸師見其緣異逐緣異解迷不知反去道轉遠若識理同千車共轍佛慧無殊也然華嚴兼別以明佛慧方等對三以明佛慧般若帶二以明佛慧唯有法華開彼所兼所對所帶乃至三藏但生滅法咸成佛慧是則所詮圓理彼此無殊能詮之教純雜有異獨稱為妙良不虗也舊云華嚴了義滿字常住法華不了義非滿非常今以此文並之若始入是了義今入不了義者亦應始入是佛慧今入非佛慧若佛慧既齊則了義亦等滿常亦然又地人呼華嚴為圓宗法華為不真宗今亦用此文並之四偈頌隨喜爾時諸大菩薩而說偈言善哉善哉大雄世尊諸衆生等易可化度能問諸佛甚深智慧聞已信行我等隨喜能問者如華嚴方等般若經中俱有當機問法菩薩乃至法華經中身子三請俱是能問也所問者即甚深智慧所謂如來慧也五如來述歎於時世尊讚歎上首諸大菩薩善哉善哉善男子汝等能於如來發隨喜心菩薩隨喜能問能信之人佛乃歎其能於如來發隨喜心意顯諸能問者皆是古佛示迹故菩薩隨喜其迹如來述歎其本亦是密顯壽量也初涌出序竟二疑問序二初此土菩薩疑問二他土菩薩疑問初中二初長文敘疑念二偈頌正發問今初爾時彌勒菩薩及八千恆河沙諸菩薩衆皆作是念我等從昔已來不見不聞如是大菩薩摩訶薩衆從地涌出住世尊前合掌供養問訊如來彌勒及菩薩衆咸疑念者凡有四意一者自寂場以後今座以前十方大士來會不絶雖不可限我以補處智力悉見悉知何於此衆不識一人又我遊化十方奉覲諸佛一切海會咸所諳知就歷履處亦所不識若來若去推求不識不識則無世界益故須疑問二者彼諸大士是前進先達彌勒是後番末學後不知前例如文殊不知入定女人境界女人不知棄諸陰蓋菩薩境界以不識故不知彼之內善自善不生無為人益故須疑問三者彼等大士本實相底應現十方別頭教化所有真應皆非彌勒境界既不識彼利物之道即不識病無對治益故須疑問四者佛託弘經召諸大士大士奉師嚴命故來密開壽量非時衆之所知既不識如來密旨則無第一義益故須疑問也然彌勒迹居補處本亦應深何當如此不識凡有二義若約實論則近成補處不知久本若約權論則本高迹下為物騰疑也二偈頌正發問四初問來處來緣至四結請決疑今初時彌勒菩薩摩訶薩知八千恆河沙諸菩薩等心之所念并欲自決所疑合掌向佛以偈問曰無量千萬億大衆諸菩薩昔所未曾見願兩足尊說是從何所來以何因緣集巨身大神通智慧叵思議其志念堅固有大忍辱力衆生所樂見為從何所來一問何處來二問何因緣來也巨身大神通是歎入如來室智慧叵思議是歎坐如來座其志念堅固有大忍辱力是歎著如來衣三皆自行德也衆生所樂見是歎化他德也二敘眷屬數量一一諸菩薩所將諸眷屬其數無有量如恆河沙等或有大菩薩將六萬恆沙如是諸大衆一心求佛道是諸大師等六萬恆河沙俱來供養佛及護持是經將五萬恆沙其數過於是四萬及三萬二萬至一萬一千一百等乃至一恆沙半及三四分億萬分之一千萬那由他萬億諸弟子乃至於半億其數復過上百萬至一萬一千及一百五十與一十乃至三二一單己無眷屬樂於獨處者俱來至佛所其數轉過上如是諸大衆若人行籌數過於恆沙劫猶不能盡知三問師法是誰是諸大威德精進菩薩衆誰為其說法教化而成就從誰初發心稱揚何佛法受持行誰經修習何佛道四結請決疑又四初結歎至四明大會同請今初如是諸菩薩神通大智力二請答來處四方地振裂皆從中涌出世尊我昔來未曾見是事願說其所從國土之名號我常遊諸國未曾見是衆我於此衆中乃不識一人三請答來緣忽然從地出願說其因緣四明大會同請今此之大會無量百千億是諸菩薩等皆欲知此事是諸菩薩衆本末之因緣無量德世尊唯願決衆疑既云欲知本末因緣則若所師若來處若來緣總求佛答明矣初此土菩薩疑問竟二他土菩薩疑問爾時釋迦牟尼分身諸佛從無量千萬億他方國土來者在於八方諸寶樹下師子座上結加趺坐其佛侍者各各見是菩薩大衆於三千大千世界四方從地涌出住於虗空各白其佛言世尊此諸無量無邊阿僧祇菩薩大衆從何所來爾時諸佛各告侍者諸善男子且待須臾有菩薩摩訶薩名曰彌勒釋迦牟尼佛之所授記次當作佛已問斯事佛今答之汝等自當因是得聞分身眷屬橫在十方亦復不知本地未有四益故與彌勒同其疑問諸佛皆不為答抑待釋迦答彌勒者彌勒所問事迹不輕釋尊一代未曾顯說因茲答問廣顯長壽此大玄祕須待釋迦自開汝自當聞分身來集本為證明故不應答也初本門序段竟二正說段二初誡許二正說初中二初長文二偈頌長文又三初述歎二誡三許今初爾時釋迦牟尼佛告彌勒菩薩善哉善哉阿逸多乃能問佛如是大事初一善哉述其上契佛心次一善哉述其下契羣念開迹顯本乃一代時教所未顯談故為佛之大事又須約修德果位深遠不約性德平等理趣故名為事也二誡汝等當共一心被精進鎧發堅固意一心誡勿亂精進誡勿懈堅固誡勿退也良以如來實智久成權迹長遠化窮三世益遍十方非等覺已下所能思議故也亦是寄彌勒以誡大會三許如來今欲顯發宣示諸佛智慧諸佛自在神通之力諸佛師子奮迅之力諸佛威猛大勢之力諸佛智慧總標果智也自在是我德神通是樂德奮迅除垢是淨德大勢威猛是常德此點圓滿四德遍能三世益物故皆名力約過去久遠久遠名為自在神通約現在分身遍滿十方名為師子奮迅約未來益物永永不窮名為大勢威猛或可奮迅是將前之狀表未來益物大勢是震動十方即現在益物亦無不可又自在神通是究竟慈悲室師子奮迅是究竟法空座威猛大勢是究竟忍辱衣證此究竟三德故力遍十方三世為益不窮也初長文竟二偈頌三初頌誡二頌許略不顯述歎今初爾時世尊欲重宣此義而說偈言當精進一心我欲說此事勿得有疑悔二頌許佛智叵思議汝今出信力住於忍善中昔所未聞法今皆當得聞我今安慰汝勿得懷疑懼佛無不實語智慧不可量所得第一法甚深叵分別如是今當說汝等一心聽初誡許竟二正說三初從此訖壽量品是正開近顯遠二分別功德品初長文是總授法身記三彌勒說偈是總申領解初中二初訖此品是略開顯動執生疑二壽量品是廣開顯斷疑生信初又二初略開二疑請初又二初長文二偈頌初又二初答所師二答來處不答何因緣集所以下文重請今初爾時世尊說此偈已告彌勒菩薩我今於此大衆宣告汝等阿逸多是諸大菩薩摩訶薩無量無數阿僧祇從地涌出汝等昔所未見者我於是娑婆世界得阿耨多羅三藐三菩提已教化示導是諸菩薩調伏其心令發道意此先答誰為其說法教化而成就從誰初發心之問也二答來處又二初答二釋今初此諸菩薩皆於是娑婆世界之下此界虗空中住於諸經典讀誦通利思惟分別正憶念界下空中略如前釋此答其住處即是來處也於諸經典等者追答稱揚何佛法受持行誰經修習何佛道之問也於諸經典者圓人受法無法不圓法華妙典一切十方三世經典悉入其中權實不二終不取一捨一此答稱揚也讀誦通利思惟分別是答受持正憶念是答修習二釋又二初釋住處二釋稱揚受持修習今初阿逸多是諸善男子等不樂在衆多有所說常樂靜處勤行精進未曾休息亦不依止人天而住不樂在衆者界內界外五陰名之為衆二邊分別名為多有所說靜處者中道第一義諦也法界一相絶待無餘故名靜處勤行精進未曾休息者心心流注任運與薩婆若相應也不依人天者人表有邊天表空表不依二邊故以此界虗空表之正住常寂光法性土也二釋稱揚受持修習常樂深智無有障礙亦常樂於諸佛之法一心精進求無上慧由其常樂深智無有障礙所以於諸經典悉皆稱揚由其常樂諸佛之法所以讀誦通利思惟分別由其一心精進求無上慧所以能正憶念也初長文竟二偈頌二初頌長文二正略開顯初中二初頌答所師二頌答來處今初爾時世尊欲重宣此義而說偈言阿逸汝當知是諸大菩薩從無數劫來修習佛智慧悉是我所化令發大道心此等是我子長文但云得菩提已化令發心不云無數劫來或謂止是圓頓利根一生超證此中但云無數劫來是我所化不云在成道後或謂止是行因行時化令發心故為但答所師未曾彰灼開顯二頌答來處依止是世界常行頭陀事志樂於靜處捨大衆憒鬧不樂多所說如是諸子等學習我道法晝夜常精進為求佛道故在娑婆世界下方空中住志念力堅固常勤求智慧說種種妙法其心無所畏初頌長文竟二正略開顯我於伽耶城菩提樹下坐得成最正覺轉無上法輪爾乃教化之令初發道心今皆住不退悉當得成佛我今說實語汝等一心信我從久遠來教化是等衆既云成道之後令初發心又云從久遠來教化是等乃是略開近而顯遠所以動執生疑也初略開竟二疑請二初長文二偈頌初中二初經家敘疑二騰疑請答今初爾時彌勒菩薩摩訶薩及無數諸菩薩等心生疑惑怪未曾有而作是念云何世尊於少時間教化如是無量無邊阿僧祇諸大菩薩令住阿耨多羅三藐三菩提二騰疑請答二初騰疑二請答初中三初法說二立譬三法合初又三初執近疑遠二執遠疑近三結難信今初即白佛言世尊如來為太子時出於釋宮去伽耶城不遠坐於道場得成阿耨多羅三藐三菩提從是已來始過四十餘年世尊云何於此少時大作佛事以佛勢力以佛功德教化如是無量大菩薩衆當成阿耨多羅三藐三菩提二執遠疑近世尊此大菩薩衆假使有人於千萬億劫數不能盡不得其邊斯等久遠已來於無量無邊諸佛所植諸善根成就菩薩道常修梵行三結難信世尊如此之事世所難信初法說竟二立譬譬如有人色美髮黑年二十五指百歲人言是我子此譬上執近而疑遠也色美髮黑總是明年少耳其百歲人亦指年少言是我父生育我等此譬上執遠而疑近也是事難信此譬結難信也三法合佛亦如是得道已來其量未久此合年二十五不應有百歲子也而此大衆諸菩薩等已於無量千萬億劫為佛道故勤行精進善入出住無量百千萬億三昧得大神通久修梵行善能次第習諸善法巧於問答人中之寶一切世間甚為希有此合百歲之人不應是年二十五者所生也今日世尊方云得佛道時初令發心教化示導令向阿耨多羅三藐三菩提世尊得佛未久乃能作此大功德事此合結難信也初騰疑竟二請答又二初明請意二正請答初又二初為現在二為未來今初我等雖復信佛隨宜所說佛所出言未曾虗妄佛所知者皆悉通達我等雖未了知仰信而已二為未來然諸新發意菩薩於佛滅後若聞是語或不信受而起破法罪業因緣淺行易生誹謗謗墮惡道不退者雖復仰信以未了知不能增道損生故須答釋令謗者生信信者增道損生也初明請意竟二正請答唯然世尊願為解說除我等疑及未來世諸善男子聞此事已亦不生疑一請除現在疑二請除未來疑也初長文竟二偈頌二初頌騰疑二頌請答初中二初頌法說二頌立譬三頌法合初又三初頌執近二頌執遠三頌結難信今初爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種出家近伽耶坐於菩提樹爾來尚未久二頌執遠此諸佛子等其數不可量久已行佛道住於神通力善學菩薩道不染世間法如蓮華在水從地而涌出皆起恭敬心住於世尊前三頌結難信是事難思議云何而可信佛得道甚近所成就甚多願為除衆疑如實分別說初頌法說竟二頌立譬譬如少壯人年始二十五示人百歲子髮白而面皺是等我所生子亦說是父父少而子老舉世所不信初五句頌譬執近疑遠次一句頌譬執遠疑近後二句頌譬結難信也三頌法合世尊亦如是得道來甚近是諸菩薩等志固無怯弱從無量劫來而行菩薩道巧於難問答其心無所畏忍辱心決定端正有威德十方佛所讚善能分別說不樂在人衆常好在禪定為求佛道故於下空中住初半偈頌合年二十五次三偈半頌合百歲子略不頌合結難信也初頌騰疑竟二頌請答我等從佛聞於此事無疑願佛為未來演說令開解若有於此經生疑不信者即當墮惡道願今為解說是無量菩薩云何於少時教化令發心而住不退地初略開顯動執生疑竟釋從地涌出品竟次釋壽量品如來壽量品第十六如來者十方三世諸佛二佛三佛本佛迹佛之通號也壽者受也量者詮量也詮量十方三世二佛三佛本佛迹佛之功德也今正詮量本地三佛功德故言如來壽量品如來義甚多今且明二身三身餘例可解二身者真身如來應身如來也如成論云乘如實道來成正覺故名如來即二身義顯何者乘是如智實是如境道是因覺是果若單論乘則如無所知若單明實則如無能知境智和合則有因果照境未窮名因盡源為果因圓果滿即是乘如實道來成正覺此真身如來也以如實智乘如實道來生三有示正成覺即應身如來也報智冥法名為真身從體起用名為應身但云二身攝法周足三身者法身如來報身如來化身如來也如大論云如法相解如法相說故名如來即三身義足何者如即法如如境非因非果有佛無佛性相常然遍一切處而無有異故名為如不動而至名之為來此約所證即法身如來也又復如智稱於如理從理名如從智名來故曰如法相解此約能證即報身如來也又以如如境智合故即能處處示成正覺轉正法輪故曰如法相說此約起用即化身如來也偈云水銀和真金能塗諸色像功德和法身處處應現往如明月之影遍萬川故名為應亦名為化此之三身不可單取故大經云法身亦非涅槃般若亦非涅槃解脫亦非涅槃三法具足稱祕密藏名大涅槃當知三身不可一異縱橫並別圓覽三法稱假名如來也文云非如非異者非彼偏如以顯圓如即法身如來義又云如來如實知見三界之相即如如智稱如如境以一切種智知以佛眼見是報身如來義又云或示己身己事或示他身他事即應身如來義若但性德三如來者是橫若但修德三如來者是縱若先法次報後應亦是縱今經圓說不縱不橫三如來也縱橫三身尚非今義況三藏通教所明如來耶又法華前亦明圓三身義同是迹中三身耳發迹顯本三如來者永異諸經故天親論云示現成大菩提無上故示三種菩提一應化菩提隨所應現即為示現如經出釋氏宮故二報佛菩提十地滿足得常涅槃如經我實成佛已來無量無邊劫故三法佛菩提謂如來藏性淨涅槃不變如經如來如實知見三界之相故經具其義論出其名不如上釋寧會經論耶又三身各論單復單義如前法身復者一自性清淨法身二離垢妙極法身報身復者一自受用報二他受用報應身復者一勝應二劣應又一應現佛界身二應現九界身若束此單復三身而為二身則二種法身及自受用報名為真身他受用報及勝劣應等名為應身故知若復若單若三若二平等平等更欲廣說則四身十身三十二身無量身等開合自在多不為多少不為少非少非多而少而多倘執名相而欲妄較諸經優劣遠之遠矣次明壽量者真如不隔諸法故名為受此法身壽也境智相應故名為受此報身壽也一期示現連持不斷故名為受此應身壽也詮量法身如來如理壽命詮量報身如來智慧壽命詮量應身如來同緣壽命故言壽量法身如來如理壽命者有佛無佛性相常然不論相應不論連持非無量非有量故文云非如非異非實非虗蓋詮量法身如理命也報身如來智慧壽命者以如如智契如如境境發智為報智冥境為受境既無量無邊常住不滅智亦如是譬如函大蓋大故文云我智力如是久修業所得慧光照無量壽命無數劫此詮報身智慧命也應身如來同緣壽命者緣長則長緣促則促如水清月現月實不來水濁月亡月亦不去故文云數數現生數數現滅或復自說名字不同年紀大小此詮應身同緣命也當知所詮不出四句一者有量二者無量三者亦有量亦無量四者非有量非無量有量則無常無量則常雙亦則亦常亦無常雙非則非常非無常今以四句更作別圓二釋一別教各釋者非常非無常雙非理極即法身也常即報身報智冥法亦非常非無常但取金剛道後正智圓滿不復生滅故名為常又依唯識則法身不生不滅故名為常報身生因所生故非常圓滿成就故非無常即雙非句也亦常亦無常即是應身應用無盡故亦常數數唱滅故亦無常也無常即是金剛心前智用增進乃至凡夫生滅出沒皆是無常也三佛各一句凡夫共一句故是別義二圓教通釋者三身各備四句法身四句者不生不滅故名為常無彼凡夫妄計倒常故名無常寂而雙照故名亦常亦無常雙破凡聖八倒故名非常非無常也報身四句者出過二乘故名為常無妄計常故名無常智能雙照故名亦常亦無常智冥諦境故名非常非無常也應身四句者應用不絶故名為常示同生滅故名無常兩義雙具故名亦常亦無常既非實報亦非業感故名非常非無常也乃至凡夫亦具三種四句心性隨緣不變故名為常所謂自從無始至盡未來輪回生死而生實不生死實不死此是性具法身常也即此心性不變隨緣流轉五道生滅不停名為無常此是法身無常義也隨緣不變故亦常不變隨緣故亦無常此是法身雙亦義也雖不變而非凝然雖隨緣而非斷滅此是法身雙非義也約性具法身既得作此四句依法身而起惑惑即般若即是性具報身亦作四句依惑苦而起業業即解脫即是性具應身亦作四句是為凡夫理即三身各各四句尚無四句名字何況行用圓人稱理而解故有名字三身四句觀行三身四句乃至果成則為究竟三身四句從始至終一身即三身三身即一身不一不異亦不縱橫當知一佛身即具諸身壽命功德隨緣感見長短不同大經云凡夫二乘見佛壽命猶如冬日菩薩所見猶如春日唯佛見佛壽命無量猶如夏日所以然者凡夫博地翳障朧藏通二乘雖斷四住不見中道若捨分段受法性身未破無明方便土中所見之佛猶是勝應當知二乘秖見冬日若諸菩薩未登別地圓住所見同彼凡夫二乘若破無明乃至受于分證法身與而言之得見報身壽命奪而言之他受用報猶名勝應未窮報身之源未盡法性之極所見佛壽猶是春日唯佛與佛窮性盡源見法身壽猶如夏日也故舉三譬譬之一者於諸常中虗空第一一切壽命如來第一此譬法身壽命無始無終性相凝湛也二者譬如四河皆歸大海此譬報身壽命所修萬善皆感佛報歸壽命海也三者阿耨達池出四大河此譬應身壽命從法報出隨緣長短也此品詮量通明三身若從別意正在報身何以故義便文會義便者報身智慧上冥下契三身宛足文會者我成佛來甚大久遠故能三世利益衆生所成即法身能成即報身法報合故能益物以此推之正意是論報身佛功德也如是三身種種功德悉是過去久遠久遠劫前道場樹下先所成就名之為本中間今日寂滅道場所成就者名之為迹非本無以垂迹非迹無以顯本本迹雖殊不思議一也若諸經所說本迹則以寂場所成法報為本從本所起勝劣兩應為迹今以寂場所成三身乃至無量劫來中間所成三身皆名為迹獨取最初實得菩提所成三身名之為本故與諸經異也二廣開顯斷疑生信為二初誡信二正答初中四初三誡二三請三重請四重誡共為四請四誡并前迹門三請一誡合有五誡七請奇特大事殷勤鄭重也今初三誡爾時佛告諸菩薩及一切大衆諸善男子汝等當信解如來誠諦之語復告大衆汝等當信解如來誠諦之語又復告諸大衆汝等當信解如來誠諦之語誠是忠誠諦是審實不欺於物言則詣真昔由機淺止可隨他意語故方便施權說三說近未告誠實今是隨自意語故言誠諦也二三請是時菩薩大衆彌勒為首合掌白佛言世尊惟願說之我等當信受佛語如是三白已菩薩既秉誠誡不敢致疑說必信受也三重請復言惟願說之我等當信受佛語四重誡爾時世尊知諸菩薩三請不止而告之言汝等諦聽初誡信竟二正答二初長文二偈頌初中二初正開近顯遠二明三世益物初又二初出執近之情二破近顯遠今初如來祕密神通之力一切世間天人及阿修羅皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠坐於道場得阿耨多羅三藐三菩提此文三意初云如來祕密神通之力是出所迷之法二云一切世間天人及阿修羅是出能迷之衆三云皆謂今釋迦等是出其迷遠之情謂也祕密者一身即三身名為祕三身即一身名為密又昔所不說名為祕唯佛自知名為密神通之力者三身之用也神是天然不動之理即法性身通是無壅不思議慧即果報身力是幹用自在即應化身也佛於三世等有三身實得三身其來甚久於諸教中祕而不說故一切世間天人阿修羅皆謂今佛始於道樹得此三身乃執近以疑遠也此本說中不復言及二乘二乘開已皆名菩薩故但對菩薩菩薩攝在天人修羅三善道內餘三惡趣罪重根鈍少智并不知作此情謂也菩薩有三種下方他方舊住下方即本日所化故無執近之謂他方舊住俱有二種一從法身應生者往世先得無生或先已聞發迹顯本設往世未曾得聞往世報盡受法性身於法身地自應得聞長遠之說是故應生菩薩多無執近之謂二者今生始得無生法忍及未得者咸有此謂也二破近顯遠上文誠諦之誡正為此復為二初正顯遠二舉譬格量久遠今初然善男子我實成佛已來無量無邊百千萬億那由他劫成佛甚大久遠則伽耶近謂即破二舉譬格量久遠又三初舉譬問二答三合顯久遠今初譬如五百千萬億那由他阿僧祇三千大千世界假使有人抹為微塵過於東方五百千萬億那由他阿僧祇國乃下一塵如是東行盡是微塵諸善男子於意云何是諸世界可得思惟校計知其數不直爾下塵之界尚不可說況下塵不下塵界豈可說耶二答彌勒菩薩等俱白佛言世尊是諸世界無量無邊非算數所知亦非心力所及一切聲聞辟支佛以無漏智不能思惟知其限數我等住阿惟越致地於是事中亦所不達世尊如是世界無量無邊一非算數心力所及二非無漏智所思惟三非阿惟越致所達蓋惟佛智之所知耳故佛功德如十方大地土十地功德如閻浮地土非虗語也三合顯久遠爾時佛告大菩薩衆諸善男子今當分明宣語汝等是諸世界若著微塵及不著者盡以為塵一塵一劫我成佛已來復過於此百千萬億那由他阿僧祇劫下塵不下塵界已不可說況界復為塵耶況復過於此耶僧傳云羅什舊經無一塵一劫四字有齊高僧曇副誦經感夢云少一句後果得之金光明經云一切海水可知滴數無有能知如來之壽此亦明未來常住非明過去久成也若引證此殊不相應又有約法身解此者則有二迷一法身無始豈論遠劫二法身平等何獨釋迦先成故知不達經宗求深反淺問一切諸佛悉顯本不若有顯有不顯則不得云諸佛道同亦不得云是我方便諸佛亦然若同皆顯本則諸佛皆云成佛甚久遠耶答顯本可同遠近不等例如日月燈明八子大通智勝有十六子釋迦一子有子是同數不必等又凡成佛則所證三身必同故云諸佛道同三世益物必同故云是我方便諸佛亦然耳況本高迹下本下迹高本迹俱高本迹俱下凡有四句一期開顯何必盡同惟原始要終則諸佛所證之體同滿三身所起之用同亘三世故不可說有異也初正開近顯遠竟二明三世益物此以最初成道為體為本從體起用為迹又以最初實得體用為本從是以來所有三世體用皆為迹也文分為二初法說二譬說初中二初正明三世益物二總結不虗初又三初明過去益物二明現在益物三明未來益物初又三初過去益物處二拂過去迹疑三明過去益物所宜今初自從是來我常在此娑婆世界說法教化亦於餘處百千萬億那由他阿僧祇國導利衆生須顯處者上明成道甚久久居何處故云常在此界及於餘國說法利生也此之娑婆即本應身所居之土今日迹居不移於本但今昔時異見燒者謂近照本者達遠故云我淨土不毀常在靈鷲山豈離伽耶別求常寂非寂光外別有娑婆二拂過去迹疑諸善男子於是中間我說然燈佛等又復言其入於涅槃如是皆以方便分別疑曰若成佛如此之久云何經中說於然燈佛時方得授記又既成佛證常住身云何儒童菩薩在然燈時得記弘法壽終入滅更生餘處諸如此類不一而足今拂之曰皆是方便分別譬如幻師所現幻事非實爾時方得授記亦非業果分段生身捨壽入滅皆是從本所垂諸化迹耳三明過去益物所宜又二初感應二施化今初諸善男子若有衆生來至我所我以佛眼觀其信等諸根利鈍隨所應度至我所者即是過去衆生漸頓兩機冥扣法身也佛眼觀者即是久已成佛用佛眼鑑照無有遺差將欲起於劣勝兩應而利益之善機凡有二力一感人天華報及三乘權果二感佛道實果若以法眼觀知萬善緣其輕重各得華報及權果報不能究竟知其終得種智果報若以佛眼圓照萬善則能具知始末華果此經一向明佛眼觀能知衆生所有萬善究竟得佛種智果也信等諸根即五根也慧根是了因信進念定四根皆屬緣因此二善根各有利鈍通攝頓漸機緣頓機利鈍即圓別根機漸機利鈍即通藏根機又大乘根名利小乘根名鈍又小乘根名利人天乘名鈍又四教乃至人天諸根各各自論利鈍十法界衆生所有善根利鈍為機如來悉照無有遺差隨所應度而現形聲饒益也二施化又二初明形聲兩益二明得益歡喜今初處處自說名字不同年紀大小亦復現言當入涅槃又以種種方便說微妙法名字不同年紀大小即非生現生當入涅槃即非滅現滅皆形益也方便說法即聲益也處處者豎則微塵劫數橫則十方剎海一一劫中皆遍十方一一剎中皆歷塵劫無非如來垂迹之時處也名字不同者或示勝應或示劣應或示佛身或示菩薩聲聞等身身既不同故名字亦不同也年紀大小者既示有身則有壽命修短不等也應以現生而得度者既能處處非生現生應以現滅而得度者亦必處處非滅現滅故云亦復現言當入涅槃也種種方便說微妙法者或頓或漸或顯或密或定不定或兼或但或對或帶或施或開或廢或立總是如來善巧方便總令衆生究竟得成一切種智故微妙也二明得益歡喜能令衆生發歡喜心由施形聲兩化令得權實四益但云歡喜舉一以攝三也初明過去益物竟二明現在益物二初感應二施化今初諸善男子如來見諸衆生樂於小法德薄垢重者如來見者即佛眼照也諸衆生樂小法者所見之機也貪愛二十五有即人天機名樂小法自求現滅即二乘機名樂小法樂於漸次紆回佛道即三教菩薩機亦名為樂小法乃至樂近說者亦名為樂小法緣了二善功用微劣名為德薄見思塵沙無明三惑濃厚名為垢重問非生現生備施頓漸二化七方便等可是樂小法者圓頓赴機是應樂大法者云何通名為樂小法耶答此有四義一約往日雖發大心不能專精多著弊欲不得出世故名弊欲以為小法二約現在如佛未出世諸天人等雖有大機而心染世樂或著邪見故名為樂小法此二義與下譬中宛轉於地之意同也三約修行雖不樂三界愛見小法而樂三乘灰斷亦名小法雖不樂三乘近果而樂歷別修行一乘不能一心圓頓普修故名樂小此三意約因門明樂小法也四約果門樂聞近成之小出釋氏宮始得菩提不樂欲聞長遠大久之道故言樂小此等小心非始今日若先樂大佛即不說始成說始成者皆為樂小者耳二施化二初明現形二明說法今初為是人說我少出家得阿耨多羅三藐三菩提然我實成佛已來久遠若斯但以方便教化衆生令入佛道作如是說此明現在為衆生故非生現生而生實非生也前明頓漸兩機來感法身今即現勝劣兩應劣應應漸機勝應應頓機此兩種應並有生法二身示生之相劣應二身生相者正慧托胎右脅出生即行七步一手指天一手指地自言天上天下唯吾獨尊此生身生相也坐吉祥草三十四心斷結習盡證得五分法身即法身生相也勝應二身生相者乘旃檀宮與諸菩薩處摩耶胎常說大乘作大佛事從右脅出十方周行各各七步作師子吼此生身生相也寂滅道場坐菩提座金剛後心斷無明盡妙覺朗然窮照法性種智圓明萬德普備此法身生相也出家者劣應出分段家勝應出二死家得菩提者劣應得生滅四諦所發無漏盡無生智名為菩提勝應照三諦一實之道究竟一切種智為菩提也勝劣二種生身生相秖是一番托胎出生但大小兩機所見不同故須甄明非有兩番托胎出生也二種出家二種成道二種法身生相亦無不然故云雙垂兩相二始同時然我實成佛下明本實不生彼天人阿修羅等今始見此二種生法二身謂言始生其實不然然我實成佛道甚大久遠如上所說剎塵之譬尚復過之今日現生非實生也或疑既非實生何故現生釋曰但為方便教化德薄垢重衆生令入佛道所以作如是說我少出家得菩提耳餘大乘經但破劣應生法二身生實非生不破勝應生法二身今云成佛甚久正破勝應法身非從寂場始生故與餘經永異二明說法又二初正明一代所說二釋出巧說之由今初諸善男子如來所演經典皆為度脫衆生或說己身或說他身或示己身或示他身或示己事或示他事諸所言說皆實不虗所演經典遍指一代五味八教也皆為度脫衆生總釋頓漸顯密定與不定無非應病與藥令得度脫故也或說己身等略舉一代教中所有種種差別示現事也說自己往昔因緣名說己身說諸佛菩薩及餘弟子種種因緣名說他身現佛界像名示己身現九界像名示他身或現勝應名示己身現劣應身名示他身現佛界事名示己事現九界事名示他事或現種智名示己事現小智斷名示他事現大自在名示己事現九惱等名示他事諸所言說皆實不虗者明其不同世間之寓言也為衆生故一一示現一一有因有果一一有始有終惟其所說己身他身所示己身他身己事他事並無分毫虗言誑語故能度脫一切衆生譬如幻師于四衢道幻作象馬牛羊種種諸物象即是象馬即是馬更無一物而不酷肖乃能令彼愚小歡悅佛亦如是以法性大幻三昧遍于十方三世幻作己身他身己事他事說示于人令彼衆生咸得見聞並無一事徒搆空言乃使衆生信受而得度脫也二釋出巧說之由又二初明由照權實理故即是說示之本二明由稱漸頓機故即是說示之緣今初所以者何如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界如斯之事如來明見無有錯謬夫現前一念真如法性本無一法可得而無法不具無法不造一切凡聖平等無差然凡夫及二乘人則滯于二死不能自度自脫因位諸大菩薩則局於數量不能橫遍豎窮皆由于此真如法性未能圓滿徹證故也惟有如來久遠劫來圓滿徹證此真法性故能以種智佛眼如實知見分段變易二種三界之相當體即是真如實相了知二種生死即非生死無有若退而在世者既無生死可退則無生死可出故無有若出而滅度者無有生死若退若出是十界實法皆空亦無在世及滅度者是十界假名皆空生死涅槃等如昨夢故非實迷為生死悟證涅槃緣起宛然故非虗無差別而十界差別故非如即差別而一性融通故非異不同二種三界之人或見三界為有或見三界為空故云不如三界見於三界也如斯之事即結指上文所明真俗妙諦即生死無有生死即退無有退即出無有出即在世無在世者即滅度無滅度者即實非實即虗非虗即如非如即異非異是謂即俗而真之事如來以如理智而明見之無有錯謬故能隨智說于隨自意語開權顯實開迹顯本也無有生死而妄見生死無有退出而妄見退出無在世而妄見在世無滅度而妄見滅度非實而妄見實非虗而妄見虗非如而妄見如非異而妄見異是謂即真而俗之事如來以如量智而明見之無有錯謬故能隨情說于隨他意語為實施權為本垂迹也二明由稱漸頓機故即是說示之緣以諸衆生有種種性種種欲種種行種種憶想分別故欲令生諸善根以若干因緣譬喻言辭種種說法所作佛事未曾暫廢種種者頓漸利鈍千差萬別也性者習欲所成指過去根種也欲者樂欲即從種所發之現行也行者隨諸樂欲所作善惡業行乃至三乘一乘出世行也憶想分別者隨所作行而生于解即相似智慧也於種種性宜用種種為人悉檀於種種欲宜用種種世界悉檀於種種行宜用種種為人對治二悉於種種憶想分別宜用種種第一義悉何以故隨其所得憶想之解更為說法即得朗悟第一義故乃至初地欲樂修行第二地時亦必憶想二地之境即是念想若發二地真解即是念想觀除言語法滅直至佛地方得究竟離于憶想獲常寂照耳故以若干因緣譬喻之辭種種說法令其生諸善根所作佛事未曾暫廢也權實善根有三五七九之不同故名為諸究竟皆歸一切種智故名佛事三輪不思議化晝夜常演令他得益無有間歇故云未曾暫廢二明現在益物竟三明未來益物二初正明非滅唱滅以益未來二釋須唱滅意初又二初明本實不滅二明方便唱滅今初如是我成佛已來甚大久遠壽命無量阿僧祇劫常住不滅諸善男子我本行菩薩道時所成壽命今猶未盡復倍上數甚大久遠壽命無量阿僧祇劫牒前過去事也常住不滅正明未來永永恆益物也我本行下舉因況果以明常住謂于本未成佛已前初悟圓因而登圓住分證常住法身之壽已不可盡倍於如上所說塵數何況果壽而非常住譬如太子時祿已不可盡況登尊極祿用寧可盡乎當知法身壽命無始無終報身壽命有始無終應身壽命隨緣修短示有始終今正明報身修得壽命故過去雖約剎塵為譬仍是有始未來直云常住不滅則是無終也然三身本非一異鈍者但見應化不知即報即法所以妄計無常利者即于應化而悟法報所以能知常住耳二明方便唱滅然今非實滅度而便唱言當取滅度如來以是方便教化衆生現在衆生見佛聞法或始見我身聞我所說即皆信受入如來慧或先修習學小乘者我今亦令得聞是經入於佛慧既入佛慧即知如來常住不滅不為此人而唱滅也其有悠悠結緣之衆乃至五千退席之流移置他方之類現在未得種熟脫者此等衆生緣在未來故以唱滅方便而教化之當知三身並有非滅唱滅之義法身非滅唱滅者如淨名云法本不生今則無滅即是法身非滅又云是寂滅義即是法身唱滅何者若已了達不唱寂滅為未了者唱耳又若言照寂即是唱滅若言寂照即是唱生夫法身者雖非生非滅而亦有生滅若迷心執著即煩惱生而智慧滅若解心無染即智慧生而煩惱滅滅惑生解此是無常滅若解生惑滅即是寂滅此之生滅悉約法性而辨若無迷解二緣則不唱有此生滅也報身非滅唱滅者誰有智慧誰有煩惱而言智慧能破煩惱此即明暗不相除是報身不滅義衆生未了聞此便謂即佛而生憍恣不復修道故復唱言道能滅惑有煩惱時則無智慧有智慧時則無煩惱豈非智慧能滅煩惱耶應身非滅唱滅者應是法報之用體既無滅用豈有窮即是應身不滅但為衆生若常見佛則生憍恣故唱我於今夜當取滅度也又法身當體不生不滅報身了達無能生滅應身相續不生不滅是故三身並皆非滅今為方便教化衆生應身唱滅事同三身皆唱滅也初正明非滅唱滅以益未來竟二釋須唱滅意亦二初不滅有損二唱滅有益今初所以者何若佛久住於世薄德之人不種善根貧窮下賤貪著五欲入於憶想妄見網中若見如來常在不滅便起憍恣而懷厭怠不能生難遭之想恭敬之心不種善根則不生真中二善是為無益思惑貪著五欲見惑入於憶想見思方生而不斷無明重沓而罔知則不斷通別二惡是為有損又起憍恣即增見惑懷厭怠即增思惑故有損不生難遭想即不能生見諦解不生恭敬心即不能生思惟道故無益也若見聞三佛不滅悉有憍恣義聞法身不滅便謂衆生如彌勒如一如無二如平等即真由是生於憍心上慢一切煩惱本自不生今亦無滅何須修道即便恣情放逸為是唱言是寂滅義又聞一切衆生即菩提相菩提相即煩惱相明暗不相除顯出佛菩提便起慢恣不復修善懈怠放逸為是唱言報身智慧能滅煩惱無明力大佛菩提智之所能滅應身不滅憍恣易解二唱滅有益是故如來以方便說比丘當知諸佛出世難可值遇所以者何諸薄德人過無量百千萬億劫或有見佛或不見者以此事故我作是言諸比丘如來難可得見斯衆生等聞如是語必當生於難遭之想心懷戀慕渴仰於佛便種善根是故如來雖不實滅而言滅度是故唱言雖法本不生今亦不滅要須滅惑方乃寂滅此法身難見義雖云智慧不滅煩惱然明時無暗汝今具足煩惱何能有慧當知智慧能滅障惑此報身難見義應身難見易解衆生聞是唱滅便於三佛生難遭想戀慕渴仰惡滅善生是故三身雖不實滅而唱滅也初正明三世益物竟二總結不虗又善男子諸佛如來法皆如是為度衆生皆實不虗既成佛已實得三身皆悉不生不滅為諸衆生盡未來時現生現滅實得三身亦實不虗現生現滅亦實不虗所以三世衆生各各得益亦不虗也若但論理而不論事但論性而不論修則同世間寓言何名不虗又設但論事而不達理但論修而不悟性則同權小生滅境界何名不虗故皆實不虗者即是權實本迹無不誠諦故也初法說竟
