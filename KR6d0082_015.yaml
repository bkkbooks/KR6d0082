body:
  text: 古吳後學蕅益智旭述本門二明三世益物中二譬説二初立譬二法合初中二初良醫治子譬譬上三世益物二治子實益譬譬上總結不虗初又三初遠行譬譬過去益物二還來譬譬現在益物三復去譬譬未來益物今初譬如良醫智慧聰達明練方藥善治衆病其人多諸子息若十二十乃至百數以有事緣遠至餘國前法説中有三意初益物處二拂迹疑三益物所宜今但譬益物所宜就所宜中有感應有施化今具譬之譬如良醫至善治衆病即譬我以佛眼觀有能應之智也其人多諸至乃至百數即譬衆生來至我所有能感之機也於施化中有形聲兩益及得益歡喜今略不譬歡喜又略不譬聲益於形益中又略不譬非生現生但譬非滅現滅一意即是以有事緣遠至他國也言良醫者醫有十種一者治病病增無損或時致死譬空見外道恣意行惡教人起邪斷善根法法身既亡慧命亦死二者治病不增不損譬有見苦行外道投巖赴火苦行行善不得禪定不能斷結故不損亦不斷善故不增也三者治病損而不增但差已還發譬修定斷結外道也四者治病能令差已不發而所治不遍譬二乘人但治一兩種有緣者不能遍治一切也五者雖能兼遍而無巧術用治苦痛譬六度菩薩慈悲廣治難行苦行釋論呼為拙度也六治病巧術治無痛惱但不能治必死之人譬通教菩薩體法巧度但治有反復凡夫不治敗種二乘也七雖能治難愈之病不能一時治一切病譬別教地前菩薩也八能一時治一切病而不能令平復如本譬圓教十信也九能遍治一切亦令平復如本而不能令過本譬圓教四十位也十者一時治一切病即能平復又使過本即是如來醫有十種者通收邪正貫彼偏圓前之三種亦稱醫者佛未出時一切外道皆自謂出家各自領衆故也第三醫中云差已還發者雖斷事惑還墮三塗以見惑未斷故隨禪受生之後仍受輪回也如阿含云良醫有四一善知病相二知病因起三善知方治四畢竟不發但是此中第四第五二種醫相何以故所知病相不出界內知病因起不出依正所有方治不逾生滅無常苦空無我不淨所云不發秪是住二涅槃若以四名義通諸教則一一教隨義各別乃至圓教於理無妨若直引彼以證此經則尚不同通教巧治安譬本門數數生滅深不可也第八不能令平復者自入未深未能令他見本法身法身被無明所覆義如病損令還得見方名為復也第十言過本者法身本有今令證本名之為復以對性德無功用故故修名過然初住已上亦得名為分過由殘惑在且名為復又讓極地究竟名過也前三種醫即大經中之舊醫用乳藥也後七並是客醫無巧術者但用無常苦無我法如用苦酢醎藥有術遠來還令服乳即最後究竟良醫良者善也具曉八術譬三達五眼也智慧者權實二智深知二諦也聰達者五眼鑒機頓漸不差也明練方藥者譬十二部教文理甚深也能詮文如方所詮理如藥藥通行理今且云理理即攝行也善治衆病者譬能觀知諸根利鈍巧用四悉檀也多諸子息者子義有三種一正因佛子謂一切衆生皆有三種性德佛性即是佛子故云其中衆生悉是吾子也二緣因佛子謂曾聞一句一偈稟説修行所生微解即了因性所修微行即緣因性正性為本束此三性總名緣因以能資發一實解故故云長者諸子若十二十乃至三十先因遊戲入火宅也三了因佛子謂聞法悟道三因開發正因理心發即法身德了因慧心發即般若德緣因善心發即解脫德束此三性總名了因以能了達中道義故故云從佛口生從法化生得佛法分真是佛子也若了因子常得見父父不遠行若緣因子機尚未熟父即遠行得有飲他毒藥之義今云多諸子息正是普收正因子也若十者十界中佛界機也二十者十界中佛及菩薩兩界機也乃至百數者十界互具十界故為百也百界並有性德三因並有生善之義故皆名子息也以有事緣者譬此土機淺彼方緣熟也遠至他國者譬非滅現滅即所謂亦復現言當入涅槃也二還來譬譬現在益物二初譬感應二譬施化今初諸子於後飲他毒藥藥發悶亂宛轉於地此譬上文機應相關見諸衆生樂於小法德薄垢重也佛在世時不但已聞法者薄有解行縱令不見聞者亦蒙利益如生盲不見日輪亦藉日輪而得起作佛既非滅示滅不惟大地幽暗縱令曾結緣者通惑未斷漸著三界見思毒藥故云飲他毒藥不知出要故云悶亂輪轉六道故云宛轉於地也二譬施化二初譬現形二譬説法今初是時其父還來歸家諸子飲毒或失本心或不失者遙見其父皆大歡喜拜跪問訊善安隱歸我等愚癡誤服毒藥願見救療更賜壽命還來歸家譬上為是人説我少出家得三菩提非生而現生也或失本心者譬貪著三界失先所種若頓若漸諸善根也或不失者譬雖著五欲不失三乘善根也遙見其父者譬佛出時衆生亦見色身而為見思障隔五分不得親奉法身故云遙也見聞佛出皆有喜敬求救之事具如諸經所明二譬説法上文廣明一代所説及釋巧説之由所謂照理稱機今但總明三意初譬佛受請轉頓漸法輪二譬勸誡三譬得益今初父見子等苦惱如是依諸經方求好藥草色香美味皆悉具足搗篩和合與子令服經方譬頓漸一切諸教典也藥草譬頓漸一切諸法門也並是出世正法故名為好色譬大小乘戒戒防身口事相彰顯也香譬事理諸禪功德普熏也味譬權實諸慧能證空中理味也皆悉具足者不論頓漸大小偏圓皆有此三學也又色是法身體質義故香是解脫離臭義故味是般若證覺義故大小偏圓一切法門皆悉攬此三德而為體也搗譬空三昧篩譬無相三昧和合譬無作三昧大小偏圓皆有此三種三昧一一三昧皆具戒定慧三亦皆以三德為其體性但有明昧之不同耳又空觀如搗假觀如篩中觀如和合三觀皆不離戒定慧亦皆不出三德體性將此法與頓漸衆生令其修行名令服也二譬勸誡而作是言此大良藥色香美味皆悉具足汝等可服速除苦惱無復衆患汝等可服勸也速除苦惱誡也勸令早服誡令勿遲頓漸諸典俱有勸誡三譬得益其諸子中不失心者見此良藥色香俱好即便服之病盡除愈子既遍收十界故獨舉不失心者能得現在益也從初成道乃至涅槃最後得度皆由不失三乘善根故耳見色香好即便服之服乃得味得味病除譬因戒生定因定發慧能斷三惑也二還來譬譬現在益物竟三復去譬譬未來益物上文有二初非滅唱滅次釋須唱滅就初又二初明本實不滅二明方便唱滅次文亦二初明不滅有損二明唱滅有益今具譬之即為四初超譬不滅有損二譬方便唱滅三譬唱滅有益四追譬本實不滅今初餘失心者見其父來雖亦歡喜問訊求索治病然與其藥而不肯服所以者何毒氣深入失本心故於此好色香藥而謂不美餘失心者譬往昔結緣尚淺之人及昔未結緣之輩不能于今佛世得度須至滅後方漸熟脫即是未來機也毒氣深入譬上貪著五欲入於憶想妄見網中好色香藥而謂不美即是不能持戒習定所以終不能得理味譬上便起憍恣而懷厭怠也二譬方便唱滅父作是念此子可愍為毒所中心皆顛倒雖見我喜求索救療如是好藥而不肯服我今當設方便令服此藥即作是言汝等當知我今衰老死時已至是好良藥今留在此汝可取服勿憂不差作是教已復至他國遣使還告汝父已死死時已至譬當入涅槃也留好良藥譬留諸經教法門也復至他國譬此方現滅他方現生故上文云惟願世尊在於他方遙見守護也遣使者或取涅槃中大聲普告為使人或用神通或用舍利或用經教等為使人今用四依菩薩語衆生云佛已滅度但留此法我今宣弘汝當受行也後時若無四依傳述經法則衆生豈能自知有佛已滅故用四依為所遣使三譬唱滅有益是時諸子聞父背喪心大憂惱而作是念若父在者慈愍我等能見救護今者捨我遠喪他國自惟孤露無復恃怙常懷悲感心遂醒悟乃知此藥色香美味即取服之毒病皆愈四追譬本實不滅其父聞子悉已得差尋便來歸咸使見之良由滅後衆生醒悟服藥修行以作因緣能感未來應化如遺教云其未度者亦皆已作得度因緣也亦有精進苦到即于道場感見諸佛者如天台大師親見靈山一會儼然未散便是服藥病除之驗故知滅實不滅益遍未來初良醫治子譬譬上三世益物竟二治子實益譬譬上總結不虗諸善男子於意云何頗有人能説此良醫虗妄罪不不也世尊初立譬竟二法合佛言我亦如是成佛已來無量無邊百千萬億那由他阿僧祇劫為衆生故以方便力言當滅度亦無有能如法説我虗妄過者成佛已來無量劫合過去益物譬言當滅度合未來益物譬現在易知故略不合亦無能説虗妄合治子實益譬也前已具顯過去久遠今此合意正欲顯示未來常住與大涅槃及金光明義同初長文竟二偈頌二初頌正顯遠二頌三世益物今初爾時世尊欲重宣此義而説偈言自我得佛來所經諸劫數無量百千萬億載阿僧祇不頌執近之情但頌顯遠也億載皆數名二頌三世益物二初頌法説二頌譬説初中二初頌正明三世益物二頌總結不虗初又三初頌過去二頌現在三頌未來初又三初超頌過去益物所宜二追頌過去益物處三頌拂過去迹疑今初常説法教化無數億衆生令入於佛道爾來無量劫為度衆生故方便現涅槃説法教化頌聲益也令入佛道頌得益也方便涅槃頌形益中非滅現滅即兼得非生現生也二追頌過去益物處而實不滅度常住此説法三頌拂過去迹疑我常住於此以諸神通力令顛倒衆生雖近而不見雖近不見故但見儒童得記及壽終等也初頌過去竟二頌現在二初頌感應二頌施化今初衆見我滅度廣供養舍利咸皆懷戀慕而生渴仰心衆生既信伏質直意柔軟一心欲見佛不自惜身命長文明感應中則云樂於小法德薄垢重今頌明供養渴仰等者彼約不知久成義説今約能感迹化義説也又雖戀慕渴仰乃至不惜身命以佛眼觀總是樂於近成小法者耳二頌施化時我及衆僧俱出靈鷲山我時語衆生常在此不滅以方便力故現有滅不滅俱出靈鷲山頌現形也我時語衆生頌説法也長文頌説法中先正明一代所説次釋出巧説之由其文甚廣今頌甚略常在此不滅句但頌顯實以方便力二句略頌稱機也二頌現在竟三頌未來長文有二初正明非滅唱滅二釋須唱滅意就初又二初明本實不滅二明方便唱滅今頌不次第初先頌方便唱滅兼頌須唱滅意二頌本實不滅兼廣釋不見得見之由今初餘國有衆生恭敬信樂者我復於彼中為説無上法汝等不聞此但謂我滅度我見諸衆生沒在於苦惱故不為現身令其生渴仰因其心戀慕乃出為説法初一偈先明不滅次半偈正頌唱滅次一偈頌釋須唱滅意後二句是頌唱滅有益得成未來機應也二頌本實不滅兼廣釋不見得見之由神通力如是於阿僧祇劫常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我此土安隱天人常充滿園林諸堂閣種種寶莊嚴寶樹多華果衆生所遊樂諸天擊天鼓常作衆伎樂雨曼陀羅華散佛及大衆此正頌本實不滅也常在靈鷲山指本時應身居于此土也及餘諸住處指本時應身亦遍十方若淨若穢諸處也本既在此諸處迹亦不移但衆生妄見劫盡而佛土本無生滅即此同居便是方便實報寂光妙土何以言之我此土安隱是佛所證安隱之法即常寂光土也由佛能證即自受用報土也天人常充滿者十地為天三十心為人即他受用報土也衆生所遊樂即方便有餘土九種方便衆生之所居也天鼓伎樂及天華等即實報土中俗諦勝妙五塵方便土中真諦法性五塵也我淨土不毀而衆見燒盡憂怖諸苦惱如是悉充滿是諸罪衆生以惡業因緣過阿僧祇劫不聞三寶名此釋不見之由由于惡業罪也寂光實報方便三種淨土皆悉不毀惡業因緣妄見燒盡在彼衆生則是同分妄見以佛菩薩觀之還是別業妄見而已諸有修功德柔和質直者則皆見我身在此而説法此釋得見之由由於修緣了二因也諸者遍指三乘權實緣修及真修也功德是如來室柔和是如來衣質直是如來座相似三法行成則見如來方便應身分證三法行成則見如來實報報身究竟三法行成則見如來寂光法身或時為此衆説佛壽無量久乃見佛者為説佛難值此總結由于衆生有見不見故使如來所説不同意顯説雖不同皆實不虗也初頌正明三世益物竟二頌總結不虗我智力如是慧光照無量壽命無數劫久修業所得汝等有智者勿於此生疑當斷令永盡佛語實不虗初一偈頌諸佛如來法皆如是長文引諸佛以證我今頌我以證諸佛也久修業所得正顯此品所詮如來壽量是約修得不約性得性得無始無終生佛體同修得有始無終佛佛道同唯其有始故過去實成有久有近唯其無終故盡未來時常住不滅也次一偈頌為度衆生皆實不虗結勸令斷執近之疑也初頌法説竟二頌譬説二初頌立譬二頌法合今初如醫善方便為治狂子故實在而言死無能説虗妄初三句但頌非滅現滅一意即顯三世益物方便又顯滅實非滅過去久遠未來常住皆實不虗矣第四句即頌總結不虗二頌法合我亦為世父救諸苦患者為凡夫顛倒實在而言滅以常見我故而生憍恣心放逸著五欲墮於惡道中此亦總頌非滅現滅一意兼頌不滅有損以顯唱滅是方便也我常知衆生行道不行道隨所應可度為説種種法每自作是意以何令衆生得入無上慧速成就佛身此正頌合總結不虗猶良醫之方便治子病也初正開近顯遠竟釋如來壽量品竟次釋分別功德品分別功德品第十七此品具有授記領解流通於授記及流通中各有淺深不同故言分別佛説壽量本迹二種弟子得種種益乃至現在四信滅後五品亦皆得益故言功德本弟子即地涌衆迹弟子即靈山衆二總授法身記三初經家總敘二如來分別三瑞表圓益今初爾時大會聞佛説壽命劫數長遠如是無量無邊阿僧祇衆生得大饒益二如來分別於時世尊告彌勒菩薩摩訶薩阿逸多我説是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍迹門三周説法三根得記並是初住無生法忍見道之位今聞本門復有爾許衆生得入圓住故知一代極唱利益難思也復有千倍菩薩摩訶薩得聞持陀羅尼門先已證無生者今聞本門極唱轉入修道增圓妙道損變易生證圓十住得大聞持圓頓妙法能受能持猶如大海普能受持龍王雨也復有一世界微塵數菩薩摩訶薩得樂説無礙辨才此是增道損生證圓十行不思議假恆沙佛法橫豎貫通故能自在演説辨才無礙也復有一世界微塵數菩薩摩訶薩得百千萬億無量旋陀羅尼此是增道損生證圓十回向法事理圓融真俗不二一中無量無量中一重重旋轉互總互持也復有三千大千世界微塵數菩薩摩訶薩能轉不退法輪此是增道損生證圓初地心心流注薩婆若海圓轉三不退輪也復有二千中國土微塵數菩薩摩訶薩能轉清淨法輪此是增道損生證圓二地自離三惑垢令他離三惑垢故云轉清淨法輪也復有小千國土微塵數菩薩摩訶薩八生當得阿耨多羅三藐三菩提此是增道損生證圓四地止餘八品微細無明故云八生當得菩提也斷一品入五地斷二品入六地斷三品入七地斷四品入八地斷五品入九地斷六品入十地斷七品入等覺斷八品盡入妙覺每斷一品無明即損一變易生增明一分中道也復有四四天下微塵數菩薩摩訶薩四生當得阿耨多羅三藐三菩提此是增道損生證圓八地止餘四品微細無明也損一生入九地損二生入十地損三生入等覺損四生盡即成妙覺復有三四天下微塵數菩薩摩訶薩三生當得阿耨多羅三藐三菩提此是增道損生證圓九地故止餘三生也復有二四天下微塵數菩薩摩訶薩二生當得阿耨多羅三藐三菩提此是增道損生證圓十地故止餘二生也復有一四天下微塵數菩薩摩訶薩一生當得阿耨多羅三藐三菩提此是增道損生證圓等覺故止餘一生也復有八世界微塵數衆生皆發阿耨多羅三藐三菩提心此即博地凡夫由聞經力證圓十信發相似心也本門得道如此之多一切諸經皆所不及良由原本垂迹處處開引中間相值數數成熟今世五味節節調伏收羅結撮歸會法華譬如田家春生夏長耕種耘治秋收冬藏一時穫刈此後雖復有得道者如捃拾耳問授法身記何缺五地六地七地人耶答此非思議可知惟如來能分別惟補處能領解何必于此生疑問聞持陀羅尼等何與舊文對位又略不同答無生忍等名字並通偏圓權實本無一定但須消釋令會圓理今約義便作此分配若欲互融何所不可當知惟八生四生等的有次序餘皆約義配釋而已二如來分別竟三瑞表圓益佛説是諸菩薩摩訶薩得大法利時於虗空中雨曼陀羅華摩訶曼陀羅華以散無量百千萬億寶樹下師子座上諸佛并散七寶塔中師子座上釋迦牟尼佛及久滅度多寶如來亦散一切諸大菩薩及四部衆又雨細末栴檀沉水香等於虗空中天鼓自鳴妙聲深遠又雨千種天衣垂諸瓔珞真珠瓔珞摩尼珠瓔珞如意珠瓔珞遍於九方衆寶香爐燒無價香自然周至供養大會一一佛上有諸菩薩執持幡蓋次第而上至于梵天是諸菩薩以妙音聲歌無量頌讚歎諸佛此中亦有六瑞一雨華瑞二雨香瑞表圓妙慧福自行德也三天鼓瑞四天衣瓔珞瑞表圓妙教行化他德也五燒香供養瑞六幡蓋讚歎瑞表圓妙自行化他同歸極果也初虗空雨華者虗空表平等法性從此法性出生四十真位圓妙慧華也前文既借分身表應釋迦表報多寶表法今先散分身諸佛次及釋迦多寶意顯三身雖非一異而由得見應身乃知報身修德及法身性德也亦散一切菩薩四衆即表大會皆得圓因妙慧皆成三身妙果無差別也細末栴檀沉水諸福德香亦從法性出生亦以奉供三身普及四衆文影略耳天鼓自鳴是表圓音演深妙教千種天衣表寂滅忍衣遍覆一切垂諸瓔珞表戒定慧陀羅尼四種瓔珞攝化衆生令生喜悅也摩尼此云如意又言如意珠者或是偶爾重文華梵雙舉或以四瓔珞字用擬戒等四瓔珞也遍於九方者本從上方雨垂遍於八方及下地也問何不如華嚴云充滿十方耶答華嚴以十表無盡此經以一表同歸今云遍於九方正表一佛界理遍該九界九界無非一佛界也衆寶香爐燒無價香自然周至供養大會者即表自行妙德總趣極果也前既雨華雨香用表福慧今之燒香即以燒表慧以香表福供養大會三身諸佛普及菩薩四衆諸未來佛故云趣極果也言自然者不由人力亦從法性虗空而顯現也有諸菩薩者亦是自然化現諸菩薩像亦從法性虗空出生也幡者轉義即表增道損生蓋者覆義即表慈悲益物次第而上即表從因至果至于梵天者梵是淨義即表究竟四德妙音歌頌讚歎諸佛即表以佛道聲令一切聞上既以天鼓表化他之教衣瓔表化他之行今還用幡蓋表行歌讚表教二種化他妙德同趣極果也圓益既深故現瑞以表之華嚴佛頂諸經説大法竟皆現奇瑞此經何獨不然二總授法身記竟三彌勒總申領解上迹門中菩薩亦悟而大事未畢所以不陳今本門既竟故托補處以總申之文分為三初頌時衆得解二頌如來分別三頌瑞表圓益今初爾時彌勒菩薩從座而起偏袒右肩合掌向佛而説偈言一切菩薩分證法空名之為座今從座起表不住所證展轉增進也本實迹權向未發迹如右肩被覆今已開竟故偏袒以表之本迹雖殊不思議一故合掌以表之增道損生速趣極果故向佛以表之佛説希有法昔所未曾聞世尊有大力壽命不可量無數諸佛子聞世尊分別説得法利者歡喜充遍身二頌如來分別或住不退地或得陀羅尼或無礙樂説萬億旋總持不退地即頌無生法忍初住念不退位餘可知或有大千界微塵數菩薩各各皆能轉不退之法輪復有中千界微塵數菩薩各各皆能轉清淨之法輪復有小千界微塵數菩薩餘各八生在當得成佛道復有四三二如此四天下微塵諸菩薩隨數生成佛或一四天下微塵數菩薩餘有一生在當成一切智如是等衆生聞佛壽長遠得無量無漏清淨之果報無量無漏揀異二乘之有量也妙因所感故言清淨無障礙土故言果報復有八世界微塵數衆生聞佛説壽命皆發無上心二頌如來分別竟三頌瑞表圓益世尊説無量不可思議法多有所饒益如虗空無邊雨天曼陀羅摩訶曼陀羅釋梵如恆沙無數佛土來雨旃檀沉水繽紛而亂墜如鳥飛空下供散於諸佛此頌雨華雨香二瑞總皆供散諸佛也長有釋梵二句以表機遍十方天鼓虗空中自然出妙聲天衣千萬種旋轉而來下此頌天鼓天衣二瑞略不頌瓔珞而天衣長有萬字正顯所覆必多衆寶妙香爐燒無價之香自然悉周遍供養諸世尊此頌燒香供養瑞也長文云大會今頌云世尊當知大會皆是三世佛也其大菩薩衆執七寶幡蓋高妙萬億種次第至梵天一一諸佛前寶幢懸勝幡亦以千萬偈歌詠諸如來此頌幡蓋讚歎瑞也如是種種事昔所未曾有聞佛壽無量一切皆歡喜佛名聞十方廣饒益衆生一切具善根以助無上心此結頌瑞表圓益不同循常瑞相故云昔所未曾有也二本門正説段竟三流通段此下共有十一品半經文盡屬流通今且逐近以三品半而為本門流通者凡有兩意一者四信五品並以聞壽長遠而為言端隨喜功德法師功德兩品秖是申明初品因果功德不輕一品秖是引證讚毀福罪當知此三品半正為流通本門例如法師至安樂行五品正為流通迹門也二者既以初品別序為迹門序迹門自具三段故以此三品半而為本門流通本門亦具三段本迹各三束為正説乃以通序五事而序兩門囑纍八品流通兩門體格周正眉目分明也今就此三品半分為三意初一品半明初品因功德以勸流通二法師功德品明初品果功德以勸流通三不輕品引信毀福罪證勸流通初中二初明現在四信二明滅後五品初又四初一念信解二解其言趣三聞持供養四深信觀成初又二初長文二偈頌初又三初出相貌二明功德三明位行不退今初爾時佛告彌勒菩薩摩訶薩阿逸多其有衆生聞佛壽命長遠如是乃至能生一念信解上已分別聞佛壽長得益深廣未入住者悟無生忍已入住者增道損生位鄰極聖未發心者發無上心入于十信此皆夙種既深現得熟脫無生發心二位並屬當機增道損生通于影響發起當機三衆故屬正説授記段也今流通之始乃約初結緣人未登十信或從此會略聞或從現在諸菩薩等展轉得聞聞佛壽命長遠如是然時既甚促聞亦不多故云乃至能生一念信解極言其時之暫而獲益之淺也夫一念者即現前一念介爾之心也信解者信佛本地所證之理是法界妙理此理非實非權而能實能權自行冥理名實化他種種方便名權此理非本非迹而能本能迹初證權實體用名本證後所施體用權實名迹又信解此理既是釋尊之所久證亦是衆生之所久迷亦是現前介爾一念之所同具故曰如心佛亦爾如佛衆生然心佛及衆生是三無差別如是隨所聞處豁爾開明隨語而入無有罣礙信一切法皆是佛法即權而實不思議真又信佛法不隔一切法即實而權不思議俗不得佛法不得一切法雙遮而見一切法亦見佛法雙照此二句是不思議中即一而三隨舉一諦皆具三諦即三而一雖分三諦秪是一心亦是行於非道通達佛道九界非道純是佛界妙道之用釋上一切法皆是佛法也行於佛道通達一切道釋上佛法不隔一切法也不得佛道一切道釋雙遮而通達佛道一切道釋雙照無所有而有三諦皆有有而無所有三諦皆無非所有非無所有三諦皆非有非無如門前路通達一切東西南北無有壅礙眼耳鼻舌身意凡有所對悉亦如是六塵體是法界亘古亘今無非圓妙三諦也無疑曰信明了曰解是為一念信解心也上約聞法信解即是信行若坐思惟隨所思惟豁然開悟通達三諦亦復如是更約思惟而生一念信解即是法行如是信解即十信初心未得六根清淨未入鐵輪正位也二明功德二初總論無量二格量顯多今初所得功德無有限量二格量顯多又二初舉五度為格量本二正格信解功德甚多今初若有善男子善女人為阿耨多羅三藐三菩提故於八十萬億那由他劫行五波羅蜜檀波羅蜜尸羅波羅蜜羼提波羅蜜毗梨耶波羅蜜禪波羅蜜除般若波羅蜜般若即是今之正慧故言除般若也問既離般若則前五不應名波羅蜜答約別教人為求無上菩提各自於五而盡其邊亦得名度以別教十向後心名假邊際故也問別教亦有次第般若還同所校何以除之答豎論空假般若可為所校中證不殊名等體等故須除也二正格信解功德甚多以是五度功德比前一念信解功德百分千分百千萬億分不及其一乃至算數譬喻所不能知三明位行不退若善男子善女人有如是功德於阿耨多羅三藐三菩提退者無有是處別六心猶退七心不退今圓初心即不退者聞壽量功德自外而資圓順信解自內而熏故不退也初長文竟二偈頌三初超頌功德二頌位行不退三追頌相貌初又二初超頌格量顯多二追頌總論無量初又二初頌舉五度為格量本二頌正格信解功德甚多今初爾時世尊欲重宣此義而説偈言若人求佛慧於八十萬億那由他劫數行五波羅蜜於是諸劫中布施供養佛及緣覺弟子并諸菩薩衆珍異之飲食上服與臥具旃檀立精舍以園林莊嚴如是等布施種種皆微妙盡此諸劫數以回向佛道若復持禁戒清淨無缺漏求於無上道諸佛之所歎若復行忍辱住於調柔地設衆惡來加其心不傾動諸有得法者懷於增上慢為斯所輕惱如是亦能忍若復勤精進志念常堅固於無量億劫一心不懈息又於無數劫住於空間處若坐若經行除睡常攝心以是因緣故能生諸禪定八十億萬劫安住心不亂持此一心福願求無上道我得一切智盡諸禪定智是人於百千萬億劫數中行此諸功德如上之所説二頌正格信解功德甚多有善男女等聞我説壽命乃至一念信其福過於彼初超頌格量顯多竟二追頌總論無量若人悉無有一切諸疑悔深心須臾信其福為如此須臾即一念也初超頌功德竟二頌行位不退又二初明不易信解二明信解則必發願故得不退今初其有諸菩薩無量劫行道聞我説壽命是則能信受其有諸菩薩者約鈍根菩薩言也行道經無量劫善根淳熟方能信受根若未熟佛不為説設令聞之彼必疑惑故信解誠不易也今若利根初聞即能一念信解便可等彼久行菩薩亦且超過彼矣二明信解則必發願故得不退如是之人等頂受此經典願我於未來長壽度衆生如今日世尊諸釋中之王道場師子吼説法無所畏我等未來世一切所尊敬坐於道場時説壽亦如是如是之人等者雙指利鈍兩根言也聞而信解則必頂受發願所以決不退也問近成者無長可説何得皆言亦如是耶答言如是者謂説常壽若得常壽盡未來際必當過此何但如是今從實成已來故且舉爾許塵劫耳二頌行位不退竟三追頌相貌若有深心者清淨而質直多聞能總持隨義解佛語如是之人等於此無有疑長文直明乃至能生一念信解便即較顯功德今正釋出相貌以顯一念信解之難得也若欲于此佛壽長遠而無有疑不論久行始行須有深心又須清淨質直又須多聞總持能隨義解不隨文字具此三法方能一念信解則一念信解談何容易信解既不容易所以功德不得不多也深心者上求下化之心了知心佛衆生理元不二依之而起無作四弘故名深心即如來室也清淨而質直者不為五住所污正念真如即如來衣也多聞能總持隨義解佛語者隨有所聞便能總一切法持一切義便能解了如來隨智隨情等語故雖少聞多解義亦名為多聞即如來座也有此觀行三法乃能信解究竟三法既信究竟三法之理乃于究竟位中所有本迹之事亦無疑也初一念信解竟二解其言趣又阿逸多若有聞佛壽命長遠解其言趣是人所得功德無有限量能起如來無上之慧前但一念信解如人飲水冷暖自知今解其言趣便可略舉似人故能起自他無上之慧也三聞持供養何況廣聞是經若教人聞若自持若教人持若自書若教人書若以華香瓔珞幢幡繒蓋香油蘇燈供養經卷是人功德無量無邊能生一切種智廣聞廣持廣書廣修供養自行化他功德外資令內智疾入故能生一切種智也四深信觀成阿逸多若善男子善女人聞我説壽命長遠深心信解則為見佛常在耆闍崛山共大菩薩諸聲聞衆圍繞説法又見此娑婆世界其地琉璃坦然平正閻浮檀金以界八道寶樹行列諸臺樓觀皆悉寶成其菩薩衆咸處其中若有能如是觀者當知是為深信解相見佛常在靈山共大菩薩諸聲聞衆説法者方便有餘土相也又見娑婆其地琉璃乃至菩薩咸處其中者實報莊嚴土相也理具此相今依理修觀故觀成而相可見又見此相雖未真證以觀力故暫見二土若三惑分滅方永與相應也有餘土中有聲聞者藏通兩教二乘已斷通惑出生其中仍本為名實報土中純諸菩薩亦是他受用耳但依此觀漸深漸成入圓初住則任運遍見應用無方矣問稱理修觀但觀一念妙理即足何須約土以明深信解相答藏通初心皆滅陰入況能見士別教初心亦且破陰後心乃見帝網之土唯圓即觀一念三千三諦具足是則一心一切心一身一切身一土一切土一念俱觀若身心土若空假中更無前後故觀成時一心見一切心一身見一切身一土見一切土十方諸佛身中現故故於自心常寂光中遍見十方一切身土若但觀心而不觀具何異權乘若唯觀他遮那之土必迷自境若了心境則自即他故他即自故觀土既爾身佛心然故聞長壽須了宗旨所以本門聞壽益倍餘經良由所聞異常故也初明現在四信竟二明滅後五品二初列五品粗格量後四品功德二隨喜功德品廣格量初品功德廣格量已況出勝者可以意得佛不煩文巧説若此也初中二初長文二偈頌長文為五初直起隨喜心二加受持讀誦三加教人四加兼行六度五加正行六度今初又復如來滅後若聞是經而不毀訾起隨喜心當知已為深信解相初品標人而已格量在後品説二加受持讀誦二初標人相二格量功德今初何況讀誦受持之者二格量功德斯人則為頂戴如來阿逸多是善男子善女人不須為我復起塔寺及作僧坊以四事供養衆僧所以者何是善男子善女人受持讀誦是經典者為已起塔造立僧坊供養衆僧則為以佛舍利起七寶塔高廣漸小至於梵天懸諸幡蓋及衆寶鈴華香瓔珞末香塗香燒香衆鼓伎樂簫笛箜篌種種舞戲以妙音聲歌唄讚頌則為於無量千萬億劫作是供養已不須為我復起塔寺等者初心恐被事緣紛動妨修正業故也則為以佛舍利等者指此經文所詮之理即是法身全身舍利能詮之文不異七寶高廣妙塔能所和合不二亦是第一義僧故直專持此經即為廣大供養廢事從理所益弘多若至後心理觀既熟則涉外不妨內觀事資於道如油多火猛順流揚帆又加櫓棹其勢轉疾也問若持經即是起塔乃至即是第一義僧不須起塔供僧者則持經亦即第一義戒不須復持戒耶答持經即順理戒任運不犯性罪亦自任運持得初篇二篇所謂乘急戒緩非全無戒也若至兼行六度則五篇七聚性業遮業悉皆清淨是乘戒俱急也又凡修圓觀者理須自思若初心念念常在四種三昧容於二篇之外所有遮罪或可少違若未專於四種三昧則五篇七聚菩薩重輕不可微犯方合一期教門大旨何以故出家菩薩具足堅持毗尼篇聚大乘戒意一切皆然況僅護篇聚於彼梵網八萬律儀猶未足為持相但因此土器劣且以小檢助成大儀仍須備曉開遮輕重制緣漸頓捨義有無坐次分流懺法天隔復有七衆同否大小共別方於自行量己品位去取適時勿慕大節而昧存亡勿據小文而迷觀道若得今意先以理教定次以行位驗倘不爾者鳥鼠人也安論品位乎敬請受佛遺言少分恭稟三加教人二初標人相二格量功德今初阿逸多若我滅後聞是經典有能受持若自書若教人書二格量功德則為起立僧坊以赤栴檀作諸殿堂三十有二高八多羅樹高廣嚴好百千比丘於其中止園林浴池經行禪窟衣服飲食牀褥湯藥一切樂具充滿其中如是僧坊堂閣若干百千萬億其數無量以此現前供養於我及比丘僧是故我説如來滅後若有受持讀誦為他人説若自書若教人書供養經卷不須復起塔寺及造僧房供養衆僧前但自己讀誦受持便為具足供養三寶況今轉以教人則法施功德寧非供養中最耶四加兼行六度二初標人相二格量功德今初況復有人能持是經兼行布施持戒忍辱精進一心智慧圓觀漸深涉事不坊正行故以事助理名兼行也二格量功德其德最勝無量無邊譬如虗空東西南北四維上下無量無邊是人功德亦復如是無量無邊疾至一切種智五加正行六度二初標人相二格量功德今初若人讀誦受持是經為他人説若自書若教人書復能起塔及造僧房供養讚歎聲聞衆僧亦以百千萬億讚歎之法讚歎菩薩功德又為他人種種因緣隨義解説此法華經財法二施復能清淨持戒與柔和者而共同止如法持戒統理大衆忍辱無瞋志念堅固忍常貴坐禪得諸深定禪精進勇猛攝諸善法進利根智慧善答問難般若安樂行中不親近求聲聞人亦不説過亦不讚美今云供養讚歎聲聞衆僧何耶始心觀淺恐染小習故誡勿親近今觀深力大故供養讚歎于彼即能化彼令趣大乘又復彌助權實不二妙觀也文中先禪後進義無先後二格量功德阿逸多若我滅後諸善男子善女人受持讀誦是經典者復有如是諸善功德當知是人已趣道場近阿耨多羅三藐三菩提坐道樹下阿逸多是善男子善女人若坐若立若行處此中便應起塔一切天人皆應供養如佛之塔已趣道場坐道樹下者位在鐵輪不久得入銅輪能八相作佛也坐立行處便應起塔皆應供養如佛塔者初依人號如來也結此五品初三是聞慧第四是思慧第五是修慧都是十信前耳或云初隨喜品即是入信心位分一品為兩心五品即十信心是鐵輪六根清淨位也今謂兩釋理須並存若圓教利根一念隨喜初垢先落乃至正行塵沙亦盡即相似如來鐵輪位也若解雖圓頓事障未除僅能圓伏五住通惑種子尚存即觀行如來具縛凡夫能知如來祕密之藏也若以五品對前四信則初二品即一念信解第三品即解其言趣第四品即聞持供養第五品即深信觀成其義既齊四五無別但是滅後加讀誦位為第二品耳初長文竟二偈頌四初頌第二品至四頌第五品今初爾時世尊欲重宣此義而説偈言若我滅度後能奉持此經斯人福無量如上之所説是則為具足一切諸供養以舍利起塔七寶而莊嚴表剎甚高廣漸小至梵天寶鈴千萬億風動出妙音又於無量劫而供養此塔華香諸瓔珞天衣衆伎樂然香油蘇燈周匝常照明惡世法末時能持是經者則為已如上具足諸供養二頌第三品若能持此經則如佛現在以牛頭栴檀起僧房供養堂有三十二高八多羅樹上饌妙衣服牀臥皆具足百千衆住處園林諸浴池經行及禪窟種種皆嚴好三頌第四品若有信解心受持讀誦者若復教人書及供養經卷散華香末香以須曼薝蔔阿提目多伽熏油常然之如是供養者得無量功德如虗空無邊其福亦如是長行但云兼行布施等今頌供養經卷即兼行之意也須曼華此云善攝意華薝蔔華此云黃華阿提目多伽華此云龍舐華又云善思夷華四頌第五品況復持此經兼布施持戒忍辱樂禪定不瞋不惡口恭敬於塔廟謙下諸比丘遠離自高心常思惟智慧有問難不瞋隨問為解説若能行是行功德不可量若見此法師成就如是德應以天華散天衣覆其身頭面接足禮生心如佛想又應作是念不久詣道樹得無漏無為廣利諸人天其所住止處經行若坐臥乃至説一偈是中應起塔莊嚴令妙好種種以供養佛子住此地則是佛受用常在於其中經行及坐臥初列五品粗格量後四品功德竟
