body:
  text: 釋分別功德品竟次釋隨喜功德品隨喜功德品第十八隨者聞深奧法隨順事理無二無別喜者慶己慶人理者現前一念心之本性即是法界實相之體非本非迹名為理本非實非權名為實理事者如來久遠證此妙理故名為本從本遍垂三世十方種種應化故名為迹本是自行契理之修德迹是果後利他之妙用本迹二事同依一理故云本迹雖殊不思議一直詮如此圓妙事理名之為實種種方便引導衆生名之為權非實則權無所依非權則實無由顯呼此實理實事為理呼彼權理權事為事事理雖殊心外無法亦是不思議一今順理者聞佛本地久遠久遠證于妙理信順不逆無一毫疑滯順事者聞佛三世益物橫豎該亘遍一切處亦無一毫疑滯即廣事而達深理即深理而達廣事不二而二故言事理不別而別故言本迹本迹皆約事說雖二雖別無二無別理具三千事造三千同居一念故雖二無二本時事理迹中事理不思議一故雖別無別如此信解名之為隨如來證此現前一念之實相故本迹權實不可思議我及衆生同此心性佛既若此我及衆生亦當得之故慶己慶人名之為喜又本迹權實雖復性具如來出世四十餘年未顯真實七方便人不聞誠諦慶我及人以凡夫心等佛所知用所生眼同如來見如此知見究竟法界深廣無涯底無等無等等故名隨喜以順理故有實功德以順事故有權功德以慶己故有智慧自行功德以慶人故有慈悲化他功德權實自他合而說之故言隨喜功德品此世界意也事理本迹自他今昔相望故為世界第五十人是初品之初初但有一念妙解但有一念慶己慶他未有圓行恩未及人所獲功德不可得比況復最初於會聞者況復讀誦講說兼行正行況復十信十住十行乃至等妙誰聞如是深妙功德而不景慕如來說此令物尚之故言隨喜功德品此為人意也上來稱美持經功德時衆咸謂入真因位乃致斯德於彼初心之初起輕弱想忽聞好堅處地芽已百圍頻伽在㲉聲勝衆鳥希有奇特輕想釋然故名隨喜功德品此對治意也外道得五通者能移山竭海而不能伏見愛不及暖法人二乘無學子果俱脫猶被涅槃縛不知其因果俱權通教人修因雖巧發心不識五百由旬得果止除四住通惑別人雖勝二乘修因則偏其門又拙非佛所讚皆不及初隨喜人佛今舉觀行初心以況極果都勝諸教故言隨喜功德品此即約教以顯第一義也二廣格量初品功德二初問二答今初爾時彌勒菩薩摩訶薩白佛言世尊若有善男子善女人聞是法華經隨喜者得幾所福而說偈言世尊滅度後其有聞是經若能隨喜者為得幾所福前品已格後四功德不說初品故彌勒承機問出也佛答為二初長文二偈頌長文為二初答內心隨喜人功德二直明外聽法人功德初中五初約展轉相教舉最後人以顯初心之初二格量本三問四答五正格量今初爾時佛告彌勒菩薩摩訶薩阿逸多如來滅後若比丘比丘尼優婆塞優婆夷及餘智者若長若幼餘智者謂未受四衆戒律不得名為比丘優婆塞等而宿有大乘智種聞能信解便可隨力演說不論年長年幼也聞是經隨喜已從法會出至於餘處若在僧坊若空間地若城邑巷陌聚落田里如其所聞文義不謬為父母宗親善友知識隨力演說是諸人等聞已隨喜復行轉教餘人聞已亦隨喜轉教如是展轉至第五十阿逸多其第五十善男子善女人隨喜功德我今說之汝當善聽展轉至第五十意顯後後漸劣于前前也何者四依弘法必具辨才聞而隨喜法味必厚逮彼聞者從法會出隨力演說雖云如其所聞理決不謬而辨說莊嚴未必遂能與法師同況能過之如是展轉第二第三或十二十已漸不如況至第五十人豈不更劣又前之四十九人皆有轉教功德今第五十但論一念隨喜不論更復轉教當知正是初品之初初今約此初初一念隨喜而明功德則後後不言可知言展轉至五十者但欲顯於法味漸薄功德漸劣不必約表法釋二格量本若四百萬億阿僧祇世界六趣四生衆生卵生胎生濕生化生若有形無形有想無想非有想非無想無足二足四足多足如是等在衆生數者有人求福隨其所欲娛樂之具皆給與之一一衆生與滿閻浮提金銀琉璃硨磲碼瑙珊瑚琥珀諸妙珍寶及象馬車乘七寶所成宮殿樓閣等是大施主如是布施滿八十年已而作是念我已施衆生娛樂之具隨意所欲然此衆生皆已衰老年過八十髮白面皺將死不久我當以佛法而訓導之即集此衆生宣布法化示教利喜一時皆得須陀洹道斯陀含道阿那含道阿羅漢道盡諸有漏於深禪定皆得自在具八解脫六趣天人阿修羅地獄鬼畜生也受生之法不出四種在㲉曰卵處腹曰胎暖氣曰濕變易曰化天但化生人具四生而多胎生修羅四生地獄化生鬼畜具四有形謂欲色二界無形謂無色界有想謂空處識處無想謂無所有處非有想非無想即非想非非想處也三問於汝意云何是大施主所得功德寧為多不四答彌勒白佛言世尊是人功德甚多無量無邊若是施主但施衆生一切樂具功德無量何況令得阿羅漢果五正格量佛告彌勒我今分明語汝是人以一切樂具施於四百萬億阿僧祇世界六趣衆生又令得阿羅漢果所得功德不如是第五十人聞法華經一偈隨喜功德百分千分百千萬億分不及其一乃至算數譬喻所不能知阿逸多如是第五十人展轉聞法華經隨喜功德尚無量無邊阿僧祇何況最初於會中聞而隨喜者其福復勝無量無邊阿僧祇不可得比夫受施之人滿四百萬億阿僧祇界不為不多矣先與世樂滿八十年後與法樂證四聖果不為不大矣而不及初初一念圓隨喜者充此一念必當盡虗空界盡未來時普度一切皆令成佛最後功德不離最初一念故也又約大論較量之意以釋此旨滿閻浮提人福不及西瞿耶尼一人福滿西洲人福不如東弗婆提一人福滿三洲人福不及北單越一人福滿四洲人福不及一四天王四天王不及一釋乃至第六天不及一梵福又初禪不及二禪二禪不及三禪三禪不及四禪乃至無所有處不及非非想處非非想處三界極尊不及須陀洹福須陀洹不及二果二果不及三果三果不及四果四果不及辟支藏教二乘不及通教體法二乘體法二乘不及出假菩薩通教菩薩不及別教初心以聞中故別教十回向後心不及圓教隨喜初心以圓聞故故知華嚴較量發心功德猶未為奇此經較量隨喜功德最為難信然一念隨喜便具十乘若解十乘則功德有據請略明之隨者順事順理事理即不思議境也喜者慶己慶人即菩提心也一念隨喜不散即止不昏即觀是善巧安心也順理圓伏無明見思順事圓伏塵沙無知是破法遍也了達權實不二是識通塞也秖于一念心中信解不可思議佛法即圓念處法爾具足七科道品是調適也既隨喜已憫己傷他必修五悔是助開也既能信順事理本迹決不以凡妄擬上聖是知次位他順事順理強軟諸魔所不能動是能安忍也實心繫實境實緣次第生實實迭相注是離法愛也如此功德豈世間財施小果法施所能及哉如此圓觀豈次第修中者所能及哉初答內心隨喜人功德竟二直明外聽法人功德四初自往二分座三勸他四具聽修行今初又阿逸多若人為是經故往詣僧坊若坐若立須臾聽受緣是功德轉身所生得好上妙象馬車乘珍寶輦輿及乘天宮二分座若復有人於講法處坐更有人來勸令坐聽若分座令坐是人功德轉身得帝釋坐處若梵王坐處若轉輪聖王所坐之處三勸他阿逸多若復有人語餘人言有經名法華可共往聽即受其教乃至須臾間聞是人功德轉身得與陀羅尼菩薩共生一處一利根二智慧三百千萬世終不瘖啞四口氣不臭五舌常無病六口亦無病七齒不垢黑八九不黃十不疏十一亦不缺落十二不差十三不曲十四唇不下垂十五亦不褰縮十六不粗澀十七不瘡疹十八疹口瘡也亦不缺壞十九二十亦不咼斜二十一二十二不厚二十三不大二十四亦不黧黑二十五無諸可惡二十六鼻不匾𠥶二十七亦不曲戾二十八面色不黑二十九亦不狹長三十三十一亦不窳曲三十二無有一切不可喜相三十四唇舌牙齒悉皆嚴好三十五六七八鼻修高直三十九四十四十一面貌圓滿四十二眉高而長四十三四額廣平正四十五六七人相具足四十八世世所生見佛四十九聞法信受教誨五十此文亦有六根功德利根是六根皆利智慧是意功德不瘖啞是舌功德修高直是鼻功德見佛是眼功德聞法是耳功德餘是身功德後明六根清淨是相似位功德今是相似位前功德耳然此五十功德或具足或不具足或隨得一二隨其功力不可一等也又隨喜是觀行位今明自往分座勸他三種未談理觀是名字位名字功德尚已如此況觀行耶況相似分證及究竟耶四具聽修行阿逸多汝且觀是勸於一人令往聽法功德如此何況一心聽說讀誦而於大衆為人分別如說修行初長文竟二偈頌二初頌內心隨喜功德二頌外聽法人功德今初爾時世尊欲重宣此義而說偈言若人於法會得聞是經典乃至於一偈隨喜為他說如是展轉教至於第五十最後人獲福今當分別之如有大施主供給無量衆具滿八十歲隨意之所欲見彼衰老相髮白而面皺齒疏形枯竭念其死不久我今應當教令得於道果即為方便說涅槃真實法世皆不牢固如水沫泡𦦨汝等咸應當疾生厭離心諸人聞是法皆得阿羅漢具足六神通三明八解脫最後第五十聞一偈隨喜是人福勝彼不可為譬喻如是展轉聞其福尚無量何況於法會初聞隨喜者二頌外聽法人功德四初超頌勸他二頌自往三頌分座四頌具聽修行今初若有勸一人將引聽法華言此經深妙千萬劫難遇即受教往聽乃至須臾聞斯人之福報今當分別說世世無口患齒不疏黃黑唇不厚褰缺無有可惡相舌不乾黑短鼻高修且直額廣而平正面目悉端嚴為人所喜見口氣無臭穢優鉢華之香常從其口出二頌自往若故詣僧坊欲聽法華經須臾聞歡喜今當說其福後生天人中得妙象馬車珍寶之輦輿及乘天宮殿三頌分座若於講法處勸人坐聽經是福因緣得釋梵轉輪座四頌具聽修行何況一心聽解說其義趣如說而修行其福不可限初明初因功德以勸流通竟
