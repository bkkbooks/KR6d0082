body:
  text: 古吳後學蕅益智旭述普門品入文為二初問答二聞品功德初中二初長文二偈頌長文有兩番問答初番為二初問二答今初爾時無盡意菩薩即從座起偏袒右肩合掌向佛而作是言世尊觀世音菩薩以何因緣名觀世音爾時者説東方菩薩竟次應説西方菩薩時也世界説東方生善竟次應説西方生善時為人説東方斷疑竟次應説西方斷疑時對治説東方得道竟次應説西方得道時第一義無盡者境也大品明空則無盡真大集明八十無盡門華嚴明十種不可盡俗淨名云夫無盡者非盡非無盡故名無盡中意者智也即一心三智也智契於境境隨智空名無盡意空又意者世出世之本也智隨于境境多智多名無盡意假又意即法界一切皆是法界故言能觀心性名為上定中而作是言者具二莊嚴故能問也以何因緣者若就衆生則以善惡兩機為因聖人靈智慈悲為緣若就菩薩則以觀智慈悲為因衆生機感為緣也二答三初總答二別答三勸持名答即大佛頂經所明十四無畏也今初佛告無盡意菩薩善男子若有無量百千萬億衆生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫無量百千萬億衆生標十法界種種機也受諸苦惱明別業所感果報各不同也自有一人受一苦一人受多苦多人受一苦多人受多苦今顯人多苦多並為菩薩與拔之境也遭苦由于二世之惡聞名即是二世之善一心稱名有事有理如此善惡合為機感也即時觀其音聲者應之速也皆得解脫者應之普也聞有四義謂聞聞聞不聞不聞聞不聞不聞隨達一種即是四教聞慧一心稱名即四教思修二慧事一心者謂念念相續不起雜想理一心者謂了知此心非自他共亦非無因能稱所稱體是法界也事一心解脫事難理一心解脫理難隨感必應如啐啄同時若夫稱唱纍年不蒙寸效者秖由未臻事一心故然亦能作未來得度因緣故雖散心一稱名號功無虗棄但效有遲速耳二別答三初約口業機明應二約意業機明應三約身業機明應初中二初明七難二結歎初又七初火難至七怨賊難今初若有持是觀世音菩薩名者設入大火火不能燒由是菩薩威神力故持名是善入火是惡善惡合為機感威神力故火不能燒即是應也果報火下從地獄上至初禪皆論機應惡業火下從地獄上至非想皆論機應煩惱火下從地獄上至等覺皆論機應也二水難若為大水所漂稱其名號即得淺處水漂是惡稱名是善以此為機得淺是應也果報水下從地獄上至二禪惡業水通三界煩惱水通九界並論機感三羅剎難若有百千萬億衆生為求金銀琉璃硨磲碼瑙珊瑚琥珀真珠等寶入於大海假使黑風吹其船舫飄墮羅剎鬼國其中若有乃至一人稱觀世音菩薩名者是諸人等皆得解脫羅剎之難以是因緣名觀世音此羅剎難亦是風難果報羅剎在欲界惡業羅剎遍三界煩惱羅剎通九界又果報風至三禪惡業風遍三界煩惱風通九界各論機應並可例解四刀杖難若復有人臨當被害稱觀世音菩薩名者彼所執刀杖尋段段壞而得解脫果報刀杖局在地居惡業刀杖遍三界煩惱刀杖通九界也五鬼難若三千大千國土滿中夜叉羅剎欲來惱人聞其稱觀世音菩薩名者是諸惡鬼尚不能以惡眼視之況復加害鬼難例前羅剎可解言大千滿中者假使之辭意顯煩惱惡鬼彌滿唯稱名能降伏之六枷鎖難設復有人若有罪若無罪杻械枷鎖檢繫其身稱觀世音菩薩名者皆悉斷壞即得解脫有罪是現世惡無罪是過去惡在手曰杻在足曰械在頭曰枷連身曰鎖封名為檢縛名為繫果報枷鎖在欲界惡業枷鎖遍三界煩惱枷鎖通九界也七怨賊難若三千大千國土滿中冤賊有一商主將諸商人齎持重寶經過險路其中一人作是唱言諸善男子勿得恐怖汝等應當一心稱觀世音菩薩名號是菩薩能以無畏施於衆生汝等若稱名者於此怨賊當得解脫衆商人聞俱發聲言南無觀世音菩薩稱其名故即得解脫大千滿中亦假設之辭奪命名冤劫財名賊果報冤賊在欲界惡業冤賊遍三界煩惱冤賊通九界觀心釋者大千滿中冤賊無始煩惱種子集在第八藏識中也有一商主第六識也諸商人遍行別境及諸善心所也重寶出世三乘法也經過險路諸對治法與諸煩惱相遇也其中一人或是勝解或是善慧或是信也一心稱名四教聞思修慧也俱發聲者心王與諸善心所決相應也即得解脫者證于四教所詮理也又此七難即表衆生身有六大火即火大水即水大風即風大刀杖枷鎖皆即地大三千大千以表空大羅剎冤賊以表識大觀音菩薩觀此六大皆如來藏一一即空假中自既解脫故能令他解脫衆生迷此六大之性枉受果報惡業煩惱諸難然正迷時性德無改原與菩薩體同故聞名稱念隨其解有偏圓行有淺深所得四教四益亦有差別究竟終得一切種智則無別也初明七難竟二結歎無盡意觀世音菩薩摩訶薩威神之力巍巍如是巍巍者高顯也功超九界故高名彰三土故顯初約口業機明應竟二約意業機明應二初明三毒二結歎今初若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲若多瞋恚常念恭敬觀世音菩薩便得離瞋若多愚癡常念恭敬觀世音菩薩便得離癡多欲恚癡是惡常念恭敬是善此二為機得離即是應也事欲事恚局在欲界事癡即通三界理三毒者二乘以耽真為欲畏俗為瞋不了生死涅槃如幻為癡出假菩薩以遊戲神通為欲訶厭二乘為瞋不達中道為癡地前菩薩以中道似愛為欲雙捨二邊為瞋無明未破為癡乃至等覺後心猶有微細無明未破即有微細欲恚未除今由大悲菩薩從初發心觀此貪瞋癡等煩惱皆是因緣生法一一即空假中即空故離凡夫三毒即假故離二乘三毒即中故離菩薩三毒成就不可思議三種善根亦是成就不可思議大貪大瞋大癡法門故令常念恭敬之者隨解偏圓隨行淺深得離亦有種種差別究竟歸于無差別也二結歎無盡意觀世音菩薩有如是等大威神力多所饒益是故衆生常應心念二約意業機明應竟三約身業機明應二初明二求二結歎今初若有女人設欲求男禮拜供養觀世音菩薩便生福德智慧之男設欲求女便生端正有相之女宿植德本衆人愛敬求男求女獨標女人者女人以無子為苦夫主所棄並婦所輕旁人所笑故也禮拜供養是機感便生男女是普應也法門解者四教未證實理皆名女人四教各論慧男定女良由大士先證權實男女故能為增上緣令諸行人各得成就諸定慧也又欲界有慧無定是狂男無色有定無慧是癡女四禪定慧均平如福德男端正女也然男無破惑之功女無出生無漏之力此亦無用男女藏通兩教二乘慧能斷見思惑是幹事之男定能發生無漏是育嗣之女然慧不能破無明見佛性則男而不男定不能懷中道子則女猶石女故大經云二乘定多慧少不見佛性菩薩慧多定少亦不見佛性也唯別教初地真明慧發無緣慈成乃名真正男女圓教初住見中道時定慧具足男女相滿故男名福德是有定之慧女名端正是有慧之定也二結歎無盡意觀世音菩薩有如是力若有衆生恭敬禮拜觀世音菩薩福不唐捐唐捐謂虗棄此句兼釋疑也亦有禮拜不得男女者唯由機淺故所求未遂而禮拜之福終必不失也二別答竟三勸持名答三初勸持二格量三結歎今初是故衆生皆應受持觀世音菩薩名號上説觀音得名因緣其力廣大既不辨形質但是述名論德若欲歸崇宜受持名號故結勸持名也良由萬德洪名稱實所召只此一名一字法爾具足三千性相三諦妙理法爾圓收頓漸偏圓權實妙智法爾理智本自不二不二而二理智宛然舉一假名則一切假名一切實法一切國土無不歸趣此假名中是故聞名功德已自不可思議受持功德尤不可思議也持名既爾想彼正報依報亦復如是故知阿彌陀經觀無量經與此妙經同一圓頓甚深希有法門無有優劣二格量無盡意若有人受持六十二億恆河沙菩薩名字復盡形供養飲食衣服臥具醫藥於汝意云何是善男子善女人功德多不無盡意言甚多世尊佛言若復有人受持觀世音菩薩名號乃至一時禮拜供養是二人福正等無異於百千萬億劫不可窮盡文有四意一格量本二問三答四正格量也格量本中共舉四多六十二億恆沙是福田多受持是持名多盡形是時節多飲食等四事供養是種子多以此四多為格量本也問答可知正格量中還舉四少以格四多但一觀世音則福田少持名亦少乃至一時則時少禮拜供養不言四事則種子少而功德正等無異良由真如實際一多無性本自平等故也觀音證此實際故一則非一與多正等六十二億證此實際故多則非多與一正等一中解無量故説六十二億無量中解一故説觀世音耳占察經云能聞我名者即為聞十方佛名亦是此意三結歎無盡意受持觀世音菩薩名號得如是無量無邊福德之利初番問答明衆生三業顯機為境法身靈智冥應境智因緣名觀世音竟次番亦二初問二答今初無盡意菩薩白佛言世尊觀世音菩薩云何遊此娑婆世界云何而為衆生説法方便之力其事云何問有三意一云何遊是問身業二云何説是問口業三方便云何是問意業即是三輪不思議化亦名三不護三無失也不思議化者化作佛身亦即化作佛口佛心乃至化作執金剛神亦即化作金剛心口雖屈曲利物而于法身智慧無所損減故淨名云善能分別諸法相於第一義而不動不動而動名不思議化也問意業云何可化答聖意無能測者若欲示之乃至昆蟲亦令得知故唯識云無上覺者神力難思化無量類皆令有心也不護者住不思議圓普法門實不作意計校籌量次第經營譬如明鏡隨對即現無有分別亦無前後也無失者衆生根機不同淺深有異觀音雖不作念逗機而逗機無失契當前人冥會事理也二答三初別答二總答三勸供養今初佛告無盡意菩薩善男子若有國土衆生應以佛身得度者觀世音菩薩即現佛身而為説法應以辟支佛身得度者即現辟支佛身而為説法應以聲聞身得度者即現聲聞身而為説法應以梵王身得度者即現梵王身而為説法應以帝釋身得度者即現帝釋身而為説法應以自在天身得度者即現自在天身而為説法應以大自在天身得度者即現大自在天身而為説法應以天大將軍身得度者即現天大將軍身而為説法應以毗沙門身得度者即現毗沙門身而為説法應以小王身得度者即現小王身而為説法應以長者身得度者即現長者身而為説法應以居士身得度者即現居士身而為説法應以宰官身得度者即現宰官身而為説法應以婆羅門身得度者即現婆羅門身而為説法應以比丘比丘尼優婆塞優婆夷身得度者即現比丘比丘尼優婆塞優婆夷身而為説法應以長者居士宰官婆羅門婦女身得度者即現婦女身而為説法應以童男童女身得度者即現童男童女身而為説法應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身得度者即皆現之而為説法應以執金剛神得度者即現執金剛神而為説法應以之言答意業方便能知機宜現身答身業説法答口業三業本不相離也此中別明三十三身若并人及非人則是三十五身大佛頂經明三十二應開出獨覺別為一合四婦女但為一略不言迦樓羅文有開合義無增減總而言之止是十法界身耳不言菩薩身者正就菩薩法界廣明現餘九法界像以顯十界互具重重無盡之意也不言地獄界者攝在非人中也若有國土衆生者實報方便同居三種國土十法界機也實報土中純以菩薩而為衆生唯有一佛界機方便土中有九種衆生謂藏教二乘無學通教三乘斷通惑人別三十心圓教十信也有二種機一是佛界機二是菩薩界機也同居土中具足九界衆生及十界機對機設應具須十界佛身又有四教相別辟支又有緣獨不同聲聞又有析法體法四向四果及示隨五味展轉調伏不同既現梵王理應亦現光音遍淨二王既現帝釋理應亦現夜摩兜率化樂三王自在即欲界主大自在即四禪主既云毗沙門亦必現餘三天故佛頂直云四天王也既云小王亦必應現四種輪王既云人非人等言人則老少貴賤何所不收言非人則地獄鬼畜何所不收故下文云以種種形遊諸國土但可意知豈可言盡為説法者隨其所堪或權或實或頓或漸或顯或密令得權實四益究竟終歸一實益耳二總答無盡意是觀世音菩薩成就如是功德以種種形遊諸國土度脫衆生前別答三十五身文廣而意狹此總答如是功德文狹而義廣以種種形則不止三十五身遊諸國土則不局娑婆世界明矣三勸供養二初勸二受旨今初是故汝等應當一心供養觀世音菩薩是觀世音菩薩摩訶薩於怖畏急難之中能施無畏是故此娑婆世界皆號之為施無畏者既名觀世音亦名施無畏者從德受名德既無盡名亦無盡也二受旨六初奉命二不受三重奉四佛勸五受已轉奉六歎結今初無盡意菩薩白佛言世尊我今當供養觀世音菩薩即解頸衆寶珠瓔珞價直百千兩金而以與之作是言仁者受此法施珍寶瓔珞衆寶珠瓔珞者衆寶間珠共為嚴飾也無盡意位高瓔珞何止直百千兩如云百姓萬民不止一百一萬也又頸表中道一實之理以衆多無盡法門莊嚴實相如瓔珞在頸解者表菩薩為常捨行故一切願行功德乃至佛智菩提涅槃亦不住不著無依無倚故言解也大集云戒定慧陀羅尼以為瓔珞莊嚴法身百千是十萬表十地各有萬德也法施者財即是法財是因緣生法即空即假即中三諦一心一切具足於法平等於財亦等如此施者即是法施也二不受時觀世音菩薩不肯受之約事則無盡意奉命供養我未奉命故不肯受禮應遜讓也約表法則不受三昧廣大之用故無所受三重奉無盡意復白觀世音菩薩言仁者愍我等故受此瓔珞或請上愍下或地位相齊亦可相愍或我為四衆故施仁愍四衆而受以無所受而受諸受也四佛勸爾時佛告觀世音菩薩當愍此無盡意菩薩及四衆天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等故受是瓔珞正以菩薩為物故施亦應為物故受也五受已轉奉即時觀世音菩薩愍諸四衆及於天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等受其瓔珞分作二分一分奉釋迦牟尼佛一分奉多寶佛塔秖一法施瓔珞分作二分表一實相舉體作事理二因也奉二佛者表以二因趣二果也理圓即法佛事圓即報佛還以二佛表二果也六歎結無盡意觀世音菩薩有如是自在神力遊於娑婆世界初長文竟二偈頌什公不譯故舊本皆無文句義疏亦皆不釋續高僧傳云偈是闍那掘多所譯今流通本既並增入故科注中依慈雲師所分之科而消釋之大科為三初雙頌兩問二雙頌兩答三雙頌兩勸今初爾時無盡意菩薩以偈問曰世尊妙相具我今重問彼佛子何因緣名為觀世音初句歎佛德次句雙含二問後二句別頌初問也二雙頌兩答二初加頌總歎行願二別頌兩答今初具足妙相尊偈答無盡意汝聽觀音行善應諸方所弘誓深如海歷劫不思議侍多千億佛發大清淨願初二句經家敘辭次六句佛正答也汝聽者誡令生三慧也觀音行者一心三智觀十界音令無量苦一時解脫即已成利他行也善應諸方所者不動真心垂形三土三十二應處處現往即普門神通力也此二句總歎所尅真應二身也弘誓深如海者明其初發心時緣於無作四諦故橫該十界豎徹三諦廣且深也歷劫等者明其中間以行填願所經時久所侍佛多所發願大故得成今真應二身譬如水漲船高泥多佛大也二別頌兩答二初頌前答二頌後答初中二初頌總答二頌別答今初我為汝略説聞名及見身心念不空過能滅諸有苦略説者舉要而言也聞名故稱口業機也見身故禮身業機也心念意業機也諸有二十五有也二頌別答二初頌七難二頌三毒二求初中十二初頌第一火難至十二加頌雷雨難今初假使興害意推落大火坑念彼觀音力火坑變成池念彼觀音者若就佛説觀音為彼即約師弟假分彼此若就衆生念彼觀音即約感應暫分彼此師弟感應無非法界能所宛然能所斯絶衆生念自心中之彼觀音觀音應自心中之彼衆生感應道交不可思議二頌第二水難或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒三加頌墮須彌難或在須彌峰為人所推墮念彼觀音力如日虗空住約事即是假設之辭設使從須彌墮尚不損傷況餘山耶約觀解者本在中道實相性德須彌山王無明惡人推墮二死海中念彼觀音三智三德便同諸佛住無所住四加頌墮金剛山難例須彌難可解或被惡人逐墮落金剛山念彼觀音力不能損一毛五超頌第七冤賊難或值冤賊繞各執刀加害念彼觀音力咸即起慈心六追頌第四刀杖難或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞七追頌第六枷鎖難或囚禁枷鎖手足被杻械念彼觀音力釋然得解脫八加頌呪咀毒藥難呪詛諸毒藥所欲害身者念彼觀音力還著於本人呪使鬼神往殺前人若前人有種種福德所護不可殺者法須還著本人密部明之甚詳須知還著本人亦復具有四悉檀益蘇軾改云兩家俱沒事者見識單淺未知折攝之妙也九追頌第五鬼難或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害十加頌惡獸難若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方十一加頌蛇蠍難蚖蛇及蝮蠍氣毒煙火然念彼觀音力尋聲自回去十二加頌雷雨難雲雷鼓掣電降雹澍大雨念彼觀音力應時得消散正頌七難加頌有五共為十二皆須具約果報惡業煩惱六道四教一一釋之若約所表不出六大須彌金剛亦是地大雷電火大雹雨水大獸蛇呪詛皆表識大菩薩因中觀此六大即空假中今住六種如實之際故遍法界救諸苦惱以要言之一切依正皆是觀音妙色妙心一切衆生于聖色心而自為難如暗中觸寶自傷其身三業求救亦即觀音是故機成即時而應當以此義念念觀之何患不同觀音利物初頌七難竟二頌三毒二求衆生被困厄無量苦逼身觀音妙智力能救世間苦界內界外皆有三毒之苦皆有無男無女之苦故無量也初頌前答竟二頌後答二初正頌示現二加頌顯機顯應初正頌示現長文有別有總別明三十二應總明身多境多今不分總別但通明三輪不思議化即分為三初明身業普應二明意業普觀三明口業普説今初具足神通力廣修智方便十方諸國土無剎不現身種種諸惡趣地獄鬼畜生生老病死苦以漸悉令滅具足神通力者百界千如全體之妙用也廣修智方便者權實二智照性以發通也上文但以非人二字含三惡趣今具出之故知具十法界身也分段變易各有四相之苦以漸悉令滅歸于常寂光或權或實循循善誘合宜而用藥不執方明矣二明意業普觀直觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰無垢清淨光慧日破諸暗能伏災風火普明照世間初一偈明所證體次一偈明所起用也真觀者證不思議空也清淨觀者證不思議假也廣大智慧觀者證不思議中也悲觀者以不思議三觀與諸衆生同一悲仰也慈觀者以不思議三觀與佛如來同一慈力也同慈力故云常願同悲仰故常瞻仰由深證此一心三觀故發無垢清淨光明名為慧日能破十界三惑暗之集諦能伏十界二死災風火之苦諦能與十界道滅而普明照世間也三明口業普説悲體戒雷震慈意妙大雲澍甘露法雨滅除煩惱𦦨欲説大法必依身意以為授法之本為度衆生現身説法故所現身名為大慈悲體與下慈意互舉一字相影略耳先用戒德警人如天震雷物無不肅故云悲體戒雷震也拔苦與樂名為大慈悲意無緣而被名之為妙物無不覆譬如大雲故云慈意妙大雲也諸天甘露服之不死所澍法雨亦復如是聞者悟道證常住命三惑煩惱苦𦦨滅除與拔同時十界皆得度也初正頌示現竟二加頌顯機顯應諍訟經官處怖畏軍陳中念彼觀音力衆冤悉退散長文三十二應應雖屬顯機則或冥或顯不可定判今頌既云念彼觀音則灼然是顯機也諍訟怖畏亦須果報惡業煩惱三釋或此亦是加頌七難偶錯簡耳但云衆冤退散或仍是冥應也二雙頌兩答竟三雙頌兩勸二初頌前番勸持名二頌後番勸供養初中二初明境智深妙以勸常念二明感應難測以勸勿疑今初妙音觀世音梵音海潮音勝彼世間音是故須常念此明菩薩有種種德具種種名一一名字並詮法界圓融不思議德故須念也即權而實名為妙音即實而權名觀世音契本淨性名為梵音契十界機名海潮音權實不二自他不二故勝彼十法界世間音也權即實故他即自故勝于別教所詮九界迷理起惑實即權故自即他故勝于別教所詮佛界緣理斷九也所以觀音一名即與六十二億名號功德正等二明感應難測以勸勿疑念念勿生疑觀世音淨聖於苦惱死厄能為作依怙疑去則念成念成則二死可脫故勸勿疑初頌前番勸持名竟二頌後番勸供養具一切功德慈眼視衆生福聚海無量是故應頂禮頂禮即是三業供養也初問答竟二聞品功德二初持地歎證二經家述益今初爾時持地菩薩即從座起前白佛言世尊若有衆生聞是觀世音菩薩品自在之業普門示現神通力者當知是人功德不少自在之業謂于七難三毒二求皆得大自在也普門示現謂現十法界身方便説法也聞者功德已自不少況受持讀誦解説書寫如説修行者乎然非通別釋題安令聞者獲大功德故須持地菩薩而歎證之大佛頂經云毗舍浮佛摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別悟無生忍聞諸如來宣妙蓮華佛知見地我先證明而為上首蓋既悟地大本如來藏即悟七大皆如來藏既悟七大皆如來藏即悟五陰六入十二處十八界皆如來藏既悟陰入處界皆如來藏即悟七難三毒乃至十法界身皆如來藏故能證此聞品功德也二經家述益佛説是普門品時衆中八萬四千衆生皆發無等等阿耨多羅三藐三菩提心無等等者無上菩提無與等者得此理已等一切法皆成無上如世仙丹無與等者能點他物亦成仙丹此約開顯之圓橫收一切皆歸一實也又究竟佛果無與等者初發心時即便等之如轉輪王無與等者太子初生即便等之此約實相之體豎談因果初後宛然也又心即理理即心心外無理理外無心心之與理但有名字名字性空俱不可説將何物等何物而云無等等耶不可説而説説此心等此理是故言無等等此約雙遮雙照非橫非豎而橫而豎也發心有三一觀行發心二相似發心三分證發心今必是分證也約化他勸流通中二勗受法弟子竟釋普門品竟次釋陀羅尼品陀羅尼品第二十六陀羅尼此翻總持持惡不起持善不失世界又翻遮持能持善為人能遮惡對治遮邊惡持中善第一義衆經用法不同或專治病如療痔等或專護法如此文或專滅罪如方等或通用治病滅罪護經如請觀音等或大神呪大明呪無上呪無等等呪則非治病非滅罪非護經又密部共有三種一佛部自分五部即五佛所説也二菩薩部三鬼神部一一部中各論上中下三法成就增益名上法禳災攝召名中法降伏名下法于上法中又分三品各有行儀各有觀法各有嚴禁而通以無上菩提心為主若無師傳則名盜法若違行儀則招惡報若犯嚴禁輒以功效向他人説則招奇禍並是如來不可思議四悉益物切須依經幸勿乖教舊名為呪新譯名為真言亦名為明或是鬼神王名故能降伏鬼神世界或如軍中密號唱使相應為人或如密默治惡對治或是如來密語如王索先陀婆群下不曉唯有智臣乃能知之洗時奉水飲時奉器食時奉鹽遊時奉馬陀羅尼亦爾秪是一法遍有諸力病愈罪除善生道合第一義故存本音不翻譯也三呪護者惡世弘經每多惱難故以真言護之使道流通也文為四初問持經功德二答甚多三請以呪護四聞品得益今初爾時藥王菩薩即從座起偏袒右肩合掌向佛而白佛言世尊若善男子善女人有能受持法華經者若讀誦通利若書寫經卷得幾所福二答甚多佛告藥王若有善男子善女人供養八百萬億那由他恆河沙等諸佛於汝意云何其所得福寧為多不甚多世尊佛言若善男子善女人能於是經乃至受持一四句偈讀誦解義如説修行功德甚多三請以呪護五初藥王二勇施三毗沙門四持國五羅剎女初中四初請二説三歎四印今初爾時藥王菩薩白佛言世尊我今當與説法者陀羅尼呪以守護之呪是華言謂禁呪呪祝呪願也祕密不翻乃以此名目之今華梵雙舉故云陀羅尼呪二説即説呪曰安爾一曼爾二摩禰三摩摩禰四旨隸五遮梨第六賖咩莫者切七賖履多瑋八羶帝九目帝十目多履十一娑履十二阿瑋娑履十三桑履十四娑履十五叉裔十六阿叉裔十七阿耆膩十八羶帝十九賖履二十陀羅尼二十一阿盧伽婆娑蘇奈切簸蔗毗叉膩二十二禰毗剃二十三阿便哆邏禰履剃二十四阿亶多罕切哆波隸輸地二十五歐究隸二十六牟究𨽻二十七阿羅隸二十八波羅隸二十九首迦差初凡切三十阿三磨三履三十一佛陀毗吉利帙音姪帝三十二達磨波利差猜離切帝三十三僧伽涅瞿沙禰三十四婆舍婆舍輸地三十五曼哆邏三十六曼哆羅邏叉夜多三十七郵樓哆三十八郵樓哆憍舍略來加切三十九惡叉邏四十惡叉冶多冶四十一阿婆盧四十二阿摩若荏切那多夜四十三三歎世尊是陀羅尼神呪六十二億恆河沙等諸佛所説若有侵毀此法師者則為侵毀是諸佛已四印時釋迦牟尼佛讚藥王菩薩言善哉善哉藥王汝愍念擁護此法師故説是陀羅尼於諸衆生多所饒益二勇施三初請二説三歎今初爾時勇施菩薩白佛言世尊我亦為擁護讀誦受持法華經者説陀羅尼若此法師得是陀羅尼若夜叉若羅剎若富單那若吉蔗若鳩槃茶若餓鬼等伺求其短無能得便富單那熱病鬼也吉蔗起尸鬼也二説即於佛前而説呪曰痤誓螺切隸一摩訶痤隸二郁枳音紙三目枳四阿隸五阿羅婆第六涅隸第七涅隸多婆第八伊緻者利切柅女紙切九韋緻柅十旨緻柅十一涅隸墀柅十二涅梨墀婆底十三三歎世尊是陀羅尼神呪恆河沙等諸佛所説亦皆隨喜若有侵毀此法師者則為侵毀是諸佛已三毗沙門三初請二説三歎今初爾時毗沙門天王護世者白佛言世尊我亦為愍念衆生擁護此法師故説是陀羅尼二説即説呪曰阿梨一那梨二䨲那梨三阿那盧四那履五拘那履六三歎世尊以是神呪擁護法師我亦自當擁護持是經者令百由旬內無諸衰患四持國三初請二説三歎今初爾時持國天王在此會中與千萬億那由他乾闥婆衆恭敬圍繞前詣佛所合掌白佛言世尊我亦以陀羅尼神呪擁護持法華經者二説即説呪曰阿伽禰一伽禰二瞿利三乾陀利四旃陀利五摩蹬音鄧耆六常求利七浮樓莎柅八頞底九三歎世尊是陀羅尼神呪四十二億諸佛所説若有侵毀此法師者則為侵毀是諸佛已五羅剎女五初列名同請二説三歎四誓五印今初爾時有羅剎女等一名藍婆二名毗藍婆三名曲齒四名華齒五名黑齒六名多髮七名無厭足八名持瓔珞九名臯帝十名奪一切衆生精氣是十羅剎女與鬼子母并其子及眷屬俱詣佛所同聲白佛言世尊我等亦欲擁護讀誦受持法華經者除其衰患若有伺求法師短者令不得便二説即於佛前而説呪曰伊提履一伊提泯二伊提履三阿提履四伊提履五泥履六泥履七泥履八泥履九泥履十樓醯十一樓醯十二樓醯十三樓醯十四多醯十五多醯十六多醯十七兜醯十八䨲醯十九三歎寧上我頭上莫惱於法師若夜叉若羅剎若餓鬼若富單那若吉蔗若毗陀羅若犍馱若烏摩勒伽若阿跋摩羅若夜叉吉蔗若人吉蔗若熱病若一日若二日若三日若四日若至七日若常熱病若男形若女形若童男形若童女形乃至夢中亦復莫惱即於佛前而説偈言若不順我呪惱亂説法者頭破作七分如阿梨樹枝如殺父母罪亦如壓油殃斗稱欺誑人調達破僧罪犯此法師者當獲如是殃毗陀羅赤色鬼犍陀黃色鬼烏摩勒伽烏色鬼阿跋摩羅青色鬼阿梨樹枝墮地法爾破為七片殺父殺母破僧是五逆之三壓油殃者西國壓油搗麻使生蟲然後壓之汁多而肥此殺業之尤斗稱欺誑人者出用輕小入用重大此盜業之尤故有震銘其背者罪惡亦不輕也四誓諸羅剎女説此偈已白佛言世尊我等亦當身自擁護受持讀誦修行是經者令得安隱離諸衰患消衆毒藥五印佛告諸羅剎女善哉善哉汝等但能擁護受持法華名者福不可量何況擁護具足受持供養經卷華香瓔珞末香塗香燒香幡蓋伎樂然種種燈酥燈油燈諸香油燈酥摩那華油燈薝蔔華油燈婆師迦華油燈優鉢羅華油燈如是等百千種供養者皋帝汝等及眷屬應當擁護如是法師三請以呪護竟四聞品得益説是陀羅尼品時六萬八千人得無生法忍釋陀羅品呪護竟次釋妙莊嚴王本事品妙莊嚴王本事品第二十七此因緣出他經昔佛末法有四比丘于法華經極生殷重始則研求未悟結契入山既又助道艱難不能專志其一人云吾等四窮尚不存身法將安寄君三人者但以命奉道莫慮朝中我當捨此身力誓給所須於是三人得展其誠功超纍劫而此一人數涉人間道力未固偶逢王駕羡彼光榮福力所資隨念受報人中天上常得為王享受既久漸起過患三人以道眼見之議共濟度知其著欲兼復邪見若非愛鉤無由可拔故一為其婦二為其子具如今經所明婦即妙音菩薩王即華德菩薩二子即是藥王藥上妙音處處弘經藥王説呪護法流通妙典四聖功深説彼前緣故名妙莊嚴本事品也世界又妙莊嚴者妙法功德莊嚴六根也此王往日與妙法有緣道熏時熟諸根應淨生雖未獲其理必臻故靈瑞感通嘉名早立例如善吉雖未無諍已號空生下文云八萬四千歲精進修行妙法華經得一切淨功德莊嚴三昧以是義故名為妙莊嚴也嘉名早立是為人精進修行是對治得三昧是第一義本迹者迹則當時一凡三聖本則四皆是大菩薩為欲引導彼時眷屬及諸衆生故也觀心者于諸見不動而通達正見統御無外名為妙莊嚴王約化他勸流通中四明人護六初明事本二雙標所化能化三明能化方便四明所化得益五結會古今六聞品悟道今初爾時佛告諸大衆乃往古世過無量無邊不可思議阿僧祇劫有佛名雲雷音宿王華智多陀阿伽度阿羅訶三藐三佛陀國名光明莊嚴劫名喜見二雙標所化能化彼佛法中有王名妙莊嚴其王夫人名曰淨德有二子一名淨藏二名淨眼是二子有大神力福德智慧久修菩薩所行之道所謂檀波羅蜜尸羅波羅蜜羼提波羅蜜毗離耶波羅蜜禪波羅蜜般若波羅蜜方便波羅蜜慈悲喜捨乃至三十七品助道法皆悉明了通達又得菩薩淨三昧日星宿三昧淨光三昧淨色三昧淨照明三昧長莊嚴三昧大威德藏三昧於此三昧亦悉通達王是所化夫人二子是能化也別顯二子功德大神力是如來衣大福德是如來室大智慧是如來座六度加方便為七或于權慧開出方願力智則為十度今但云方便即攝餘三慈悲喜捨是四無量心三十七品有經名為正道以其是慧行故此中指為助道以七科豎入故意指十度以為正道然圓教十度四等三十七品並是稱性無作妙道非正非助一往隨義名正助耳禪中具有三昧道品中亦節節有三昧今更標七三昧名皆是隨用立名其理不異也圓離三垢名淨三昧實智如日權智如星權實不二名日星宿三昧性淨發光名淨光三昧普現色身名淨色三昧性淨光明照了諸法名淨照明三昧示現莊嚴長時不滅名長莊嚴三昧十力威德含攝諸法名大威德藏三昧三明能化方便三初時至二論議三現化今初爾時彼佛欲引導妙莊嚴王及愍念衆生故説是法華經彼佛出世常宣正法觀于王及衆生機熟時至乃説是法説是法華即王得度時至故也二論議時淨藏淨眼二子到其母所合十指爪掌白言願母往詣雲雷音宿王華智佛所我等亦當侍從親近供養禮拜所以者何此佛於一切天人衆中説法華經宜應聽受母告子言汝父信受外道深著婆羅門法汝等應往白父與共俱去淨藏淨眼合十指爪掌白母我等是法王子而生此邪見家母告子言汝等當憂念汝父為現神變若得見者心必清淨或聽我等往到佛所子白母時至母讓令化父子怨生邪見家母責令憂念父此約化儀機緣既熟應須發起故也若據其本則子母元知若附世情則母慈先白若約利他則慈復居先三現化於是二子念其父故涌在虗空高七多羅樹現種種神變於虗空中行住坐臥身上出水身下出火身下出水身上出火或現大身滿虗空中而復現小小復現大於空中滅忽然在地入地如水履水如地現如是等種種神變令其父王心淨信解三明能化方便竟四明所化得益十初信子伏師二白母求出家三重催見佛四敘歎功德五俱詣佛所六佛授王記七出家修行八稱歎二子九佛述行高十讚佛自誓今初時父見子神力如是心大歡喜得未曾有合掌向子言汝等師為是誰誰之弟子二子白言大王彼雲雷音宿王華智佛今在七寶菩提樹下法座上坐於一切世間天人衆中廣説法華經是我等師我是弟子父語子言我今亦欲見汝等師可共俱往王昔信受外道所覩邪變不過或一或二狹而且陋故今見子所作信伏其師而求見也二白母求出家於是二子從空中下到其母所合掌白母父王今已信解堪任發阿耨多羅三藐三菩提心我等為父已作佛事願母見聽於彼佛所出家修道爾時二子欲重宣其意以偈白母願母放我等出家作沙門諸佛甚難值我等隨佛學如優曇鉢華值佛復難是脫諸難亦難願聽我出家母即告言聽汝出家所以者何佛難值故父王已信宮中八萬四千又熟故白母稱慶願求出家而母亦聽之也三重催見佛於是二子白父母言善哉父母願時往詣雲雷音宿王華智佛所親近供養所以者何佛難得值如優曇鉢羅華又如一眼之龜值浮木孔而我等宿福深厚生值佛法是故父母當聽我等令得出家所以者何諸佛難值時亦難遇一眼龜者約事秖是譬難值耳若約表法凡龜魚之眼兩向看之既云一眼則所見非正在生死海而又邪見何能值于佛法浮木實諦之孔四敘歎功德彼時妙莊嚴王後宮八萬四千人皆悉堪任受持是法華經淨眼菩薩於法華三昧久已通達淨藏菩薩已於無量百千萬億劫通達離諸惡趣三昧欲令一切衆生離諸惡趣故其王夫人得諸佛集三昧能知諸佛祕密之藏二子如是以方便力善化其父令心信解好樂佛法法華三昧者攝一切法歸一實相如前説離諸惡趣三昧者九界三惑以為能趣二種生死以為所趣圓道正定乃能離之即二十五王三昧圓破二十五有也佛集三昧者三德祕密之藏佛集其中唯佛行處也五俱詣佛所聞法供養見瑞歡喜於是妙莊嚴王與群臣眷屬俱淨德夫人與後宮采女眷屬俱其王二子與四萬二千人俱一時共詣佛所到已頭面禮足繞佛三匝却住一面爾時彼佛為王説法示教利喜王大歡悅爾時妙莊嚴王及其夫人解頸真珠瓔珞價直百千以散佛上於虗空中化成四柱寶臺臺中有大寶牀敷百千萬天衣其上有佛結加趺坐放大光明爾時妙莊嚴王作是念佛身希有端嚴殊特成就第一微妙之色成就第一微妙之色猶龍女所讚微妙淨法身具相三十二也已悟色之實相故佛旋與授記六佛授王記時雲雷音宿王華智佛告四衆言汝等見是妙莊嚴王於我前合掌立不此王於我法中作比丘精勤修習助佛道法當得作佛號娑羅樹王國名大光劫名大高王其娑羅樹王佛有無量菩薩衆及無量聲聞其國平正功德如是七出家修行其王即時以國付弟與夫人二子并諸眷屬於佛法中出家修道王出家已於八萬四千歲常勤精進修行妙法華經過是已後得一切淨功德莊嚴三昧八稱歎二子即升虗空高七多羅樹而白佛言世尊此我二子已作佛事以神通變化轉我邪心令得安住於佛法中得見世尊此二子者是我善知識為欲發起宿世善根饒益我故來生我家九佛述行高爾時雲雷音宿王華智佛告妙莊嚴王言如是如是如汝所言若善男子善女人種善根故世世得善知識其善知識能作佛事示教利喜令入阿耨多羅三藐三菩提大王當知善知識者是大因緣所以化導令得見佛發阿耨多羅三藐三菩提心大王汝見此二子不此二子已曾供養六十五百千萬億那由他恆河沙諸佛親近恭敬於諸佛所受持法華經愍念邪見衆生令住正見善知識有三一外護二同行三教授也又有三一諸佛菩薩二道品六度三實際實相六種知識皆能作于佛事教授及佛菩薩二種則能示教利喜教授同行及諸菩薩三種則能化導令得見佛實相實際則能令入菩提此六並有全力並不可缺故云是大因緣十讚佛自誓妙莊嚴王即從虗空中下而白佛言世尊如來甚希有以功德智慧故頂上肉髻光明顯照其眼長廣而紺青色眉間毫相白如珂月齒白齊密常有光明脣色赤好如頻婆果爾時妙莊嚴王讚歎佛如是等無量百千萬億功德已於如來前一心合掌復白佛言世尊未曾有也如來之法具足成就不可思議微妙功德教戒所行安隱快善我從今日不復自隨心行不生邪見憍慢瞋恚諸惡之心説是語已禮佛而出深達實相故外欽佛德內革己心如悟冰水同一濕性以湯消冰永不凝結也四明所化得益竟五結會古今佛告大衆於意云何妙莊嚴王豈異人乎今華德菩薩是其淨德夫人今佛前時放光照于東方所召之莊嚴相菩薩是哀愍妙莊嚴王及諸眷屬故於彼光明莊嚴國土中生其二子者今藥王菩薩藥上菩薩是是藥王藥上菩薩成就如此諸大功德已於無量百千萬億諸佛所植衆德本成就不可思議諸善功德若有人識是二菩薩名字者一切世間諸天人民亦應禮拜六聞品悟道佛説是妙莊嚴王本事品時八萬四千人遠塵離垢於諸法中得法眼淨於諸法中得法眼淨即遍照三千相性假實諸法通達無滯無染著也或是分證或是相似後心二約化他勸流通竟三約自行勸流通普賢菩薩勸發品第二十八梵音邲輸陀大論觀經皆譯遍吉此經譯為普賢普即遍義賢即吉義等覺居衆伏之頂伏道周遍故名為普斷道將盡所較無幾鄰終際極故名為賢如十四夜月鄰似十五夜月也大佛頂經云我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就今言勸發者戀法之辭遙在彼國具聞此經始末既周欲令自行化他永永無已故自東而來更請正説勸發自行更請流通勸發化他復以誓願而總勸發文具四悉檀意我為供養法華經故自現其身若見我身甚大歡喜世界悉也以見我故轉復精進即得三昧及陀羅尼為人悉也無有非人能破壞者亦復不為女人惑亂對治悉也剎塵菩薩具普賢道第一義悉也以此四悉檀因緣故來勸發上判流通文為三神力囑纍二品正明付囑流通藥王下五品舉菩薩化道力大以勸流通今此一品舉普賢誓願力大以勸流通也文分為四初發來二勸發三述發四發益初發來三初上供二下化三修敬今初爾時普賢菩薩以自在神通力威德名聞與大菩薩無量無邊不可稱數從東方來所經諸國普皆震動雨寶蓮華作無量百千萬億種種伎樂自在是理一神通是行一威德是人一名聞是教一又自在是常精通是樂威德是我名聞是淨言説如此即一而四德無不備也威德故震動名聞故雨華神通故作樂自在故隨動隨雨隨作譬如大龍飛行雲雨流起此是心力法力衆生力應化力不思議力所致以此四德妙力遠來勸發四一所經歷處自行上供其事如此問華嚴明普賢菩薩依真而住非國土今何故云從東方來答彼經顯示所證自體此經且據應迹所從夫真如法性初住已能分證何況普賢應迹所從多寶亦云東方又何況普賢若知真性之外無國土則知國土之外亦非別有真可住矣二下化又與無數諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等大衆圍繞各現威德神通之力隨他所宜現八部像主伴並具四德舉二攝二故云各現威德神通之力當知所隨皆法身也又與大菩薩是示現實功德與諸八部是示現權功德權實並具四德並有上供下化二意三修敬到娑婆世界耆闍崛山中頭面禮釋迦牟尼佛右繞七匝初發來竟二勸發二初請問勸發二誓願勸發初中二初問二答今初白佛言世尊我於寶威德上王佛國遙聞此娑婆世界説法華經與無量無邊百千萬億諸菩薩衆共來聽受惟願世尊當為説之若善男子善女人於如來滅後云何能得是法華經當為説之更請正説流通之要旨也云何能得是經謂得正説流通之妙解也請正説是勸發自行請流通是勸發化他欲令妙法光流無極乃戀法無已之極思也二答佛告普賢菩薩若善男子善女人成就四法於如來滅後當得是法華經一者為諸佛護念二者植衆德本三者入正定聚四者發救一切衆生之心善男子善女人如是成就四法於如來滅後必得是經普賢菩薩既雙請正説流通今佛亦以四法而雙答之先答正説者開權顯實也佛于衆生雖復大慈平等普度而諸衆生迷背法性如覆盆之下自隔日光若能遠惡世界從善為人返迷對治歸悟第一義開衆生知見顯佛知見者則稱可聖心是為諸佛護念法身若佛知見開則般若照明是為植衆德本亦即不亂不味不取不捨是為入正定聚般若亦即上合慈力下同悲仰是為發救衆生之心解脫當知四法秖是開權顯實證圓三德也又諸佛護念是開佛知見植衆德本是示佛知見入正定聚是入佛知見發救生心是悟佛知見迹門之要此四收矣又迹則有本從本三德故有迹中三德從本開示悟入故有迹中開示悟入今開迹即顯本本迹無二無別故以四法答其請正説也次答流通者流通之要唯三唯四今諸佛護念入正定聚即著如來衣植衆德本即坐如來座發救生心即入如來室又諸佛護念即身安樂行植衆德本即口安樂行入正定聚即意安樂行發救生心即誓願安樂行故以四法答其請流通也一答酬其兩請舉四冠一經遠來勸發其義如此能行四法必解經體故云必得是經此結成正説之請也能運此解傳與他人他人得此信解成初依人若得真解成第二第三第四依人此結成流通之請也初請問勸發竟二誓願勸發二初誓願護人二誓願護法初中六初攘其外難二教以內法三覆以神力四示近因五示近果六總結勸今初爾時普賢菩薩白佛言世尊於後五百歲濁惡世中其有受持是經典者我當守護除其衰患令得安隱使無伺求得其便者若魔若魔子若魔女若魔民若為魔所著者若夜叉若羅剎若鳩槃茶若毗舍闍若吉蔗若富單那若韋陀羅等諸惱人者皆不得便韋陀羅主厭禱鬼也此翻善妙二教以內法又三初行立讀誦二若坐思惟三三七精進今初是人若行若立讀誦此經我爾時乘六牙白象王與大菩薩衆俱詣其所而自現身供養守護安慰其心亦為供養法華經故二若坐思惟是人若坐思惟此經爾時我復乘白象王現其人前其人若於法華經有所忘失一句一偈我當教之與共讀誦還令通利爾時受持讀誦法華經者得見我身甚大歡喜轉復精進以見我故即得三昧及陀羅尼名為旋陀羅尼百千萬億旋陀羅尼法音方便陀羅尼得如是等陀羅尼旋者旋假入空也百千萬億者旋空入假也法音方便者二為方便得入中道第一義也三三七精進世尊若後世後五百歲濁惡世中比丘比丘尼優婆塞優婆夷求索者受持者讀誦者書寫者欲修習是法華經於三七日中應一心精進滿三七日已我當乘六牙白象與無量菩薩而自圍繞以一切衆生所喜見身現其人前而為説法示教利喜亦復與其陀羅尼呪得是陀羅尼故無有非人能破壞者亦不為女人之所惑亂我身亦自常護是人惟願世尊聽我説此陀羅尼呪即於佛前而説呪曰阿檀地一檀陀婆地二檀陀婆帝三檀陀鳩舍隸四檀陀修陀隸五修陀隸六修陀羅婆底七佛陀波羶禰八薩婆陀羅尼阿婆多尼九薩婆婆沙阿婆多尼十修阿婆多尼十一僧伽婆履叉尼十二僧伽涅伽陀尼十三阿僧祇十四僧伽婆伽地十五帝隸阿隋僧伽兜略盧遮切阿羅帝波羅帝十六薩婆僧伽地三摩地伽蘭地十七薩婆達磨修波利剎帝十八薩婆薩埵樓馱憍舍略阿䨲伽地十九辛阿毗吉利地帝二十二教以內法竟三覆以神力世尊若有菩薩得聞是陀羅尼者當知普賢神通之力若法華經行閻浮提有受持者應作此念皆是普賢威神之力四示勝因若有受持讀誦正憶念解其義趣如説修行當知是人行普賢行於無量無邊諸佛所深種善根為諸如來手摩其頭行普賢行同未來佛得脫也深種善根於過去佛得種也手摩其頭為現在佛所熟也五示近果若但書寫是人命終當生忉利天上是時八萬四千天女作衆伎樂而來迎之其人即著七寶冠於采女中娛樂快樂何況受持讀誦正憶念解其義趣如説修行若有人受持讀誦解其義趣是人命終為千佛授手令不恐怖不墮惡趣即往兜率天上彌勒菩薩所彌勒菩薩有三十二相大菩薩衆所共圍繞有百千萬億天女眷屬而於中生有如是等功德利益但能書寫近生忉利具五法師能生兜率得為補處眷屬也問何不生安樂土耶答若發淨願則隨其觀行淺深生四種安樂土不發淨願則隨其五品功成生兜率也六總結勸是故智者應當一心自書若使人書受持讀誦正憶念如説修行初發願護人竟二誓願護法世尊我今以神通力故守護是經於如來滅後閻浮提內廣令流布使不斷絶二勸發竟三述發二初先述護法二述護人今初爾時釋迦牟尼佛讚言善哉善哉普賢汝能護助是經令多所衆生安樂利益汝已成就不可思議功德深大慈悲從久遠來發阿耨多羅三藐三菩提意而能作是神通之願守護是經我當以神通力守護能受持普賢菩薩名者聞法華經受持法華皆是普賢神力聞普賢名受持普賢名字皆是如來神力即兼述護人中第三覆以神力也二述護人五初述第二教以內法二述第四示勝因三述第五示近果四述第一攘外難五述總結勸今初普賢若有受持讀誦正憶念修習書寫是法華經者當知是人則見釋迦牟尼佛如從佛口聞此經典當知是人供養釋迦牟尼佛當知是人佛讚善哉當知是人為釋迦牟尼佛手摩其頭當知是人為釋迦牟尼佛衣之所覆見釋迦佛不但見六牙白象普賢身也從佛口聞不但普賢共讀誦也佛讚善哉手摩衣覆不但普賢呪護也讚善是空座行成手摩是慈室行成衣覆是忍衣行成二述第四示勝因如是之人不復貪著世樂不好外道經書手筆亦復不喜親近其人及諸惡者若屠兒若畜豬羊雞狗若獵師若衒賣女色是人心意質直有正憶念有福德力是人不為三毒所惱亦不為嫉妬我慢邪慢增上慢所惱是人少欲知足能修普賢之行三述第五示近果普賢若如來滅後後五百歲若有人見受持讀誦法華經者應作是念此人不久當詣道場破諸魔衆得阿耨多羅三藐三菩提轉法輪擊法鼓吹法螺雨法雨當坐天人大衆中師子法座上普賢若於後世受持讀誦是經典者是人不復貪著衣服臥具飲食資生之物所願不虗亦於現世得其福報當詣道場必成遠果何止忉利兜率之近果耶雖不貪著四事亦於現世得其福報何止命終方生天耶四述第一攘外難若有人輕毀之言汝狂人耳空作是行終無所獲如是罪報當世世無眼若有供養讚歎之者當於今世得現果報若復見受持是經者出其過惡若實若不實此人現世得白癩病若輕笑之者當世世牙齒疏缺醜脣平鼻手腳繚戾眼目角睞身體臭穢惡瘡膿血水腹短氣諸惡重病佛廣示毀者之罪令知過必改不相惱亂非但持經者難滅亦乃欲毀者福生無毀無難彼此安樂曠濟無偏慈之至也五述總結勸是故普賢若見受持是經典者當起遠迎當如敬佛三述發竟四發益二初聞品益二聞經益今初説是普賢勸發品時恆河沙等無量無邊菩薩得百千萬億旋陀羅尼三千大千世界微塵等諸菩薩具普賢道百千萬億旋陀羅尼秖是法界差別智耳具普賢道是滿足十地鄰極至聖也二聞經益佛説是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切大會皆大歡喜受持佛語作禮而去三事歡喜如前説此中云何猶稱聲聞乃經家存其本位耳又經家稱其為大乘聲聞以佛道聲令一切聞也跋語嗚呼圓頓妙法曠劫難逢繄我愚蒙何緣幸遘每一披閲恍若夙聞豈非普賢威神之力釋迦守護之功耶智者大師不可復作後賢堅執鬪諍滋生圓融絶待法門幾成彼此是非情見弘之者城塹益高益深望之者疑畏日新日盛耳聞目擊扼腕痛心不揣疏庸聊為介紹舉筆于己丑之十一月初五日甫成一序病臥半月至十九日方得勉強從事旦夕孳孳手不停書目不停閲臘月二十六日僅完三卷經文計得會義八卷歇節三日庚寅元旦隨即試筆又歷一月方得告成共計會義一十六卷足運心力六十八日嗟嗟曾聞古人一炷香中即能朗誦華嚴一部而旭也根鈍矻矻乃爾亦可嗤矣然以此誘接初學令得漸悟法華實相不終按劍亦不望洋則釋迦普賢及與智者皆必鑒旭苦心也夫庚寅仲春朔日巳刻閣筆故跋妙法蓮華經懸談一卷清淨挺著卍云收于閲經十二種第六故省于此
